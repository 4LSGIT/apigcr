<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automation Manager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ══════════════════════════════════════════════
       SHELL — owns topbar + tab switcher + iframe container only.
       Engine-specific styles live inside sub-pages.
       ══════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1a1a2e;
      --navy2:   #16213e;
      --blue:    #4f8ef7;
      --blue2:   #3a7de8;
      --green:   #22c55e;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --purple:  #8b5cf6;
      --bg:      #f1f5f9;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --muted:   #94a3b8;
      --text:    #1e293b;
      --text2:   #475569;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Topbar ── */
    #topbar {
      background: var(--navy);
      color: #fff;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 0;
      flex-shrink: 0;
      border-bottom: 2px solid var(--blue);
    }

    #topbar .title {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.02em;
      margin-right: 24px;
      white-space: nowrap;
    }
    #topbar .title span { color: var(--blue); }

    .tab-nav {
      display: flex;
      height: 100%;
      gap: 2px;
      flex: 1;
    }

    .tab-nav-btn {
      height: 100%;
      padding: 0 20px;
      border: none;
      background: none;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }
    .tab-nav-btn:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.05); }
    .tab-nav-btn.active { color: #fff; border-bottom-color: var(--blue); }

    .topbar-actions { display: flex; gap: 8px; margin-left: auto; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px; border: none;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue2); }
    .btn-ghost { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-ghost:hover { background: rgba(255,255,255,0.18); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Iframe container ── */
    .subpage-panel {
      display: none;
      flex: 1;
      overflow: hidden;
    }
    .subpage-panel.active { display: flex; }
    .subpage-panel iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    /* ── Scrollbar (inherited by iframe-less parts only) ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Topbar (generated into by boot script) ── -->
<div id="topbar">
  <div class="title">Yisra<span>Case</span> — Automation</div>
  <div class="tab-nav" id="tab-nav"></div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" id="btn-refresh" style="display:none" onclick="onTopbarRefresh()" title="Refresh">
      <i class="fa-solid fa-rotate-right"></i>
    </button>
    <button class="btn btn-danger" id="btn-delete" style="display:none" onclick="onTopbarDelete()">
      <i class="fa-solid fa-trash"></i> Delete
    </button>
    <button class="btn btn-primary" id="btn-save" style="display:none" onclick="onTopbarSave()">
      <i class="fa-solid fa-floppy-disk"></i> Save
    </button>
    <button class="btn btn-primary" id="btn-new" style="display:none" onclick="onTopbarNew()">
      <i class="fa-solid fa-plus"></i> <span id="btn-new-label">New</span>
    </button>
  </div>
</div>

<!-- ── Sub-page panels (generated by boot script) ── -->
<div id="subpages-root" style="flex:1;display:flex;flex-direction:column;overflow:hidden"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// AUTOMATION MANAGER — SHELL
// ═══════════════════════════════════════════════════════════════
//
// Owns: tab switcher, top bar buttons, sub-page registry, lifecycle
//       protocol, parent bridges (apiSend relay, firmData getter,
//       firmData helpers).
//
// Sub-pages are iframes; they communicate with the shell only via:
//   - window.parent.apiSend(...)                     (relay to a.html)
//   - window.parent.firmData                         (live getter)
//   - window.parent.fdPhoneLines() etc.              (helpers)
//   - window.parent.fdPhoneLineSelectHtml() etc.     (select/datalist builders)
//   - window.parent.setTopbarButtons({...})          (button visibility)
//   - by exposing lifecycle hooks (onShow, onHide, onSave, onDelete,
//     onRefresh, onNew) on their own window, which the shell calls.
// ═══════════════════════════════════════════════════════════════

// ── Parent bridges ─────────────────────────────────────────────
// apiSend: relay. Sub-pages call window.parent.apiSend(...). We
// forward to a.html's apiSend. Function declaration so it's
// globally accessible via window.apiSend.
function apiSend(...args) {
  return window.parent.apiSend(...args);
}

// firmData: live getter. Returns the parent's firmData object by
// reference, so any read picks up the current state (including
// any future re-assignment in a.html). Sub-pages read it as
// window.parent.firmData.
Object.defineProperty(window, 'firmData', {
  get()  { return window.parent ? window.parent.firmData : undefined; },
  configurable: true,
});

// ── firmData helpers (lifted from the 4.1 monolith block) ──────
// These live in the shell so all four sub-pages share a single
// source. Sub-pages call window.parent.fdPhoneLines() etc.
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fdPhoneLines()  { return (window.parent?.firmData?.phoneLines)  || []; }
function fdEmailFroms()  { return (window.parent?.firmData?.emailFrom)   || []; }
function fdUsers()       { return (window.parent?.firmData?.users)       || []; }
function fdCurrentUser() { return window.parent?.firmData?.currentUser   || null; }

function fdPhoneLineSelectHtml(id, currentValue) {
  const lines = fdPhoneLines();
  if (!lines.length) {
    return `<input id="${id}" value="${esc(currentValue || '')}">`;
  }
  const cur = String(currentValue || '');
  const inList = lines.some(l => String(l.phone_number) === cur);
  const customOpt = (cur && !inList)
    ? `<option value="${esc(cur)}" selected>${esc(cur)} (not in firmData)</option>`
    : '';
  const blankOpt = cur ? '' : `<option value="" selected>— select a phone line —</option>`;
  const opts = lines.map(l => {
    const label = `${l.display_name || l.phone_number} (${l.phone_number}${l.provider ? `, ${l.provider}` : ''})`;
    return `<option value="${esc(l.phone_number)}" ${String(l.phone_number) === cur ? 'selected' : ''}>${esc(label)}</option>`;
  }).join('');
  return `<select id="${id}">${blankOpt}${customOpt}${opts}</select>`;
}

function fdEmailFromSelectHtml(id, currentValue) {
  const emails = fdEmailFroms();
  if (!emails.length) {
    return `<input id="${id}" value="${esc(currentValue || '')}">`;
  }
  const cur = String(currentValue || '');
  const inList = emails.some(e => String(e.email) === cur);
  const customOpt = (cur && !inList)
    ? `<option value="${esc(cur)}" selected>${esc(cur)} (not in firmData)</option>`
    : '';
  const blankOpt = cur ? '' : `<option value="" selected>— select a sender —</option>`;
  const opts = emails.map(e => {
    const label = e.from_name
      ? `${e.from_name} <${e.email}>${e.provider ? ` (${e.provider})` : ''}`
      : `${e.email}${e.provider ? ` (${e.provider})` : ''}`;
    return `<option value="${esc(e.email)}" ${String(e.email) === cur ? 'selected' : ''}>${esc(label)}</option>`;
  }).join('');
  return `<select id="${id}">${blankOpt}${customOpt}${opts}</select>`;
}

function fdParamSourceDatalistHtml(datalistId) {
  const contactFields = [
    { name: 'contact_id',    note: 'primary key' },
    { name: 'contact_fname', note: 'first name' },
    { name: 'contact_lname', note: 'last name' },
    { name: 'contact_name',  note: 'full name (computed)' },
    { name: 'contact_pname', note: 'preferred name' },
    { name: 'contact_phone', note: 'primary phone' },
    { name: 'contact_email', note: 'primary email' },
    { name: 'contact_city',  note: 'city' },
    { name: 'contact_state', note: 'state' },
    { name: 'contact_zip',   note: 'zip' }
  ];
  const cfOpts = contactFields.map(f =>
    `<option value="${esc(f.name)}" label="[contact] ${esc(f.note)}"></option>`
  ).join('');
  const plOpts = fdPhoneLines().map(l => {
    const label = `[phone] ${l.display_name || ''} — ${l.phone_number}`;
    return `<option value="'${esc(l.phone_number)}'" label="${esc(label)}"></option>`;
  }).join('');
  const emOpts = fdEmailFroms().map(e => {
    const label = `[email] ${e.from_name || ''} <${e.email}>`;
    return `<option value="'${esc(e.email)}'" label="${esc(label)}"></option>`;
  }).join('');
  const usOpts = fdUsers().map(u => {
    const label = `[user] ${u.user_name || u.user_fname || ''} (#${u.user})`;
    return `<option value="'${u.user}'" label="${esc(label)}"></option>`;
  }).join('');
  return `<datalist id="${datalistId}">${cfOpts}${plOpts}${emOpts}${usOpts}</datalist>`;
}

// ═══════════════════════════════════════════════════════════════
// SUB-PAGE REGISTRY
// ═══════════════════════════════════════════════════════════════
//
// Adding a new sub-page = add an entry here + create the file.
// No shell code changes required.
//
// Fields:
//   id        — DOM id stem and lookup key
//   title     — tab button label
//   icon      — Font Awesome icon name (without 'fa-' prefix)
//   src       — iframe URL (lazy-loaded on first activation)
//   newLabel  — text for "New X" button when this tab is active
// ═══════════════════════════════════════════════════════════════
const SUB_PAGES = [
  { id: 'workflows',     title: 'Workflows',      icon: 'diagram-project', src: '/automation/workflows.html',     newLabel: 'New Workflow' },
  { id: 'sequences',     title: 'Sequences',      icon: 'list-ol',         src: '/automation/sequences.html',     newLabel: 'New Sequence Template' },
  { id: 'scheduledJobs', title: 'Scheduled Jobs', icon: 'clock',           src: '/automation/scheduledJobs.html', newLabel: 'New Scheduled Job' },
  { id: 'hooks',         title: 'Hooks',          icon: 'webhook',         src: '/automation/hooks.html',         newLabel: 'New Hook' },
  { id: 'emailRouter',   title: 'Email Router',   icon: 'envelope-open-text', src: '/automation/emailRouter.html', newLabel: 'New Route' },
];

// ── Shell state ────────────────────────────────────────────────
let activeSubPageId = null;
let topbarButtons = { save: false, delete: false, refresh: false, new: false };

// ── Render tab buttons + iframe containers from registry ───────
function renderShellStructure() {
  const nav = document.getElementById('tab-nav');
  const root = document.getElementById('subpages-root');

  nav.innerHTML = SUB_PAGES.map(p => `
    <button class="tab-nav-btn" id="tabnav-${p.id}" onclick="switchSubPage('${p.id}')">
      <i class="fa-solid fa-${p.icon}"></i> ${esc(p.title)}
    </button>
  `).join('');

  root.innerHTML = SUB_PAGES.map(p => `
    <div class="subpage-panel" id="subpage-panel-${p.id}">
      <iframe id="subpage-${p.id}" data-src="${p.src}" title="${esc(p.title)}"></iframe>
    </div>
  `).join('');
}

// ── Tab switching + lazy-load ──────────────────────────────────
//
// Mirrors a.html's tabMore pattern: data-src → src on first
// activation; subsequent activations just toggle display.
function switchSubPage(id) {
  const page = SUB_PAGES.find(p => p.id === id);
  if (!page) return;

  // Leaving the previous sub-page: call its onHide
  if (activeSubPageId && activeSubPageId !== id) {
    callSubPageHook(activeSubPageId, 'onHide');
  }

  activeSubPageId = id;

  // Reset topbar buttons — the sub-page's onShow (or init, on
  // first load) will declare its current needs via setTopbarButtons.
  // The "New" label updates unconditionally per tab.
  topbarButtons = { save: false, delete: false, refresh: false, new: false };
  applyTopbarButtons();
  document.getElementById('btn-new-label').textContent = page.newLabel;

  // Flip active classes
  document.querySelectorAll('.subpage-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`subpage-panel-${id}`).classList.add('active');
  document.getElementById(`tabnav-${id}`).classList.add('active');

  // Lazy-load: copy data-src → src on first activation
  const iframe = document.getElementById(`subpage-${id}`);
  if (iframe && iframe.dataset.src) {
    iframe.src = iframe.dataset.src;
    delete iframe.dataset.src;
    // onShow will be called by the sub-page's own init() after it boots.
    // Nothing more to do here.
    return;
  }

  // Subsequent activations: iframe is already loaded, call onShow now.
  callSubPageHook(id, 'onShow');
}

// ── Lifecycle hook invocation ──────────────────────────────────
//
// Sub-pages register functions on their own window. Shell iterates
// by name. Missing hook → returns undefined, no error.
function callSubPageHook(id, hookName, ...args) {
  const iframe = document.getElementById(`subpage-${id}`);
  if (!iframe || !iframe.contentWindow) return undefined;
  let fn;
  try { fn = iframe.contentWindow[hookName]; }
  catch { return undefined; } // cross-origin edge case — shouldn't happen same-origin
  return (typeof fn === 'function') ? fn(...args) : undefined;
}

function activeSubPageWindow() {
  if (!activeSubPageId) return null;
  const iframe = document.getElementById(`subpage-${activeSubPageId}`);
  return (iframe && iframe.contentWindow) ? iframe.contentWindow : null;
}

// ── Topbar button state ────────────────────────────────────────
//
// Sub-pages request visibility via setTopbarButtons({save, delete,
// refresh, new}). Partial updates — pass only what's changing.
// Shell resets all on tab switch.
function setTopbarButtons(partial) {
  if (!partial || typeof partial !== 'object') return;
  for (const k of ['save', 'delete', 'refresh', 'new']) {
    if (k in partial) topbarButtons[k] = !!partial[k];
  }
  applyTopbarButtons();
}

function applyTopbarButtons() {
  document.getElementById('btn-save').style.display    = topbarButtons.save    ? '' : 'none';
  document.getElementById('btn-delete').style.display  = topbarButtons.delete  ? '' : 'none';
  document.getElementById('btn-refresh').style.display = topbarButtons.refresh ? '' : 'none';
  document.getElementById('btn-new').style.display     = topbarButtons.new     ? '' : 'none';
}

// ── Topbar button click handlers → delegate to active sub-page ─
function onTopbarSave()    { callSubPageHook(activeSubPageId, 'onSave'); }
function onTopbarDelete()  { callSubPageHook(activeSubPageId, 'onDelete'); }
function onTopbarRefresh() { callSubPageHook(activeSubPageId, 'onRefresh'); }
function onTopbarNew()     { callSubPageHook(activeSubPageId, 'onNew'); }

// ── Expose to sub-pages via window.parent ──────────────────────
window.apiSend             = apiSend;
window.fdPhoneLines        = fdPhoneLines;
window.fdEmailFroms        = fdEmailFroms;
window.fdUsers             = fdUsers;
window.fdCurrentUser       = fdCurrentUser;
window.fdPhoneLineSelectHtml   = fdPhoneLineSelectHtml;
window.fdEmailFromSelectHtml   = fdEmailFromSelectHtml;
window.fdParamSourceDatalistHtml = fdParamSourceDatalistHtml;
window.setTopbarButtons    = setTopbarButtons;
window.esc                 = esc; // useful for sub-pages that want to match helper output

// ── Boot ───────────────────────────────────────────────────────
renderShellStructure();
switchSubPage(SUB_PAGES[0].id);
</script>

</body>
</html>
