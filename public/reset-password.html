<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — 4LSG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #333;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #07ADEF; }
    button {
      width: 100%;
      padding: 12px;
      background: #07ADEF;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #069ad8; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .error {
      background: #fdecea;
      color: #b71c1c;
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .success-card {
      text-align: center;
    }
    .success-card .checkmark {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .success-card p {
      color: #666;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <!-- Reset Form -->
  <div class="card" id="resetForm">
    <h1>Reset Your Password</h1>
    <p class="subtitle">Enter your new password below.</p>

    <div class="error" id="errorMsg"></div>

    <label for="newPassword">New Password</label>
    <input type="password" id="newPassword" placeholder="Enter new password" autofocus>

    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm new password">

    <button id="submitBtn" onclick="handleSubmit()">Reset Password</button>
  </div>

  <!-- Success State -->
  <div class="card success-card" id="successCard" style="display:none;">
    <div class="checkmark">&#10003;</div>
    <h1>Password Updated</h1>
    <p>Your password has been changed successfully. You will be redirected to the login page shortly.</p>
    <button onclick="window.location.href='/'">Go to Login</button>
  </div>

  <!-- Invalid/Expired Token State -->
  <div class="card success-card" id="invalidCard" style="display:none;">
    <div class="checkmark" style="color:#b71c1c;">&#10007;</div>
    <h1>Invalid Link</h1>
    <p>This reset link is invalid or has expired. Please request a new password reset from the login page.</p>
    <button onclick="window.location.href='/'">Go to Login</button>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get("token");

    // If no token in URL, show invalid state immediately
    if (!token) {
      document.getElementById("resetForm").style.display = "none";
      document.getElementById("invalidCard").style.display = "";
    }

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.style.display = "block";
    }

    function hideError() {
      document.getElementById("errorMsg").style.display = "none";
    }

    async function handleSubmit() {
      hideError();

      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (!newPassword) {
        return showError("Please enter a new password.");
      }
      if (newPassword.length < 4) {
        return showError("Password must be at least 4 characters.");
      }
      if (newPassword !== confirmPassword) {
        return showError("Passwords do not match.");
      }

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "Resetting...";

      try {
        const res = await fetch("/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, new_password: newPassword })
        });

        const data = await res.json();

        if (!res.ok) {
          btn.disabled = false;
          btn.textContent = "Reset Password";

          if (data.error && data.error.includes("expired")) {
            // Token expired/invalid — show the invalid card
            document.getElementById("resetForm").style.display = "none";
            document.getElementById("invalidCard").style.display = "";
          } else {
            showError(data.error || "Something went wrong. Please try again.");
          }
          return;
        }

        // Success — show success card and redirect after delay
        document.getElementById("resetForm").style.display = "none";
        document.getElementById("successCard").style.display = "";

        setTimeout(() => {
          window.location.href = "/";
        }, 3000);

      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Reset Password";
        showError("Network error. Please check your connection and try again.");
      }
    }

    // Submit on Enter key
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && document.getElementById("resetForm").style.display !== "none") {
        handleSubmit();
      }
    });
  </script>
</body>
</html>
