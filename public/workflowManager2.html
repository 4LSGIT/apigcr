<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Studio</title>
  <!-- Tailwind + Font Awesome + SweetAlert2 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .step-card { transition: all 0.2s; }
    .step-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .nav-link { transition: all 0.2s; }
    .nav-link.active { background-color: #f3e8ff; color: #6b21a8; font-weight: 600; }
  </style>
</head>
<body class="h-full bg-gray-50 font-sans">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <div class="w-72 bg-white border-r border-gray-200 flex flex-col">
    <div class="p-6 border-b">
      <h1 class="text-2xl font-bold text-purple-700 flex items-center gap-2">
        <i class="fa-solid fa-diagram-project"></i> Workflow Studio
      </h1>
    </div>
    
    <nav class="flex-1 p-3">
      <button onclick="showView('dashboard')" class="nav-link active flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl hover:bg-purple-50" id="nav-dashboard">
        <i class="fa-solid fa-house w-5"></i> Dashboard
      </button>
      <button onclick="showView('workflows')" class="nav-link flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl hover:bg-purple-50 mt-1" id="nav-workflows">
        <i class="fa-solid fa-layer-group w-5"></i> Workflows
      </button>
      <button onclick="showView('executions')" class="nav-link flex items-center gap-3 w-full text-left px-4 py-3 rounded-xl hover:bg-purple-50 mt-1" id="nav-executions">
        <i class="fa-solid fa-list-check w-5"></i> Executions
      </button>
    </nav>

    <div class="p-4 border-t text-xs text-gray-400">
      Built for 4LSG • v1.0
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="flex-1 overflow-auto" id="main-content">
    <!-- Views will be injected here -->
  </div>
</div>

<script>
// ==================== API HELPER ====================
async function api(endpoint, method = "GET", payload = null) {
  return window.parent.apiSend(endpoint, method, payload);
}

// ==================== VIEW SWITCHER ====================
function showView(view) {
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${view}`).classList.add('active');
  renderView(view);
}

// ==================== RENDER FUNCTIONS ====================
async function renderView(view) {
  const content = document.getElementById('main-content');
  
  if (view === 'dashboard') {
    content.innerHTML = `
      <div class="p-8">
        <h2 class="text-3xl font-bold mb-8">Dashboard</h2>
        <div id="dashboard-content" class="grid grid-cols-3 gap-6">
          <!-- Populated by loadDashboard() -->
        </div>
      </div>`;
    loadDashboard();
  } 
  else if (view === 'workflows') {
    content.innerHTML = `
      <div class="p-8">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-3xl font-bold">Workflows</h2>
          <button onclick="createNewWorkflow()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-2xl flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> New Workflow
          </button>
        </div>
        <div id="workflows-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>`;
    loadWorkflows();
  } 
  else if (view === 'executions') {
    content.innerHTML = `
      <div class="p-8">
        <h2 class="text-3xl font-bold mb-6">Executions</h2>
        <div id="executions-list" class="space-y-4"></div>
      </div>`;
    loadExecutions();
  }
}

// ==================== DASHBOARD ====================
async function loadDashboard() {
  const data = await api('/executions?limit=6');
  const container = document.getElementById('dashboard-content');
  
  container.innerHTML = `
    <div class="bg-white rounded-3xl p-6 shadow-sm">
      <p class="text-sm text-gray-500">Active Executions</p>
      <p class="text-5xl font-bold text-purple-600 mt-2">${data.executions.filter(e => e.status === 'active' || e.status === 'processing').length}</p>
    </div>
    <!-- More cards can be added easily -->
  `;
}

// ==================== WORKFLOWS LIST ====================
async function loadWorkflows() {
  const data = await api('/workflows?limit=50');
  const container = document.getElementById('workflows-list');
  
  container.innerHTML = data.workflows.map(w => `
    <div onclick="openWorkflowEditor(${w.id})" class="step-card bg-white rounded-3xl p-6 cursor-pointer border border-gray-100 hover:border-purple-200">
      <div class="flex justify-between">
        <h3 class="font-semibold text-xl">${w.name}</h3>
        <span class="text-xs bg-purple-100 text-purple-700 px-3 py-1 rounded-full">${w.step_count} steps</span>
      </div>
      <p class="text-sm text-gray-500 mt-2 line-clamp-2">${w.description || 'No description'}</p>
    </div>
  `).join('');
}

async function createNewWorkflow() {
  const { value: name } = await Swal.fire({
    title: 'New Workflow',
    input: 'text',
    inputLabel: 'Workflow Name',
    showCancelButton: true,
    inputValidator: (val) => !val && 'Name is required'
  });
  
  if (name) {
    const res = await api('/workflows', 'POST', { name });
    openWorkflowEditor(res.workflowId);
  }
}

// ==================== WORKFLOW EDITOR ====================
async function openWorkflowEditor(workflowId) {
  // This can be expanded into a full drag-and-drop editor later.
  // For now, we open a clean modal with steps list + actions.
  const wf = await api(`/workflows/${workflowId}`);
  
  Swal.fire({
    title: wf.workflow.name,
    html: `
      <div class="text-left max-h-96 overflow-auto">
        ${wf.steps.map(s => `
          <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl mb-3">
            <div class="w-8 h-8 bg-purple-100 text-purple-700 rounded-xl flex items-center justify-center font-bold">${s.step_number}</div>
            <div>
              <div class="font-medium">${s.type}</div>
              <div class="text-xs text-gray-500">${Object.keys(s.config).length} config fields</div>
            </div>
          </div>
        `).join('')}
      </div>
    `,
    width: '800px',
    showCloseButton: true,
    showConfirmButton: false
  });
}

// ==================== EXECUTIONS ====================
async function loadExecutions() {
  const data = await api('/executions?limit=20');
  const container = document.getElementById('executions-list');
  
  container.innerHTML = data.executions.map(e => `
    <div onclick="showExecutionDetail(${e.id})" class="bg-white border border-gray-100 hover:border-purple-200 rounded-3xl p-6 cursor-pointer flex justify-between items-center">
      <div>
        <span class="font-medium">${e.workflow_name}</span>
        <span class="text-xs ml-3 px-3 py-1 rounded-full ${e.status === 'completed' ? 'bg-green-100 text-green-700' : e.status.includes('error') ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}">
          ${e.status}
        </span>
      </div>
      <div class="text-sm text-gray-500">${new Date(e.created_at).toLocaleDateString()}</div>
    </div>
  `).join('');
}

async function showExecutionDetail(id) {
  const data = await api(`/executions/${id}?history=true`);
  Swal.fire({
    title: `Execution #${id}`,
    html: `<pre class="text-left text-xs overflow-auto max-h-96">${JSON.stringify(data, null, 2)}</pre>`,
    width: '900px'
  });
}

// ==================== INIT ====================
showView('dashboard');
</script>
</body>
</html>
