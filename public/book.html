<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book an Appointment</title>
<!-- Firm favicon (same assets as b.html): 32 = browser tab/bookmark,
     192 = Android home screen / PWA, apple-touch-icon 180 = iOS
     "Add to Home Screen". Only matters when the page is opened directly
     (direct/token links) — iframes inherit the host page's icon. -->
<link rel="icon" type="image/png" sizes="32x32" href="https://legalsolutions.group/assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="https://legalsolutions.group/assets/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://legalsolutions.group/assets/favicon-180.png">
<style>
  /*
   * Public booking widget — Scheduler Slice 6b.1 (staged flow).
   * Self-contained: runs inside third-party iframes, zero shell deps.
   * Light, neutral theme; --accent is overridden from view config.
   *
   * Flow: ① Date (provider + date)  ② Time  ③ Details.
   * Selecting a date auto-advances to ②; selecting a time to ③.
   * Back via the step bar or the "change" links in summaries.
   */
  :root {
    --accent: #2563eb;
    --accent-text: #ffffff;
    --bg: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --panel: #f9fafb;
    --danger: #b91c1c;
    --danger-bg: #fef2f2;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px; line-height: 1.45;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 16px 14px 40px; }

  /* ── Header ─────────────────────────────────────────────── */
  .head { text-align: center; margin-bottom: 14px; }
  .head img.logo { max-height: 84px; max-width: 300px; margin-bottom: 8px; }
  .head h1 { margin: 0; font-size: 20px; font-weight: 700; }
  .head .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 14px; }

  /* ── Step bar ───────────────────────────────────────────── */
  .stepbar {
    display: flex; align-items: center; justify-content: center;
    gap: 0; margin: 6px 0 18px; user-select: none;
  }
  .stepbar .step {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    min-width: 72px; cursor: default;
  }
  .stepbar .step .num {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--border); color: var(--muted);
    font-size: 13px; font-weight: 700; background: var(--bg);
  }
  .stepbar .step .lbl { font-size: 11px; color: var(--muted); font-weight: 600; }
  .stepbar .step.active .num {
    border-color: var(--accent); color: var(--accent);
  }
  .stepbar .step.active .lbl { color: var(--text); }
  .stepbar .step.done { cursor: pointer; }
  .stepbar .step.done .num {
    border-color: var(--accent); background: var(--accent); color: var(--accent-text);
  }
  .stepbar .connector {
    flex: 0 1 48px; height: 2px; background: var(--border);
    margin: 0 4px 16px;
  }
  .stepbar .connector.done { background: var(--accent); }

  .section-label {
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin: 14px 0 8px;
  }
  .tz-note { font-size: 11.5px; color: var(--muted); font-weight: 400;
    text-transform: none; letter-spacing: 0; }

  /* Step summary lines ("Tue, Jun 16 · change") */
  .summary {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; margin-bottom: 4px; font-size: 14px;
  }
  .summary .val { font-weight: 600; }
  .summary a.change {
    color: var(--accent); font-size: 13px; text-decoration: none; cursor: pointer;
    margin-left: auto;
  }
  .summary a.change:hover { text-decoration: underline; }

  /* ── Date strip ─────────────────────────────────────────── */
  .date-strip {
    display: flex; gap: 6px; overflow-x: auto; padding: 2px 2px 8px;
    -webkit-overflow-scrolling: touch; scrollbar-width: thin;
  }
  .date-chip {
    flex: 0 0 auto; min-width: 58px; padding: 7px 6px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); cursor: pointer; text-align: center;
    font-size: 12px; color: var(--text);
  }
  .date-chip .dow { display: block; font-size: 11px; color: var(--muted); }
  .date-chip .dom { display: block; font-size: 15px; font-weight: 600; margin-top: 1px; }
  .date-chip.selected {
    border-color: var(--accent); background: var(--accent); color: var(--accent-text);
  }
  .date-chip.selected .dow { color: var(--accent-text); opacity: 0.85; }
  /* Weekdays outside the view's availability windows (cfg.allowed_weekdays).
     Cosmetic only — the server never offers out-of-window slots. */
  .date-chip.disabled {
    cursor: default; background: var(--panel); opacity: 0.45;
  }
  .date-chip.disabled .dow, .date-chip.disabled .dom { color: var(--muted); }

  /* ── Inputs ─────────────────────────────────────────────── */
  select, input[type="text"], input[type="tel"], input[type="email"], textarea {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text); font-family: inherit;
  }
  select:focus, input:focus, textarea:focus {
    outline: none; border-color: var(--accent);
  }

  /* ── Slots ──────────────────────────────────────────────── */
  .slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  @media (min-width: 420px) { .slots { grid-template-columns: repeat(4, 1fr); } }
  .slot {
    padding: 10px 4px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); cursor: pointer; text-align: center;
    font-size: 14px; font-weight: 500; color: var(--text);
  }
  .slot.selected {
    border-color: var(--accent); background: var(--accent); color: var(--accent-text);
  }
  .slots-msg { color: var(--muted); font-size: 14px; padding: 8px 2px; }

  /* ── Details ────────────────────────────────────────────── */
  .field { margin-bottom: 12px; }
  .field label {
    display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px;
  }
  .field label .req { color: var(--danger); }
  .saved-note {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 14px; color: var(--muted); margin-bottom: 12px;
  }
  .saved-note #saved-details { color: var(--text); }
  .saved-note a {
    display: block; margin-top: 6px; font-size: 13px;
    color: var(--accent); text-decoration: none; cursor: pointer;
  }
  .saved-note a:hover { text-decoration: underline; }

  /* Honeypot: off-screen, NOT display:none (some bots skip hidden inputs). */
  .hp-field {
    position: absolute; left: -9999px; top: -9999px;
    height: 1px; width: 1px; overflow: hidden;
  }

  /* ── Messages / button ──────────────────────────────────── */
  .msg {
    border-radius: 8px; padding: 10px 12px; font-size: 14px; margin: 12px 0;
    display: none;
  }
  .msg.show { display: block; }
  .msg.error { background: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; }
  .msg.info  { background: var(--panel); color: var(--text); border: 1px solid var(--border); }

  .book-btn {
    width: 100%; padding: 14px; margin-top: 8px;
    background: var(--accent); color: var(--accent-text);
    border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .book-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── States ─────────────────────────────────────────────── */
  .state { text-align: center; padding: 48px 16px; color: var(--muted); }
  .state-logo { display: block; margin: 0 auto 16px; max-height: 84px; max-width: 300px; }
  a.book-btn { display: block; box-sizing: border-box; text-decoration: none; text-align: center; }
  .call-note { color: var(--muted); font-size: 14px; margin-top: 12px; }
  .thankyou { padding: 24px 4px; }
  .hidden { display: none !important; }

  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="wrap">
  <!-- Boot / unavailable states -->
  <div class="state" id="state-loading"><span class="spinner"></span>&nbsp; Loading…</div>
  <div class="state hidden" id="state-unavailable">
    <img class="state-logo hidden" id="unavailable-logo" alt="">
    Sorry — this booking page isn't available. It may have expired or been replaced.
    <div id="unavailable-cta-wrap" class="hidden" style="margin-top:14px;">
      <a id="unavailable-cta" class="book-btn"></a>
    </div>
    <div class="call-note" id="unavailable-call"></div>
  </div>

  <!-- Main flow -->
  <div class="hidden" id="main">
    <div class="head">
      <a id="logo-link" class="hidden" target="_blank" rel="noopener">
        <img class="logo" id="logo" alt="">
      </a>
      <img class="logo hidden" id="logo-plain" alt="">
      <h1 id="title"></h1>
      <p class="subtitle hidden" id="subtitle"></p>
    </div>

    <!-- Step bar -->
    <div class="stepbar" id="stepbar">
      <div class="step" data-step="1"><span class="num">1</span><span class="lbl">Date</span></div>
      <div class="connector" data-conn="1"></div>
      <div class="step" data-step="2"><span class="num">2</span><span class="lbl">Time</span></div>
      <div class="connector" data-conn="2"></div>
      <div class="step" data-step="3"><span class="num">3</span><span class="lbl">Details</span></div>
    </div>

    <!-- ── Step 1: provider + date ─────────────────────────── -->
    <div id="step-1">
      <div class="hidden" id="provider-section">
        <div class="section-label">With</div>
        <select id="provider"></select>
      </div>

      <div class="section-label">Pick a date</div>
      <div class="date-strip" id="date-strip"></div>
    </div>

    <!-- ── Step 2: time ────────────────────────────────────── -->
    <div id="step-2" class="hidden">
      <div class="summary">
        <span class="val" id="sum2-date"></span>
        <span class="muted" id="sum2-provider"></span>
        <a class="change" data-goto="1">change date</a>
      </div>
      <div class="msg error" id="step2-msg"></div>
      <div class="section-label">Pick a time <span class="tz-note">— Times shown in Eastern Time</span></div>
      <div id="slots-region">
        <div class="slots-msg">Loading…</div>
      </div>
    </div>

    <!-- ── Step 3: details + confirm ───────────────────────── -->
    <div id="step-3" class="hidden">
      <div class="summary">
        <span class="val" id="sum3-slot"></span>
        <a class="change" data-goto="2">change time</a>
      </div>

      <div class="section-label">Your details</div>

      <div class="saved-note hidden" id="saved-note">
        <span id="saved-details">Booking with your saved details.</span>
        <a id="not-you">Not you, or details changed?</a>
      </div>

      <div id="identity-fields">
        <div class="field">
          <label for="f-first">First name <span class="req">*</span></label>
          <input type="text" id="f-first" autocomplete="given-name" maxlength="20">
        </div>
        <div class="field">
          <label for="f-last">Last name <span class="req">*</span></label>
          <input type="text" id="f-last" autocomplete="family-name" maxlength="30">
        </div>
        <div class="field">
          <label for="f-phone">Phone <span class="req">*</span></label>
          <input type="tel" id="f-phone" autocomplete="tel" inputmode="tel">
        </div>
        <div class="field">
          <label for="f-email">Email</label>
          <input type="email" id="f-email" autocomplete="email" maxlength="50">
        </div>
      </div>

      <div class="field hidden" id="note-field">
        <label for="f-note">Anything we should know?</label>
        <textarea id="f-note" rows="3" maxlength="500"></textarea>
      </div>

      <!-- Honeypot -->
      <div class="hp-field" aria-hidden="true">
        <label for="website">Website</label>
        <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
      </div>

      <div class="msg error" id="err-msg"></div>
      <div class="msg info" id="info-msg"></div>

      <button class="book-btn" id="book-btn" disabled>Select a time</button>
    </div>
  </div>

  <!-- Thank-you (replaces #main on success) -->
  <div class="thankyou hidden" id="thankyou"></div>
</div>

<script>
(function () {
  'use strict';

  // ── Context from the URL ────────────────────────────────────
  // /book/<slug> — slug is the last path segment.
  var slug = location.pathname.split('/').filter(Boolean).pop() || '';
  var qs = new URLSearchParams(location.search);
  var token = qs.get('c') || '';

  var FIRM_TZ = 'America/New_York'; // matches the server's FIRM_TZ; label says Eastern

  // ── State ───────────────────────────────────────────────────
  var cfg = null;             // /config payload (incl. ts/sig)
  var step = 1;               // current wizard step
  var selectedDate = null;    // 'YYYY-MM-DD'
  var selectedSlot = null;    // 'YYYY-MM-DD HH:mm'
  var slotFetchSeq = 0;       // stale-response guard
  var slotDebounce = null;
  var tokenMode = false;      // true → no identity fields rendered
  var useToken = false;       // send c on POST; dropped by "Not you / changed"
  var submitting = false;

  // ── DOM helpers ─────────────────────────────────────────────
  function E(id) { return document.getElementById(id); }
  function show(id) { E(id).classList.remove('hidden'); }
  function hide(id) { E(id).classList.add('hidden'); }
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }
  function setMsg(id, msg) {
    var el = E(id);
    if (msg) { el.textContent = msg; el.classList.add('show'); }
    else el.classList.remove('show');
  }
  function setErr(msg)  { setMsg('err-msg', msg); }
  function setInfo(msg) { setMsg('info-msg', msg); }

  // ── Date / time formatting (wall-clock digits, NO TZ math) ──
  // Server slots are firm-local 'YYYY-MM-DD HH:mm' strings. We format the
  // digits as-is; the section is labeled "Eastern Time".
  function fmtTime(hhmm) {
    var h = parseInt(hhmm.slice(0, 2), 10);
    var m = hhmm.slice(3, 5);
    var ampm = h < 12 ? 'AM' : 'PM';
    var h12 = ((h + 11) % 12) + 1;
    return h12 + ':' + m + ' ' + ampm;
  }
  // 'YYYY-MM-DD' → local-safe Date (noon avoids DST/UTC day-shift) for labels.
  function dateObj(ymd) {
    var p = ymd.split('-');
    return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]), 12, 0, 0);
  }
  function fmtDateLong(ymd) { // 'Tue, Jun 16'
    return dateObj(ymd).toLocaleDateString(undefined,
      { weekday: 'short', month: 'short', day: 'numeric' });
  }
  function fmtSlotLong(slot) { // 'Tue, Jun 16 · 2:30 PM'
    return fmtDateLong(slot.slice(0, 10)) + ' \u00B7 ' + fmtTime(slot.slice(11, 16));
  }

  // Firm-local "today" via Intl — the horizon window is firm-local, and a
  // visitor in another timezone shouldn't see an off-by-one first day.
  function firmToday() {
    return new Intl.DateTimeFormat('en-CA', {
      timeZone: FIRM_TZ, year: 'numeric', month: '2-digit', day: '2-digit'
    }).format(new Date()); // 'YYYY-MM-DD'
  }
  function addDays(ymd, n) {
    var p = ymd.split('-');
    var d = new Date(Date.UTC(Number(p[0]), Number(p[1]) - 1, Number(p[2]) + n));
    return d.toISOString().slice(0, 10);
  }

  // ── API ─────────────────────────────────────────────────────
  function apiGet(path) {
    return fetch(path, { headers: { 'Accept': 'application/json' } })
      .then(function (r) {
        return r.json().catch(function () { return {}; })
          .then(function (j) { return { ok: r.ok, status: r.status, body: j }; });
      });
  }
  function apiPost(path, data) {
    return fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(data),
    }).then(function (r) {
      return r.json().catch(function () { return {}; })
        .then(function (j) { return { ok: r.ok, status: r.status, body: j }; });
    });
  }

  // ── Wizard navigation ───────────────────────────────────────
  // Step 2 reachable once a date is picked; step 3 once a time is picked.
  function maxReachable() {
    if (selectedSlot) return 3;
    if (selectedDate) return 2;
    return 1;
  }

  function goStep(n) {
    if (n > maxReachable()) return;
    step = n;
    [1, 2, 3].forEach(function (i) {
      E('step-' + i).classList.toggle('hidden', i !== n);
    });
    // Step bar: done = before current, active = current.
    var bar = E('stepbar');
    bar.querySelectorAll('.step').forEach(function (el) {
      var s = Number(el.dataset.step);
      el.classList.toggle('done', s < n);
      el.classList.toggle('active', s === n);
    });
    bar.querySelectorAll('.connector').forEach(function (el) {
      el.classList.toggle('done', Number(el.dataset.conn) < n);
    });
    // Refresh summaries.
    if (n === 2) {
      E('sum2-date').textContent = fmtDateLong(selectedDate);
      E('sum2-provider').textContent = providerLabel();
      setMsg('step2-msg', null);
    }
    if (n === 3) {
      E('sum3-slot').textContent = fmtSlotLong(selectedSlot);
      updateBookBtn();
    }
    try { window.scrollTo(0, 0); } catch (e) {}
  }

  function providerLabel() {
    if (!Array.isArray(cfg.providers) || !cfg.providers.length) return '';
    var sel = E('provider');
    var p = cfg.providers.find(function (x) { return String(x.id) === sel.value; });
    return p ? 'with ' + p.name : '';
  }

  // ── Boot ────────────────────────────────────────────────────
  function boot() {
    if (!slug) return showUnavailable();
    apiGet('/api/book/' + encodeURIComponent(slug) + '/config')
      .then(function (r) {
        if (!r.ok) return showUnavailable();
        cfg = r.body;
        renderShell();
      })
      .catch(showUnavailable);
  }

  // Parse the booking-view slug out of a /book/<slug> URL (any origin).
  // Returns null when the URL isn't a /book/ link.
  function bookingUrlSlug(url) {
    try {
      var u = new URL(url, location.origin);
      var m = u.pathname.match(/^\/book\/([^\/?#]+)/);
      return m ? decodeURIComponent(m[1]) : null;
    } catch (e) { return null; }
  }

  // Render a fallback CTA into the unavailable state from the token-less
  // /api/manage-config payload ({ fallback:{kind,url,button_text}, logo_url,
  // logo_link_url, firm_phone }). Mirrors the slice-10 manage invalid state.
  //
  // Self-loop guard: a 'book' fallback can point at /book/<slug>. If that slug
  // is the SAME one that just failed (e.g. manage_fallback_url targets the very
  // view that's inactive), the CTA would loop the user back to this dead page.
  // Detect that and degrade to the firm site (logo_link_url) or the call-us note.
  function applyBookingFallback(c) {
    var fb  = (c && c.fallback) || {};
    var cta = E('unavailable-cta');
    var url = (fb.url && /^https?:\/\//i.test(fb.url)) ? fb.url : '';

    if (fb.kind === 'book' && url && bookingUrlSlug(url) === slug) {
      var site = (c && c.logo_link_url && /^https?:\/\//i.test(c.logo_link_url)) ? c.logo_link_url : '';
      if (site) {
        cta.textContent = 'Visit our website \u2192';
        cta.href = site;
        show('unavailable-cta-wrap');
        return;
      }
      url = ''; // no site to degrade to → fall through to call-us
    }

    if ((fb.kind === 'book' || fb.kind === 'site') && url) {
      cta.textContent = fb.button_text ||
        (fb.kind === 'book' ? 'Book a new time \u2192' : 'Visit our website \u2192');
      cta.href = url;
      show('unavailable-cta-wrap');
      return;
    }

    var phone = c && c.firm_phone;
    E('unavailable-call').textContent = phone ? ('Need help? Call us at ' + phone + '.') : '';
  }

  function showUnavailable() {
    hide('state-loading');
    show('state-unavailable');
    // No view config on a dead/inactive slug (its /config 404s), so there's no
    // branding to render from. Fetch the token-less firm config for the logo +
    // a general fallback CTA so the dead end is branded, not a bare message.
    apiGet('/api/manage-config')
      .then(function (r) {
        var c = (r.ok && r.body) ? r.body : {};
        if (c.logo_url) { E('unavailable-logo').src = c.logo_url; show('unavailable-logo'); }
        applyBookingFallback(c);
      })
      .catch(function () {});
  }

  function renderShell() {
    hide('state-loading');

    if (cfg.accent_color && /^#?[a-zA-Z0-9(),.% #-]{1,20}$/.test(cfg.accent_color)) {
      document.documentElement.style.setProperty('--accent', cfg.accent_color);
    }
    // Logo: linked when logo_link_url is configured, plain otherwise.
    // (logo_link_url is additive in the config response — absent on an older
    // backend, the plain path just renders.)
    if (cfg.logo_url) {
      if (cfg.logo_link_url && /^https?:\/\//i.test(cfg.logo_link_url)) {
        E('logo').src = cfg.logo_url;
        E('logo-link').href = cfg.logo_link_url;
        show('logo-link');
      } else {
        E('logo-plain').src = cfg.logo_url;
        show('logo-plain');
      }
    }
    E('title').textContent = cfg.title || 'Book an Appointment';
    document.title = cfg.title || 'Book an Appointment';
    if (cfg.subtitle) {
      E('subtitle').textContent = cfg.subtitle;
      show('subtitle');
    }

    // Provider select — only in client_choice mode (cfg.providers non-null).
    if (Array.isArray(cfg.providers) && cfg.providers.length) {
      var sel = E('provider');
      sel.innerHTML = cfg.providers.map(function (p) {
        return '<option value="' + Number(p.id) + '">' + esc(p.name) + '</option>';
      }).join('');
      sel.addEventListener('change', function () {
        // New provider invalidates any chosen time; slots refetch when (re)entering step 2.
        selectedSlot = null;
        if (selectedDate) scheduleSlotFetch();
      });
      show('provider-section');
    }

    // Identity: token in URL → no PII fields; show masked saved details
    // (server-masked — full PII never reaches the page on token paths) with
    // a "Not you / changed?" escape hatch to the public form.
    tokenMode = !!token;
    useToken = tokenMode;
    if (tokenMode) {
      show('saved-note');
      hide('identity-fields');
      E('not-you').addEventListener('click', function () {
        switchToPublic(null);
      });
      fetchSavedDetails();
    }
    if (cfg.collect_note) show('note-field');

    buildDateStrip();
    wireNav();
    wireDetails();
    E('book-btn').addEventListener('click', submit);
    show('main');
    goStep(1);
  }

  // Masked saved-details fetch — best-effort upgrade of the generic note.
  // 404 / older backend / network error → generic note stays; a truly
  // invalid token also fails at POST and lands in switchToPublic there.
  function fetchSavedDetails() {
    apiGet('/api/book/' + encodeURIComponent(slug) + '/contact?c=' + encodeURIComponent(token))
      .then(function (r) {
        if (!r.ok || !r.body || !r.body.display) return;
        var d = r.body.display;
        var parts = [d.name, d.phone, d.email].filter(Boolean);
        if (parts.length) {
          E('saved-details').textContent = 'Booking as ' + parts.join(' \u00B7 ');
        }
      })
      .catch(function () { /* keep generic note */ });
  }

  // Drop the token and switch to the public identity form. Used by the
  // "Not you / changed?" link and by an invalid_token POST response.
  function switchToPublic(errMsg) {
    tokenMode = false;
    useToken = false;
    hide('saved-note');
    show('identity-fields');
    setErr(errMsg);
    updateBookBtn();
    var f = E('f-first');
    if (f) f.focus();
  }

  function wireNav() {
    // Step-bar circles: completed steps navigate back.
    E('stepbar').addEventListener('click', function (e) {
      var el = e.target.closest('.step');
      if (!el) return;
      var n = Number(el.dataset.step);
      if (n < step) goStep(n);
    });
    // "change date" / "change time" links.
    document.querySelectorAll('a.change[data-goto]').forEach(function (a) {
      a.addEventListener('click', function () { goStep(Number(a.dataset.goto)); });
    });
  }

  // ── Date strip (step 1) ─────────────────────────────────────
  function buildDateStrip() {
    var strip = E('date-strip');
    var today = firmToday();
    var horizon = Math.max(0, Number(cfg.horizon_days) || 0);
    // Per-view allowed weekdays (0=Sun…6=Sat) from /config. null/absent →
    // unrestricted (older backend responses too). Cosmetic: the server is the
    // enforcer — it returns no out-of-window slots and 409s such bookings.
    var allowed = Array.isArray(cfg.allowed_weekdays) ? cfg.allowed_weekdays : null;
    var html = '';
    for (var i = 0; i <= horizon; i++) {
      var ymd = addDays(today, i);
      var d = dateObj(ymd); // local-noon construction → getDay() is the true local weekday
      var dead = allowed && allowed.indexOf(d.getDay()) === -1;
      var dow = d.toLocaleDateString(undefined, { weekday: 'short' });
      var dom = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      html += '<div class="date-chip' + (dead ? ' disabled' : '') + '" data-date="' + ymd + '">' +
              '<span class="dow">' + esc(dow) + '</span>' +
              '<span class="dom">' + esc(dom) + '</span></div>';
    }
    strip.innerHTML = html;
    strip.addEventListener('click', function (e) {
      var chip = e.target.closest('.date-chip');
      if (chip && !chip.classList.contains('disabled')) selectDate(chip.dataset.date);
    });
  }

  function selectDate(ymd) {
    selectedDate = ymd;
    selectedSlot = null;
    var chips = E('date-strip').querySelectorAll('.date-chip');
    chips.forEach(function (c) {
      c.classList.toggle('selected', c.dataset.date === ymd);
    });
    scheduleSlotFetch();
    goStep(2); // auto-advance
  }

  // ── Slots (step 2; debounce + stale guard) ──────────────────
  function scheduleSlotFetch() {
    clearTimeout(slotDebounce);
    E('slots-region').innerHTML = '<div class="slots-msg"><span class="spinner"></span>&nbsp; Loading times…</div>';
    slotDebounce = setTimeout(fetchSlots, 250);
  }

  function fetchSlots() {
    if (!selectedDate) return;
    var seq = ++slotFetchSeq;
    var url = '/api/book/' + encodeURIComponent(slug) + '/slots?date=' + selectedDate;
    var provSel = E('provider');
    if (!E('provider-section').classList.contains('hidden') && provSel.value) {
      url += '&provider=' + encodeURIComponent(provSel.value);
    }
    apiGet(url).then(function (r) {
      if (seq !== slotFetchSeq) return; // stale response — a newer fetch is in flight
      if (!r.ok) {
        var msg = r.status === 429
          ? 'Too many requests — please wait a moment and pick the date again.'
          : 'Could not load times — please try again.';
        E('slots-region').innerHTML = '<div class="slots-msg">' + esc(msg) + '</div>';
        return;
      }
      renderSlots(r.body.slots || []);
    }).catch(function () {
      if (seq !== slotFetchSeq) return;
      E('slots-region').innerHTML = '<div class="slots-msg">Could not load times — please try again.</div>';
    });
  }

  function renderSlots(slots) {
    var region = E('slots-region');
    if (!slots.length) {
      region.innerHTML = '<div class="slots-msg">No times available this day — pick another date.</div>';
      return;
    }
    region.innerHTML = '<div class="slots">' + slots.map(function (s) {
      return '<div class="slot" data-slot="' + esc(s) + '">' + fmtTime(s.slice(11, 16)) + '</div>';
    }).join('') + '</div>';
    region.querySelector('.slots').addEventListener('click', function (e) {
      var el = e.target.closest('.slot');
      if (!el) return;
      selectedSlot = el.dataset.slot;
      region.querySelectorAll('.slot').forEach(function (x) {
        x.classList.toggle('selected', x === el);
      });
      setErr(null);
      goStep(3); // auto-advance
    });
  }

  // ── Details / button state (step 3) ─────────────────────────
  function wireDetails() {
    ['f-first', 'f-last', 'f-phone', 'f-email'].forEach(function (id) {
      E(id).addEventListener('input', updateBookBtn);
    });
  }

  function identityValid() {
    if (tokenMode) return true;
    var first = E('f-first').value.trim();
    var last  = E('f-last').value.trim();
    var phoneDigits = E('f-phone').value.replace(/\D/g, '');
    return !!(first && last && phoneDigits.length >= 10);
  }

  function updateBookBtn() {
    var btn = E('book-btn');
    if (submitting) { btn.disabled = true; return; }
    if (!selectedSlot) {
      btn.disabled = true;
      btn.textContent = 'Select a time';
      return;
    }
    btn.textContent = 'Book ' + fmtSlotLong(selectedSlot);
    btn.disabled = !identityValid();
  }

  // ── Submit ──────────────────────────────────────────────────
  function submit() {
    if (!selectedSlot || submitting) return;
    if (!identityValid()) {
      setErr(tokenMode ? 'Something went wrong — please try again.'
                       : 'Please fill in your first name, last name, and phone number.');
      return;
    }
    setErr(null); setInfo(null);
    submitting = true;
    var btn = E('book-btn');
    btn.disabled = true;
    btn.textContent = 'Booking\u2026';

    var payload = {
      start: selectedSlot,
      website: E('website').value, // honeypot — humans leave it empty
      ts: cfg.ts,
      sig: cfg.sig,
    };
    if (!E('provider-section').classList.contains('hidden')) {
      payload.provider = Number(E('provider').value);
    }
    if (useToken) payload.c = token;
    if (!tokenMode) {
      payload.first = E('f-first').value.trim();
      payload.last  = E('f-last').value.trim();
      payload.phone = E('f-phone').value.trim();
      var em = E('f-email').value.trim();
      if (em) payload.email = em;
    }
    if (cfg.collect_note) {
      var note = E('f-note').value.trim();
      if (note) payload.note = note;
    }

    apiPost('/api/book/' + encodeURIComponent(slug), payload)
      .then(handleBookResponse)
      .catch(function () {
        finishSubmit();
        setErr('Something went wrong — please try again, or call us.');
      });
  }

  function finishSubmit() {
    submitting = false;
    updateBookBtn();
  }

  function handleBookResponse(r) {
    if (r.ok && r.body && r.body.success) {
      // thankyou_html is trusted admin content (booking_views.thankyou_html).
      E('thankyou').innerHTML = r.body.thankyou_html || '<p>Thank you — your appointment has been booked.</p>';
      hide('main');
      show('thankyou');
      try { window.scrollTo(0, 0); } catch (e) {}
      return;
    }

    finishSubmit();
    var code = r.body && r.body.code;

    if (r.status === 409 && code === 'slot_taken') {
      // Bounce back to the time step with a fresh slot list.
      selectedSlot = null;
      goStep(2);
      setMsg('step2-msg', 'Sorry — that time was just taken. Please pick another.');
      scheduleSlotFetch();
      return;
    }

    if (r.status === 400 && code === 'stale_form') {
      // Old tab: re-fetch config for a fresh ts/sig — keep every entered
      // field — and let them press Book again.
      setInfo('This page sat open a while — we refreshed it. Please press Book again.');
      apiGet('/api/book/' + encodeURIComponent(slug) + '/config').then(function (cr) {
        if (cr.ok) {
          cfg.ts = cr.body.ts;
          cfg.sig = cr.body.sig;
        } else {
          setErr('Could not refresh the page — please reload and try again.');
        }
      });
      return;
    }

    if (code === 'invalid_token' || code === 'invalid_client') {
      // Saved-details link didn't resolve — drop the token, reveal the
      // public fields, and let them proceed on the public path.
      switchToPublic('We couldn\u2019t find your saved details — please enter your name and phone number below.');
      return;
    }

    var friendly = {
      invalid_phone:    'Please enter a valid 10-digit phone number.',
      missing_name:     'Please enter your first and last name.',
      invalid_email:    'Please enter a valid email address (or leave it blank).',
      invalid_provider: 'Please choose who you\u2019d like to meet with.',
      outside_horizon:  'That date is no longer available — please pick another.',
      invalid_start:    'That time is no longer valid — please pick another.',
      invalid_request:  'This page has expired — please reload and try again.',
      rate_limited:     'Too many requests — please wait a moment and try again.',
    };
    setErr(friendly[code] || 'Something went wrong — please try again, or call us.');
  }

  boot();
})();
</script>

</body>
</html>
