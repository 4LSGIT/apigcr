<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Console</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #161a22;
    --panel-2: #1d2230;
    --border: #2a3040;
    --text: #e6e9ef;
    --muted: #8a93a6;
    --accent: #6ea8fe;
    --danger: #ff6b6b;
    --ok: #4ade80;
    --warn: #fbbf24;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, Segoe UI, Roboto, sans-serif; font-size: 13px; }
  .app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; transition: grid-template-columns 0.15s ease; }
  .app.sidebar-collapsed { grid-template-columns: 0 1fr; }
  .app.sidebar-collapsed .sidebar { overflow: hidden; }
  .sidebar { border-right: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; min-height: 0; }
  .sidebar h3 { margin: 0; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar h3 button { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
  .sidebar h3 button:hover { color: var(--text); border-color: var(--accent); }
  .sidebar .section { flex: 1; overflow-y: auto; min-height: 0; }
  .sidebar .section.collapsed { flex: 0 0 auto; max-height: 32px; overflow: hidden; }
  .table-list { padding: 4px 0; }
  .table-row { padding: 4px 10px 4px 20px; cursor: pointer; border-left: 2px solid transparent; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .table-row:hover { background: var(--panel-2); border-left-color: var(--accent); }
  .table-row .count { float: right; color: var(--muted); font-size: 10px; }
  .cols { padding: 2px 0 6px 28px; display: none; }
  .cols.open { display: block; }
  .col { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--muted); padding: 1px 6px; cursor: pointer; }
  .col:hover { color: var(--text); }
  .col .k { color: var(--warn); }
  .col .t { color: #82c0ff; margin-left: 6px; }
  .saved-list { padding: 4px 0; }
  .saved-item { padding: 4px 10px 4px 12px; cursor: pointer; display: flex; justify-content: space-between; font-size: 12px; border-left: 2px solid transparent; }
  .saved-item:hover { background: var(--panel-2); border-left-color: var(--ok); }
  .saved-item .x { color: var(--muted); font-size: 11px; padding: 0 4px; }
  .saved-item .x:hover { color: var(--danger); }

  .main { display: flex; flex-direction: column; min-width: 0; }
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .toolbar button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; cursor: pointer; font-size: 12px; }
  .toolbar button:hover { border-color: var(--accent); }
  .toolbar button.primary { background: var(--accent); color: #001; border-color: var(--accent); font-weight: 600; }
  .toolbar button.primary:hover { filter: brightness(1.08); }
  .toolbar button.danger-toggle { border-color: var(--danger); color: var(--danger); }
  .toolbar button.danger-toggle.active { background: var(--danger); color: #fff; }
  .toolbar .sep { flex: 1; }
  .toolbar .hint { color: var(--muted); font-size: 11px; }

  .editor-wrap { border-bottom: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  #editor { width: 100%; min-height: 100px; height: 120px; max-height: 40vh; resize: vertical; background: var(--panel); color: var(--text); border: none; outline: none; padding: 10px 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; line-height: 1.5; box-sizing: border-box; }

  .status { padding: 6px 10px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--panel); }
  .status .ok { color: var(--ok); }
  .status .err { color: var(--danger); }

  .results { flex: 1; overflow: auto; min-height: 0; }
  table.r { border-collapse: collapse; font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  table.r th, table.r td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; vertical-align: top; }
  /* default: one-line cells with ellipsis — readable, user hovers for full value */
  table.r th { background: var(--panel); position: sticky; top: 0; cursor: pointer; user-select: none; white-space: nowrap; }
  table.r td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 360px; }
  /* "Wrap" toggle — multi-line, break only at word boundaries */
  table.r.wrap td { white-space: pre-wrap; overflow-wrap: anywhere; max-width: 480px; text-overflow: clip; }
  table.r th:hover { color: var(--accent); }
  table.r tbody tr:nth-child(odd) { background: rgba(255,255,255,0.02); }
  table.r td.null { color: var(--muted); font-style: italic; }
  .empty { padding: 20px; color: var(--muted); text-align: center; }

  /* history drawer */
  .history { border-top: 1px solid var(--border); background: var(--panel); max-height: 30%; overflow: auto; display: none; }
  .history.open { display: block; }
  .history .h { padding: 6px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .history .h button { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer; }
  .hist-item { padding: 4px 10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; cursor: pointer; border-bottom: 1px dotted var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-item:hover { background: var(--panel-2); color: var(--accent); }

  dialog { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 14px; min-width: 340px; }
  dialog input, dialog select { width: 100%; padding: 6px 8px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; font-size: 12px; box-sizing: border-box; }
  dialog .actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 10px; }
  dialog button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; cursor: pointer; }

  /* schema editor */
  #schemaDialog { width: min(1100px, 96vw); max-height: 90vh; overflow: auto; }
  #schemaDialog .title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  #schemaDialog .title h3 { margin: 0; font-size: 14px; }
  #schemaDialog .title .muted { color: var(--muted); font-size: 11px; }
  #schemaDialog .name-row { display: grid; grid-template-columns: 100px 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
  #schemaDialog .grid-head, #schemaDialog .grid-row {
    display: grid;
    grid-template-columns: 18px 1.6fr 1.4fr 0.8fr 44px 1.2fr 44px 44px 44px 44px 28px;
    gap: 4px;
    align-items: center;
    font-size: 11px;
  }
  #schemaDialog .grid-head { color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 2px; border-bottom: 1px solid var(--border); }
  #schemaDialog .grid-row { padding: 3px 2px; border-bottom: 1px dotted var(--border); }
  #schemaDialog .grid-row.removed { opacity: 0.35; text-decoration: line-through; }
  #schemaDialog .grid-row.added { background: rgba(74, 222, 128, 0.05); }
  #schemaDialog .grid-row.changed { background: rgba(251, 191, 36, 0.05); }
  #schemaDialog .handle { color: var(--muted); text-align: center; font-size: 10px; }
  #schemaDialog .chk { display: flex; justify-content: center; }
  #schemaDialog .chk input { width: auto; }
  #schemaDialog .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0; }
  #schemaDialog .remove-btn:hover { color: var(--danger); }
  #schemaDialog .add-col { margin-top: 6px; background: var(--panel-2); border: 1px dashed var(--border); color: var(--muted); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; width: 100%; }
  #schemaDialog .add-col:hover { color: var(--accent); border-color: var(--accent); }
  #schemaDialog .warn { color: var(--warn); font-size: 11px; padding: 6px 0; }

  .table-row .edit-table { opacity: 0; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 0 4px; float: right; }
  .table-row:hover .edit-table { opacity: 1; }
  .table-row .edit-table:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h3>
      <span>Schema</span>
      <span>
        <button id="btnNewTable" title="Build a CREATE TABLE statement">+ Table</button>
        <button id="btnSnapshot" title="Download schema (CREATE TABLE only, no data)">↓ .sql</button>
        <button id="btnSaveToRef" title="Save dump to ref/ — dev only (Cloud Run filesystem is ephemeral)">→ ref/</button>
        <button id="btnReloadSchema" title="Reload schema">↻</button>
      </span>
    </h3>
    <div class="section" id="schemaSection">
      <div class="table-list" id="tableList"><div class="empty">Loading…</div></div>
    </div>
    <h3>
      <span>Saved Queries</span>
      <button id="btnSaveQuery">+ Save current</button>
    </h3>
    <div class="section" id="savedSection" style="max-height: 30%;">
      <div class="saved-list" id="savedList"><div class="empty">—</div></div>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <button id="btnSidebar" title="Show/hide sidebar">☰</button>
      <button class="primary" id="btnRun">Run <span class="hint">⌘/Ctrl+⏎</span></button>
      <button id="btnExplain" title="Prepend EXPLAIN">EXPLAIN</button>
      <button id="btnWrap" title="Wrap long cells (multi-line)">Wrap</button>
      <button id="btnCsv" disabled>Export CSV</button>
      <button id="btnHistory">History</button>
      <span class="sep"></span>
      <button id="btnWriteToggle" class="danger-toggle" title="Toggle write mode">🔒 Read-only</button>
      <span class="hint" id="userHint"></span>
    </div>

    <div class="editor-wrap">
      <textarea id="editor" spellcheck="false" placeholder="SELECT 1;   -- Ctrl/Cmd+Enter to run"></textarea>
    </div>

    <div class="status" id="status">Ready.</div>

    <div class="results" id="results"><div class="empty">Run a query.</div></div>

    <div class="history" id="historyPanel">
      <div class="h">
        <span>Local history (this browser)</span>
        <button id="btnClearHistory">Clear</button>
      </div>
      <div id="historyList"></div>
    </div>
  </main>
</div>

<dialog id="nameDialog">
  <form method="dialog" id="nameForm">
    <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:6px;">Save query as…</label>
    <input id="nameInput" required maxlength="120" placeholder="e.g. Active users last 7d">
    <div class="actions">
      <button value="cancel">Cancel</button>
      <button value="ok" class="primary" style="background:var(--accent); color:#001;">Save</button>
    </div>
  </form>
</dialog>

<dialog id="schemaDialog">
  <div class="title">
    <h3 id="schemaDialogTitle">New Table</h3>
    <span class="muted">Generates SQL into the editor — nothing runs until you hit Run.</span>
  </div>
  <div class="name-row">
    <label style="font-size:12px; color:var(--muted);">Table name</label>
    <input id="schemaTableName" maxlength="64" placeholder="my_table">
  </div>
  <div id="schemaWarn" class="warn"></div>
  <div class="grid-head">
    <span></span>
    <span>Name</span>
    <span>Type</span>
    <span>Length / Values</span>
    <span title="Unsigned (integer types)">Uns.</span>
    <span>Default</span>
    <span title="NOT NULL if unchecked">Null</span>
    <span title="Primary key">PK</span>
    <span>AI</span>
    <span>Uniq</span>
    <span></span>
  </div>
  <div id="schemaColumns"></div>
  <button type="button" class="add-col" id="schemaAddCol">+ Add column</button>
  <div class="actions">
    <button type="button" id="schemaCancel">Cancel</button>
    <button type="button" id="schemaGenerate" class="primary" style="background:var(--accent); color:#001;">Generate SQL → Editor</button>
  </div>
</dialog>

<script>
// ── parent-bridge auth (same pattern as featureRequests.html) ────────────────
const P = window.parent;
function api(endpoint, method = "GET", payload = null) {
  if (!P || !P.apiSend) throw new Error("This page must be loaded inside the admin app.");
  return P.apiSend(endpoint, method, payload);
}

const editor   = document.getElementById("editor");
const status_  = document.getElementById("status");
const results  = document.getElementById("results");
const btnWrite = document.getElementById("btnWriteToggle");
const btnCsv   = document.getElementById("btnCsv");
const btnRun   = document.getElementById("btnRun");
const userHint = document.getElementById("userHint");

let lastRows = null;
let lastFields = null;
let sortState = { key: null, dir: 1 };
let writeMode = false;
let wrapMode  = false;

// ── auth guard + user hint ───────────────────────────────────────────────────
// Prefer the parent's live JWT (it gets refreshed on expiry by apiSend);
// localStorage is the fallback for a just-reloaded iframe. The `authed` flag
// gates the init calls at the bottom so we don't fire redundant API requests
// after rejecting the user.
let authed = false;
(function checkSU() {
  try {
    const token = P?.AUTH_STATE?.jwt || localStorage.getItem("jwt");
    if (!token) throw new Error("no token");
    const payload = JSON.parse(atob(token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/")));
    if (payload.user_auth !== "authorized - SU") {
      document.body.innerHTML = '<div style="padding:40px; text-align:center; color:#ff6b6b;">Superuser access required.</div>';
      return;
    }
    userHint.textContent = `${payload.username || payload.sub} · SU`;
    authed = true;
  } catch (e) {
    document.body.innerHTML = '<div style="padding:40px; text-align:center; color:#ff6b6b;">Not authenticated.</div>';
  }
})();

// ── write toggle ─────────────────────────────────────────────────────────────
btnWrite.addEventListener("click", () => {
  if (!writeMode) {
    if (!confirm("Enable WRITE mode?\n\nYou will be able to run INSERT/UPDATE/DELETE/DROP/ALTER.\nEvery query is audit-logged to admin_audit_log.")) return;    writeMode = true;
    btnWrite.textContent = "⚠️ WRITES ON";
    btnWrite.classList.add("active");
  } else {
    writeMode = false;
    btnWrite.textContent = "🔒 Read-only";
    btnWrite.classList.remove("active");
  }
});

// ── editor keybindings ───────────────────────────────────────────────────────
editor.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); runQuery(); return; }
  if (e.key === "Tab") {
    e.preventDefault();
    const start = editor.selectionStart, end = editor.selectionEnd;
    editor.value = editor.value.slice(0, start) + "    " + editor.value.slice(end);
    editor.selectionStart = editor.selectionEnd = start + 4;
  }
});
btnRun.addEventListener("click", runQuery);

// Sidebar collapse — frees up horizontal room for wide result tables.
document.getElementById("btnSidebar").addEventListener("click", () => {
  document.querySelector(".app").classList.toggle("sidebar-collapsed");
});

// Wrap toggle — re-renders the last result with the new mode.
document.getElementById("btnWrap").addEventListener("click", (e) => {
  wrapMode = !wrapMode;
  e.currentTarget.classList.toggle("primary", wrapMode);
  if (lastRows) renderResults(lastRows, lastFields);
});

document.getElementById("btnExplain").addEventListener("click", () => {
  const q = editor.value.trim();
  if (!q) return;
  editor.value = /^explain\s/i.test(q) ? q : "EXPLAIN " + q;
  runQuery();
});

// ── run ──────────────────────────────────────────────────────────────────────
async function runQuery() {
  const query = editor.value.trim();
  if (!query) return;
  setStatus("Running…");
  btnRun.disabled = true;
  const t0 = performance.now();
  try {
    const res = await api("/admin/db/query", "POST", { query, allowWrite: writeMode });
    const ms = Math.round(performance.now() - t0);
    lastRows = res.rows;
    lastFields = res.fields;
    sortState = { key: null, dir: 1 };
    renderResults(res.rows, res.fields);
    setStatus(`<span class="ok">OK</span> · ${res.rowCount ?? 0} row(s) · ${res.durationMs ?? ms} ms`);
    btnCsv.disabled = !Array.isArray(res.rows) || res.rows.length === 0;
    pushHistory(query);
  } catch (err) {
    lastRows = null;
    btnCsv.disabled = true;
    results.innerHTML = `<div class="empty" style="color:var(--danger);">${escapeHtml(err.message || String(err))}</div>`;
    setStatus(`<span class="err">Error:</span> ${escapeHtml(err.message || String(err))}`);
  } finally {
    btnRun.disabled = false;
  }
}

function setStatus(html) { status_.innerHTML = html; }

// ── results rendering ────────────────────────────────────────────────────────
function renderResults(rows, fields) {
  if (!Array.isArray(rows)) {
    // write result: {affectedRows, insertId, ...}
    results.innerHTML = `<pre style="padding:12px; margin:0; color:var(--muted);">${escapeHtml(JSON.stringify(rows, null, 2))}</pre>`;
    return;
  }
  if (rows.length === 0) {
    results.innerHTML = `<div class="empty">0 rows.</div>`;
    return;
  }
  const cols = fields?.length ? fields.map(f => f.name) : Object.keys(rows[0]);
  const sorted = sortRows(rows, cols);
  let html = `<table class="r${wrapMode ? " wrap" : ""}"><thead><tr>`;
  for (const c of cols) {
    const arrow = sortState.key === c ? (sortState.dir > 0 ? " ▲" : " ▼") : "";
    html += `<th data-col="${escapeHtml(c)}">${escapeHtml(c)}${arrow}</th>`;
  }
  html += "</tr></thead><tbody>";
  for (const r of sorted) {
    html += "<tr>";
    for (const c of cols) {
      const v = r[c];
      if (v === null || v === undefined) { html += `<td class="null">NULL</td>`; continue; }
      const raw = typeof v === "object" ? JSON.stringify(v) : String(v);
      html += `<td title="${escapeHtml(raw)}">${escapeHtml(raw)}</td>`;
    }
    html += "</tr>";
  }
  html += "</tbody></table>";
  results.innerHTML = html;
  results.querySelectorAll("th").forEach(th => th.addEventListener("click", () => {
    const key = th.dataset.col;
    if (sortState.key === key) sortState.dir *= -1;
    else sortState = { key, dir: 1 };
    renderResults(lastRows, lastFields);
  }));
}

function sortRows(rows, cols) {
  if (!sortState.key) return rows;
  const k = sortState.key, d = sortState.dir;
  return [...rows].sort((a, b) => {
    const av = a[k], bv = b[k];
    if (av === bv) return 0;
    if (av === null || av === undefined) return 1;
    if (bv === null || bv === undefined) return -1;
    if (typeof av === "number" && typeof bv === "number") return (av - bv) * d;
    return String(av).localeCompare(String(bv)) * d;
  });
}

// ── CSV export ───────────────────────────────────────────────────────────────
btnCsv.addEventListener("click", () => {
  if (!Array.isArray(lastRows) || !lastRows.length) return;
  const cols = lastFields?.length ? lastFields.map(f => f.name) : Object.keys(lastRows[0]);
  const esc = (v) => {
    if (v === null || v === undefined) return "";
    const s = typeof v === "object" ? JSON.stringify(v) : String(v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const csv = [cols.map(esc).join(","), ...lastRows.map(r => cols.map(c => esc(r[c])).join(","))].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `query-${new Date().toISOString().replace(/[:.]/g, "-")}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

// ── schema sidebar ───────────────────────────────────────────────────────────
const tableList = document.getElementById("tableList");
let schemaCache = { tables: [] }; // populated by loadSchema; used by the editor
document.getElementById("btnReloadSchema").addEventListener("click", loadSchema);

async function loadSchema() {
  tableList.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const res = await api("/admin/db/schema");
    schemaCache = res;
    const rows = res.tables || [];
    if (!rows.length) { tableList.innerHTML = '<div class="empty">No tables.</div>'; return; }
    tableList.innerHTML = rows.map(t => {
      const cols = t.columns.map(c => {
        const key = c.keyType === "PRI" ? '<span class="k">🔑</span>' : c.keyType === "UNI" ? '<span class="k">·U·</span>' : c.keyType === "MUL" ? '<span class="k">·I·</span>' : "";
        return `<div class="col" data-insert="${escapeHtml(c.name)}">${escapeHtml(c.name)} ${key}<span class="t">${escapeHtml(c.type)}</span></div>`;
      }).join("");
      return `
        <div class="table-row" data-table="${escapeHtml(t.name)}">
          <button class="edit-table" data-edit="${escapeHtml(t.name)}" title="Edit table schema">✎</button>
          ${escapeHtml(t.name)} <span class="count">${t.columns.length}c</span>
        </div>
        <div class="cols" data-cols-for="${escapeHtml(t.name)}">${cols}</div>
      `;
    }).join("");
    tableList.querySelectorAll(".table-row").forEach(row => {
      row.addEventListener("click", () => {
        const name = row.dataset.table;
        const cols = tableList.querySelector(`[data-cols-for="${CSS.escape(name)}"]`);
        const isOpen = cols.classList.contains("open");
        tableList.querySelectorAll(".cols.open").forEach(c => c.classList.remove("open"));
        if (!isOpen) cols.classList.add("open");
        insertAtCursor(editor, `SELECT * FROM \`${name}\` LIMIT 100;\n`);
      });
    });
    tableList.querySelectorAll(".col").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        insertAtCursor(editor, el.dataset.insert);
      });
    });
    tableList.querySelectorAll(".edit-table").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        openTableEditor(btn.dataset.edit);
      });
    });
  } catch (err) {
    tableList.innerHTML = `<div class="empty" style="color:var(--danger);">${escapeHtml(err.message)}</div>`;
  }
}

// ── table editor (Create / Alter) ────────────────────────────────────────────
// Modal form that collects column definitions and generates SQL into the
// editor. Nothing runs automatically — preview-first by design.
const schemaDialog   = document.getElementById("schemaDialog");
const schemaTitle    = document.getElementById("schemaDialogTitle");
const schemaName     = document.getElementById("schemaTableName");
const schemaColsEl   = document.getElementById("schemaColumns");
const schemaWarnEl   = document.getElementById("schemaWarn");

// MySQL type catalogue: lengthKind tells the form whether to show the
// Length/Values field (and what it means).
//   none    — no args
//   number  — single integer (VARCHAR(n), CHAR(n))
//   decimal — "p,s" (DECIMAL, NUMERIC)
//   values  — enum values, e.g. 'a','b','c'
const TYPE_CATALOG = [
  { type: "INT",        lengthKind: "none",    supportsUnsigned: true  },
  { type: "BIGINT",     lengthKind: "none",    supportsUnsigned: true  },
  { type: "TINYINT",    lengthKind: "number",  supportsUnsigned: true  },
  { type: "SMALLINT",   lengthKind: "none",    supportsUnsigned: true  },
  { type: "MEDIUMINT",  lengthKind: "none",    supportsUnsigned: true  },
  { type: "DECIMAL",    lengthKind: "decimal", supportsUnsigned: true  },
  { type: "FLOAT",      lengthKind: "none",    supportsUnsigned: true  },
  { type: "DOUBLE",     lengthKind: "none",    supportsUnsigned: true  },
  { type: "VARCHAR",    lengthKind: "number",  supportsUnsigned: false },
  { type: "CHAR",       lengthKind: "number",  supportsUnsigned: false },
  { type: "TEXT",       lengthKind: "none",    supportsUnsigned: false },
  { type: "MEDIUMTEXT", lengthKind: "none",    supportsUnsigned: false },
  { type: "LONGTEXT",   lengthKind: "none",    supportsUnsigned: false },
  { type: "JSON",       lengthKind: "none",    supportsUnsigned: false },
  { type: "DATE",       lengthKind: "none",    supportsUnsigned: false },
  { type: "DATETIME",   lengthKind: "none",    supportsUnsigned: false },
  { type: "TIMESTAMP",  lengthKind: "none",    supportsUnsigned: false },
  { type: "TIME",       lengthKind: "none",    supportsUnsigned: false },
  { type: "ENUM",       lengthKind: "values",  supportsUnsigned: false },
  { type: "BOOLEAN",    lengthKind: "none",    supportsUnsigned: false }, // MySQL alias for TINYINT(1)
  { type: "BLOB",       lengthKind: "none",    supportsUnsigned: false },
];
const TYPE_BY_NAME = Object.fromEntries(TYPE_CATALOG.map(t => [t.type, t]));

// State: the column list currently in the modal. Each row has an `originalName`
// when loaded from an existing table (used to emit CHANGE vs ADD/DROP).
let editorState = null;

function blankColumn() {
  return { name: "", type: "INT", args: "", unsigned: false, notNull: true, pk: false, ai: false, unique: false, defaultVal: "", originalName: null, original: null };
}

// Parse COLUMN_TYPE from information_schema into {type, args, unsigned}.
function parseColumnType(colType) {
  const lower = String(colType || "").toLowerCase();
  const unsigned = /\bunsigned\b/.test(lower);
  const stripped = lower.replace(/\s*unsigned\s*/, "").replace(/\s*zerofill\s*/, "").trim();
  const m = stripped.match(/^([a-z]+)(?:\((.+)\))?$/);
  if (!m) return { type: stripped.toUpperCase(), args: "", unsigned };
  return { type: m[1].toUpperCase(), args: m[2] || "", unsigned };
}

function openTableEditor(existingTableName) {
  const editing = !!existingTableName;
  schemaTitle.textContent = editing ? `Edit Table: ${existingTableName}` : "New Table";
  schemaName.value = existingTableName || "";
  schemaName.disabled = editing; // renaming the table itself is out of scope for v1
  schemaWarnEl.textContent = "";

  if (editing) {
    const t = (schemaCache.tables || []).find(x => x.name === existingTableName);
    if (!t) { alert("Table not found in schema cache. Reload schema."); return; }
    editorState = {
      mode: "alter",
      tableName: existingTableName,
      columns: t.columns.map(c => {
        const parsed = parseColumnType(c.type);
        const extra = String(c.extra || "").toLowerCase();
        const defVal = c.defaultValue;
        const col = {
          name: c.name,
          type: TYPE_BY_NAME[parsed.type] ? parsed.type : parsed.type, // keep as-is; unknown types still display
          args: parsed.args,
          unsigned: parsed.unsigned,
          notNull: c.nullable === "NO",
          pk: c.keyType === "PRI",
          ai: extra.includes("auto_increment"),
          unique: c.keyType === "UNI",
          // COLUMN_DEFAULT is null when there is no default, literal string otherwise.
          // Special-case CURRENT_TIMESTAMP-family so we emit it unquoted later.
          defaultVal: defVal === null || defVal === undefined ? "" : String(defVal),
          originalName: c.name,
        };
        col.original = JSON.parse(JSON.stringify(col)); // snapshot for diff
        return col;
      }),
    };
  } else {
    editorState = {
      mode: "create",
      tableName: "",
      columns: [
        { ...blankColumn(), name: "id", type: "INT", unsigned: true, notNull: true, pk: true, ai: true },
      ],
    };
  }
  renderEditorRows();
  schemaDialog.showModal();
}

function renderEditorRows() {
  schemaColsEl.innerHTML = editorState.columns.map((c, i) => renderRow(c, i)).join("");
  schemaColsEl.querySelectorAll("[data-row]").forEach(rowEl => {
    const i = +rowEl.dataset.row;
    rowEl.querySelector("[data-f=name]").addEventListener("input", (e) => { editorState.columns[i].name = e.target.value; flagRow(rowEl, i); });
    rowEl.querySelector("[data-f=type]").addEventListener("change", (e) => {
      editorState.columns[i].type = e.target.value;
      // reset args/unsigned when type changes incompatibly
      const meta = TYPE_BY_NAME[e.target.value];
      if (meta && meta.lengthKind === "none") editorState.columns[i].args = "";
      if (meta && !meta.supportsUnsigned) editorState.columns[i].unsigned = false;
      renderEditorRows();
    });
    rowEl.querySelector("[data-f=args]").addEventListener("input", (e) => { editorState.columns[i].args = e.target.value; flagRow(rowEl, i); });
    rowEl.querySelector("[data-f=def]").addEventListener("input", (e) => { editorState.columns[i].defaultVal = e.target.value; flagRow(rowEl, i); });
    rowEl.querySelectorAll("[data-chk]").forEach(el => {
      el.addEventListener("change", (e) => {
        const f = el.dataset.chk;
        // "Null" checkbox: checked = allow NULL. State stores the inverse so
        // the snapshot-diff stays clean (no extra fields that weren't in the
        // original snapshot).
        if (f === "nullable") editorState.columns[i].notNull = !e.target.checked;
        else editorState.columns[i][f] = e.target.checked;
        flagRow(rowEl, i);
      });
    });
    const unsEl = rowEl.querySelector("[data-f=unsigned]");
    if (unsEl) unsEl.addEventListener("change", (e) => { editorState.columns[i].unsigned = e.target.checked; flagRow(rowEl, i); });
    rowEl.querySelector("[data-remove]").addEventListener("click", () => {
      if (editorState.mode === "alter" && editorState.columns[i].originalName) {
        // tombstone instead of splicing so we can emit DROP COLUMN
        editorState.columns[i]._deleted = !editorState.columns[i]._deleted;
        renderEditorRows();
      } else {
        editorState.columns.splice(i, 1);
        renderEditorRows();
      }
    });
  });
}

// True when an existing (original-backed) column has been edited. We strip
// `original` and `_deleted` from the live copy so only user-visible fields
// participate in the comparison. Key order matters for JSON.stringify —
// rest-destructuring preserves the insertion order of the remaining keys,
// which matches the order in c.original (a JSON clone of the same shape).
function columnIsDirty(c) {
  if (!c.original) return true;
  const { original, _deleted, ...rest } = c;
  return JSON.stringify(rest) !== JSON.stringify(c.original);
}

function flagRow(rowEl, i) {
  const c = editorState.columns[i];
  rowEl.classList.remove("added", "removed", "changed");
  if (editorState.mode !== "alter") return;
  if (c._deleted) { rowEl.classList.add("removed"); return; }
  if (!c.originalName) { rowEl.classList.add("added"); return; }
  if (columnIsDirty(c)) rowEl.classList.add("changed");
}

function renderRow(c, i) {
  const meta = TYPE_BY_NAME[c.type];
  const lengthKind = meta?.lengthKind ?? (c.args ? "number" : "none");
  const argsPlaceholder = lengthKind === "decimal" ? "10,2" : lengthKind === "values" ? "'a','b'" : lengthKind === "number" ? "255" : "—";
  const canUnsigned = meta?.supportsUnsigned;
  const types = TYPE_CATALOG.map(t => `<option ${c.type === t.type ? "selected" : ""}>${t.type}</option>`).join("")
    + (TYPE_BY_NAME[c.type] ? "" : `<option selected>${escapeHtml(c.type)}</option>`);
  const tombstoned = c._deleted ? "removed" : "";
  const addedCls = editorState.mode === "alter" && !c.originalName ? "added" : "";
  return `
    <div class="grid-row ${tombstoned} ${addedCls}" data-row="${i}">
      <span class="handle">${i + 1}</span>
      <input data-f="name" value="${escapeHtml(c.name)}" placeholder="column_name">
      <select data-f="type">${types}</select>
      <input data-f="args" value="${escapeHtml(c.args)}" placeholder="${argsPlaceholder}" ${lengthKind === "none" ? "disabled" : ""}>
      <span class="chk">${canUnsigned ? `<input type="checkbox" data-f="unsigned" ${c.unsigned ? "checked" : ""}>` : ""}</span>
      <input data-f="def" value="${escapeHtml(c.defaultVal)}" placeholder="NULL / CURRENT_TIMESTAMP / …">
      <span class="chk"><input type="checkbox" data-chk="nullable" ${!c.notNull ? "checked" : ""}></span>
      <span class="chk"><input type="checkbox" data-chk="pk" ${c.pk ? "checked" : ""}></span>
      <span class="chk"><input type="checkbox" data-chk="ai" ${c.ai ? "checked" : ""}></span>
      <span class="chk"><input type="checkbox" data-chk="unique" ${c.unique ? "checked" : ""}></span>
      <button class="remove-btn" type="button" data-remove title="${c._deleted ? "Restore" : (editorState.mode === "alter" && c.originalName ? "Mark for DROP" : "Remove")}">${c._deleted ? "↺" : "✕"}</button>
    </div>
  `;
}

document.getElementById("btnNewTable").addEventListener("click", () => openTableEditor(null));
document.getElementById("schemaAddCol").addEventListener("click", () => {
  editorState.columns.push(blankColumn());
  renderEditorRows();
});
document.getElementById("schemaCancel").addEventListener("click", () => schemaDialog.close());
document.getElementById("schemaGenerate").addEventListener("click", () => {
  const name = schemaName.value.trim() || editorState.tableName;
  if (!name) { schemaWarnEl.textContent = "Table name required."; return; }
  if (!/^[A-Za-z_][A-Za-z0-9_]*$/.test(name)) { schemaWarnEl.textContent = "Table name must be [A-Za-z_][A-Za-z0-9_]*."; return; }
  for (const c of editorState.columns) {
    if (c._deleted) continue;
    if (!c.name || !/^[A-Za-z_][A-Za-z0-9_]*$/.test(c.name)) { schemaWarnEl.textContent = `Bad column name: ${c.name || "(empty)"}`; return; }
  }
  const sql = editorState.mode === "alter" ? buildAlterSql(name, editorState.columns) : buildCreateSql(name, editorState.columns);
  if (!sql) { schemaWarnEl.textContent = "No changes to apply."; return; }
  // Drop into editor, prepended with a header so user sees what it is. Do not run.
  const header = `-- ${editorState.mode === "alter" ? "ALTER" : "CREATE"} generated by DB Console\n-- Review carefully. Flip the Read-only toggle off to run.\n`;
  editor.value = (editor.value.trim() ? editor.value.trimEnd() + "\n\n" : "") + header + sql + "\n";
  editor.focus();
  schemaDialog.close();
  setStatus(`<span class="ok">SQL generated.</span> Review in the editor, then Run (with writes enabled).`);
});

// ── SQL generators ───────────────────────────────────────────────────────────
function formatType(c) {
  const meta = TYPE_BY_NAME[c.type];
  let out = c.type;
  if (c.args && meta?.lengthKind !== "none") out += `(${c.args})`;
  if (c.unsigned && meta?.supportsUnsigned) out += " UNSIGNED";
  return out;
}
function formatDefault(raw) {
  if (raw === null || raw === undefined || raw === "") return null;
  const v = String(raw).trim();
  if (v === "") return null;
  if (/^NULL$/i.test(v)) return "NULL";
  if (/^(TRUE|FALSE)$/i.test(v)) return v.toUpperCase();
  if (/^-?\d+(\.\d+)?$/.test(v)) return v;
  if (/^CURRENT_TIMESTAMP(\(\d+\))?$/i.test(v)) return v.toUpperCase();
  // treat everything else as a string literal
  return `'${v.replace(/'/g, "''")}'`;
}
function columnClause(c) {
  const bits = [`\`${c.name}\``, formatType(c)];
  if (c.notNull) bits.push("NOT NULL"); else bits.push("NULL");
  const def = formatDefault(c.defaultVal);
  if (def !== null) bits.push(`DEFAULT ${def}`);
  if (c.ai) bits.push("AUTO_INCREMENT");
  if (c.unique && !c.pk) bits.push("UNIQUE");
  return bits.join(" ");
}

function buildCreateSql(tableName, cols) {
  const live = cols.filter(c => !c._deleted);
  const body = live.map(columnClause);
  const pks = live.filter(c => c.pk).map(c => `\`${c.name}\``);
  if (pks.length) body.push(`PRIMARY KEY (${pks.join(", ")})`);
  return `CREATE TABLE \`${tableName}\` (\n  ${body.join(",\n  ")}\n) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_general_ci;`;
}

function buildAlterSql(tableName, cols) {
  // Detect PK changes — emit a warning-comment, let user hand-edit. Multi-step
  // PK changes are fiddly and not worth auto-generating.
  const pkBefore = cols.filter(c => c.original?.pk).map(c => c.originalName);
  const pkAfter  = cols.filter(c => !c._deleted && c.pk).map(c => c.name);
  const pkChanged = pkBefore.join(",") !== pkAfter.join(",");

  const clauses = [];
  for (const c of cols) {
    if (c._deleted && c.originalName) {
      clauses.push(`DROP COLUMN \`${c.originalName}\``);
      continue;
    }
    if (!c.originalName) {
      clauses.push(`ADD COLUMN ${columnClause(c)}`);
      continue;
    }
    if (!columnIsDirty(c)) continue;
    const renamed = c.originalName !== c.name;
    if (renamed) {
      clauses.push(`CHANGE COLUMN \`${c.originalName}\` ${columnClause(c)}`);
    } else {
      clauses.push(`MODIFY COLUMN ${columnClause(c)}`);
    }
  }
  if (!clauses.length && !pkChanged) return "";
  let sql = `ALTER TABLE \`${tableName}\`\n  ${clauses.join(",\n  ")};`;
  if (pkChanged) {
    sql += `\n\n-- WARNING: primary key changed (${pkBefore.join(",") || "(none)"} -> ${pkAfter.join(",") || "(none)"}).`
        +  `\n-- Auto-generator skipped PK DDL. Hand-edit if needed:`
        +  `\n-- ALTER TABLE \`${tableName}\` DROP PRIMARY KEY${pkAfter.length ? `, ADD PRIMARY KEY (${pkAfter.map(n => `\`${n}\``).join(", ")})` : ""};`;
  }
  return sql;
}

// ── schema download ──────────────────────────────────────────────────────────
// apiSend parses JSON, which won't work for a binary/text download, so we
// fetch directly with the parent's JWT.
document.getElementById("btnSnapshot").addEventListener("click", async () => {
  setStatus("Generating schema…");
  try {
    const token = P?.AUTH_STATE?.jwt || localStorage.getItem("jwt");
    if (!token) throw new Error("No JWT available — reload the admin page");
    const res = await fetch("/admin/db/schema.sql", {
      headers: { "Authorization": `Bearer ${token}` },
    });
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { msg = (await res.json()).error || msg; } catch {}
      if (res.status === 401) msg = "Session expired — reload the admin page";
      throw new Error(msg);
    }
    const blob = await res.blob();
    const disposition = res.headers.get("Content-Disposition") || "";
    const match = /filename="?([^";]+)"?/.exec(disposition);
    const filename = match?.[1] || `schema-${new Date().toISOString().replace(/[:.]/g, "-")}.sql`;
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    setStatus(`<span class="ok">Downloaded:</span> ${escapeHtml(filename)} (${blob.size.toLocaleString()} bytes)`);
  } catch (err) {
    setStatus(`<span class="err">Download failed:</span> ${escapeHtml(err.message)}`);
  }
});

// Dev-only: save dump server-side into ref/. The backend 400s outside
// ENVIRONMENT=development; we just surface the error in the status bar.
document.getElementById("btnSaveToRef").addEventListener("click", async () => {
  setStatus("Saving to ref/…");
  try {
    const res = await api("/admin/db/schema/save-to-ref", "POST");
    setStatus(`<span class="ok">Saved:</span> ${escapeHtml(res.file)} (${res.tables} tables, ${res.bytes.toLocaleString()} bytes)`);
  } catch (err) {
    setStatus(`<span class="err">Save failed:</span> ${escapeHtml(err.message)}`);
  }
});

// ── saved queries ────────────────────────────────────────────────────────────
const savedList = document.getElementById("savedList");
const nameDialog = document.getElementById("nameDialog");
const nameInput  = document.getElementById("nameInput");

async function loadSaved() {
  try {
    const res = await api("/admin/db/saved-queries");
    const rows = res.rows || [];
    savedList.innerHTML = rows.length
      ? rows.map(r => `
          <div class="saved-item" data-id="${r.id}">
            <span data-load title="${escapeHtml(r.query)}">${escapeHtml(r.name)}</span>
            <span class="x" data-delete title="Delete">✕</span>
          </div>`).join("")
      : '<div class="empty">—</div>';
    savedList.querySelectorAll(".saved-item").forEach(el => {
      el.querySelector("[data-load]").addEventListener("click", async () => {
        const row = rows.find(r => r.id == el.dataset.id);
        if (row) { editor.value = row.query; editor.focus(); }
      });
      el.querySelector("[data-delete]").addEventListener("click", async (e) => {
        e.stopPropagation();
        if (!confirm("Delete this saved query?")) return;
        await api(`/admin/db/saved-queries/${el.dataset.id}`, "DELETE");
        loadSaved();
      });
    });
  } catch (err) {
    savedList.innerHTML = `<div class="empty" style="color:var(--danger);">${escapeHtml(err.message)}</div>`;
  }
}

document.getElementById("btnSaveQuery").addEventListener("click", () => {
  if (!editor.value.trim()) { alert("Editor is empty."); return; }
  nameInput.value = "";
  nameDialog.showModal();
});
document.getElementById("nameForm").addEventListener("submit", async (e) => {
  if (e.submitter?.value !== "ok") return;
  const name = nameInput.value.trim();
  if (!name) return;
  try {
    await api("/admin/db/saved-queries", "POST", { name, query: editor.value });
    loadSaved();
  } catch (err) {
    alert("Save failed: " + err.message);
  }
});

// ── history (localStorage, last 50) ──────────────────────────────────────────
const HIST_KEY = "dbConsoleHistory";
const historyPanel = document.getElementById("historyPanel");
const historyList  = document.getElementById("historyList");
document.getElementById("btnHistory").addEventListener("click", () => {
  historyPanel.classList.toggle("open");
  if (historyPanel.classList.contains("open")) renderHistory();
});
document.getElementById("btnClearHistory").addEventListener("click", () => {
  if (confirm("Clear local query history?")) { localStorage.removeItem(HIST_KEY); renderHistory(); }
});
function pushHistory(q) {
  try {
    const arr = JSON.parse(localStorage.getItem(HIST_KEY) || "[]");
    arr.unshift({ q, t: Date.now() });
    localStorage.setItem(HIST_KEY, JSON.stringify(arr.slice(0, 50)));
  } catch {}
}
function renderHistory() {
  const arr = JSON.parse(localStorage.getItem(HIST_KEY) || "[]");
  historyList.innerHTML = arr.length
    ? arr.map((h, i) => `<div class="hist-item" data-i="${i}" title="${escapeHtml(h.q)}">${escapeHtml(h.q.replace(/\s+/g, " "))}</div>`).join("")
    : '<div class="empty" style="padding:12px;">—</div>';
  historyList.querySelectorAll(".hist-item").forEach(el => {
    el.addEventListener("click", () => {
      const a = JSON.parse(localStorage.getItem(HIST_KEY) || "[]");
      const h = a[+el.dataset.i];
      if (h) { editor.value = h.q; editor.focus(); }
    });
  });
}

// ── utils ────────────────────────────────────────────────────────────────────
function insertAtCursor(el, text) {
  const s = el.selectionStart, e = el.selectionEnd;
  el.value = el.value.slice(0, s) + text + el.value.slice(e);
  el.selectionStart = el.selectionEnd = s + text.length;
  el.focus();
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ── init ─────────────────────────────────────────────────────────────────────
if (authed) {
  loadSchema();
  loadSaved();
}
</script>
