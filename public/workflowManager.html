<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Manager</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1a1a2e;
      --navy2:   #16213e;
      --blue:    #4f8ef7;
      --blue2:   #3a7de8;
      --green:   #22c55e;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --bg:      #f1f5f9;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --muted:   #94a3b8;
      --text:    #1e293b;
      --text2:   #475569;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Topbar ─────────────────────────────────────── */
    #topbar {
      background: var(--navy);
      color: #fff;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 2px solid var(--blue);
    }

    #topbar .title {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.02em;
      margin-right: auto;
    }

    #topbar .title span { color: var(--blue); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue2); }
    .btn-ghost { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-ghost:hover { background: rgba(255,255,255,0.18); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Three-panel layout ─────────────────────────── */
    #panels {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left: Workflow List ────────────────────────── */
    #panel-left {
      width: 220px;
      min-width: 220px;
      background: var(--navy2);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    #panel-left .panel-head {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #wf-search {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px;
      padding: 5px 9px;
      color: #fff;
      font-size: 12px;
      outline: none;
    }

    #wf-search::placeholder { color: rgba(255,255,255,0.3); }
    #wf-search:focus { border-color: var(--blue); }

    #wf-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .wf-item {
      padding: 9px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.12s;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .wf-item:hover { background: rgba(255,255,255,0.05); }
    .wf-item.active { border-left-color: var(--blue); background: rgba(79,142,247,0.1); }

    .wf-item-name {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wf-item.active .wf-item-name { color: #fff; }

    .wf-item-meta {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      margin-top: 2px;
    }

    .wf-item-actions {
      display: none;
      gap: 4px;
      margin-top: 5px;
    }

    .wf-item.active .wf-item-actions { display: flex; }

    .wf-act {
      background: rgba(255,255,255,0.08);
      border: none;
      color: rgba(255,255,255,0.6);
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .wf-act:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .wf-act.danger:hover { background: rgba(239,68,68,0.3); color: #fca5a5; }

    #panel-left-foot {
      padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* ── Middle: Canvas ─────────────────────────────── */
    #panel-mid {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    #canvas-head {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #canvas-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #canvas-title.placeholder { color: var(--muted); font-weight: 400; }

    #canvas-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 10px;
      text-align: center;
    }

    .empty-state i { font-size: 40px; opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    /* Step cards */
    .step-flow { display: flex; flex-direction: column; gap: 0; }

    .step-connector {
      display: flex;
      align-items: center;
      padding: 0 0 0 28px;
      height: 24px;
      color: var(--muted);
      font-size: 18px;
    }

    .step-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .step-card:hover { border-color: var(--blue); box-shadow: 0 2px 12px rgba(79,142,247,0.12); }
    .step-card.active { border-color: var(--blue); box-shadow: 0 2px 16px rgba(79,142,247,0.2); }

    .step-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .step-card.active .step-num { background: var(--blue); }

    .step-type-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .type-webhook        { background: #eff6ff; color: #3b82f6; }
    .type-internal_function { background: #f0fdf4; color: #16a34a; }
    .type-custom_code    { background: #faf5ff; color: #9333ea; }

    .step-label {
      flex: 1;
      min-width: 0;
    }

    .step-label-main {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .step-label-sub {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .step-badges { display: flex; gap: 4px; align-items: center; }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .badge-abort   { background: #fee2e2; color: #991b1b; }
    .badge-retry   { background: #fef3c7; color: #92400e; }
    .badge-ignore  { background: #f1f5f9; color: #64748b; }
    .badge-branch  { background: #ede9fe; color: #6d28d9; }
    .badge-delay   { background: #ecfdf5; color: #065f46; }

    .step-card-actions {
      display: none;
      gap: 4px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .step-card.active .step-card-actions { display: flex; }

    .step-act {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 4px;
      padding: 3px 9px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.12s;
      display: flex; align-items: center; gap: 4px;
    }

    .step-act:hover { background: var(--border); }
    .step-act.danger:hover { background: #fee2e2; border-color: #fca5a5; color: var(--red); }

    .add-step-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border: 2px dashed var(--border);
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
      margin-top: 0;
      background: none;
      width: 100%;
    }

    .add-step-btn:hover { border-color: var(--blue); color: var(--blue); background: #eff6ff; }

    /* ── Right: Editor / Tester ─────────────────────── */
    #panel-right {
      width: 380px;
      min-width: 380px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #editor-head {
      padding: 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 11px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.12s;
    }

    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    #editor-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .editor-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 8px;
      text-align: center;
    }

    .editor-placeholder i { font-size: 32px; opacity: 0.25; }

    /* Form elements */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    .field input, .field select, .field textarea {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.12s;
      font-family: inherit;
    }

    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
    }

    .field textarea { resize: vertical; min-height: 90px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

    .field-row { display: flex; gap: 8px; }
    .field-row .field { flex: 1; margin-bottom: 0; }

    .section-divider {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 0 8px;
      border-top: 1px solid var(--border);
      margin: 8px 0 12px;
    }

    .json-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--blue);
      cursor: pointer;
      margin-bottom: 6px;
      user-select: none;
    }

    .json-toggle:hover { text-decoration: underline; }

    #editor-foot {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Tester ─────────────────────────────────────── */
    .tester-vars { margin-bottom: 14px; }

    .var-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
      align-items: center;
    }

    .var-row input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 12px;
      outline: none;
    }

    .var-row input:focus { border-color: var(--blue); }

    .var-row button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      font-size: 13px;
    }

    .var-row button:hover { color: var(--red); }

    .add-var-btn {
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      border-radius: 5px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      transition: all 0.12s;
    }

    .add-var-btn:hover { border-color: var(--blue); color: var(--blue); }

    .test-result {
      margin-top: 14px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .test-result-head {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .test-result-head.success { background: #f0fdf4; color: #166534; border-bottom: 1px solid #bbf7d0; }
    .test-result-head.error   { background: #fef2f2; color: #991b1b; border-bottom: 1px solid #fecaca; }

    .test-result-body {
      background: var(--navy);
      padding: 12px;
      overflow-x: auto;
    }

    .test-result-body pre {
      color: #e2e8f8;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .test-section {
      margin-bottom: 8px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .test-section-label {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
    }

    /* Spinner */
    .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <div class="title">Yisra<span>Case</span> — Workflow Manager</div>
  <button class="btn btn-ghost btn-sm" onclick="wfRefresh()">
    <i class="fa-solid fa-rotate-right"></i> Refresh
  </button>
  <button class="btn btn-primary btn-sm" onclick="wfNew()">
    <i class="fa-solid fa-plus"></i> New Workflow
  </button>
</div>

<!-- Three panels -->
<div id="panels">

  <!-- LEFT: Workflow list -->
  <div id="panel-left">
    <div class="panel-head">
      <input id="wf-search" placeholder="Search workflows…" oninput="wfFilter(this.value)">
    </div>
    <div id="wf-list"><div style="padding:16px;color:rgba(255,255,255,0.3);font-size:12px">Loading…</div></div>
    <div id="panel-left-foot">
      <button class="btn btn-primary" style="width:100%;font-size:12px" onclick="wfNew()">
        <i class="fa-solid fa-plus"></i> New Workflow
      </button>
    </div>
  </div>

  <!-- MIDDLE: Canvas -->
  <div id="panel-mid">
    <div id="canvas-head">
      <div id="canvas-title" class="placeholder">← Select a workflow</div>
      <div id="canvas-actions" style="display:none;gap:8px">
        <button class="btn btn-ghost btn-sm" style="background:var(--bg);color:var(--text2);border:1px solid var(--border)" onclick="wfRename()">
          <i class="fa-solid fa-pencil"></i> Rename
        </button>
        <button class="btn btn-ghost btn-sm" style="background:var(--bg);color:var(--text2);border:1px solid var(--border)" onclick="wfDuplicate()">
          <i class="fa-regular fa-copy"></i> Duplicate
        </button>
        <button class="btn btn-danger btn-sm" onclick="wfDelete()">
          <i class="fa-solid fa-trash"></i>
        </button>
      </div>
    </div>
    <div id="canvas-body">
      <div class="empty-state">
        <i class="fa-solid fa-diagram-project"></i>
        <p>Select a workflow from the left<br>or create a new one.</p>
      </div>
    </div>
  </div>

  <!-- RIGHT: Editor / Tester -->
  <div id="panel-right">
    <div id="editor-head">
      <button class="tab-btn active" id="tab-edit" onclick="switchTab('edit')">
        <i class="fa-solid fa-pencil"></i> Edit Step
      </button>
      <button class="tab-btn" id="tab-test" onclick="switchTab('test')">
        <i class="fa-solid fa-flask"></i> Test Step
      </button>
    </div>
    <div id="editor-body">
      <div class="editor-placeholder">
        <i class="fa-regular fa-hand-pointer"></i>
        <p>Click a step to edit it.</p>
      </div>
    </div>
    <div id="editor-foot" style="display:none">
      <button class="btn btn-primary" style="flex:1" onclick="stepSave()">
        <i class="fa-solid fa-floppy-disk"></i> Save Step
      </button>
      <button class="btn" style="background:var(--bg);border:1px solid var(--border);color:var(--text2)" onclick="stepCancel()">
        Cancel
      </button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
const S = {
  workflows:       [],   // full list from API
  filtered:        [],   // after search
  activeWfId:      null,
  activeWf:        null, // { id, name, description }
  steps:           [],   // current workflow steps
  activeStepIdx:   null, // index in S.steps
  tab:             'edit',
  editingNew:      false // true when adding a brand new step
};

const api = (path, method = 'GET', payload = null) =>
  window.parent.apiSend(path, method, payload);

// ─────────────────────────────────────────────────────────────
// Entry point — called by parent window button
// ─────────────────────────────────────────────────────────────
async function workflowManagerLoad() {
  await loadWorkflows();
}

// Auto-load on open
workflowManagerLoad();

// ─────────────────────────────────────────────────────────────
// Workflow list
// ─────────────────────────────────────────────────────────────
async function loadWorkflows() {
  try {
    const data = await api('/workflows?limit=100');
    S.workflows = data.workflows || [];
    S.filtered  = S.workflows;
    renderWfList();
  } catch (e) {
    document.getElementById('wf-list').innerHTML =
      `<div style="padding:16px;color:#f87171;font-size:12px">Failed to load: ${e.message}</div>`;
  }
}

function renderWfList() {
  const el = document.getElementById('wf-list');
  if (!S.filtered.length) {
    el.innerHTML = '<div style="padding:16px;color:rgba(255,255,255,0.3);font-size:12px">No workflows found.</div>';
    return;
  }
  el.innerHTML = S.filtered.map(wf => `
    <div class="wf-item${wf.id === S.activeWfId ? ' active' : ''}" onclick="selectWorkflow(${wf.id})">
      <div class="wf-item-name">${esc(wf.name)}</div>
      <div class="wf-item-meta">${wf.step_count || 0} step${wf.step_count !== 1 ? 's' : ''}</div>
      <div class="wf-item-actions">
        <button class="wf-act" onclick="event.stopPropagation();wfRename()"><i class="fa-solid fa-pencil"></i></button>
        <button class="wf-act" onclick="event.stopPropagation();wfDuplicate()"><i class="fa-regular fa-copy"></i></button>
        <button class="wf-act danger" onclick="event.stopPropagation();wfDelete()"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>`).join('');
}

function wfFilter(q) {
  const lq = q.toLowerCase();
  S.filtered = S.workflows.filter(w => w.name.toLowerCase().includes(lq));
  renderWfList();
}

function wfRefresh() { loadWorkflows(); if (S.activeWfId) loadSteps(S.activeWfId); }

// ─────────────────────────────────────────────────────────────
// Select workflow → load steps
// ─────────────────────────────────────────────────────────────
async function selectWorkflow(id) {
  S.activeWfId    = id;
  S.activeWf      = S.workflows.find(w => w.id === id);
  S.activeStepIdx = null;
  renderWfList();
  clearEditor();

  const title = document.getElementById('canvas-title');
  title.textContent = S.activeWf?.name || '';
  title.classList.remove('placeholder');
  document.getElementById('canvas-actions').style.display = 'flex';

  await loadSteps(id);
}

async function loadSteps(wfId) {
  document.getElementById('canvas-body').innerHTML =
    '<div class="empty-state"><i class="fa-solid fa-spinner spin"></i><p>Loading…</p></div>';
  try {
    const data = await api(`/workflows/${wfId}`);
    S.steps = (data.steps || []).map(s => ({
      ...s,
      config:       typeof s.config === 'string'       ? JSON.parse(s.config)       : s.config,
      error_policy: typeof s.error_policy === 'string' ? JSON.parse(s.error_policy) : s.error_policy
    }));
    renderCanvas();
  } catch (e) {
    document.getElementById('canvas-body').innerHTML =
      `<div class="empty-state"><p style="color:var(--red)">${e.message}</p></div>`;
  }
}

// ─────────────────────────────────────────────────────────────
// Canvas rendering
// ─────────────────────────────────────────────────────────────
function renderCanvas() {
  const body = document.getElementById('canvas-body');
  if (!S.steps.length) {
    body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:flex-start;padding:8px 0;gap:0">
        <button class="add-step-btn" onclick="stepNew()">
          <i class="fa-solid fa-plus"></i> Add First Step
        </button>
      </div>`;
    return;
  }

  const items = [];
  S.steps.forEach((step, idx) => {
    if (idx > 0) items.push(`<div class="step-connector"><i class="fa-solid fa-arrow-down"></i></div>`);
    items.push(stepCardHTML(step, idx));
  });

  items.push(`<div class="step-connector"><i class="fa-solid fa-arrow-down" style="opacity:0.3"></i></div>`);
  items.push(`<button class="add-step-btn" onclick="stepNew()"><i class="fa-solid fa-plus"></i> Add Step</button>`);

  body.innerHTML = `<div class="step-flow">${items.join('')}</div>`;
}

function stepCardHTML(step, idx) {
  const cfg = step.config || {};
  const isActive = S.activeStepIdx === idx;

  // Labels
  const typeLabels = { webhook: 'Webhook', internal_function: 'Function', custom_code: 'Custom Code' };
  const typeIcons  = { webhook: 'fa-globe', internal_function: 'fa-bolt', custom_code: 'fa-code' };

  let mainLabel = typeLabels[step.type] || step.type;
  let subLabel  = '';

  if (step.type === 'internal_function') {
    mainLabel = cfg.function_name || 'function';
    const url = cfg.params?.to || cfg.params?.url || '';
    subLabel = url ? `→ ${url}` : '';
  } else if (step.type === 'webhook') {
    mainLabel = cfg.url ? trimUrl(cfg.url) : 'Webhook';
    subLabel  = cfg.method || 'GET';
  } else if (step.type === 'custom_code') {
    mainLabel = 'Custom Code';
    subLabel  = (cfg.code || '').slice(0, 40) + ((cfg.code || '').length > 40 ? '…' : '');
  }

  // Badges
  const badges = [];
  const ep = step.error_policy;
  if (ep?.strategy && ep.strategy !== 'ignore') {
    const cls = ep.strategy.includes('abort') ? 'badge-abort' : 'badge-retry';
    badges.push(`<span class="badge ${cls}">${ep.strategy}</span>`);
  }
  if (cfg.function_name === 'set_next' || cfg.function_name === 'evaluate_condition') {
    badges.push(`<span class="badge badge-branch"><i class="fa-solid fa-code-branch"></i> branch</span>`);
  }
  if (cfg.function_name === 'wait_for' || cfg.function_name === 'schedule_resume' || cfg.function_name === 'wait_until_time') {
    badges.push(`<span class="badge badge-delay"><i class="fa-regular fa-clock"></i> delay</span>`);
  }

  // Move buttons
  const canUp   = idx > 0;
  const canDown = idx < S.steps.length - 1;

  return `
    <div class="step-card${isActive ? ' active' : ''}" onclick="selectStep(${idx})">
      <div class="step-card-head">
        <div class="step-num">${step.step_number}</div>
        <div class="step-type-icon type-${step.type}">
          <i class="fa-solid ${typeIcons[step.type] || 'fa-circle'}"></i>
        </div>
        <div class="step-label">
          <div class="step-label-main">${esc(mainLabel)}</div>
          ${subLabel ? `<div class="step-label-sub">${esc(subLabel)}</div>` : ''}
        </div>
        <div class="step-badges">${badges.join('')}</div>
      </div>
      ${isActive ? `
      <div class="step-card-actions">
        <button class="step-act" onclick="event.stopPropagation();stepMoveUp(${idx})" ${!canUp ? 'disabled style="opacity:0.3"' : ''}>
          <i class="fa-solid fa-arrow-up"></i> Up
        </button>
        <button class="step-act" onclick="event.stopPropagation();stepMoveDown(${idx})" ${!canDown ? 'disabled style="opacity:0.3"' : ''}>
          <i class="fa-solid fa-arrow-down"></i> Down
        </button>
        <button class="step-act danger" onclick="event.stopPropagation();stepDelete(${idx})">
          <i class="fa-solid fa-trash"></i> Delete
        </button>
      </div>` : ''}
    </div>`;
}

// ─────────────────────────────────────────────────────────────
// Step selection → populate editor
// ─────────────────────────────────────────────────────────────
function selectStep(idx) {
  S.activeStepIdx = idx;
  S.editingNew    = false;
  renderCanvas();
  renderEditor(S.steps[idx]);
}

function clearEditor() {
  S.activeStepIdx = null;
  document.getElementById('editor-body').innerHTML = `
    <div class="editor-placeholder">
      <i class="fa-regular fa-hand-pointer"></i>
      <p>Click a step to edit it.</p>
    </div>`;
  document.getElementById('editor-foot').style.display = 'none';
}

// ─────────────────────────────────────────────────────────────
// Editor tab
// ─────────────────────────────────────────────────────────────
let jsonMode = false;

function switchTab(tab) {
  S.tab = tab;
  document.getElementById('tab-edit').classList.toggle('active', tab === 'edit');
  document.getElementById('tab-test').classList.toggle('active', tab === 'test');

  if (tab === 'edit' && S.activeStepIdx !== null) {
    renderEditor(S.steps[S.activeStepIdx]);
  } else if (tab === 'test' && S.activeStepIdx !== null) {
    renderTester(S.steps[S.activeStepIdx]);
  } else if (tab === 'test') {
    document.getElementById('editor-body').innerHTML = `
      <div class="editor-placeholder"><i class="fa-regular fa-hand-pointer"></i><p>Select a step first.</p></div>`;
    document.getElementById('editor-foot').style.display = 'none';
  }
}

function renderEditor(step) {
  if (S.tab !== 'edit') return;
  document.getElementById('editor-foot').style.display = 'flex';
  jsonMode = false;

  const cfg = step.config || {};
  const ep  = step.error_policy || {};

  const strategies = ['ignore','abort','retry_then_ignore','retry_then_abort'];

  document.getElementById('editor-body').innerHTML = `
    <div class="field">
      <label>Step Type</label>
      <select id="e-type" onchange="onTypeChange()">
        <option value="webhook"           ${step.type==='webhook'?'selected':''}>Webhook</option>
        <option value="internal_function" ${step.type==='internal_function'?'selected':''}>Internal Function</option>
        <option value="custom_code"       ${step.type==='custom_code'?'selected':''}>Custom Code</option>
      </select>
    </div>

    <div id="e-config-area">
      ${renderConfigFields(step.type, cfg)}
    </div>

    <div class="section-divider">Error Policy</div>

    <div class="field-row">
      <div class="field">
        <label>Strategy</label>
        <select id="e-ep-strategy">
          ${strategies.map(s => `<option value="${s}" ${ep.strategy===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Max Retries</label>
        <input id="e-ep-retries" type="number" min="0" max="10" value="${ep.max_retries ?? 0}" style="width:100%">
      </div>
    </div>
    <div class="field">
      <label>Backoff Seconds</label>
      <input id="e-ep-backoff" type="number" min="0" value="${ep.backoff_seconds ?? 5}">
    </div>`;
}

function renderConfigFields(type, cfg) {
  const jsonToggle = `<div class="json-toggle" onclick="toggleJson()"><i class="fa-solid fa-code"></i> ${jsonMode ? 'Switch to form' : 'Edit as raw JSON'}</div>`;

  if (jsonMode) {
    return `
      ${jsonToggle}
      <div class="field">
        <label>Config JSON</label>
        <textarea id="e-config-json" rows="14">${JSON.stringify(cfg, null, 2)}</textarea>
      </div>`;
  }

  if (type === 'webhook') return `
    ${jsonToggle}
    <div class="field"><label>URL</label><input id="e-url" value="${esc(cfg.url||'')}"></div>
    <div class="field">
      <label>Method</label>
      <select id="e-method">
        ${['GET','POST','PUT','PATCH','DELETE'].map(m=>`<option ${cfg.method===m?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Body (JSON)</label><textarea id="e-body">${cfg.body ? JSON.stringify(cfg.body, null, 2) : ''}</textarea></div>
    <div class="field"><label>Headers (JSON)</label><textarea id="e-headers" rows="3">${cfg.headers ? JSON.stringify(cfg.headers, null, 2) : ''}</textarea></div>
    <div class="field"><label>set_vars (JSON)</label><textarea id="e-setvars" rows="3">${cfg.set_vars ? JSON.stringify(cfg.set_vars, null, 2) : ''}</textarea></div>`;

  if (type === 'internal_function') return `
    ${jsonToggle}
    <div class="field">
      <label>Function Name</label>
      <select id="e-fn">
        ${['set_next','evaluate_condition','noop','set_var','format_string',
           'schedule_resume','wait_for','wait_until_time',
           'send_sms','send_email','create_task',
           'lookup_contact','update_contact','lookup_appointment','update_appointment',
           'set_test_var']
          .map(f => `<option ${cfg.function_name===f?'selected':''}>${f}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Params (JSON)</label><textarea id="e-params">${cfg.params ? JSON.stringify(cfg.params, null, 2) : '{}'}</textarea></div>
    <div class="field"><label>set_vars (JSON)</label><textarea id="e-setvars" rows="3">${cfg.set_vars ? JSON.stringify(cfg.set_vars, null, 2) : ''}</textarea></div>`;

  if (type === 'custom_code') return `
    ${jsonToggle}
    <div class="field"><label>Code</label><textarea id="e-code" rows="10">${esc(cfg.code||'')}</textarea></div>
    <div class="field"><label>Input (JSON)</label><textarea id="e-input" rows="3">${cfg.input ? JSON.stringify(cfg.input, null, 2) : '{}'}</textarea></div>`;

  return jsonToggle;
}

function onTypeChange() {
  const type = document.getElementById('e-type')?.value;
  if (!type) return;
  document.getElementById('e-config-area').innerHTML = renderConfigFields(type, {});
}

function toggleJson() {
  jsonMode = !jsonMode;
  const type = document.getElementById('e-type')?.value;
  const cfg  = jsonMode ? gatherConfig(type) : {};
  document.getElementById('e-config-area').innerHTML = renderConfigFields(type, jsonMode ? cfg : {});
}

// ─────────────────────────────────────────────────────────────
// Gather config from form
// ─────────────────────────────────────────────────────────────
function gatherConfig(type) {
  if (jsonMode) {
    try { return JSON.parse(document.getElementById('e-config-json').value); }
    catch { Swal.fire('Error', 'Config JSON is not valid.', 'error'); return null; }
  }

  const tryParse = (id, fallback = null) => {
    const el = document.getElementById(id);
    if (!el || !el.value.trim()) return fallback;
    try { return JSON.parse(el.value); }
    catch { Swal.fire('Error', `${id} is not valid JSON.`, 'error'); return 'ERROR'; }
  };

  const val = id => document.getElementById(id)?.value?.trim() || '';

  if (type === 'webhook') {
    const body    = tryParse('e-body');    if (body    === 'ERROR') return null;
    const headers = tryParse('e-headers'); if (headers === 'ERROR') return null;
    const setvars = tryParse('e-setvars'); if (setvars === 'ERROR') return null;
    const cfg = { url: val('e-url'), method: val('e-method') };
    if (body)    cfg.body     = body;
    if (headers) cfg.headers  = headers;
    if (setvars) cfg.set_vars = setvars;
    return cfg;
  }

  if (type === 'internal_function') {
    const params  = tryParse('e-params', {});   if (params  === 'ERROR') return null;
    const setvars = tryParse('e-setvars');       if (setvars === 'ERROR') return null;
    const cfg = { function_name: val('e-fn'), params };
    if (setvars) cfg.set_vars = setvars;
    return cfg;
  }

  if (type === 'custom_code') {
    const input = tryParse('e-input', {}); if (input === 'ERROR') return null;
    return { code: val('e-code'), input };
  }

  return {};
}

// ─────────────────────────────────────────────────────────────
// Save step
// ─────────────────────────────────────────────────────────────
async function stepSave() {
  if (S.tab === 'test') return;

  const type = document.getElementById('e-type')?.value;
  if (!type) return;

  const config = gatherConfig(type);
  if (!config) return;

  const error_policy = {
    strategy:        document.getElementById('e-ep-strategy')?.value || 'ignore',
    max_retries:     parseInt(document.getElementById('e-ep-retries')?.value) || 0,
    backoff_seconds: parseInt(document.getElementById('e-ep-backoff')?.value) || 5
  };

  try {
    if (S.editingNew) {
      await api(`/workflows/${S.activeWfId}/steps`, 'POST', { type, config, error_policy });
      S.editingNew = false;
    } else {
      const step = S.steps[S.activeStepIdx];
      await api(`/workflows/${S.activeWfId}/steps/${step.step_number}`, 'PUT', { type, config, error_policy });
    }
    await loadSteps(S.activeWfId);
    await loadWorkflows();
    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Step saved', timer: 1800, showConfirmButton: false });
  } catch (e) {
    Swal.fire('Error', e.message, 'error');
  }
}

function stepCancel() {
  S.editingNew = false;
  clearEditor();
  if (S.activeStepIdx !== null) renderCanvas();
}

// ─────────────────────────────────────────────────────────────
// Step CRUD
// ─────────────────────────────────────────────────────────────
function stepNew() {
  if (!S.activeWfId) return;
  S.activeStepIdx = null;
  S.editingNew    = true;
  S.tab = 'edit';
  document.getElementById('tab-edit').classList.add('active');
  document.getElementById('tab-test').classList.remove('active');
  renderEditor({ type: 'internal_function', config: { function_name: 'noop', params: {} }, error_policy: {} });
  document.getElementById('editor-foot').style.display = 'flex';
}

async function stepDelete(idx) {
  const step = S.steps[idx];
  const res = await Swal.fire({
    title: `Delete step ${step.step_number}?`,
    text: 'This cannot be undone.',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#ef4444',
    confirmButtonText: 'Delete'
  });
  if (!res.isConfirmed) return;
  try {
    await api(`/workflows/${S.activeWfId}/steps/${step.step_number}`, 'DELETE');
    S.activeStepIdx = null;
    clearEditor();
    await loadSteps(S.activeWfId);
    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Step deleted', timer: 1800, showConfirmButton: false });
  } catch (e) { Swal.fire('Error', e.message, 'error'); }
}

async function stepMoveUp(idx) {
  const step = S.steps[idx];
  const prev = S.steps[idx - 1];
  try {
    await api(`/workflows/${S.activeWfId}/steps/reorder`, 'PATCH', { fromStep: step.step_number, toStep: prev.step_number });
    await loadSteps(S.activeWfId);
  } catch (e) { Swal.fire('Error', e.message, 'error'); }
}

async function stepMoveDown(idx) {
  const step = S.steps[idx];
  const next = S.steps[idx + 1];
  try {
    await api(`/workflows/${S.activeWfId}/steps/reorder`, 'PATCH', { fromStep: step.step_number, toStep: next.step_number });
    await loadSteps(S.activeWfId);
  } catch (e) { Swal.fire('Error', e.message, 'error'); }
}

// ─────────────────────────────────────────────────────────────
// Workflow CRUD
// ─────────────────────────────────────────────────────────────
async function wfNew() {
  const { value: name } = await Swal.fire({
    title: 'New Workflow',
    input: 'text',
    inputPlaceholder: 'Workflow name…',
    showCancelButton: true,
    confirmButtonText: 'Create',
    inputValidator: v => !v.trim() && 'Name is required'
  });
  if (!name) return;
  try {
    const res = await api('/workflows', 'POST', { name: name.trim() });
    await loadWorkflows();
    selectWorkflow(res.workflowId);
  } catch (e) { Swal.fire('Error', e.message, 'error'); }
}

async function wfRename() {
  if (!S.activeWf) return;
  const { value: name } = await Swal.fire({
    title: 'Rename Workflow',
    input: 'text',
    inputValue: S.activeWf.name,
    showCancelButton: true,
    confirmButtonText: 'Save',
    inputValidator: v => !v.trim() && 'Name is required'
  });
  if (!name) return;
  try {
    await api(`/workflows/${S.activeWfId}`, 'PUT', { name: name.trim() });
    await loadWorkflows();
    S.activeWf = S.workflows.find(w => w.id === S.activeWfId);
    document.getElementById('canvas-title').textContent = S.activeWf?.name || '';
  } catch (e) { Swal.fire('Error', e.message, 'error'); }
}

async function wfDuplicate() {
  if (!S.activeWf) return;
  const { value: name } = await Swal.fire({
    title: 'Duplicate Workflow',
    input: 'text',
    inputValue: `Copy of ${S.activeWf.name}`,
    showCancelButton: true,
    confirmButtonText: 'Duplicate'
  });
  if (!name) return;
  try {
    const res = await api(`/workflows/${S.activeWfId}/duplicate`, 'POST', { name });
    await loadWorkflows();
    selectWorkflow(res.newWorkflowId);
    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Duplicated!', timer: 1800, showConfirmButton: false });
  } catch (e) { Swal.fire('Error', e.message, 'error'); }
}

async function wfDelete() {
  if (!S.activeWf) return;
  const res = await Swal.fire({
    title: `Delete "${S.activeWf.name}"?`,
    text: 'All steps will be permanently deleted.',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#ef4444',
    confirmButtonText: 'Delete'
  });
  if (!res.isConfirmed) return;
  try {
    await api(`/workflows/${S.activeWfId}`, 'DELETE');
    S.activeWfId = null; S.activeWf = null; S.steps = []; S.activeStepIdx = null;
    document.getElementById('canvas-title').textContent = '← Select a workflow';
    document.getElementById('canvas-title').classList.add('placeholder');
    document.getElementById('canvas-actions').style.display = 'none';
    document.getElementById('canvas-body').innerHTML = `
      <div class="empty-state"><i class="fa-solid fa-diagram-project"></i><p>Select a workflow from the left.</p></div>`;
    clearEditor();
    await loadWorkflows();
  } catch (e) { Swal.fire('Error', e.message, 'error'); }
}

// ─────────────────────────────────────────────────────────────
// Tester
// ─────────────────────────────────────────────────────────────
function renderTester(step) {
  document.getElementById('editor-foot').style.display = 'none';
  const cfg = step.config || {};

  // Auto-detect variables used in this step's config
  const cfgStr = JSON.stringify(cfg);
  const detected = [...new Set([...cfgStr.matchAll(/\{\{(\w[\w.]*)\}\}/g)].map(m => m[1])
    .filter(k => !k.startsWith('env.') && k !== 'this'))];

  const varRows = detected.length
    ? detected.map(k => varRowHTML(k, '')).join('')
    : varRowHTML('', '');

  document.getElementById('editor-body').innerHTML = `
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">
      Testing: <strong style="color:var(--text)">${esc(cfg.function_name || cfg.url || step.type)}</strong>
    </div>

    <div class="section-divider">Variables</div>
    <div id="var-rows">${varRows}</div>
    <button class="add-var-btn" onclick="addVarRow()"><i class="fa-solid fa-plus"></i> Add variable</button>

    <div style="margin-top:14px">
      <button class="btn btn-primary" style="width:100%" onclick="runTest()">
        <i class="fa-solid fa-play"></i> Run Step
      </button>
    </div>

    <div id="test-result"></div>`;
}

function varRowHTML(key, val) {
  return `<div class="var-row">
    <input placeholder="variable name" value="${esc(key)}" style="flex:1.2">
    <input placeholder="value" value="${esc(val)}">
    <button onclick="this.parentElement.remove()" title="Remove"><i class="fa-solid fa-xmark"></i></button>
  </div>`;
}

function addVarRow() {
  document.getElementById('var-rows').insertAdjacentHTML('beforeend', varRowHTML('',''));
}

async function runTest() {
  if (S.activeStepIdx === null) return;
  const step = S.steps[S.activeStepIdx];

  // Gather variables
  const variables = {};
  document.querySelectorAll('#var-rows .var-row').forEach(row => {
    const [k, v] = row.querySelectorAll('input');
    if (k.value.trim()) variables[k.value.trim()] = v.value;
  });

  const resultEl = document.getElementById('test-result');
  resultEl.innerHTML = `<div style="margin-top:14px;color:var(--muted);font-size:13px"><i class="fa-solid fa-spinner spin"></i> Running…</div>`;

  try {
    const res = await api('/workflows/test-step', 'POST', {
      step: {
        type:         step.type,
        config:       step.config,
        error_policy: step.error_policy
      },
      variables
    });

    const isSuccess = res.success;

    const sections = [];

    if (!isSuccess) {
      sections.push({ label: 'ERROR', content: res.error });
      if (res.would_abort) sections.push({ label: 'NOTE', content: 'This step would abort the workflow.' });
    } else {
      if (res.output !== undefined) sections.push({ label: 'OUTPUT', content: res.output });
      if (res.set_vars && Object.keys(res.set_vars).length)
        sections.push({ label: 'VARIABLES SET', content: res.set_vars });
      if (res.next_step !== null && res.next_step !== undefined)
        sections.push({ label: 'NEXT STEP', content: res.next_step });
      if (res.delayed_until)
        sections.push({ label: 'DELAY UNTIL', content: res.delayed_until });
      if (res.resolved_config)
        sections.push({ label: 'RESOLVED CONFIG', content: res.resolved_config });
    }

    const sectionsHTML = sections.map(s => `
      <div class="test-section">
        <div class="test-section-label">${s.label}</div>
        <pre style="padding:8px 10px;font-size:11px;color:#e2e8f8">${esc(typeof s.content === 'object' ? JSON.stringify(s.content, null, 2) : String(s.content))}</pre>
      </div>`).join('');

    resultEl.innerHTML = `
      <div class="test-result" style="margin-top:14px">
        <div class="test-result-head ${isSuccess ? 'success' : 'error'}">
          <i class="fa-solid ${isSuccess ? 'fa-circle-check' : 'fa-circle-xmark'}"></i>
          ${isSuccess ? 'Success' : 'Failed'} &nbsp;·&nbsp; ${res.duration_ms}ms
          ${res.attempts > 1 ? `&nbsp;·&nbsp; ${res.attempts} attempts` : ''}
        </div>
        <div class="test-result-body">${sectionsHTML}</div>
      </div>`;

  } catch (e) {
    resultEl.innerHTML = `
      <div class="test-result" style="margin-top:14px">
        <div class="test-result-head error"><i class="fa-solid fa-circle-xmark"></i> Request failed</div>
        <div class="test-result-body"><pre>${esc(e.message)}</pre></div>
      </div>`;
  }
}

// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function trimUrl(url) {
  try { const u = new URL(url); return u.hostname + u.pathname; }
  catch { return url.length > 40 ? url.slice(0,40)+'…' : url; }
}
