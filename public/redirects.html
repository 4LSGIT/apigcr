<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirects</title>
<style>
  /* Palette matches connections.html / dbConsole.html — admin tools share this. */
  :root {
    --bg: #0f1117;
    --panel: #161a22;
    --panel-2: #1d2230;
    --border: #2a3040;
    --text: #e6e9ef;
    --muted: #8a93a6;
    --accent: #6ea8fe;
    --accent-2: #82c0ff;
    --danger: #ff6b6b;
    --ok: #4ade80;
    --warn: #fbbf24;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
  }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  .panel-host { flex: 1; overflow: auto; min-height: 0; }
  .panel { padding: 14px 16px; }

  /* ── List view ─────────────────────────────────────────────── */
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .list-header h2 { margin: 0; font-size: 14px; font-weight: 600; color: var(--text); }
  .list-header .right { display: flex; gap: 6px; align-items: center; }

  table.list {
    width: 100%; border-collapse: collapse; font-size: 12px;
    border: 1px solid var(--border); background: var(--panel);
  }
  table.list th, table.list td {
    border-bottom: 1px solid var(--border); padding: 7px 10px; text-align: left;
    vertical-align: middle;
  }
  table.list th {
    background: var(--panel-2); color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; font-size: 10.5px; font-weight: 600;
  }
  table.list tbody tr { cursor: pointer; }
  table.list tbody tr:hover { background: var(--panel-2); }
  table.list .actions-cell { white-space: nowrap; }
  table.list .actions-cell button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer; margin-right: 4px;
  }
  table.list .actions-cell button:hover { border-color: var(--accent); }
  table.list .actions-cell button.danger:hover { border-color: var(--danger); color: var(--danger); }
  .empty-row td { color: var(--muted); padding: 16px; text-align: center; font-style: italic; }

  .slug-cell { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--accent-2); }
  .target-cell {
    max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--muted);
  }
  .muted { color: var(--muted); }

  /* ── Buttons ───────────────────────────────────────────────── */
  .btn {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 12px; cursor: pointer; font-size: 12px;
    transition: border-color 0.12s, background 0.12s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #001; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: var(--danger); color: #fff; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.small { padding: 3px 8px; font-size: 11px; }

  /* ── Badges ────────────────────────────────────────────────── */
  .badge {
    display: inline-block; font-size: 10.5px; font-weight: 600;
    padding: 2px 7px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.04em;
    border: 1px solid var(--border);
  }
  .badge.on  { background: rgba(74, 222, 128, 0.15); color: var(--ok);    border-color: rgba(74,222,128,0.4); }
  .badge.off { background: rgba(138, 147, 166, 0.15); color: var(--muted); border-color: var(--border); }
  .badge.exp { background: rgba(251, 191, 36, 0.15); color: var(--warn);   border-color: rgba(251,191,36,0.4); }

  /* ── Modal editor ──────────────────────────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: flex-start; justify-content: center;
    z-index: 100; padding: 40px 16px; overflow: auto;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    width: 100%; max-width: 560px; padding: 20px;
  }
  .modal h3 { margin: 0 0 16px; font-size: 15px; font-weight: 600; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .field input[type="text"], .field input[type="url"], .field input[type="datetime-local"] {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; padding: 8px 10px; font-size: 13px;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .slug-row { display: flex; gap: 6px; }
  .slug-row input { flex: 1; }
  .field .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .field.inline { display: flex; align-items: center; gap: 8px; }
  .field.inline label { margin: 0; text-transform: none; letter-spacing: 0; font-size: 13px; color: var(--text); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .modal-err {
    background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.4);
    color: var(--danger); border-radius: 4px; padding: 8px 10px; font-size: 12px;
    margin-bottom: 14px; display: none;
  }
  .modal-err.show { display: block; }

  .inline-error {
    background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.4);
    color: var(--danger); border-radius: 4px; padding: 8px 10px; font-size: 12px; margin-bottom: 10px;
  }

  /* Toast for copy feedback */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--accent); color: var(--text);
    padding: 8px 16px; border-radius: 6px; font-size: 12px; z-index: 200;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="panel-host">
  <div class="panel">
    <div id="list-region"></div>
  </div>
</div>

<!-- Editor modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h3 id="modal-title">New Redirect</h3>
    <div class="modal-err" id="modal-err"></div>

    <div class="field">
      <label for="f-slug">Slug</label>
      <div class="slug-row">
        <input type="text" id="f-slug" placeholder="smith-retainer" autocomplete="off" spellcheck="false">
        <button class="btn small" id="f-randomize" type="button" title="Generate a random slug">Randomize</button>
      </div>
      <div class="hint">Letters, numbers, <code>_</code> and <code>-</code> only. Case-insensitive when visited.</div>
    </div>

    <div class="field">
      <label for="f-target">Target URL</label>
      <input type="url" id="f-target" placeholder="https://app.clio.com/link/v2/..." autocomplete="off" spellcheck="false">
      <div class="hint">Must be an http(s) URL.</div>
    </div>

    <div class="field">
      <label for="f-label">Label <span style="text-transform:none">(optional, for your reference)</span></label>
      <input type="text" id="f-label" placeholder="Smith retainer payment" autocomplete="off">
    </div>

    <div class="field">
      <label for="f-expires">Expires <span style="text-transform:none">(optional)</span></label>
      <input type="datetime-local" id="f-expires">
      <div class="hint">Leave blank for no expiry.</div>
    </div>

    <div class="field inline">
      <input type="checkbox" id="f-active" checked>
      <label for="f-active">Active</label>
    </div>

    <div class="modal-actions">
      <button class="btn" id="f-cancel" type="button">Cancel</button>
      <button class="btn primary" id="f-save" type="button">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Parent bridge ───────────────────────────────────────────
// All pages have window.top.apiSend(path, method, data?).
const api = (path, method = 'GET', data) => window.top.apiSend(path, method, data);

// ── State ───────────────────────────────────────────────────
const state = { redirects: [], editingId: null };

// ── Helpers ─────────────────────────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}
const E = (id) => document.getElementById(id);

function fullLink(slug) {
  return `${window.location.origin}/r/${slug}`;
}

function isExpired(r) {
  return r.expires_at && new Date(r.expires_at).getTime() <= Date.now();
}

function statusBadge(r) {
  if (!r.active) return '<span class="badge off">Inactive</span>';
  if (isExpired(r)) return '<span class="badge exp">Expired</span>';
  return '<span class="badge on">Active</span>';
}

function showToast(msg) {
  const t = E('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 1600);
}

async function copyLink(slug) {
  const link = fullLink(slug);
  try {
    await navigator.clipboard.writeText(link);
    showToast('Link copied');
  } catch {
    // Fallback for clipboard API restrictions inside iframes.
    const ta = document.createElement('textarea');
    ta.value = link;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); showToast('Link copied'); }
    catch { showToast('Copy failed — ' + link); }
    document.body.removeChild(ta);
  }
}

function randomSlug() {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let s = '';
  for (let i = 0; i < 7; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

// ── List render ─────────────────────────────────────────────
async function loadRedirects() {
  const region = E('list-region');
  try {
    const data = await api('/api/redirects', 'GET');
    state.redirects = data.redirects || [];
    renderList();
  } catch (err) {
    region.innerHTML = `<div class="inline-error">Failed to load redirects: ${esc(err.message)}</div>`;
  }
}

function renderList() {
  const region = E('list-region');
  const rows = state.redirects;
  const body = rows.length === 0
    ? `<tr class="empty-row"><td colspan="6">No redirects yet — click "+ New Redirect" to add one.</td></tr>`
    : rows.map(listRow).join('');

  region.innerHTML = `
    <div class="list-header">
      <h2>Redirects</h2>
      <div class="right">
        <button class="btn primary" id="new-btn">+ New Redirect</button>
      </div>
    </div>
    <table class="list">
      <thead>
        <tr>
          <th>Slug</th>
          <th>Target</th>
          <th>Label</th>
          <th>Status</th>
          <th>Hits</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>${body}</tbody>
    </table>
  `;

  E('new-btn').addEventListener('click', () => openEditor(null));

  region.querySelectorAll('tr[data-id]').forEach(tr => {
    const id = Number(tr.dataset.id);
    tr.addEventListener('click', e => {
      if (e.target.closest('.actions-cell')) return;
      openEditor(id);
    });
    tr.querySelector('button[data-action=copy]')?.addEventListener('click', e => {
      e.stopPropagation();
      copyLink(tr.dataset.slug);
    });
    tr.querySelector('button[data-action=edit]')?.addEventListener('click', e => {
      e.stopPropagation();
      openEditor(id);
    });
    tr.querySelector('button[data-action=delete]')?.addEventListener('click', e => {
      e.stopPropagation();
      deleteRedirect(id, tr.dataset.slug);
    });
  });
}

function listRow(r) {
  return `
    <tr data-id="${r.id}" data-slug="${esc(r.slug)}">
      <td class="slug-cell">${esc(r.slug)}</td>
      <td class="target-cell" title="${esc(r.target_url)}">${esc(r.target_url)}</td>
      <td>${r.label ? esc(r.label) : '<span class="muted">—</span>'}</td>
      <td>${statusBadge(r)}</td>
      <td>${r.hit_count}</td>
      <td class="actions-cell">
        <button data-action="copy" title="Copy full link">Copy</button>
        <button data-action="edit">Edit</button>
        <button data-action="delete" class="danger">Delete</button>
      </td>
    </tr>
  `;
}

// ── Editor ──────────────────────────────────────────────────
function openEditor(id) {
  state.editingId = id;
  const r = id ? state.redirects.find(x => x.id === id) : null;

  E('modal-title').textContent = r ? 'Edit Redirect' : 'New Redirect';
  E('f-slug').value   = r ? r.slug : '';
  E('f-target').value = r ? r.target_url : '';
  E('f-label').value  = r && r.label ? r.label : '';
  E('f-active').checked = r ? !!r.active : true;
  E('f-expires').value = r && r.expires_at ? toLocalInput(r.expires_at) : '';
  hideErr();

  E('modal-backdrop').classList.add('open');
  E('f-slug').focus();
}

function closeEditor() {
  E('modal-backdrop').classList.remove('open');
  state.editingId = null;
}

function showErr(msg) {
  const el = E('modal-err');
  el.textContent = msg;
  el.classList.add('show');
}
function hideErr() {
  E('modal-err').classList.remove('show');
}

// datetime-local <-> server. The server stores/returns UTC; we present local.
function toLocalInput(serverVal) {
  const d = new Date(serverVal);
  if (isNaN(d.getTime())) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fromLocalInput(localVal) {
  if (!localVal) return null;
  const d = new Date(localVal); // parsed as local time
  return isNaN(d.getTime()) ? null : d.toISOString();
}

async function saveRedirect() {
  hideErr();
  const slug   = E('f-slug').value.trim();
  const target = E('f-target').value.trim();
  const label  = E('f-label').value.trim();
  const active = E('f-active').checked ? 1 : 0;
  const expires_at = fromLocalInput(E('f-expires').value);

  if (!slug) return showErr('Slug is required.');
  if (!/^[a-zA-Z0-9_-]{1,64}$/.test(slug)) {
    return showErr('Slug may contain only letters, numbers, _ and - (max 64).');
  }
  if (!target) return showErr('Target URL is required.');
  if (!/^https?:\/\//i.test(target)) return showErr('Target URL must start with http:// or https://');

  const payload = { slug, target_url: target, label: label || null, active, expires_at };

  const saveBtn = E('f-save');
  saveBtn.disabled = true;
  try {
    if (state.editingId) {
      await api(`/api/redirects/${state.editingId}`, 'PUT', payload);
    } else {
      await api('/api/redirects', 'POST', payload);
    }
    closeEditor();
    await loadRedirects();
  } catch (err) {
    // apiSend throws with the server message where available.
    showErr(err.message || 'Save failed.');
  } finally {
    saveBtn.disabled = false;
  }
}

async function deleteRedirect(id, slug) {
  const ok = window.confirm(`Delete redirect "${slug}"? This cannot be undone.`);
  if (!ok) return;
  try {
    await api(`/api/redirects/${id}`, 'DELETE');
    await loadRedirects();
  } catch (err) {
    alert('Delete failed: ' + (err.message || 'unknown error'));
  }
}

// ── Wire modal controls ─────────────────────────────────────
E('f-cancel').addEventListener('click', closeEditor);
E('f-save').addEventListener('click', saveRedirect);
E('f-randomize').addEventListener('click', () => { E('f-slug').value = randomSlug(); });
E('modal-backdrop').addEventListener('click', e => {
  if (e.target === E('modal-backdrop')) closeEditor();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && E('modal-backdrop').classList.contains('open')) closeEditor();
});

// ── Boot ────────────────────────────────────────────────────
loadRedirects();
</script>

</body>
</html>
