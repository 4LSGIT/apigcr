// ─────────────────────────────────────────────────────────────
// Gather the action_config blob from the editor. Branches on:
//   - SEQ.jsonMode (raw textarea)  → parse as JSON
//   - actionType                   → action-specific form fields
//   - internal_function:
//       - meta available + form rendered → per-field gather with type coercion
//       - meta missing or fallback JSON textarea present → parse #se-params
//
// Returns the action_config object, or null on validation failure (caller
// must early-return without saving). Used by both seqGatherStep (for save)
// and seqToggleJson (to capture state across the form↔JSON flip).
// ─────────────────────────────────────────────────────────────
function seqGatherActionConfig(actionType) {
  if (SEQ.jsonMode) {
    const raw = document.getElementById('se-config-json')?.value?.trim() ?? '';
    if (!raw) return {};
    try { return JSON.parse(raw); }
    catch { Swal.fire('Error', 'Action Config JSON invalid', 'error'); return null; }
  }

  const val = id => document.getElementById(id)?.value?.trim() || '';
  const tryParse = (id, fb = null) => {
    const el = document.getElementById(id);
    if (!el || !el.value.trim()) return fb;
    try { return JSON.parse(el.value); }
    catch { Swal.fire('Error', `${id} is not valid JSON`, 'error'); return 'ERROR'; }
  };

  if (actionType === 'sms') {
    return { function_name: 'send_sms', params: { from: val('se-from'), to: val('se-to'), message: val('se-message') } };
  }
  if (actionType === 'email') {
    const params = {
      from: val('se-from'),
      to: val('se-to'),
      subject: val('se-subject'),
      text: val('se-text'),
    };
    const attachRaw = val('se-attach');
    if (attachRaw) {
      let parsed;
      try { parsed = JSON.parse(attachRaw); }
      catch { Swal.fire('Error', 'Attachments is not valid JSON', 'error'); return null; }
      if (!Array.isArray(parsed)) {
        Swal.fire('Error', 'Attachments must be a JSON array', 'error');
        return null;
      }
      if (parsed.length) params.attachment_urls = parsed;
    }
    return { function_name: 'send_email', params };
  }
  if (actionType === 'task') {
    const desc = val('se-desc');
    return { function_name: 'create_task', params: { title: val('se-title'), assigned_to: parseInt(val('se-assigned-to')) || 0, ...(desc && { description: desc }) } };
  }
  if (actionType === 'webhook') {
    // Slice 3.3 — webhook step. URL can contain {{placeholders}}; resolver
    // runs at execution time.
    const url = val('se-wh-url');
    if (!url) { Swal.fire('Error', 'Webhook URL is required', 'error'); return null; }
    const headers = tryParse('se-wh-headers', {}); if (headers === 'ERROR') return null;
    const body    = tryParse('se-wh-body',    {}); if (body    === 'ERROR') return null;
    const credRaw = val('se-wh-cred');
    const credId  = credRaw ? parseInt(credRaw) : null;
    const timeoutRaw = val('se-wh-timeout');
    const timeout_ms = timeoutRaw ? parseInt(timeoutRaw) : 30000;
    return {
      method: document.getElementById('se-wh-method')?.value || 'POST',
      url,
      ...(credId && { credential_id: credId }),
      headers: headers || {},
      body:    body    || {},
      timeout_ms,
    };
  }
  if (actionType === 'start_workflow') {
    // Slice 3.3 — start_workflow step.
    const wfRaw = val('se-sw-workflow');
    if (!wfRaw) { Swal.fire('Error', 'Workflow is required', 'error'); return null; }
    const workflow_id = parseInt(wfRaw);
    if (!workflow_id) { Swal.fire('Error', 'Workflow ID must be a positive integer', 'error'); return null; }
    const init_data = tryParse('se-sw-initdata', {}); if (init_data === 'ERROR') return null;
    const tieChecked = document.getElementById('se-sw-tie')?.checked;
    const overrideVal = val('se-sw-override');
    return {
      workflow_id,
      init_data: init_data || {},
      tie_to_contact: !!tieChecked,
      contact_id_override: tieChecked ? null : (overrideVal || ''),
    };
  }
  // internal_function — metadata-driven path with JSON fallback.
  const fnName = val('se-fn');
  // set_vars handling:
  //   - When the field is rendered (SEQ_HIDE_SETVARS_FIELD=false): gather
  //     from the textarea like normal.
  //   - When the field is hidden: read from a hidden input that the renderer
  //     emits to preserve the original step's set_vars across form-mode
  //     saves and form↔JSON round-trips. Avoids silently dropping data on
  //     unrelated edits.
  let sv = null;
  if (!SEQ_HIDE_SETVARS_FIELD) {
    sv = tryParse('se-setvars');
    if (sv === 'ERROR') return null;
  } else {
    const hidden = document.getElementById('se-setvars-preserved');
    if (hidden?.value) {
      try { sv = JSON.parse(hidden.value); } catch { /* malformed — drop silently */ }
    }
  }

  // Fallback path: function has no metadata (or load failed) → still a
  // JSON textarea at #se-params.
  if (!FUNCTIONS.meta[fnName] || document.getElementById('se-params')) {
    const params = tryParse('se-params', {});
    if (params === 'ERROR') return null;
    const cfg = { function_name: fnName, params };
    if (sv) cfg.set_vars = sv;
    return cfg;
  }

  // Metadata-driven gather — read per-field inputs, skip hidden mode-group
  // fields and skip workflow-only params (SEQ_HIDDEN_PARAMS).
  const meta = FUNCTIONS.meta[fnName];
  const inner = document.getElementById('se-fn-body-inner');
  const activeMode = inner ? inner.dataset.mode : '';
  const params = {};

  for (const spec of meta.params) {
    if (SEQ_HIDDEN_PARAMS.has(spec.name)) continue;
    if (spec.modeGroup && spec.modeGroup !== activeMode) continue;

    const el = document.getElementById(`se-pf-${spec.name}`);
    if (!el) continue;

    if (spec.type === 'boolean') {
      if (el.checked) params[spec.name] = true;
      else if (spec.default === true) params[spec.name] = false; // explicit override of true default
      continue;
    }

    const raw = (el.value || '').trim();
    if (!raw) continue;

    switch (spec.type) {
      case 'integer': {
        const n = parseInt(raw, 10);
        if (Number.isFinite(n)) params[spec.name] = n;
        else { Swal.fire('Error', `${spec.name} must be an integer`, 'error'); return null; }
        break;
      }
      case 'number': {
        const n = Number(raw);
        if (Number.isFinite(n)) params[spec.name] = n;
        else { Swal.fire('Error', `${spec.name} must be a number`, 'error'); return null; }
        break;
      }
      case 'object':
      case 'array': {
        try {
          const parsed = JSON.parse(raw);
          const isArr = Array.isArray(parsed);
          if (spec.type === 'array' && !isArr) {
            Swal.fire('Error', `${spec.name} must be a JSON array`, 'error');
            return null;
          }
          if (spec.type === 'object' && (isArr || typeof parsed !== 'object' || parsed === null)) {
            Swal.fire('Error', `${spec.name} must be a JSON object`, 'error');
            return null;
          }
          params[spec.name] = parsed;
        } catch {
          Swal.fire('Error', `${spec.name} is not valid JSON`, 'error');
          return null;
        }
        break;
      }
      default:
        // string / enum / iso_datetime / duration / placeholder_string
        params[spec.name] = raw;
    }
  }

  const cfg = { function_name: fnName, params };
  if (sv) cfg.set_vars = sv;
  return cfg;
}

function seqGatherStep() {
  const actionType = document.getElementById('se-action-type')?.value || SEQ.steps[SEQ.activeStepIdx]?.action_type || 'sms';
  const action_config = seqGatherActionConfig(actionType);
  if (action_config === null) return null;

  // Gather timing
  const timingType = document.getElementById('st-type')?.value;
  let timing = SEQ.steps[SEQ.activeStepIdx]?.timing || { type: 'immediate' };
  if (timingType) {
    timing = { type: timingType };
    if (timingType === 'delay') {
      const mode = document.getElementById('st-delay-mode')?.value || 'relative';
      if (mode === 'absolute') {
        const atVal = document.getElementById('st-at')?.value?.trim();
        if (!atVal) {
          Swal.fire('Error', 'Absolute mode requires a value in the "At (datetime)" field', 'error');
          return null;
        }
        timing.at = atVal;
      } else {
        timing.value = parseInt(document.getElementById('st-value')?.value) || 5;
        timing.unit  = document.getElementById('st-unit')?.value || 'minutes';
      }
      const rand = parseInt(document.getElementById('st-rand')?.value) || 0;
      if (rand > 0) timing.randomizeMinutes = rand;
    } else if (timingType === 'next_business_day') {
      timing.timeOfDay        = document.getElementById('st-time')?.value || '09:00';
      timing.randomizeMinutes = parseInt(document.getElementById('st-rand')?.value) || 0;
    } else if (timingType === 'business_days') {
      timing.value     = parseInt(document.getElementById('st-value')?.value) || 1;
      timing.timeOfDay = document.getElementById('st-time')?.value || '09:00';
    } else if (timingType === 'before_appt') {
      timing.hoursBack        = parseFloat(document.getElementById('st-hours')?.value) || 24;
      timing.timeOfDay        = document.getElementById('st-time')?.value || '10:00';
      timing.randomizeMinutes = parseInt(document.getElementById('st-rand')?.value) || 0;
      timing.minHoursBefore   = parseFloat(document.getElementById('st-minhours')?.value) || 1;
    } else if (timingType === 'before_appt_fixed') {
      timing.hoursBack = parseFloat(document.getElementById('st-hours')?.value) || 2;
    }
  }

  // Gather condition + fire_guard
  let condition = null, fire_guard = null;
  const cq = document.getElementById('sc-query')?.value?.trim();
  if (cq) {
    // Local tryParse — was previously hoisted in seqGatherStep but moved into
    // seqGatherActionConfig along with the action_config gather. Inlined here
    // for the two condition fields that still need it.
    const tryParse = (id, fb = null) => {
      const el = document.getElementById(id);
      if (!el || !el.value.trim()) return fb;
      try { return JSON.parse(el.value); }
      catch { Swal.fire('Error', `${id} is not valid JSON`, 'error'); return 'ERROR'; }
    };
    const cp = tryParse('sc-params', {}); if (cp === 'ERROR') return null;
    const ca = tryParse('sc-assert', {}); if (ca === 'ERROR') return null;
    condition = { query: cq, params: cp, assert: ca };
  }
  const mgv = document.getElementById('sg-minhours')?.value?.trim();
  if (mgv) fire_guard = { min_hours_before_appt: parseFloat(mgv) };

  // Gather error policy
  const error_policy = {
    strategy:        document.getElementById('se-ep-strategy')?.value || 'ignore',
    max_retries:     parseInt(document.getElementById('se-ep-retries')?.value) || 0,
    backoff_seconds: parseInt(document.getElementById('se-ep-backoff')?.value) || 5,
  };

  return { action_type: actionType, action_config, timing, condition, fire_guard, error_policy };
}

async function seqStepSave() {
  const payload = seqGatherStep();
  if (!payload) return;
  try {
    if (SEQ.editingNew) {
      await api(`/sequences/templates/${SEQ.activeTemplateId}/steps`, 'POST', payload);
      SEQ.editingNew = false;
    } else {
      const step = SEQ.steps[SEQ.activeStepIdx];
      await api(`/sequences/templates/${SEQ.activeTemplateId}/steps/${step.step_number}`, 'PUT', payload);
    }
    await loadSeqSteps(SEQ.activeTemplateId);
    await loadSequences();
    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Step saved', timer: 1800, showConfirmButton: false });
  } catch (e) {
    Swal.fire('Error', e.message, 'error');
  }
}

function seqStepCancel() {
  SEQ.editingNew = false;
  seqClearEditor();
  if (SEQ.activeStepIdx !== null) renderSeqCanvas();
}

function seqStepNew() {
  if (!SEQ.activeTemplateId) return;
  SEQ.activeStepIdx = null;
  SEQ.editingNew = true;
  SEQ.tab = 'edit';
  ['edit', 'timing', 'conditions'].forEach(t => document.getElementById(`seq-tab-${t}`).classList.toggle('active', t === 'edit'));
  seqRenderActiveTab();
  document.getElementById('seq-editor-foot').style.display = 'flex';
}

async function seqStepDelete(idx) {
  const step = SEQ.steps[idx];
  const r = await Swal.fire({ title: `Delete step ${step.step_number}?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Delete' });
  if (!r.isConfirmed) return;
  try {
    await api(`/sequences/templates/${SEQ.activeTemplateId}/steps/${step.step_number}`, 'DELETE');
    SEQ.activeStepIdx = null;
    seqClearEditor();
    await loadSeqSteps(SEQ.activeTemplateId);
  } catch (e) {
    Swal.fire('Error', e.message, 'error');
  }
}

async function seqStepMove(idx, dir) {
  const a = SEQ.steps[idx], b = SEQ.steps[idx + dir];
  try {
    await api(`/sequences/templates/${SEQ.activeTemplateId}/steps/reorder`, 'PATCH', { fromStep: a.step_number, toStep: b.step_number });
    await loadSeqSteps(SEQ.activeTemplateId);
  } catch (e) {
    Swal.fire('Error', e.message, 'error');
  }
}

// ══════════════════════════════════════════════════════════════════
// SEQUENCE TYPES — MANAGER MODAL + HELPERS (Slice E Phase 3)
//
// Sequence types live in the sequence_template_types table and define
// (a) the namespace for `sequence_templates.type` and (b) the
// priority_fields ordering used by the cascade ranker. Editing happens
// inside this sub-page via a SweetAlert2 modal launched from the
// bottom-left "Manage Types" button — there is no separate sub-page.
// All API CRUD goes through /api/sequence-types[/:type] with a Phase 2
// backend.
// ══════════════════════════════════════════════════════════════════

// Read priority_fields off a type row, tolerating string or array shape.
function _seqPriorityFieldsOf(type) {
  if (!type) return [];
  const pf = type.priority_fields;
  if (Array.isArray(pf)) return pf.slice();
  if (typeof pf === 'string') {
    const parsed = parseJson(pf);
    return Array.isArray(parsed) ? parsed.slice() : [];
  }
  return [];
}

// Read the current filter-input values from the open template editor swal.
function _seqCurrentFilterValues() {
  const inputs = document.querySelectorAll('#seq-filter-fields-container .seq-filter-input');
  const out = {};
  inputs.forEach(inp => {
    const k = inp.dataset.pfKey;
    const v = (inp.value || '').trim();
    if (k && v) out[k] = v;
  });
  return out;
}

// Build <option> HTML for the type dropdown. Active types listed first;
// orphaned (or inactive) currentType is prepended as a disabled option
// so the user sees what the template is currently pinned to.
function _seqTypeOptionsHtml(currentType) {
  const opts = [];
  const activeTypes = SEQ_TYPES.list.filter(t => t.active !== 0 && t.active !== false);
  for (const t of activeTypes) {
    const desc = (t.description || '').trim();
    const labelRaw = desc ? `${t.type} — ${desc}` : t.type;
    const label = labelRaw.length > 70 ? labelRaw.slice(0, 67) + '…' : labelRaw;
    const sel = (t.type === currentType) ? ' selected' : '';
    opts.push(`<option value="${esc(t.type)}"${sel}>${esc(label)}</option>`);
  }
  if (currentType) {
    const inActive = activeTypes.some(t => t.type === currentType);
    if (!inActive) {
      const inAny = SEQ_TYPES.list.some(t => t.type === currentType);
      const suffix = inAny ? '(inactive)' : '(unregistered)';
      opts.unshift(`<option value="${esc(currentType)}" selected disabled>${esc(currentType)} ${suffix}</option>`);
    }
  } else {
    opts.unshift(`<option value="" disabled selected>— Select a type —</option>`);
  }
  return opts.join('');
}

// Render the dynamic filter-fields container based on the selected type's
// priority_fields. `currentFilters` preloads inputs; `droppedKeys` (if
// non-empty) shows an amber notice listing fields cleared by a type-change.
function _seqRenderFilterFields(typeName, currentFilters, droppedKeys) {
  const el = document.getElementById('seq-filter-fields-container');
  if (!el) return;
  if (!typeName) { el.innerHTML = ''; return; }
  const type = SEQ_TYPES.list.find(t => t.type === typeName);
  if (!type) { el.innerHTML = ''; return; }
  const pf = _seqPriorityFieldsOf(type);
  if (!pf.length) {
    el.innerHTML = `
      <div class="tfe-label">Filters</div>
      <div class="tfe-empty">This type has no priority_fields configured — no filters available.</div>
    `;
    return;
  }
  currentFilters = currentFilters || {};
  const droppedSet = new Set(droppedKeys || []);
  // Orphans: keys present in currentFilters that aren't in pf and weren't
  // just dropped — i.e. stale data from a prior type config. They'll be
  // cleared on save.
  const orphans = Object.keys(currentFilters)
    .filter(k => !pf.includes(k) && !droppedSet.has(k) && currentFilters[k]);
  const droppedHtml = (droppedKeys && droppedKeys.length)
    ? `<div class="tfe-notice">Cleared filter${droppedKeys.length > 1 ? 's' : ''}: ${droppedKeys.map(esc).join(', ')} — not in the new type's priority list.</div>`
    : '';
  const orphanHtml = orphans.length
    ? `<div class="tfe-notice-info">Filter${orphans.length > 1 ? 's' : ''} for ${orphans.map(esc).join(', ')} — no longer in this type's priority list. Will be cleared on save.</div>`
    : '';
  el.innerHTML = `
    <div class="tfe-label">Filters <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(blank = match anything)</span></div>
    ${orphanHtml}
    ${pf.map(field => `
      <div class="tfe-row">
        <span class="tfe-row-label">${esc(field)}</span>
        <input type="text" data-pf-key="${esc(field)}" class="seq-filter-input"
               placeholder="Any" value="${esc(currentFilters[field] || '')}">
      </div>
    `).join('')}
    ${droppedHtml}
  `;
}

// Bound to the type <select>'s change event in the template editor swal.
// Preserves overlapping filter values; drops the rest with a notice.
function _seqOnTypeChange() {
  const sel = document.getElementById('swal-type');
  if (!sel) return;
  const newType = sel.value;
  // Clear orphan/inactive warning — picking from the dropdown is by
  // definition picking a known active type.
  const warn = document.getElementById('seq-orphan-warn');
  if (warn) { warn.style.display = 'none'; warn.textContent = ''; }
  const oldFilters = _seqCurrentFilterValues();
  const newType_obj = SEQ_TYPES.list.find(t => t.type === newType);
  const newPf = _seqPriorityFieldsOf(newType_obj);
  const kept = {};
  const dropped = [];
  for (const [k, v] of Object.entries(oldFilters)) {
    if (newPf.includes(k)) kept[k] = v;
    else dropped.push(k);
  }
  _seqRenderFilterFields(newType, kept, dropped);
}

// Validate a priority_fields name. Spec: /^[a-z][a-z0-9_]*$/ , ≤50 chars.
function _seqValidPfName(s) {
  return typeof s === 'string' && s.length > 0 && s.length <= 50 && /^[a-z][a-z0-9_]*$/.test(s);
}

// ── Types Manager modal ────────────────────────────────────────
// Opens a list view of all sequence_template_types. Returns when the
// user closes it. Re-fetches the cache on entry. Each row supports
// active toggle, edit, delete. "+ New Type" button opens the editor.
async function seqOpenTypesManager() {
  // Fresh fetch every open — small table, cheap call.
  try { await loadSeqTypes(); }
  catch (e) {
    Swal.fire('Error', `Failed to load sequence types: ${e.message}`, 'error');
    return;
  }

  await Swal.fire({
    title: 'Sequence Types',
    width: 720,
    showCancelButton: false,
    showConfirmButton: true,
    confirmButtonText: 'Close',
    html: `
      <div style="display:flex;justify-content:flex-end;margin:0 0 10px">
        <button class="btn btn-primary btn-sm" id="stm-new-btn">
          <i class="fa-solid fa-plus"></i> New Type
        </button>
      </div>
      <div id="stm-list-container">${_seqRenderTypesList()}</div>
    `,
    didOpen: () => {
      const newBtn = document.getElementById('stm-new-btn');
      if (newBtn) newBtn.addEventListener('click', async () => {
        Swal.close();
        const created = await seqOpenTypeEditor(null);
        // Re-open the list regardless of outcome, with refreshed data.
        if (created !== 'cancelled') await loadSeqTypes().catch(() => {});
        seqOpenTypesManager();
      });
      _seqWireTypesList();
    }
  });
}

function _seqRenderTypesList() {
  if (!SEQ_TYPES.list.length) {
    return `<div class="stm-empty">No sequence types yet. Click "+ New Type" to create one.</div>`;
  }
  // Sort: active first, then alpha by type name
  const sorted = SEQ_TYPES.list.slice().sort((a, b) => {
    const aA = (a.active !== 0 && a.active !== false) ? 0 : 1;
    const bA = (b.active !== 0 && b.active !== false) ? 0 : 1;
    if (aA !== bA) return aA - bA;
    return String(a.type).localeCompare(String(b.type));
  });
  return `<div class="stm-list">` + sorted.map(t => {
    const isActive = t.active !== 0 && t.active !== false;
    const pf = _seqPriorityFieldsOf(t);
    const chips = pf.length
      ? pf.map((f, i) => `<span class="stm-chip-pf"><span class="stm-chip-pf-idx">${i + 1}.</span>${esc(f)}</span>`).join('')
      : `<span style="color:var(--muted);font-style:italic;font-size:11px">no priority fields</span>`;
    const desc = (t.description || '').trim();
    const descShort = desc.length > 120 ? desc.slice(0, 117) + '…' : desc;
    return `
      <div class="stm-row${isActive ? '' : ' inactive'}" data-type="${esc(t.type)}">
        <div class="stm-row-body">
          <div class="stm-row-name">${esc(t.type)}${isActive ? '' : ' <span style="color:var(--muted);font-weight:400;font-size:11px">(inactive)</span>'}</div>
          ${descShort ? `<div class="stm-row-desc">${esc(descShort)}</div>` : ''}
          <div class="stm-row-chips">${chips}</div>
        </div>
        <div class="stm-row-actions">
          <label class="stm-row-toggle" title="${isActive ? 'Click to deactivate' : 'Click to activate'}">
            <input type="checkbox" data-stm-active="${esc(t.type)}" ${isActive ? 'checked' : ''}>
            ${isActive ? 'Active' : 'Inactive'}
          </label>
          <button class="btn btn-outline btn-sm" data-stm-edit="${esc(t.type)}"><i class="fa-solid fa-pencil"></i></button>
          <button class="btn btn-outline btn-sm" data-stm-del="${esc(t.type)}" title="Delete"><i class="fa-solid fa-trash"></i></button>
        </div>
      </div>
    `;
  }).join('') + `</div>`;
}

// Wire the row buttons inside the list container. Called on initial render
// and after each refresh.
function _seqWireTypesList() {
  const root = document.getElementById('stm-list-container');
  if (!root) return;

  root.querySelectorAll('[data-stm-edit]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const typeName = btn.getAttribute('data-stm-edit');
      const t = SEQ_TYPES.list.find(x => x.type === typeName);
      if (!t) return;
      Swal.close();
      const result = await seqOpenTypeEditor(t);
      if (result !== 'cancelled') await loadSeqTypes().catch(() => {});
      seqOpenTypesManager();
    });
  });

  root.querySelectorAll('[data-stm-del]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const typeName = btn.getAttribute('data-stm-del');
      // Use a nested confirm here — small dialog, OK to layer.
      const r = await Swal.fire({
        title: `Delete type "${typeName}"?`,
        text: 'This cannot be undone. Deletion will fail if any templates currently use this type.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        confirmButtonText: 'Delete'
      });
      if (!r.isConfirmed) {
        // Re-open the list (Swal.fire above closed the parent).
        seqOpenTypesManager();
        return;
      }
      try {
        await api(`/api/sequence-types/${encodeURIComponent(typeName)}`, 'DELETE');
        await loadSeqTypes().catch(() => {});
        Swal.fire({ icon: 'success', title: 'Deleted', timer: 1200, showConfirmButton: false });
        setTimeout(() => seqOpenTypesManager(), 1300);
      } catch (e) {
        // 409: templates exist using this type. Backend response is expected
        // to include either a `templates` array or a message listing them.
        let body = null;
        try { body = e.response || (e.body ? JSON.parse(e.body) : null); } catch {}
        let listHtml = '';
        const tpls = (body && (body.templates || body.usedBy || body.in_use_by)) || null;
        if (Array.isArray(tpls) && tpls.length) {
          listHtml = `<div style="margin-top:10px;text-align:left;font-size:12px"><strong>Templates using this type:</strong><ul style="margin:6px 0 0 18px;padding:0">${
            tpls.map(t => `<li>${esc(t.name || t.id || JSON.stringify(t))}</li>`).join('')
          }</ul></div>`;
        }
        await Swal.fire({
          icon: 'error',
          title: 'Cannot delete type',
          html: `${esc(e.message || 'Templates currently use this type.')}${listHtml}`,
        });
        seqOpenTypesManager();
      }
    });
  });

  root.querySelectorAll('[data-stm-active]').forEach(cb => {
    cb.addEventListener('change', async () => {
      const typeName = cb.getAttribute('data-stm-active');
      const want = !!cb.checked;
      try {
        await api(`/api/sequence-types/${encodeURIComponent(typeName)}`, 'PUT', { active: want });
        await loadSeqTypes().catch(() => {});
        // Re-render the list in place (don't bounce through close/reopen)
        const container = document.getElementById('stm-list-container');
        if (container) {
          container.innerHTML = _seqRenderTypesList();
          _seqWireTypesList();
        }
      } catch (e) {
        cb.checked = !want; // revert
        Swal.showValidationMessage?.(e.message);
        Swal.fire('Error', e.message, 'error').then(() => seqOpenTypesManager());
      }
    });
  });
}

// ── Type Editor (create or edit) ──────────────────────────────
// Returns 'saved', 'cancelled', or undefined on hard error.
async function seqOpenTypeEditor(existingType) {
  const isEdit = !!existingType;
  const initial = isEdit ? {
    type: existingType.type || '',
    description: existingType.description || '',
    active: existingType.active !== 0 && existingType.active !== false,
    priority_fields: _seqPriorityFieldsOf(existingType),
  } : {
    type: '',
    description: '',
    active: true,
    priority_fields: [],
  };

  // Snapshot for reorder-detection on save (edit mode only).
  const originalPf = initial.priority_fields.slice();

  const html = `
    <div style="text-align:left;display:flex;flex-direction:column;gap:10px;padding:0 .25em">
      <div>
        <label style="display:block;font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Type Name</label>
        <input id="ste-type" type="text" value="${esc(initial.type)}" ${isEdit ? 'disabled' : ''}
               placeholder="e.g. no_show, lead_drip"
               style="width:100%;padding:7px 9px;border:1px solid #d1d5db;border-radius:5px;font-size:13px;font-family:'SF Mono','Consolas',monospace${isEdit ? ';background:#f1f5f9;color:#64748b' : ''}">
        ${isEdit ? '<div style="font-size:11px;color:#94a3b8;margin-top:3px">Type name is the primary key and cannot be changed.</div>' : '<div style="font-size:11px;color:#94a3b8;margin-top:3px">Lowercase letters, digits, underscores. Must start with a letter.</div>'}
      </div>
      <div>
        <label style="display:block;font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Description</label>
        <textarea id="ste-desc" placeholder="What this type is used for"
                  style="width:100%;min-height:60px;padding:7px 9px;border:1px solid #d1d5db;border-radius:5px;font-size:13px;resize:vertical">${esc(initial.description)}</textarea>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#475569">
        <input id="ste-active" type="checkbox" ${initial.active ? 'checked' : ''}>
        Active
      </label>
      <div>
        <label style="display:block;font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Priority Fields (ordered)</label>
        <div style="font-size:11px;color:#64748b;margin-bottom:6px">Cascade ranks templates by these fields in this order. Most-specific first.</div>
        <div id="ste-pf-list" class="pfe-list"></div>
        <button type="button" id="ste-pf-add" class="pfe-add">
          <i class="fa-solid fa-plus"></i> Add field
        </button>
        <div class="pfe-hint">Format: lowercase, digits, underscores. Start with a letter. Max 50 chars.</div>
      </div>
    </div>
  `;

  const result = await Swal.fire({
    title: isEdit ? `Edit Type: ${initial.type}` : 'New Sequence Type',
    width: 600,
    html,
    showCancelButton: true,
    confirmButtonText: isEdit ? 'Save' : 'Create',
    didOpen: () => {
      // Populate priority_fields rows
      _steRenderPfRows(initial.priority_fields);
      document.getElementById('ste-pf-add').addEventListener('click', () => {
        const cur = _steReadPfRows();
        cur.push('');
        _steRenderPfRows(cur);
        // Focus the new input
        const list = document.getElementById('ste-pf-list');
        const inputs = list.querySelectorAll('input[type="text"]');
        if (inputs.length) inputs[inputs.length - 1].focus();
      });
    },
    preConfirm: async () => {
      const typeName = (document.getElementById('ste-type').value || '').trim();
      const desc = (document.getElementById('ste-desc').value || '').trim();
      const active = document.getElementById('ste-active').checked;
      const pf = _steReadPfRows();

      if (!isEdit) {
        if (!_seqValidPfName(typeName)) {
          Swal.showValidationMessage('Type name must be lowercase, start with a letter, and contain only letters/digits/underscores (max 50 chars).');
          return false;
        }
      }
      // priority_fields: each must validate, must be unique, may be empty list
      const trimmed = pf.map(s => (s || '').trim()).filter(s => s !== '');
      for (const f of trimmed) {
        if (!_seqValidPfName(f)) {
          Swal.showValidationMessage(`Priority field "${f}" is invalid. Use lowercase, start with a letter, only letters/digits/underscores (max 50 chars).`);
          return false;
        }
      }
      const seen = new Set();
      for (const f of trimmed) {
        if (seen.has(f)) {
          Swal.showValidationMessage(`Duplicate priority field: "${f}".`);
          return false;
        }
        seen.add(f);
      }

      // Reorder-detection (edit mode): if order changed (or set changed),
      // confirm before saving.
      if (isEdit) {
        const changed = JSON.stringify(trimmed) !== JSON.stringify(originalPf);
        if (changed) {
          // Check is "reorder" (same set, different order) vs add/remove.
          const sameSet = trimmed.length === originalPf.length
            && trimmed.every(f => originalPf.includes(f));
          if (sameSet) {
            const ok = await Swal.fire({
              title: 'Confirm reorder',
              html: `Templates of type <strong>${esc(typeName)}</strong> will rank by these fields in this new order. Existing in-flight enrollments are unaffected.`,
              icon: 'warning',
              showCancelButton: true,
              confirmButtonText: 'Save reorder',
            });
            if (!ok.isConfirmed) return false;
          }
          // For add/remove we don't confirm — that's a structural change
          // the user explicitly made by adding/removing rows. The rank is
          // implicitly affected, but Phase 2 backend should also block
          // removal of fields used by template filters via a 409 anyway.
        }
      }

      // Build payload
      const body = {
        description: desc || null,
        active,
        priority_fields: trimmed,
      };
      try {
        if (isEdit) {
          await api(`/api/sequence-types/${encodeURIComponent(initial.type)}`, 'PUT', body);
        } else {
          body.type = typeName;
          await api('/api/sequence-types', 'POST', body);
        }
        return true;
      } catch (e) {
        // 409 on remove-of-used-field expected here — surface body if present
        let body2 = null;
        try { body2 = e.response || (e.body ? JSON.parse(e.body) : null); } catch {}
        let extra = '';
        const tpls = (body2 && (body2.templates || body2.usedBy || body2.in_use_by)) || null;
        if (Array.isArray(tpls) && tpls.length) {
          extra = `<div style="margin-top:10px;text-align:left;font-size:12px"><strong>Templates affected:</strong><ul style="margin:6px 0 0 18px;padding:0">${
            tpls.map(t => `<li>${esc(t.name || t.id || JSON.stringify(t))}</li>`).join('')
          }</ul></div>`;
        }
        Swal.showValidationMessage(`${e.message || 'Save failed'}${extra ? ' (see details below)' : ''}`);
        if (extra) {
          // Append details to the validation message container if possible
          const vc = Swal.getValidationMessage?.();
          if (vc) { vc.innerHTML += extra; vc.style.textAlign = 'left'; }
        }
        return false;
      }
    }
  });

  return result.isConfirmed ? 'saved' : 'cancelled';
}

// Render priority_fields rows from a string array.
function _steRenderPfRows(arr) {
  const list = document.getElementById('ste-pf-list');
  if (!list) return;
  arr = arr || [];
  if (!arr.length) {
    list.innerHTML = `<div style="font-size:12px;color:var(--muted);font-style:italic;padding:4px 0">No priority fields. Click "Add field" to add one.</div>`;
    return;
  }
  list.innerHTML = arr.map((v, i) => `
    <div class="pfe-row" data-idx="${i}">
      <button type="button" class="pfe-btn" data-pf-up="${i}" ${i === 0 ? 'disabled' : ''} title="Move up"><i class="fa-solid fa-arrow-up"></i></button>
      <button type="button" class="pfe-btn" data-pf-down="${i}" ${i === arr.length - 1 ? 'disabled' : ''} title="Move down"><i class="fa-solid fa-arrow-down"></i></button>
      <input type="text" value="${esc(v)}" maxlength="50" placeholder="field_name">
      <button type="button" class="pfe-btn danger" data-pf-rm="${i}" title="Remove"><i class="fa-solid fa-xmark"></i></button>
    </div>
  `).join('');
  // Wire up/down/remove
  list.querySelectorAll('[data-pf-up]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.getAttribute('data-pf-up'), 10);
      const cur = _steReadPfRows();
      if (i > 0) {
        [cur[i - 1], cur[i]] = [cur[i], cur[i - 1]];
        _steRenderPfRows(cur);
      }
    });
  });
  list.querySelectorAll('[data-pf-down]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.getAttribute('data-pf-down'), 10);
      const cur = _steReadPfRows();
      if (i < cur.length - 1) {
        [cur[i], cur[i + 1]] = [cur[i + 1], cur[i]];
        _steRenderPfRows(cur);
      }
    });
  });
  list.querySelectorAll('[data-pf-rm]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.getAttribute('data-pf-rm'), 10);
      const cur = _steReadPfRows();
      cur.splice(i, 1);
      _steRenderPfRows(cur);
    });
  });
  // Live invalid-styling on input
  list.querySelectorAll('input[type="text"]').forEach(inp => {
    const sync = () => {
      const v = inp.value.trim();
      if (!v || _seqValidPfName(v)) inp.classList.remove('invalid');
      else inp.classList.add('invalid');
    };
    inp.addEventListener('input', sync);
    sync();
  });
}

// Read current priority_fields values from the DOM as a string array.
function _steReadPfRows() {
  const list = document.getElementById('ste-pf-list');
  if (!list) return [];
  return Array.from(list.querySelectorAll('.pfe-row input[type="text"]')).map(i => i.value);
}

async function seqNew() {
  // Slice E Phase 3 — refresh types cache before opening so the dropdown
  // reflects any changes made in the types manager during this session.
  // Best-effort; if it fails we still open with whatever's cached.
  try { await loadSeqTypes(); } catch {}

  const hasTypes = SEQ_TYPES.list.some(t => t.active !== 0 && t.active !== false);

  const { value: vals } = await Swal.fire({
    title: 'New Sequence Template',
    width: 600,
    html: `<input id="swal-name" class="swal2-input" placeholder="Name">
          <label style="display:flex;align-items:center;gap:8px;margin:10px .875em 4px;font-size:13px;color:#475569">
            <input type="checkbox" id="swal-idonly">
            ID-only template (cannot be cascade-matched by type)
          </label>
          <div id="seq-type-and-filters">
            <select id="swal-type" class="swal2-input" style="display:flex">
              ${_seqTypeOptionsHtml(null)}
            </select>
            <div id="seq-orphan-warn" class="tfe-notice" style="display:none;margin:0 .875em"></div>
            <div id="seq-filter-fields-container" class="tfe-container"></div>
          </div>
          <div id="seq-no-types" class="tfe-notice" style="display:${hasTypes ? 'none' : ''};margin:8px .875em">
            No sequence types registered.
            <a href="javascript:void(0)" id="seq-no-types-link" style="color:#3b82f6;font-weight:600">Create one now →</a>
            Or check "ID-only template" above to skip type matching.
          </div>
          <div style="text-align:left;font-size:12px;color:#475569;margin:14px .875em 4px">
            <strong>Test Input (JSON)</strong>
            <span style="color:#94a3b8">— optional</span>
          </div>
          <textarea id="swal-testinput"
                    placeholder='{ "appt_id": 42, "contact_id": 123, "appt_time": "2026-05-01T10:00:00Z" }'
                    style="width:calc(100% - 1.75em);margin:0 .875em;padding:8px 12px;border:1px solid #d1d5db;border-radius:4px;font-family:'SF Mono','Consolas',monospace;font-size:12px;min-height:110px;resize:vertical"></textarea>
          <div style="text-align:left;font-size:11px;color:#64748b;margin:6px .875em 0">
            Document what trigger_data this sequence expects when enrolled.
          </div>`,
    didOpen: () => {
      const cb       = document.getElementById('swal-idonly');
      const typeEl   = document.getElementById('swal-type');
      const filtersEl= document.getElementById('seq-filter-fields-container');
      const groupEl  = document.getElementById('seq-type-and-filters');
      const link     = document.getElementById('seq-no-types-link');

      // Initial filter fields — empty (no type selected yet, unless we pre-select)
      // If the dropdown has a real first option (i.e. types exist), render its filters.
      const firstOpt = Array.from(typeEl.options).find(o => !o.disabled && o.value);
      if (firstOpt) {
        typeEl.value = firstOpt.value;
        _seqRenderFilterFields(firstOpt.value, {}, []);
      }

      typeEl.addEventListener('change', _seqOnTypeChange);

      const sync = () => {
        if (cb.checked) { groupEl.style.display = 'none'; }
        else { groupEl.style.display = ''; }
      };
      cb.addEventListener('change', sync);
      // ID-only auto-toggles itself if there are no types
      if (!hasTypes) {
        // Don't force-check, but make it more discoverable
        cb.focus();
      }
      if (link) {
        link.addEventListener('click', async () => {
          // Close current modal, open types manager, then re-open this one.
          Swal.close();
          await seqOpenTypesManager();
          // Re-open seqNew with refreshed cache
          seqNew();
        });
      }
    },
    showCancelButton: true,
    confirmButtonText: 'Create',
    preConfirm: () => {
      const name = document.getElementById('swal-name').value.trim();
      const idOnly = document.getElementById('swal-idonly').checked;
      const typeEl = document.getElementById('swal-type');
      const type = idOnly ? null : (typeEl.value || '').trim();
      if (!name) { Swal.showValidationMessage('Name is required'); return false; }
      if (!idOnly && !type) {
        Swal.showValidationMessage('Type is required (or check ID-only)');
        return false;
      }
      // Slice 2.1 — parse + shape-check test_input client-side so the user
      // gets an immediate error. Backend validates again.
      const tiRaw = document.getElementById('swal-testinput').value.trim();
      let test_input = null;
      if (tiRaw) {
        try { test_input = JSON.parse(tiRaw); }
        catch (e) { Swal.showValidationMessage('Test Input is not valid JSON'); return false; }
        if (test_input === null) {
          // literal null in textarea → treat as cleared
        } else if (typeof test_input !== 'object' || Array.isArray(test_input)) {
          Swal.showValidationMessage('Test Input must be a JSON object (not array or primitive)');
          return false;
        }
      }
      // Slice E Phase 3 — read filter fields and assemble filters payload.
      const filters = idOnly ? null : _seqCurrentFilterValues();
      const filtersOut = (filters && Object.keys(filters).length) ? filters : null;
      return {
        name,
        type,
        filters: filtersOut,
        test_input
      };
    }
  });
  if (!vals) return;
  try {
    const r = await api('/sequences/templates', 'POST', vals);
    await loadSequences();
    selectSeqTemplate(r.templateId);
  } catch (e) {
    Swal.fire('Error', e.message, 'error');
  }
}

    preConfirm: () => {
      const name = document.getElementById('swal-name').value.trim();
      const idOnly = document.getElementById('swal-idonly').checked;
      const typeEl = document.getElementById('swal-type');
      const type = idOnly ? null : (typeEl.value || '').trim();
      if (!name) { Swal.showValidationMessage('Name is required'); return false; }
      if (!idOnly && !type) {
        Swal.showValidationMessage('Type is required (or check ID-only)');
        return false;
      }
      // Slice 2.1 — parse + shape-check test_input. Blank textarea → null.
      const tiRaw = document.getElementById('swal-testinput').value.trim();
      let test_input = null;
      if (tiRaw) {
        try { test_input = JSON.parse(tiRaw); }
        catch (e) { Swal.showValidationMessage('Test Input is not valid JSON'); return false; }
        if (test_input === null) {
          // literal null
        } else if (typeof test_input !== 'object' || Array.isArray(test_input)) {
          Swal.showValidationMessage('Test Input must be a JSON object (not array or primitive)');
          return false;
        }
      }
      // Slice E Phase 3 — assemble filters payload.
      const filters = idOnly ? null : _seqCurrentFilterValues();
      const filtersOut = (filters && Object.keys(filters).length) ? filters : null;
      return {
        name,
        type,
        filters: filtersOut,
        active: document.getElementById('swal-active').checked,
        test_input
      };
    }
  });
  if (!vals) return;
  try {
    await api(`/sequences/templates/${SEQ.activeTemplateId}`, 'PUT', vals);
    await loadSequences();
    SEQ.activeTemplate = SEQ.templates.find(t => t.id === SEQ.activeTemplateId);
    document.getElementById('seq-canvas-title').textContent = seqTitleText(SEQ.activeTemplate);
  } catch (e) {
    Swal.fire('Error', e.message, 'error');
  }
}

async function seqDuplicate() {
  if (!SEQ.activeTemplate) return;
  const { value: name } = await Swal.fire({ title: 'Duplicate', input: 'text', inputValue: `Copy of ${SEQ.activeTemplate.name}`, showCancelButton: true, confirmButtonText: 'Duplicate' });
  if (!name) return;
  try {
    const r = await api(`/sequences/templates/${SEQ.activeTemplateId}/duplicate`, 'POST', { name });
    await loadSequences();
    selectSeqTemplate(r.templateId);
  } catch (e) {
    Swal.fire('Error', e.message, 'error');
  }
}

async function seqDelete() {
  if (!SEQ.activeTemplate) return;
  // Stop polling before the confirm dialog — we don't want a tick firing
  // against a template the user is about to delete.
  stopSeqEnrollPolling();

  const r = await Swal.fire({ title: `Delete "${SEQ.activeTemplate.name}"?`, text: 'All steps will be deleted.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'Delete' });
  if (!r.isConfirmed) return;
  try {
    await api(`/sequences/templates/${SEQ.activeTemplateId}`, 'DELETE');
    SEQ.activeTemplateId = null;
    SEQ.activeTemplate = null;
    SEQ.steps = [];
    SEQ.activeStepIdx = null;
    SEQENROLL.offset = 0;
    SEQENROLL.total  = 0;
    const t = document.getElementById('seq-canvas-title');
    t.textContent = '← Select a sequence template';
    t.classList.add('placeholder');
    document.getElementById('seq-canvas-actions').style.display = 'none';
    document.getElementById('seq-canvas-body').innerHTML = '<div class="empty-state"><i class="fa-solid fa-list-ol"></i><p>Select a template.</p></div>';
    seqClearEditor();
    await loadSequences();
  } catch (e) {
    // Delete failed (most commonly: active enrollments exist). The template
    // is still selected; surface the error as before. Polling stays stopped
    // for this tick — it'll restart on the next list refresh if needed.
    Swal.fire('Error', e.message, 'error');
  }
}

// ══════════════════════════════════════════════════════════════════
// ENROLLMENTS TAB
// ══════════════════════════════════════════════════════════════════

function seqEnrollFmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleString(); } catch { return String(d); }
}

function seqEnrollStatusBadge(status) {
  return `<span class="exec-status-badge exec-status-${esc(status)}">${esc(status)}</span>`;
}

function seqJobStatusBadge(status) {
  return `<span class="job-status-badge job-status-${esc(status)}">${esc(status)}</span>`;
}

function seqLogStatusBadge(status) {
  return `<span class="log-status-badge log-status-${esc(status)}">${esc(status)}</span>`;
}

async function loadSequenceEnrollments() {
  if (!SEQ.activeTemplateId) return;
  const templateIdAtCall = SEQ.activeTemplateId;

  const tbody = document.getElementById('seq-enroll-tbody');
  const count = document.getElementById('seq-enroll-count');
  const pager = document.getElementById('seq-enroll-pagination');

  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)"><i class="fa-solid fa-spinner fa-pulse"></i></td></tr>';

  try {
    const url  = `/sequences/templates/${templateIdAtCall}/enrollments?limit=${SEQENROLL.limit}&offset=${SEQENROLL.offset}`;
    const data = await api(url);

    // If user navigated away while we were waiting, drop the result.
    if (SEQ.activeTemplateId !== templateIdAtCall) return;

    SEQENROLL.total = data.total || 0;
    const rows = data.enrollments || [];

    count.textContent = `${SEQENROLL.total} total enrollment${SEQENROLL.total === 1 ? '' : 's'}`;

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)">No enrollments yet.</td></tr>';
      pager.innerHTML = '';
      stopSeqEnrollPolling();
      return;
    }

    tbody.innerHTML = renderSeqEnrollRows(rows);
    pager.innerHTML = renderSeqEnrollPager(rows.length);

    // Polling decision: if any visible row is non-terminal (status === 'active'), poll.
    const anyActive = rows.some(en => !SEQENROLL_TERMINAL.has(en.status));
    if (anyActive) startSeqEnrollPolling();
    else           stopSeqEnrollPolling();
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="6" style="color:var(--red);padding:12px">${esc(e.message)}</td></tr>`;
    pager.innerHTML = '';
    stopSeqEnrollPolling();
  }
}

function renderSeqEnrollRows(rows) {
  return rows.map(en => {
    const nameCell = en.contact_name && en.contact_name.trim() ? en.contact_name : `#${en.contact_id}`;
    const stepCell = (en.current_step != null && en.total_steps != null)
      ? `${en.current_step}/${en.total_steps}`
      : '—';
    return `
      <tr>
        <td class="mono">${en.id}</td>
        <td>${esc(nameCell)}</td>
        <td>${seqEnrollStatusBadge(en.status)}</td>
        <td>${stepCell}</td>
        <td class="text-sm">${seqEnrollFmtDate(en.enrolled_at)}</td>
        <td><button class="btn btn-outline" style="padding:3px 8px;font-size:11px" onclick="viewSequenceEnrollment(${en.id})"><i class="fa-solid fa-eye"></i></button></td>
      </tr>
    `;
  }).join('');
}

function renderSeqEnrollPager(visibleCount) {
  const from = SEQENROLL.offset + 1;
  const to   = SEQENROLL.offset + visibleCount;
  const hasPrev = SEQENROLL.offset > 0;
  const hasNext = SEQENROLL.offset + SEQENROLL.limit < SEQENROLL.total;
  return `
    <button class="btn btn-outline" style="font-size:11px;padding:3px 10px" ${hasPrev ? '' : 'disabled'} onclick="seqEnrollPrevPage()">‹ Previous</button>
    <span>Showing ${from}–${to} of ${SEQENROLL.total}</span>
    <button class="btn btn-outline" style="font-size:11px;padding:3px 10px" ${hasNext ? '' : 'disabled'} onclick="seqEnrollNextPage()">Next ›</button>
  `;
}

function seqEnrollPrevPage() {
  SEQENROLL.offset = Math.max(0, SEQENROLL.offset - SEQENROLL.limit);
  loadSequenceEnrollments();
}

function seqEnrollNextPage() {
  if (SEQENROLL.offset + SEQENROLL.limit >= SEQENROLL.total) return;
  SEQENROLL.offset += SEQENROLL.limit;
  loadSequenceEnrollments();
}

async function viewSequenceEnrollment(id) {
  try {
    // ?log=false — we don't need the legacy joined step-log; ?history=true
    // gives us the scheduled_jobs-derived view joined with sequence_step_log.
    const data = await api(`/sequences/enrollments/${id}?history=true&log=false`);
    const en      = data.enrollment;
    const history = data.history || [];

    const triggerObj = parseJson(en.trigger_data);

    // Display-status decision per row:
    //   - If a log row exists: primary = log_status (sent/skipped/failed).
    //     Secondary = job_status as a small faded badge (useful when retries differed).
    //   - If no log row exists: primary = job_status (pending/running/completed/failed).
    //     Row is CSS-greyed via .row-muted.
    const historyRowsHtml = history.length
      ? history.map(h => {
          const hasLog    = h.log_id != null;
          const rowCls    = hasLog ? '' : 'row-muted';
          const primary   = hasLog ? seqLogStatusBadge(h.log_status) : seqJobStatusBadge(h.job_status);
          const secondary = hasLog
            ? `<span style="margin-left:4px;opacity:0.75">${seqJobStatusBadge(h.job_status)}</span>`
            : '';
          const errText = h.error_message || h.skip_reason || '';
          const attemptsCell = (h.attempts != null && h.max_attempts != null)
            ? `${h.attempts}/${h.max_attempts}`
            : '—';
          const durationCell = h.duration_ms != null ? `${h.duration_ms}ms` : '—';

          // action_config_resolved — collapsible inside the Error/Detail column.
          let detailCell = '—';
          if (errText) detailCell = `<span>${esc(errText)}</span>`;
          if (h.action_config_resolved) {
            const cfgJson = JSON.stringify(h.action_config_resolved, null, 2);
            const prefix = (detailCell === '—') ? '' : detailCell;
            detailCell = prefix + `
              <details style="margin-top:4px"><summary style="cursor:pointer;font-size:10px;color:#64748b">resolved config</summary>
                <pre style="background:#1e293b;color:#e2e8f0;padding:6px 8px;border-radius:4px;font-size:10px;overflow:auto;max-height:160px;margin-top:4px">${esc(cfgJson)}</pre>
              </details>`;
          }

          return `
            <tr class="${rowCls}">
              <td>${h.step_number ?? '—'}</td>
              <td>${esc(h.action_type || '—')}</td>
              <td>${primary}${secondary}</td>
              <td class="text-sm">${seqEnrollFmtDate(h.scheduled_time)}</td>
              <td class="text-sm">${hasLog ? seqEnrollFmtDate(h.executed_at) : '—'}</td>
              <td>${attemptsCell}</td>
              <td class="text-sm">${durationCell}</td>
              <td class="step-error-cell">${detailCell}</td>
            </tr>`;
        }).join('')
      : '<tr><td colspan="8" style="text-align:center;padding:12px;color:#94a3b8">No step history.</td></tr>';

    const cancelReasonBlock = (en.status === 'cancelled' && en.cancel_reason)
      ? `<div style="margin-top:10px;padding:8px 10px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;color:#991b1b;font-size:12px">
           <b>Cancel reason:</b> ${esc(en.cancel_reason)}
         </div>`
      : '';

    Swal.fire({
      title: `Enrollment #${id}`,
      width: 820,
      html: `
        <div style="text-align:left;font-size:12px;max-height:65vh;overflow:auto">
          <p><b>Status:</b> ${seqEnrollStatusBadge(en.status)}</p>
          <p style="margin-top:6px"><b>Template:</b> ${esc(en.template_name || '—')}${en.template_type ? ` (${esc(en.template_type)})` : ''}</p>
          <p style="margin-top:6px"><b>Contact:</b> #${en.contact_id}</p>
          <p style="margin-top:6px"><b>Enrolled:</b> ${seqEnrollFmtDate(en.enrolled_at)}</p>
          <p style="margin-top:6px"><b>Completed:</b> ${seqEnrollFmtDate(en.completed_at)}</p>
          <p style="margin-top:6px"><b>Step:</b> ${en.current_step ?? '—'}/${en.total_steps ?? '—'}</p>
          ${cancelReasonBlock}

          ${triggerObj ? `
            <details style="margin-top:12px"><summary style="cursor:pointer;font-weight:600">Trigger Data</summary>
              <pre style="background:#1e293b;color:#e2e8f0;padding:10px;border-radius:6px;font-size:11px;overflow:auto;max-height:220px;margin-top:6px">${esc(JSON.stringify(triggerObj, null, 2))}</pre>
            </details>
          ` : ''}

          <h4 style="margin-top:14px;font-size:13px">Step History</h4>
          <table class="seq-step-history-table">
            <thead>
              <tr>
                <th>Step</th>
                <th>Action</th>
                <th>Status</th>
                <th>Scheduled</th>
                <th>Executed</th>
                <th>Attempts</th>
                <th>Duration</th>
                <th>Error / Detail</th>
              </tr>
            </thead>
            <tbody>${historyRowsHtml}</tbody>
          </table>
        </div>
      `,
    });
  } catch (e) {
    Swal.fire({ toast: true, position: 'top-end', icon: 'error', title: e.message, timer: 2500, showConfirmButton: false });
  }
}

function startSeqEnrollPolling() {
  stopSeqEnrollPolling();
  if (!SEQ.activeTemplateId) return;
  SEQENROLL.targetTemplateId = SEQ.activeTemplateId;
  SEQENROLL.pollTimer = setInterval(async () => {
    // Bail if user switched templates, tabs, or the sub-page is hidden.
    // The subPageActive guard matches the hooks.html / workflows.html
    // pattern — don't hammer the API when the shell routed away.
    if (!subPageActive
        || SEQENROLL.targetTemplateId !== SEQ.activeTemplateId
        || SEQ.tab !== 'enrollments') {
      stopSeqEnrollPolling();
      return;
    }
    try {
      const url  = `/sequences/templates/${SEQENROLL.targetTemplateId}/enrollments?limit=${SEQENROLL.limit}&offset=${SEQENROLL.offset}`;
      const data = await api(url);
      if (!subPageActive
          || SEQENROLL.targetTemplateId !== SEQ.activeTemplateId
          || SEQ.tab !== 'enrollments') {
        stopSeqEnrollPolling();
        return;
      }

      const rows = data.enrollments || [];
      SEQENROLL.total = data.total || 0;

      const tbody = document.getElementById('seq-enroll-tbody');
      const count = document.getElementById('seq-enroll-count');
      const pager = document.getElementById('seq-enroll-pagination');
      if (!tbody || !count || !pager) { stopSeqEnrollPolling(); return; }

      count.textContent = `${SEQENROLL.total} total enrollment${SEQENROLL.total === 1 ? '' : 's'}`;
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)">No enrollments yet.</td></tr>';
        pager.innerHTML = '';
        stopSeqEnrollPolling();
        return;
      }

      tbody.innerHTML = renderSeqEnrollRows(rows);
      pager.innerHTML = renderSeqEnrollPager(rows.length);

      // Stop if nothing is active anymore.
      const anyActive = rows.some(en => !SEQENROLL_TERMINAL.has(en.status));
      if (!anyActive) stopSeqEnrollPolling();
    } catch (e) {
      // Swallow transient errors; keep the loop going.
      console.warn('[seq-enroll] poll error:', e.message);
    }
  }, 5000);
}

function stopSeqEnrollPolling() {
  if (SEQENROLL.pollTimer) {
    clearInterval(SEQENROLL.pollTimer);
    SEQENROLL.pollTimer = null;
  }
  SEQENROLL.targetTemplateId = null;
}

// ══════════════════════════════════════════════════════════════════
// EXPLAIN (human-readable sequence summary)
//
// `seqExplain(template, steps)` is a pure function — same shape as
// the workflow explainer in workflows.html. Sequences are linear,
// so step references are just self-anchors (click to open in editor).
//
// Action types covered: sms, email, task, internal_function,
// webhook, start_workflow. Variables stay as-is per design choice.
// ══════════════════════════════════════════════════════════════════

const _seqEsc = (window.esc || function(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
});

// Render the timing block. Six top-level types, each with sub-shapes.
function _seqExplainTiming(t) {
  if (!t || !t.type || t.type === 'immediate') {
    return `<div class="ex-timing"><b>Fires:</b> immediately (~5s after enrollment or previous step)</div>`;
  }
  const jitter = t.randomizeMinutes ? ` <span class="ex-muted">(±${t.randomizeMinutes} min jitter)</span>` : '';

  if (t.type === 'delay') {
    if (typeof t.at === 'string') {
      return `<div class="ex-timing"><b>Fires at:</b> <code>${_seqEsc(t.at)}</code>${jitter}</div>`;
    }
    return `<div class="ex-timing"><b>Waits:</b> ${_seqEsc(String(t.value ?? '?'))} ${_seqEsc(t.unit || 'minutes')}${jitter}</div>`;
  }
  if (t.type === 'next_business_day') {
    return `<div class="ex-timing"><b>Fires:</b> next business day at ${_seqEsc(t.timeOfDay || '09:00')}${jitter}</div>`;
  }
  if (t.type === 'business_days') {
    const n = t.value || 1;
    return `<div class="ex-timing"><b>Fires:</b> ${n} business day${n === 1 ? '' : 's'} later at ${_seqEsc(t.timeOfDay || '09:00')}${jitter}</div>`;
  }
  if (t.type === 'before_appt') {
    const minNote = t.minHoursBefore != null
      ? ` <span class="ex-muted">(skipped if appt is less than ${t.minHoursBefore}h away)</span>`
      : '';
    return `<div class="ex-timing"><b>Fires:</b> ${_seqEsc(String(t.hoursBack ?? 24))}h before appointment, at ${_seqEsc(t.timeOfDay || '10:00')}${jitter}${minNote}</div>`;
  }
  if (t.type === 'before_appt_fixed') {
    return `<div class="ex-timing"><b>Fires:</b> exactly ${_seqEsc(String(t.hoursBack ?? 24))}h before appointment${jitter}</div>`;
  }
  return `<div class="ex-timing"><b>Fires:</b> <code>${_seqEsc(t.type)}</code> <span class="ex-muted">(unknown timing type)</span></div>`;
}

// Normalize attachment_urls (string | array of strings | array of {url,name} |
// single {url,name}) into a list of display names for the explainer.
// Returns null if there's nothing to show.
function _seqAttachmentNames(au) {
  if (au == null || au === '') return null;
  let items;
  if (Array.isArray(au))           items = au;
  else if (typeof au === 'object') items = [au];
  else if (typeof au === 'string') items = au.split(',').map(s => s.trim()).filter(Boolean);
  else return null;
  if (!items.length) return null;
  return items.map(it => {
    if (typeof it === 'string') {
      return it.split('/').pop().split('?')[0] || 'file';
    }
    if (it && typeof it === 'object') {
      if (it.name) return String(it.name);
      if (typeof it.url === 'string') return it.url.split('/').pop().split('?')[0] || 'file';
    }
    return 'file';
  });
}

// Render the action body. action_type drives the shape; action_config
// usually has { function_name, params } for sms/email/task/internal,
// or carries top-level url/method/credential_id/body for webhook,
// or workflow_id/init_data/tie_to_contact for start_workflow.
function _seqExplainAction(step) {
  const at = step.action_type || 'internal_function';
  const cfg = step.action_config || {};
  const params = cfg.params || {};

  if (at === 'sms') {
    return `
      <div class="ex-line"><b>Send SMS</b></div>
      <div class="ex-detail">To: <code>${_seqEsc(String(params.to ?? ''))}</code></div>
      <div class="ex-detail">From: <code>${_seqEsc(String(params.from ?? ''))}</code></div>
      <div class="ex-message">${_seqEsc(String(params.message ?? ''))}</div>
    `;
  }

  if (at === 'email') {
    let bodyHtml = '';
    if (params.html) {
      const stripped = String(params.html)
        .replace(/<style[\s\S]*?<\/style>/gi, '')
        .replace(/<script[\s\S]*?<\/script>/gi, '')
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<\/p>/gi, '\n\n')
        .replace(/<[^>]+>/g, '')
        .replace(/&nbsp;/g, ' ')
        .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
        .replace(/&quot;/g, '"').replace(/&#39;/g, "'")
        .replace(/\n{3,}/g, '\n\n')
        .trim();
      bodyHtml = `<div class="ex-message">${_seqEsc(stripped)}</div>
        <div class="ex-detail ex-muted">(HTML body — tags stripped for readability)</div>`;
    } else if (params.text) {
      bodyHtml = `<div class="ex-message">${_seqEsc(String(params.text))}</div>`;
    } else {
      bodyHtml = `<div class="ex-message ex-muted"><i>(no body)</i></div>`;
    }
    const attachNames = _seqAttachmentNames(params.attachment_urls);
    const attachLine = attachNames
      ? `<div class="ex-detail">Attachments: ${attachNames.map(n => `<code>${_seqEsc(n)}</code>`).join(' ')}</div>`
      : '';
    return `
      <div class="ex-line"><b>Send Email</b></div>
      <div class="ex-detail">To: <code>${_seqEsc(String(params.to ?? ''))}</code></div>
      <div class="ex-detail">From: <code>${_seqEsc(String(params.from ?? ''))}</code></div>
      ${params.subject ? `<div class="ex-detail">Subject: <code>${_seqEsc(String(params.subject))}</code></div>` : ''}
      ${attachLine}
      ${bodyHtml}
    `;
  }

  if (at === 'task') {
    return `
      <div class="ex-line"><b>Create Task</b></div>
      ${params.title ? `<div class="ex-detail">Title: <code>${_seqEsc(String(params.title))}</code></div>` : ''}
      ${params.assigned_to ? `<div class="ex-detail">Assigned to: <code>user #${_seqEsc(String(params.assigned_to))}</code></div>` : ''}
      ${params.description ? `<div class="ex-message">${_seqEsc(String(params.description))}</div>` : ''}
    `;
  }

  if (at === 'webhook') {
    const m = (cfg.method || 'POST').toUpperCase();
    return `
      <div class="ex-line"><b>HTTP Request</b> <span class="ex-muted">(not retry-idempotent)</span></div>
      <div class="ex-detail"><code>${_seqEsc(m)}</code> <code>${_seqEsc(cfg.url || '')}</code></div>
      ${cfg.credential_id ? `<div class="ex-detail ex-muted">Uses credential #${cfg.credential_id}</div>` : ''}
      ${cfg.body ? `<div class="ex-detail">Body: <code>${_seqEsc(JSON.stringify(cfg.body))}</code></div>` : ''}
    `;
  }

  if (at === 'start_workflow') {
    const tied = cfg.tie_to_contact !== false;
    return `
      <div class="ex-line"><b>Start Workflow</b> <code>#${_seqEsc(String(cfg.workflow_id ?? '?'))}</code></div>
      <div class="ex-detail ex-muted">${tied ? 'Tied to this enrollment\'s contact' : (cfg.contact_id_override ? `Override contact: <code>${_seqEsc(String(cfg.contact_id_override))}</code>` : 'Untied')}</div>
      ${cfg.init_data ? `<div class="ex-detail">init_data: <code>${_seqEsc(JSON.stringify(cfg.init_data))}</code></div>` : ''}
    `;
  }

  // internal_function
  const fn = cfg.function_name || 'unknown';
  return `
    <div class="ex-line"><b>Internal function:</b> <code>${_seqEsc(fn)}</code></div>
    ${Object.keys(params).length ? `<div class="ex-detail">Params: <code>${_seqEsc(JSON.stringify(params))}</code></div>` : ''}
    ${cfg.set_vars && Object.keys(cfg.set_vars).length ? `<div class="ex-detail ex-muted">Saves: ${Object.keys(cfg.set_vars).map(k => `<code>${_seqEsc(k)}</code>`).join(' ')}</div>` : ''}
  `;
}

// Condition is a SQL-query gate: cond.query runs with cond.params bound,
// result compared to cond.assert. If it doesn't match, step is SKIPPED.
function _seqExplainCondition(cond) {
  if (!cond) return '';
  return `
    <div class="ex-detail ex-cond">
      <b>Only fires if:</b> SQL query matches <code>${_seqEsc(JSON.stringify(cond.assert ?? null))}</code>
      <div class="ex-muted">Query: <code>${_seqEsc(String(cond.query || '').slice(0, 120))}${(cond.query || '').length > 120 ? '…' : ''}</code></div>
    </div>
  `;
}

function _seqExplainGuard(guard) {
  if (!guard || !guard.min_hours_before_appt) return '';
  return `
    <div class="ex-detail ex-cond">
      <b>Skipped if:</b> appointment is less than ${_seqEsc(String(guard.min_hours_before_appt))}h away when this step fires
    </div>
  `;
}

// Top-level pure renderer.
function seqExplain(template, steps) {
  const sorted = [...(steps || [])].sort((a, b) => a.step_number - b.step_number);
  const stepBlocks = sorted.map(step => {
    const ep = step.error_policy;
    const policy = (ep && ep.strategy && ep.strategy !== 'ignore')
      ? `<div class="ex-detail ex-policy">On failure: <b>${_seqEsc(ep.strategy)}</b>${ep.max_retries ? ` (retry ${ep.max_retries}× , ${ep.backoff_seconds || 5}s apart)` : ''}</div>`
      : '';
    return `
      <div class="ex-step" id="seq-ex-step-${step.step_number}">
        <div class="ex-step-num">${step.step_number}</div>
        <div class="ex-step-body">
          ${_seqExplainTiming(step.timing)}
          ${_seqExplainCondition(step.condition)}
          ${_seqExplainGuard(step.fire_guard)}
          <div class="ex-action">
            ${_seqExplainAction(step)}
          </div>
          ${policy}
          <div class="ex-detail ex-muted ex-jump"><a class="ex-step-link" data-explain-step="${step.step_number}">Open step ${step.step_number} in editor</a></div>
        </div>
      </div>
    `;
  }).join('');

  // Header includes filter chips for type and filters JSON so paralegals
  // see at a glance which appointments / triggers this template is scoped to.
  const filterChips = [];
  if (template?.type)              filterChips.push(`<span class="ex-chip">type: ${_seqEsc(template.type)}</span>`);
  // Slice E Phase 3 — generic filters iteration. Tolerates string or object.
  let _expFilters = template?.filters;
  if (typeof _expFilters === 'string') _expFilters = parseJson(_expFilters);
  if (_expFilters && typeof _expFilters === 'object' && !Array.isArray(_expFilters)) {
    for (const [k, v] of Object.entries(_expFilters)) {
      if (v !== null && v !== '' && v !== undefined) {
        filterChips.push(`<span class="ex-chip">${_seqEsc(k)}: ${_seqEsc(v)}</span>`);
      }
    }
  }

  return `
    <div class="ex-doc">
      <div class="ex-header">
        <h2 class="ex-title">${_seqEsc(template?.name || 'Sequence')}</h2>
        ${filterChips.length ? `<div class="ex-chips">${filterChips.join('')}</div>` : ''}
        ${template?.description ? `<p class="ex-desc">${_seqEsc(template.description)}</p>` : ''}
      </div>
      <div class="ex-steps">${stepBlocks || '<div class="ex-muted">No steps defined.</div>'}</div>
    </div>
  `;
}

function seqShowExplain() {
  if (!SEQ.activeTemplate) return;
  if (!SEQ.steps?.length) {
    Swal.fire({ icon: 'info', title: 'Nothing to explain', text: 'This sequence has no steps yet.' });
    return;
  }
  const html = `<style>${_SEQ_EXPLAIN_CSS}</style>${seqExplain(SEQ.activeTemplate, SEQ.steps)}`;
  Swal.fire({
    html,
    width: 820,
    showConfirmButton: false,
    showCloseButton: true,
    didOpen: () => {
      const popup = Swal.getPopup();
      if (!popup) return;
      popup.querySelectorAll('[data-explain-step]').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          const num = parseInt(a.dataset.explainStep, 10);
          const idx = SEQ.steps.findIndex(s => s.step_number === num);
          if (idx < 0) {
            Swal.fire({ icon: 'warning', title: `Step ${num} not found`, text: 'This reference points to a step that no longer exists.' });
            return;
          }
          Swal.close();
          seqSelectStep(idx);
          setTimeout(() => {
            const cards = document.querySelectorAll('.step-card');
            if (cards[idx]) cards[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 80);
        });
      });
    }
  });
}

// ══════════════════════════════════════════════════════════════════
// PANEL RESIZE HANDLES
// ══════════════════════════════════════════════════════════════════

function initPanelResize() {
  document.querySelectorAll('.panel-resize-handle').forEach(handle => {
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      const panel = handle.parentElement;
      const startX = e.clientX;
      const startW = panel.offsetWidth;
      handle.classList.add('dragging');
      const onMove = ev => {
        const w = startW - (ev.clientX - startX);
        panel.style.width = Math.max(280, Math.min(600, w)) + 'px';
        panel.style.minWidth = 'auto';
      };
      const onUp = () => {
        handle.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

async function init() {
  subPageActive = true;
  declareTopbar();
  initPanelResize();
  await loadFunctions();
  await loadSequences();
  await loadSeqExtras();
  seqLoaded = true;
}

function declareTopbar() {
  if (!subPageActive) return;
  P.setTopbarButtons({ refresh: true, new: true, save: false, delete: false });
}

function onShow() {
  subPageActive = true;
  declareTopbar();
  // Resume polling if user left us on Enrollments with live enrollments.
  if (seqLoaded && SEQ.activeTemplateId && SEQ.tab === 'enrollments') {
    loadSequenceEnrollments();
  }
}

function onHide() {
  subPageActive = false;
  stopSeqEnrollPolling();
}

function onRefresh() {
  loadSequences().then(() => {
    if (SEQ.activeTemplateId) loadSeqSteps(SEQ.activeTemplateId);
    if (SEQ.tab === 'enrollments') loadSequenceEnrollments();
  });
}

function onNew() { return seqNew(); }
