<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequences</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* ══════════════════════════════════════════════
       SEQUENCES SUB-PAGE — self-contained styles.
       ══════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1a1a2e;
      --navy2:   #16213e;
      --blue:    #4f8ef7;
      --blue2:   #3a7de8;
      --green:   #22c55e;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --purple:  #8b5cf6;
      --bg:      #f1f5f9;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --muted:   #94a3b8;
      --text:    #1e293b;
      --text2:   #475569;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Button family ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px; border: none;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue2); }
    .btn-ghost { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-ghost:hover { background: rgba(255,255,255,0.18); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-outline { background: var(--bg); border: 1px solid var(--border); color: var(--text2); }
    .btn-outline:hover { background: var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════════
       THREE-PANEL LAYOUT
       ══════════════════════════════════════════════ */

    .three-panel { flex: 1; overflow: hidden; display: flex; }

    .panel-left {
      width: 220px; min-width: 220px;
      background: var(--navy2);
      display: flex; flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
      transition: width 0.15s, min-width 0.15s;
    }
    .panel-left.collapsed { width: 40px; min-width: 40px; }
    .panel-left.collapsed .panel-left-search,
    .panel-left.collapsed .panel-left-list,
    .panel-left.collapsed .panel-left-foot { display: none; }
    .panel-left.collapsed .panel-left-head { justify-content: center; }

    .panel-collapse-btn {
      background: none; border: none; color: rgba(255,255,255,0.4);
      cursor: pointer; padding: 2px 4px; font-size: 12px; flex-shrink: 0;
      transition: color 0.12s;
    }
    .panel-collapse-btn:hover { color: #fff; }

    .panel-left-head {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 6px;
    }

    .panel-left-search {
      flex: 1; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px; padding: 5px 9px;
      color: #fff; font-size: 12px; outline: none;
    }
    .panel-left-search::placeholder { color: rgba(255,255,255,0.3); }
    .panel-left-search:focus { border-color: var(--blue); }

    .panel-left-list { flex: 1; overflow-y: auto; padding: 4px 0; }

    .left-item {
      padding: 9px 12px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.12s;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .left-item:hover { background: rgba(255,255,255,0.05); }
    .left-item.active { border-left-color: var(--blue); background: rgba(79,142,247,0.1); }

    .left-item-name {
      color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .left-item.active .left-item-name { color: #fff; }
    .left-item-meta { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 2px; }

    .left-item-actions { display: none; gap: 4px; margin-top: 5px; }
    .left-item.active .left-item-actions { display: flex; }

    .left-act {
      background: rgba(255,255,255,0.08); border: none;
      color: rgba(255,255,255,0.6); border-radius: 4px;
      padding: 3px 7px; font-size: 11px; cursor: pointer; transition: all 0.12s;
    }
    .left-act:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .left-act.danger:hover { background: rgba(239,68,68,0.3); color: #fca5a5; }

    .panel-left-foot { padding: 10px 12px; border-top: 1px solid rgba(255,255,255,0.06); }

    .panel-mid {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: var(--bg);
    }

    .canvas-head {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .canvas-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .canvas-title.placeholder { color: var(--muted); font-weight: 400; }

    .canvas-body { flex: 1; overflow-y: auto; padding: 20px; }

    .panel-right {
      width: 380px; min-width: 280px; max-width: 600px;
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }

    .panel-resize-handle {
      position: absolute; left: -3px; top: 0; bottom: 0; width: 6px;
      cursor: col-resize; z-index: 10;
    }
    .panel-resize-handle:hover, .panel-resize-handle.dragging {
      background: var(--blue); opacity: 0.3;
    }

    .editor-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .editor-tab {
      flex: 1; padding: 11px; border: none; background: none;
      font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.12s;
    }
    .editor-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .editor-tab:hover:not(.active) { color: var(--text); }

    .editor-body { flex: 1; overflow-y: auto; padding: 16px; }

    .editor-foot {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; flex-shrink: 0;
    }

    /* ── Empty / loading states ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--muted);
      gap: 10px; text-align: center;
    }
    .empty-state i { font-size: 36px; opacity: 0.25; }

    .editor-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: var(--muted); gap: 8px; text-align: center;
    }
    .editor-placeholder i { font-size: 28px; opacity: 0.2; }

    /* ══════════════════════════════════════════════
       STEP CANVAS
       ══════════════════════════════════════════════ */
    .step-flow { display: flex; flex-direction: column; }

    .step-connector {
      padding: 0 0 0 28px; height: 22px;
      color: var(--muted); font-size: 16px; display: flex; align-items: center;
    }

    .step-card {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 10px; padding: 11px 13px;
      cursor: pointer; transition: all 0.15s; position: relative;
    }
    .step-card:hover { border-color: var(--blue); box-shadow: 0 2px 12px rgba(79,142,247,0.12); }
    .step-card.active { border-color: var(--blue); box-shadow: 0 2px 16px rgba(79,142,247,0.2); }

    .step-card-head { display: flex; align-items: center; gap: 9px; }

    .step-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--navy); color: #fff;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-card.active .step-num { background: var(--blue); }

    .step-type-icon {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .type-webhook           { background: #eff6ff; color: #3b82f6; }
    .type-internal_function { background: #f0fdf4; color: #16a34a; }
    .type-custom_code       { background: #faf5ff; color: #9333ea; }
    .type-sms   { background: #f0fdf4; color: #16a34a; }
    .type-email { background: #eff6ff; color: #3b82f6; }
    .type-task  { background: #fefce8; color: #ca8a04; }

    .step-label { flex: 1; min-width: 0; }
    .step-label-main { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .step-label-sub  { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    .step-badges { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .badge { font-size: 10px; font-weight: 600; padding: 2px 5px; border-radius: 4px; white-space: nowrap; }
    .badge-abort  { background: #fee2e2; color: #991b1b; }
    .badge-retry  { background: #fef3c7; color: #92400e; }
    .badge-ignore { background: #f1f5f9; color: #64748b; }
    .badge-delay  { background: #ecfdf5; color: #065f46; }
    .badge-cond   { background: #fdf4ff; color: #7e22ce; }
    .badge-guard  { background: #fff7ed; color: #c2410c; }

    .step-card-actions { display: none; gap: 4px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .step-card.active .step-card-actions { display: flex; }

    .step-id-tag {
      font-size: 10px; color: var(--muted); opacity: 0.7;
      font-family: ui-monospace, Menlo, monospace;
      white-space: nowrap; flex-shrink: 0;
      align-self: flex-start;
    }

    .step-act {
      background: var(--bg); border: 1px solid var(--border); color: var(--text2);
      border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer;
      transition: all 0.12s; display: flex; align-items: center; gap: 4px;
    }
    .step-act:hover { background: var(--border); }
    .step-act.danger:hover { background: #fee2e2; border-color: #fca5a5; color: var(--red); }
    .step-act:disabled { opacity: 0.3; cursor: not-allowed; }

    .add-step-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px; border: 2px dashed var(--border); border-radius: 10px;
      color: var(--muted); cursor: pointer; font-size: 13px; transition: all 0.15s;
      background: none; width: 100%;
    }
    .add-step-btn:hover { border-color: var(--blue); color: var(--blue); background: #eff6ff; }

    /* ── Form elements ── */
    .field { margin-bottom: 13px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 4px;
    }
    .field input, .field select, .field textarea {
      width: 100%; padding: 7px 9px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; color: var(--text); background: var(--surface);
      outline: none; transition: border-color 0.12s; font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
    }
    .field textarea { resize: vertical; min-height: 80px; font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; }
    .field-row { display: flex; gap: 8px; }
    .field-row .field { flex: 1; margin-bottom: 0; }

    .section-divider {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 6px 0 8px; border-top: 1px solid var(--border); margin: 8px 0 12px;
    }

    .json-toggle {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--blue); cursor: pointer;
      margin-bottom: 6px; user-select: none;
    }
    .json-toggle:hover { text-decoration: underline; }

    /* ══════════════════════════════════════════════
       ENROLLMENTS TAB
       ══════════════════════════════════════════════ */
    .exec-status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      white-space: nowrap;
    }
    .exec-status-active    { background: #dbeafe; color: #1e40af; }
    .exec-status-completed { background: #dcfce7; color: #166534; }
    .exec-status-cancelled { background: #e2e8f0; color: #475569; }

    .seq-enroll-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .seq-enroll-table th {
      text-align: left; padding: 8px 10px;
      background: var(--bg); font-weight: 600; color: var(--text2);
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    .seq-enroll-table td {
      padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top;
    }
    .seq-enroll-table tr:hover { background: #f8fafc; }

    .seq-step-history-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px; }
    .seq-step-history-table th {
      text-align: left; padding: 6px 8px; background: #f1f5f9;
      font-weight: 600; color: #475569; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.4px;
      border-bottom: 1px solid #cbd5e1;
    }
    .seq-step-history-table td {
      padding: 6px 8px; border-bottom: 1px solid #e2e8f0; vertical-align: top;
    }
    .seq-step-history-table .step-error-cell {
      color: #991b1b; font-size: 11px; max-width: 240px; overflow-wrap: break-word;
    }
    .seq-step-history-table tr.row-muted td { color: #94a3b8; }
    .seq-step-history-table tr.row-muted td.step-error-cell { color: #cbd5e1; }

    .job-status-badge {
      display: inline-block; padding: 1px 6px; border-radius: 8px;
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      white-space: nowrap;
    }
    .job-status-pending   { background: #fef3c7; color: #92400e; }
    .job-status-running   { background: #dbeafe; color: #1e40af; }
    .job-status-completed { background: #dcfce7; color: #166534; }
    .job-status-failed    { background: #fee2e2; color: #991b1b; }

    .log-status-badge {
      display: inline-block; padding: 1px 6px; border-radius: 8px;
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      white-space: nowrap;
    }
    .log-status-sent    { background: #dcfce7; color: #166534; }
    .log-status-skipped { background: #e2e8f0; color: #475569; }
    .log-status-failed  { background: #fee2e2; color: #991b1b; }

    /* Utilities */
    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: 12px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ══════════════════════════════════════════════
       SEQUENCE TYPES MANAGER (modal contents)
       ══════════════════════════════════════════════ */
    .stm-list { display: flex; flex-direction: column; gap: 8px; text-align: left; }
    .stm-empty { padding: 24px 12px; text-align: center; color: var(--muted); font-size: 13px; }
    .stm-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface);
    }
    .stm-row.inactive { opacity: 0.55; background: #fafafa; }
    .stm-row-body { flex: 1; min-width: 0; }
    .stm-row-name { font-weight: 600; font-size: 13px; color: var(--text); }
    .stm-row-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .stm-row-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .stm-chip-pf {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; background: #eef2ff; color: #3730a3;
      border-radius: 10px; font-size: 11px; font-family: 'SF Mono','Consolas',monospace;
    }
    .stm-chip-pf-idx { color: #6366f1; font-weight: 700; }
    .stm-row-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
    .stm-row-actions .btn { padding: 4px 9px; font-size: 11px; }
    .stm-row-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text2); user-select: none; cursor: pointer;
    }

    /* Priority fields editor (inside type editor modal) */
    .pfe-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
    .pfe-row {
      display: flex; align-items: center; gap: 6px;
    }
    .pfe-row input[type="text"] {
      flex: 1; padding: 6px 9px;
      border: 1px solid var(--border); border-radius: 5px;
      font-size: 13px; font-family: 'SF Mono','Consolas',monospace;
      outline: none;
    }
    .pfe-row input[type="text"]:focus { border-color: var(--blue); }
    .pfe-row input[type="text"].invalid { border-color: var(--red); background: #fef2f2; }
    .pfe-btn {
      width: 26px; height: 26px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--bg); color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0;
    }
    .pfe-btn:hover { background: var(--border); }
    .pfe-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pfe-btn.danger:hover { background: #fee2e2; border-color: #fca5a5; color: var(--red); }
    .pfe-add {
      align-self: flex-start; margin-top: 6px;
      padding: 5px 11px; font-size: 11px;
      background: var(--bg); border: 1px dashed var(--border); border-radius: 5px;
      color: var(--text2); cursor: pointer;
    }
    .pfe-add:hover { background: var(--border); color: var(--text); }
    .pfe-hint {
      font-size: 11px; color: var(--muted); margin-top: 4px;
      font-family: 'SF Mono','Consolas',monospace;
    }

    /* Filter fields container in template editor swal */
    .tfe-container { text-align: left; margin: 8px .875em 0; }
    .tfe-label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 6px;
    }
    .tfe-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .tfe-row-label {
      width: 130px; flex-shrink: 0;
      font-size: 12px; color: var(--text2);
      font-family: 'SF Mono','Consolas',monospace;
    }
    .tfe-row input {
      flex: 1; padding: 6px 9px;
      border: 1px solid var(--border); border-radius: 5px;
      font-size: 13px; outline: none;
    }
    .tfe-row input:focus { border-color: var(--blue); }
    .tfe-empty {
      font-size: 12px; color: var(--muted); font-style: italic;
      padding: 6px 0;
    }
    .tfe-notice {
      font-size: 11px; color: #c2410c;
      background: #fff7ed; border: 1px solid #fed7aa;
      padding: 6px 9px; border-radius: 5px; margin-top: 6px;
    }
    .tfe-notice-info {
      font-size: 11px; color: #3730a3;
      background: #eef2ff; border: 1px solid #c7d2fe;
      padding: 6px 9px; border-radius: 5px; margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="three-panel">

  <!-- ── Template list (left) ── -->
  <div class="panel-left">
    <div class="panel-left-head">
      <input class="panel-left-search" id="seq-search" placeholder="Search…" oninput="seqFilter(this.value)">
      <button class="panel-collapse-btn" onclick="togglePanelLeft(this)" title="Collapse"><i class="fa-solid fa-angles-left"></i></button>
    </div>
    <div class="panel-left-list" id="seq-list">
      <div style="padding:16px;color:rgba(255,255,255,0.3);font-size:12px">Loading…</div>
    </div>
    <div class="panel-left-foot">
      <button class="btn btn-outline" style="width:100%;font-size:12px;background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75)" onclick="seqOpenTypesManager()" title="Manage Sequence Types">
        <i class="fa-solid fa-gear"></i> Manage Types
      </button>
    </div>
  </div>

  <!-- ── Canvas (middle) ── -->
  <div class="panel-mid">
    <div class="canvas-head">
      <div class="canvas-title placeholder" id="seq-canvas-title">← Select a sequence template</div>
      <div id="seq-canvas-actions" style="display:none;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="seqShowExplain()"><i class="fa-regular fa-circle-question"></i> Explain</button>
        <button class="btn btn-outline btn-sm" onclick="seqEdit()"><i class="fa-solid fa-pencil"></i> Edit</button>
        <button class="btn btn-outline btn-sm" onclick="seqDuplicate()"><i class="fa-regular fa-copy"></i> Duplicate</button>
        <button class="btn btn-danger btn-sm" onclick="seqDelete()"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>
    <div class="canvas-body" id="seq-canvas-body">
      <div class="empty-state">
        <i class="fa-solid fa-list-ol"></i>
        <p>Select a template or create a new one.</p>
      </div>
    </div>
  </div>

  <!-- ── Editor / enrollments (right) ── -->
  <div class="panel-right">
    <div class="panel-resize-handle"></div>
    <div class="editor-tabs">
      <button class="editor-tab active" id="seq-tab-edit"        onclick="seqSwitchEditorTab('edit')">
        <i class="fa-solid fa-pencil"></i> Edit Step
      </button>
      <button class="editor-tab"        id="seq-tab-timing"      onclick="seqSwitchEditorTab('timing')">
        <i class="fa-regular fa-clock"></i> Timing
      </button>
      <button class="editor-tab"        id="seq-tab-conditions"  onclick="seqSwitchEditorTab('conditions')">
        <i class="fa-solid fa-filter"></i> Conditions
      </button>
      <button class="editor-tab"        id="seq-tab-enrollments" onclick="seqSwitchEditorTab('enrollments')">
        <i class="fa-solid fa-clock-rotate-left"></i> Enrollments
      </button>
    </div>
    <div class="editor-body" id="seq-editor-body">
      <div class="editor-placeholder"><i class="fa-regular fa-hand-pointer"></i><p>Click a step to edit it.</p></div>
    </div>
    <div class="editor-body" id="seq-tab-enrollments-body" style="display:none;padding:12px 16px;overflow:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span class="text-sm text-muted" id="seq-enroll-count">—</span>
        <button class="btn btn-outline" onclick="loadSequenceEnrollments()" style="font-size:12px">
          <i class="fa-solid fa-rotate"></i> Refresh
        </button>
      </div>
      <table class="seq-enroll-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Contact</th>
            <th>Status</th>
            <th>Step</th>
            <th>Enrolled</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="seq-enroll-tbody"></tbody>
      </table>
      <div id="seq-enroll-pagination"
           style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:12px;color:var(--muted)"></div>
    </div>
    <div class="editor-foot" id="seq-editor-foot" style="display:none">
      <button class="btn btn-primary" style="flex:1" onclick="seqStepSave()">
        <i class="fa-solid fa-floppy-disk"></i> Save Step
      </button>
      <button class="btn btn-outline" onclick="seqStepCancel()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// SEQUENCES SUB-PAGE
//
// Shell communication:
//   - P.apiSend(...)                      — relayed to a.html
//   - P.fdPhoneLineSelectHtml(...)        — shell helper
//   - P.fdPhoneLineMmsSelectHtml(...)     — shell helper (MMS-capable lines only)
//   - P.fdEmailFromSelectHtml(...)        — shell helper
//   - P.setTopbarButtons({...})           — topbar button visibility
//
// Lifecycle hooks on window: onShow, onHide, onRefresh, onNew
//
// Polling: SEQENROLL polls while Enrollments tab is active. Tick
// function bails on (a) template change, (b) editor-tab change,
// (c) sub-page hide. subPageActive guard added at tick entry.
// ═══════════════════════════════════════════════════════════════

const P = window.parent;

// ── Utilities ──────────────────────────────────────────────────
const api = (...args) => P.apiSend(...args);

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function parseJson(val) {
  if (!val) return null;
  if (typeof val === 'object') return val;
  try { return JSON.parse(val); } catch { return null; }
}

function togglePanelLeft(btn) {
  const panel = btn.closest('.panel-left');
  const collapsed = panel.classList.toggle('collapsed');
  btn.innerHTML = collapsed ? '<i class="fa-solid fa-angles-right"></i>' : '<i class="fa-solid fa-angles-left"></i>';
  btn.title = collapsed ? 'Expand' : 'Collapse';
}
window.togglePanelLeft = togglePanelLeft;

// Shell firmData helpers — bound to parent frame so they pick up
// whatever a.html currently has in window.firmData.
const fdPhoneLineSelectHtml    = (id, val) => P.fdPhoneLineSelectHtml(id, val);
const fdPhoneLineMmsSelectHtml = (id, val) => P.fdPhoneLineMmsSelectHtml(id, val);
const fdEmailFromSelectHtml    = (id, val) => P.fdEmailFromSelectHtml(id, val);

// ── State ──────────────────────────────────────────────────────
const SEQ = {
  templates: [], filtered: [],
  activeTemplateId: null, activeTemplate: null, steps: [],
  activeStepIdx: null, tab: 'edit', editingNew: false, jsonMode: false
};

const SEQENROLL = {
  offset:     0,
  limit:      50,
  total:      0,
  pollTimer:  null,
  targetTemplateId: null,
};

const SEQENROLL_TERMINAL = new Set(['completed', 'cancelled']);

let subPageActive = false;
let seqLoaded = false;

// FUNCTIONS list (sequence-side functions used for internal_function action)
// FUNCTIONS.meta is a map of name → __meta from lib/internal_functions.js.
// Metadata-bearing functions render structured form fields; functions without
// metadata fall back to a Params JSON textarea.
const FUNCTIONS = { workflow: [], sequence: [], meta: {} };

// ─────────────────────────────────────────────────────────────
// Slice B — sequence-context filtering for the metadata-driven form.
// REMOVE WHEN SEQUENCES GAIN VARIABLE SUPPORT (slice C; see cookbook 2.3).
//
// Sequences have no per-enrollment variable bag. set_vars on step config and
// per-function output_var/count_var/date_var params would all save into the
// DB and then be silently dropped at execution time, since sequenceEngine
// does not call mergeVariables. Hiding them in the UI prevents the footgun.
// JSON-mode authors who hand-write these fields are advanced users and
// accept the no-op behavior; their JSON survives and will start working
// quietly when slice C ships (graceful migration).
//
// To re-enable: delete these constants and the two filter checks (search:
//   SEQ_HIDDEN_PARAMS / SEQ_HIDE_SETVARS_FIELD).
// ─────────────────────────────────────────────────────────────
const SEQ_HIDDEN_PARAMS      = new Set(['output_var', 'count_var', 'date_var']);
const SEQ_HIDE_SETVARS_FIELD = true;

// Slice 3.3 — caches for the new webhook + start_workflow step editors.
// Fetched lazily on first open of a step that needs them; the async load is
// fire-and-forget so the editor still renders (with a "loading…" placeholder
// in the dropdown) if the list hasn't come back yet. Refetch happens on each
// sub-page onShow via loadFunctions + loadSeqExtras() chain.
const SEQ_CREDENTIALS = { list: [], loaded: false };
const SEQ_WORKFLOWS   = { list: [], loaded: false };

// Slice E Phase 3 — sequence_template_types cache. Drives the type
// dropdown and dynamic filter fields in the template editor, plus the
// in-page Manage Types modal. Reloaded on every onShow + after any type
// CRUD inside the manager. Includes inactive types so existing templates
// pinned to a now-inactive type still render correctly.
const SEQ_TYPES = { list: [], loaded: false };

async function loadFunctions() {
  try {
    const data = await api('/workflows/functions');
    FUNCTIONS.workflow = data.workflow || [];
    FUNCTIONS.sequence = data.sequence || [];
    FUNCTIONS.meta     = data.meta     || {};
  } catch (e) {
    console.warn('Failed to load function list, using fallback:', e.message);
    FUNCTIONS.workflow = ['set_next','evaluate_condition','noop','set_var','format_string','schedule_resume','wait_for','wait_until_time','send_sms','send_email','create_log','create_task','create_appointment','lookup_contact','update_contact','lookup_appointment','update_appointment','get_appointments','query_db','cancel_sequences','enroll_sequence','set_test_var'];
    FUNCTIONS.sequence = ['send_sms','send_email','create_log','create_task','create_appointment','lookup_contact','update_contact','lookup_appointment','update_appointment','get_appointments','query_db','cancel_sequences','enroll_sequence','noop','set_var'];
    FUNCTIONS.meta     = {};  // metadata-driven form falls back to JSON textarea when meta is empty
  }
}

// Slice 3.3 — lazy loaders for the new step editors. Parallel fetch; either
// one failing doesn't block the other. Called from onShow() alongside
// loadFunctions so the caches are warm by the time the user opens a step.
async function loadSeqExtras() {
  const jobs = [];
  if (!SEQ_CREDENTIALS.loaded) {
    jobs.push(api('/api/credentials').then(d => {
      SEQ_CREDENTIALS.list = d.credentials || [];
      SEQ_CREDENTIALS.loaded = true;
    }).catch(e => console.warn('Failed to load credentials:', e.message)));
  }
  if (!SEQ_WORKFLOWS.loaded) {
    // /workflows returns { workflows: [...], pagination: {...} } — flat shape
    // for the list, pagination nested (envelope finding #60 — not our fix).
    // Default limit is 20; fetch up to 200 so the dropdown covers most firms
    // without paginating.
    jobs.push(api('/workflows?limit=200').then(d => {
      SEQ_WORKFLOWS.list = d.workflows || [];
      SEQ_WORKFLOWS.loaded = true;
    }).catch(e => console.warn('Failed to load workflows:', e.message)));
  }
  // Slice E Phase 3 — types cache. No active filter; we want orphaned/
  // inactive types to render in the editor too (with an "(unregistered)"
  // hint if needed).
  if (!SEQ_TYPES.loaded) {
    jobs.push(loadSeqTypes().catch(e => console.warn('Failed to load sequence types:', e.message)));
  }
  if (jobs.length) await Promise.all(jobs);
}

// Refresh-able loader — used both by loadSeqExtras (initial) and by the
// types manager modal (after each CRUD). Always overwrites the cache.
async function loadSeqTypes() {
  const d = await api('/api/sequence-types');
  SEQ_TYPES.list = d.types || d.sequence_types || [];
  SEQ_TYPES.loaded = true;
  return SEQ_TYPES.list;
}

// ─────────────────────────────────────────────────────────────
// Internal-credential URL safety check (save-time warning)
//
// Same pattern as workflows.html and scheduledJobs.html — see those for
// detailed rationale. The warning surfaces two flavors:
//   - 'foreign'        — URL host is not this app
//   - 'hook_receiver'  — URL is /hooks/* on this app (exfil risk via hook
//     targets, even though the receiver-side header strip closes the
//     specific INTERNAL_API_KEY exfil — there's no legitimate reason to
//     send an internal cred to a hook)
//
// Returns { ok: true } or { ok: false, level, text }.
// ─────────────────────────────────────────────────────────────
function checkInternalCredUrl(credentialId, urlString) {
  if (!credentialId) return { ok: true };
  const cred = SEQ_CREDENTIALS.list.find(c => String(c.id) === String(credentialId));
  if (!cred || cred.type !== 'internal') return { ok: true };
  if (!urlString || typeof urlString !== 'string' || !urlString.trim()) return { ok: true };

  const appOrigin = window.location.origin;
  let target;
  try { target = new URL(urlString); } catch { return { ok: true }; }
  let appUrl;
  try { appUrl = new URL(appOrigin); } catch { return { ok: true }; }

  const sameHost = target.protocol === appUrl.protocol
                && target.hostname === appUrl.hostname
                && (!appUrl.port || target.port === appUrl.port);
  if (!sameHost) {
    return {
      ok: false, level: 'foreign',
      text: `Internal credential will NOT be sent at runtime — URL host does not match this app (${appUrl.hostname}). Pick a different credential type or change the URL.`,
    };
  }
  if (target.pathname.startsWith('/hooks/') || target.pathname === '/hooks') {
    return {
      ok: false, level: 'hook_receiver',
      text: `Internal credential should not be used for hook receiver URLs — the receiver does not consume the credential, and a configured hook target could forward the key to an external URL (exfil risk).`,
    };
  }
  return { ok: true };
}

// Update the warning element in the sequence webhook editor.  Pure DOM
// op — no-op if the editor isn't currently mounted.
function seqUpdateCredWarning() {
  const warnEl = document.getElementById('se-wh-cred-warn');
  if (!warnEl) return;
  const credId = document.getElementById('se-wh-cred')?.value || '';
  const url    = document.getElementById('se-wh-url')?.value || '';
  const result = checkInternalCredUrl(credId, url);
  if (result.ok) {
    warnEl.style.display = 'none';
    warnEl.textContent = '';
    return;
  }
  warnEl.style.display = '';
  warnEl.textContent = '⚠ ' + result.text;
}

// ══════════════════════════════════════════════════════════════════
// TEMPLATE LIST + CANVAS
// ══════════════════════════════════════════════════════════════════

async function loadSequences() {
  try {
    const data = await api('/sequences/templates');
    SEQ.templates = data.templates || [];
    SEQ.filtered  = SEQ.templates;
    renderSeqList();
  } catch (e) {
    document.getElementById('seq-list').innerHTML = `<div style="padding:16px;color:#f87171;font-size:12px">${esc(e.message)}</div>`;
  }
}

function renderSeqList() {
  const el = document.getElementById('seq-list');
  if (!SEQ.filtered.length) {
    el.innerHTML = '<div style="padding:16px;color:rgba(255,255,255,0.3);font-size:12px">No templates.</div>';
    return;
  }
  el.innerHTML = SEQ.filtered.map(t => {
    const typeDisplay = (t.type && String(t.type).trim()) ? esc(t.type) : '—';
    return `
    <div class="left-item${t.id === SEQ.activeTemplateId ? ' active' : ''}" onclick="selectSeqTemplate(${t.id})">
      <div class="left-item-name">${esc(t.name)}</div>
      <div class="left-item-meta">id: ${t.id} · ${typeDisplay} · ${t.step_count || 0} step${t.step_count !== 1 ? 's' : ''}${_seqFilterChipsList(t.filters)}${t.active ? '' : ' · <span style="color:#f87171">inactive</span>'}</div>
      <div class="left-item-actions">
        <button class="left-act" onclick="event.stopPropagation();seqEdit()"><i class="fa-solid fa-pencil"></i></button>
        <button class="left-act" onclick="event.stopPropagation();seqDuplicate()"><i class="fa-regular fa-copy"></i></button>
        <button class="left-act danger" onclick="event.stopPropagation();seqDelete()"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

// Slice E Phase 3 — render filters JSON as inline meta chips in the
// left-pane list. Tolerates filters being null, an object, or a JSON
// string (mysql2 typeCast variability). Empty object → no chips.
function _seqFilterChipsList(filters) {
  const obj = (typeof filters === 'string') ? parseJson(filters) : filters;
  if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return '';
  const entries = Object.entries(obj).filter(([, v]) => v !== null && v !== '' && v !== undefined);
  if (!entries.length) return '';
  return entries.map(([k, v]) =>
    ` · <span style="color:#60a5fa">${esc(k)}:${esc(v)}</span>`
  ).join('');
}

function seqFilter(q) {
  const needle = q.toLowerCase();
  SEQ.filtered = SEQ.templates.filter(t =>
    (t.name || '').toLowerCase().includes(needle) ||
    (t.type || '').toLowerCase().includes(needle)
  );
  renderSeqList();
}

function seqTitleText(t) {
  let s = (t.type && String(t.type).trim()) ? `${t.name} (${t.type})` : `${t.name}`;
  // Slice E Phase 3 — generic filters iteration. Tolerates string or object.
  const f = (typeof t.filters === 'string') ? parseJson(t.filters) : t.filters;
  if (f && typeof f === 'object' && !Array.isArray(f)) {
    for (const [k, v] of Object.entries(f)) {
      if (v !== null && v !== '' && v !== undefined) s += ` · ${k}: ${v}`;
    }
  }
  return s;
}

async function selectSeqTemplate(id) {
  // Reset enrollments state for the new template.
  stopSeqEnrollPolling();
  SEQENROLL.offset = 0;
  SEQENROLL.total  = 0;

  SEQ.activeTemplateId = id;
  SEQ.activeTemplate   = SEQ.templates.find(t => t.id === id);
  SEQ.activeStepIdx    = null;
  renderSeqList();
  const t = document.getElementById('seq-canvas-title');
  t.textContent = seqTitleText(SEQ.activeTemplate);
  t.classList.remove('placeholder');
  document.getElementById('seq-canvas-actions').style.display = 'flex';
  seqClearEditor();
  await loadSeqSteps(id);

  // If the Enrollments tab is the active editor tab, reload for the new template.
  if (SEQ.tab === 'enrollments') {
    loadSequenceEnrollments();
  }
}

async function loadSeqSteps(id) {
  document.getElementById('seq-canvas-body').innerHTML = '<div class="empty-state"><i class="fa-solid fa-spinner spin"></i></div>';
  try {
    const data = await api(`/sequences/templates/${id}`);
    SEQ.steps = (data.steps || []).map(s => ({
      ...s,
      timing:        typeof s.timing === 'string'        ? JSON.parse(s.timing)        : s.timing,
      action_config: typeof s.action_config === 'string' ? JSON.parse(s.action_config) : s.action_config,
      condition:     typeof s.condition === 'string'     ? JSON.parse(s.condition)     : s.condition,
      fire_guard:    typeof s.fire_guard === 'string'    ? JSON.parse(s.fire_guard)    : s.fire_guard,
      error_policy:  typeof s.error_policy === 'string'  ? JSON.parse(s.error_policy)  : s.error_policy,
    }));
    renderSeqCanvas();
  } catch (e) {
    document.getElementById('seq-canvas-body').innerHTML = `<div class="empty-state"><p style="color:var(--red)">${esc(e.message)}</p></div>`;
  }
}

function renderSeqCanvas() {
  const body = document.getElementById('seq-canvas-body');
  if (!SEQ.steps.length) {
    body.innerHTML = `<button class="add-step-btn" onclick="seqStepNew()"><i class="fa-solid fa-plus"></i> Add First Step</button>`;
    return;
  }
  const items = [];
  SEQ.steps.forEach((step, idx) => {
    if (idx > 0) items.push(`<div class="step-connector"><i class="fa-solid fa-arrow-down"></i></div>`);
    items.push(seqStepCardHTML(step, idx));
  });
  items.push(`<div class="step-connector"><i class="fa-solid fa-arrow-down" style="opacity:0.25"></i></div>`);
  items.push(`<button class="add-step-btn" onclick="seqStepNew()"><i class="fa-solid fa-plus"></i> Add Step</button>`);
  body.innerHTML = `<div class="step-flow">${items.join('')}</div>`;
}

function seqStepCardHTML(step, idx) {
  const cfg = step.action_config || {}, timing = step.timing || {};
  const isActive = SEQ.activeStepIdx === idx;
  const typeIcons = { sms: 'fa-message', email: 'fa-envelope', task: 'fa-list-check', internal_function: 'fa-bolt', webhook: 'fa-globe' };
  const main = cfg.function_name || step.action_type || 'step';
  const sub = cfg.params?.message ? cfg.params.message.slice(0, 40) + (cfg.params.message.length > 40 ? '…' : '') : cfg.params?.to || '';
  const badges = [];
  const ep = step.error_policy || {};
  if (ep.strategy && ep.strategy !== 'ignore') badges.push(`<span class="badge ${ep.strategy.includes('abort') ? 'badge-abort' : 'badge-retry'}">${ep.strategy}</span>`);
  if (timing.type) {
    const label = timing.type === 'immediate' ? 'now' : timing.type === 'delay' ? `${timing.value}${timing.unit?.slice(0, 1) || 'm'}` : timing.type.replace(/_/g, ' ');
    badges.push(`<span class="badge badge-delay"><i class="fa-regular fa-clock"></i> ${esc(label)}</span>`);
  }
  if (step.condition)  badges.push(`<span class="badge badge-cond"><i class="fa-solid fa-filter"></i> cond</span>`);
  if (step.fire_guard) badges.push(`<span class="badge badge-guard"><i class="fa-solid fa-shield"></i> guard</span>`);
  const typeClass = `type-${step.action_type || 'internal_function'}`;
  return `
    <div class="step-card${isActive ? ' active' : ''}" onclick="seqSelectStep(${idx})">
      <div class="step-card-head">
        <div class="step-num">${step.step_number}</div>
        <div class="step-type-icon ${typeClass}"><i class="fa-solid ${typeIcons[step.action_type] || 'fa-bolt'}"></i></div>
        <div class="step-label">
          <div class="step-label-main">${esc(main)}</div>
          ${sub ? `<div class="step-label-sub">${esc(sub)}</div>` : ''}
        </div>
        <div class="step-badges">${badges.join('')}</div>
        <div class="step-id-tag">id ${step.id ?? '—'}</div>
      </div>
      ${isActive ? `
      <div class="step-card-actions">
        <button class="step-act" onclick="event.stopPropagation();seqStepMove(${idx},-1)" ${idx === 0 ? 'disabled' : ''}>
          <i class="fa-solid fa-arrow-up"></i></button>
        <button class="step-act" onclick="event.stopPropagation();seqStepMove(${idx},1)" ${idx === SEQ.steps.length - 1 ? 'disabled' : ''}>
          <i class="fa-solid fa-arrow-down"></i></button>
        <button class="step-act danger" onclick="event.stopPropagation();seqStepDelete(${idx})">
          <i class="fa-solid fa-trash"></i> Delete</button>
      </div>` : ''}</div>`;
}

function seqSelectStep(idx) {
  SEQ.activeStepIdx = idx;
  SEQ.editingNew = false;
  renderSeqCanvas();
  seqRenderActiveTab();
}

function seqClearEditor() {
  SEQ.activeStepIdx = null;
  document.getElementById('seq-editor-body').innerHTML = '<div class="editor-placeholder"><i class="fa-regular fa-hand-pointer"></i><p>Click a step to edit it.</p></div>';
  document.getElementById('seq-editor-foot').style.display = 'none';
}

// ══════════════════════════════════════════════════════════════════
// EDITOR TAB SWITCHING
// ══════════════════════════════════════════════════════════════════

function seqSwitchEditorTab(tab) {
  // Leaving enrollments → stop polling.
  if (SEQ.tab === 'enrollments' && tab !== 'enrollments') {
    stopSeqEnrollPolling();
  }

  SEQ.tab = tab;
  ['edit', 'timing', 'conditions', 'enrollments'].forEach(t => {
    document.getElementById(`seq-tab-${t}`).classList.toggle('active', t === tab);
  });

  const editorBody = document.getElementById('seq-editor-body');
  const editorFoot = document.getElementById('seq-editor-foot');
  const enrollBody = document.getElementById('seq-tab-enrollments-body');

  if (tab === 'enrollments') {
    editorBody.style.display = 'none';
    editorFoot.style.display = 'none';
    enrollBody.style.display = '';
    loadSequenceEnrollments();
    return;
  }

  // edit / timing / conditions — restore editor-body; foot visibility is
  // managed by the step-edit render functions (seqRenderActiveTab / seqStepNew).
  enrollBody.style.display = 'none';
  editorBody.style.display = '';

  seqRenderActiveTab();
}

function seqRenderActiveTab() {
  if (SEQ.activeStepIdx === null && !SEQ.editingNew) return;
  const step = SEQ.editingNew
    ? { action_type: 'sms', action_config: { function_name: 'send_sms', params: {} }, timing: { type: 'immediate' }, condition: null, fire_guard: null, error_policy: {} }
    : SEQ.steps[SEQ.activeStepIdx];
  if (SEQ.tab === 'edit')            seqRenderEditTab(step);
  else if (SEQ.tab === 'timing')     seqRenderTimingTab(step);
  else if (SEQ.tab === 'conditions') seqRenderConditionsTab(step);
  document.getElementById('seq-editor-foot').style.display = 'flex';
}

function seqRenderEditTab(step) {
  // Reset jsonMode whenever the edit tab opens for a (different or same)
  // step. Without this, switching steps while in JSON mode would carry the
  // flag over and try to render the new step's config as raw JSON before
  // the user explicitly toggled — confusing.
  SEQ.jsonMode = false;
  const cfg = step.action_config || {}, ep = step.error_policy || {};
  const strategies = ['ignore', 'abort', 'retry_then_ignore', 'retry_then_abort'];
  document.getElementById('seq-editor-body').innerHTML = `
    <div class="field"><label>Action Type</label>
      <select id="se-action-type" onchange="seqOnActionTypeChange()">
        ${['sms', 'email', 'task', 'internal_function', 'webhook', 'start_workflow'].map(t => `<option value="${t}" ${step.action_type === t ? 'selected' : ''}>${t}</option>`).join('')}
      </select>
    </div>
    <div id="se-config-area">${seqRenderActionConfig(step.action_type || 'sms', cfg)}</div>
    <div class="section-divider">Error Policy</div>
    <div class="field-row">
      <div class="field"><label>Strategy</label>
        <select id="se-ep-strategy">${strategies.map(s => `<option value="${s}" ${ep.strategy === s ? 'selected' : ''}>${s}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Max Retries</label>
        <input id="se-ep-retries" type="number" min="0" max="10" value="${ep.max_retries ?? 0}">
      </div>
    </div>
    <div class="field"><label>Backoff Seconds</label>
      <input id="se-ep-backoff" type="number" min="0" value="${ep.backoff_seconds ?? 5}">
    </div>`;
  // Surface the internal-cred warning on initial render — covers the case
  // where a saved webhook step already has a misconfigured (cred + URL) pair.
  // No-op if action_type is not 'webhook' (warning element won't exist).
  seqUpdateCredWarning();
}

function seqRenderActionConfig(type, cfg) {
  // JSON-toggle affordance — shared across all action types. Clicking flips
  // SEQ.jsonMode and re-renders this same area as a single textarea, where
  // the user can edit the entire action_config blob directly. Mirror of
  // workflows.html wfToggleJson pattern.
  const toggle = `<div class="json-toggle" onclick="seqToggleJson()"><i class="fa-solid fa-code"></i> ${SEQ.jsonMode ? 'Switch to form' : 'Edit as JSON'}</div>`;
  if (SEQ.jsonMode) {
    return `${toggle}<div class="field"><label>Action Config (JSON)</label><textarea id="se-config-json" rows="14">${esc(JSON.stringify(cfg, null, 2))}</textarea></div>`;
  }

  if (type === 'sms') return `${toggle}
    <div class="field"><label>From (phone_lines number)</label>${fdPhoneLineSelectHtml('se-from', cfg.params?.from || '')}</div>
    <div class="field"><label>To</label><input id="se-to" value="${esc(cfg.params?.to || '{{contacts.contact_phone}}')}"></div>
    <div class="field"><label>Message</label><textarea id="se-message" rows="4">${esc(cfg.params?.message || '')}</textarea></div>`;
  if (type === 'email') {
    const attachJson = cfg.params?.attachment_urls != null
      ? JSON.stringify(cfg.params.attachment_urls, null, 2)
      : '';
    return `${toggle}
    <div class="field"><label>From</label>${fdEmailFromSelectHtml('se-from', cfg.params?.from || '')}</div>
    <div class="field"><label>To</label><input id="se-to" value="${esc(cfg.params?.to || '{{contacts.contact_email}}')}"></div>
    <div class="field"><label>Subject</label><input id="se-subject" value="${esc(cfg.params?.subject || '')}"></div>
    <div class="field"><label>Text</label><textarea id="se-text" rows="5">${esc(cfg.params?.text || '')}</textarea></div>
    <div class="field">
      <label>Attachments (optional)</label>
      <textarea id="se-attach" rows="4" placeholder='[]'>${esc(attachJson)}</textarea>
      <p style="font-size:11px;color:var(--muted);margin:4px 0 0;line-height:1.4">
        JSON array. Examples:<br>
        &nbsp;&nbsp;<code>["https://.../file.pdf"]</code><br>
        &nbsp;&nbsp;<code>[{"url":"https://...","name":"Fee Agreement.pdf"}]</code><br>
        Placeholders work inside URL strings. Files must be publicly reachable.
      </p>
    </div>`;
  }
  if (type === 'task') return `${toggle}
    <div class="field"><label>Title</label><input id="se-title" value="${esc(cfg.params?.title || '')}"></div>
    <div class="field"><label>Assigned To (user ID)</label><input id="se-assigned-to" type="number" value="${esc(cfg.params?.assigned_to || '')}"></div>
    <div class="field"><label>Description</label><textarea id="se-desc" rows="3">${esc(cfg.params?.description || '')}</textarea></div>`;
  // ── Slice 3.3: webhook step ──
  // NOT retry-idempotent — receiver must tolerate duplicates. Cookbook §5.18.
  if (type === 'webhook') {
    const methods = ['GET', 'POST', 'PUT', 'PATCH', 'DELETE'];
    const curMethod = (cfg.method || 'POST').toUpperCase();
    const curCred = cfg.credential_id == null ? '' : String(cfg.credential_id);
    const credOpts = SEQ_CREDENTIALS.loaded
      ? `<option value="">— none —</option>` + SEQ_CREDENTIALS.list.map(c =>
          `<option value="${c.id}" ${String(c.id) === curCred ? 'selected' : ''}>${esc(c.name)} (${esc(c.type)})</option>`
        ).join('')
      : `<option value="${esc(curCred)}" selected>loading credentials…</option>`;
    const headersText = cfg.headers ? JSON.stringify(cfg.headers, null, 2) : '{}';
    const bodyText    = cfg.body    ? JSON.stringify(cfg.body,    null, 2) : '{\n  "contact_id": "{{trigger_data.contact_id}}"\n}';
    return `${toggle}
      <div class="field-row">
        <div class="field" style="flex:0 0 120px"><label>Method</label>
          <select id="se-wh-method">${methods.map(m => `<option ${m === curMethod ? 'selected' : ''}>${m}</option>`).join('')}</select>
        </div>
        <div class="field" style="flex:1"><label>URL</label>
          <input id="se-wh-url" value="${esc(cfg.url || '')}" placeholder="https://example.com/path — {{placeholders}} OK" oninput="seqUpdateCredWarning()">
        </div>
      </div>
      <div class="field"><label>Credential</label>
        <select id="se-wh-cred" onchange="seqUpdateCredWarning()">${credOpts}</select>
        <div id="se-wh-cred-warn" style="display:none;margin-top:6px;padding:8px 10px;background:#fef3c7;border:1px solid #f59e0b;border-radius:6px;color:#92400e;font-size:11px;line-height:1.4"></div>
      </div>
      <div class="field"><label>Headers (JSON)</label>
        <textarea id="se-wh-headers" rows="2">${esc(headersText)}</textarea>
      </div>
      <div class="field"><label>Body (JSON)</label>
        <textarea id="se-wh-body" rows="5">${esc(bodyText)}</textarea>
      </div>
      <div class="field"><label>Timeout (ms)</label>
        <input id="se-wh-timeout" type="number" min="1" max="120000" value="${cfg.timeout_ms || 30000}">
      </div>
      <p style="font-size:11px;color:var(--muted);margin:-4px 0 8px">Not retry-idempotent — receiver must tolerate duplicate delivery on retry.</p>`;
  }
  // ── Slice 3.3: start_workflow step ──
  // Retry-safe: on retry, if a prior 'sent' log row has a workflow_execution_id
  // and that execution still exists, we reuse it (no duplicate). Cookbook §3.12.
  if (type === 'start_workflow') {
    const curWf  = cfg.workflow_id == null ? '' : String(cfg.workflow_id);
    const wfOpts = SEQ_WORKFLOWS.loaded
      ? `<option value="">— select a workflow —</option>` + SEQ_WORKFLOWS.list.map(w =>
          `<option value="${w.id}" ${String(w.id) === curWf ? 'selected' : ''}>#${w.id} ${esc(w.name)}</option>`
        ).join('')
      : `<option value="${esc(curWf)}" selected>loading workflows…</option>`;
    // Default to checked when tie_to_contact is omitted (backwards-compat).
    const tieChecked = cfg.tie_to_contact !== false;
    const overrideVal = cfg.contact_id_override == null ? '' : String(cfg.contact_id_override);
    const initDataText = cfg.init_data ? JSON.stringify(cfg.init_data, null, 2)
                                       : '{\n  "contact_id": "{{trigger_data.contact_id}}"\n}';
    // Reuse the shell's resolver-source datalist if available (contact
    // fields, phone lines, email froms, user IDs). Falls back to a plain
    // textarea if the shell helper isn't present.
    const datalistHtml = (typeof P.fdParamSourceDatalistHtml === 'function')
      ? P.fdParamSourceDatalistHtml('se-sw-initdata-sources')
      : '';
    return `${toggle}
      <div class="field"><label>Workflow</label>
        <select id="se-sw-workflow">${wfOpts}</select>
      </div>
      <div class="field"><label>init_data (JSON)</label>
        <textarea id="se-sw-initdata" rows="6">${esc(initDataText)}</textarea>
        ${datalistHtml}
        <p style="font-size:11px;color:var(--muted);margin:4px 0 0">Placeholders like <code>{{trigger_data.contact_id}}</code> resolve at step execution time.</p>
      </div>
      <div class="field" style="flex-direction:row;align-items:center;gap:8px">
        <input type="checkbox" id="se-sw-tie" ${tieChecked ? 'checked' : ''} onchange="seqOnStartWorkflowTieChange()">
        <label for="se-sw-tie" style="margin:0;cursor:pointer">Tie started workflow to this enrollment's contact</label>
      </div>
      <div class="field" id="se-sw-override-wrap" style="display:${tieChecked ? 'none' : ''}">
        <label>Contact ID Override</label>
        <input id="se-sw-override" value="${esc(overrideVal)}" placeholder="123 or {{trigger_data.spouse_contact_id}}">
        <p style="font-size:11px;color:var(--muted);margin:4px 0 0">Contact ID or <code>{{placeholder}}</code>. Empty means rely on workflow template default.</p>
      </div>`;
  }
  // ── internal_function — metadata-driven form. Falls back to JSON params
  // textarea when no metadata is registered for the function. set_vars is
  // hidden in the sequence renderer (SEQ_HIDE_SETVARS_FIELD) — see filter
  // constants near top of script.
  const fnList   = (FUNCTIONS.sequence.length ? FUNCTIONS.sequence : ['noop']);
  const currentFn = cfg.function_name && fnList.includes(cfg.function_name) ? cfg.function_name : fnList[0];
  const setVarsHtml = SEQ_HIDE_SETVARS_FIELD
    ? ''
    : `<div class="field"><label>set_vars (JSON)</label><textarea id="se-setvars" rows="3">${cfg.set_vars ? esc(JSON.stringify(cfg.set_vars, null, 2)) : ''}</textarea></div>`;
  // When the set_vars field is hidden, preserve any existing set_vars value
  // through round-trip save via a hidden input. Without this, opening a step
  // that has set_vars and re-saving via the form would silently drop them.
  // The JSON-mode round-trip also relies on this — toggleJson re-renders the
  // form with the just-gathered cfg, so any JSON-mode edit to set_vars flows
  // back through this hidden input.
  const setVarsHidden = (SEQ_HIDE_SETVARS_FIELD && cfg.set_vars && Object.keys(cfg.set_vars).length)
    ? `<input type="hidden" id="se-setvars-preserved" value="${esc(JSON.stringify(cfg.set_vars))}">`
    : '';
  return `${toggle}
    <div class="field"><label>Function</label><select id="se-fn" onchange="seqOnFnChange()">${fnList.map(f => `<option ${currentFn === f ? 'selected' : ''}>${f}</option>`).join('')}</select></div>
    <div id="se-fn-body">${seqRenderInternalFnBody(currentFn, cfg.params || {})}</div>
    ${setVarsHtml}${setVarsHidden}`;
}

// Slice 3.3 — checkbox handler for start_workflow's tie-to-contact toggle.
function seqOnStartWorkflowTieChange() {
  const checked = document.getElementById('se-sw-tie')?.checked;
  const wrap = document.getElementById('se-sw-override-wrap');
  if (wrap) wrap.style.display = checked ? 'none' : '';
}

// ─────────────────────────────────────────────────────────────
// Internal-function form renderer — drives off FUNCTIONS.meta. Mirror of
// the workflows.html wfRenderInternalFnBody / wfRenderParamField pair, with
// SEQ_HIDDEN_PARAMS filtering to suppress workflow-only params (output_var,
// count_var, date_var) that would silently no-op in sequences.
//
// Renders:
//   - Description line (one-liner from meta.description)
//   - Mode toggle (when meta has params with modeGroup)
//   - Per-param form fields, ordered by meta.params declaration
//   - Params JSON fallback when no meta is present
//
// Field naming: id="se-pf-{paramName}" for per-param inputs.
// Mode tracking: data-mode attribute on the body container.
// ─────────────────────────────────────────────────────────────

function _seqHumanizeMode(s) {
  return String(s || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function _seqHasPlaceholder(v) {
  return typeof v === 'string' && /\{\{[^}]+\}\}/.test(v);
}

function _seqDetectMode(meta, params) {
  // Returns {modes:[], current} — which modeGroup is currently active based
  // on which params are populated. Defaults to first declared mode.
  const modes = [];
  for (const p of meta.params) {
    if (p.modeGroup && !modes.includes(p.modeGroup)) modes.push(p.modeGroup);
  }
  if (!modes.length) return { modes: [], current: null };
  for (const mode of modes) {
    const fieldsInMode = meta.params.filter(p => p.modeGroup === mode);
    const anyPopulated = fieldsInMode.some(p => {
      // nullishSkipsBlock: key-presence counts even when null
      if (p.nullishSkipsBlock) return p.name in params;
      const v = params[p.name];
      return v !== undefined && v !== null && v !== '';
    });
    if (anyPopulated) return { modes, current: mode };
  }
  return { modes, current: modes[0] };
}

function seqRenderInternalFnBody(fnName, params) {
  const meta = FUNCTIONS.meta[fnName];
  if (!meta) {
    // No metadata — fall back to Params JSON textarea.
    return `<div class="field"><label>Params (JSON)</label><textarea id="se-params" rows="8">${esc(params ? JSON.stringify(params, null, 2) : '{}')}</textarea></div>`;
  }

  const desc = meta.description
    ? `<p style="font-size:12px;color:var(--muted);margin:0 0 10px;line-height:1.5">${esc(meta.description)}</p>`
    : '';

  // Filter out workflow-only params for the sequence renderer. SEQ_HIDDEN_PARAMS
  // is the slice-B kill list — see comment near constant declaration.
  const visibleParams = meta.params.filter(p => !SEQ_HIDDEN_PARAMS.has(p.name));

  if (!visibleParams.length) {
    // Functions with no (visible) params (noop, etc.)
    return `${desc}<p style="font-size:12px;color:var(--muted);margin:0 0 10px">No parameters required.</p>`;
  }

  const { modes, current } = _seqDetectMode({ params: visibleParams }, params);

  const modeBar = modes.length
    ? `<div class="field">
         <label>Mode</label>
         <div style="display:flex;gap:6px">
           ${modes.map(m => `<button type="button" class="mode-btn" data-mode="${m}" onclick="seqOnModeChange('${m}')" style="padding:6px 12px;border:1px solid ${m === current ? 'var(--blue)' : 'var(--border)'};background:${m === current ? 'rgba(79,142,247,0.15)' : 'transparent'};color:var(--text);border-radius:6px;cursor:pointer;font-size:12px">${esc(_seqHumanizeMode(m))}</button>`).join('')}
         </div>
       </div>`
    : '';

  const fieldsHtml = visibleParams.map(spec => {
    const value = params[spec.name];
    const visible = !spec.modeGroup || spec.modeGroup === current;
    return seqRenderParamField(spec, value, visible);
  }).join('');

  return `<div id="se-fn-body-inner" data-mode="${current || ''}">${desc}${modeBar}${fieldsHtml}</div>`;
}

function seqRenderParamField(spec, value, visible) {
  const id = `se-pf-${spec.name}`;
  const labelHtml = `<label>${esc(spec.name)}${spec.required ? ' <span style="color:#ef4444">*</span>' : ''}</label>`;
  const helpHtml = spec.description
    ? `<p style="font-size:11px;color:var(--muted);margin:4px 0 0;line-height:1.4">${esc(spec.description)}</p>`
    : '';
  const wrapperStyle = visible ? '' : 'display:none';
  const wrapperAttrs = `class="field" id="se-pfw-${spec.name}" data-mode-group="${spec.modeGroup || ''}" style="${wrapperStyle}"`;

  // Widget hints — phone_line / phone_line_mms / email_from dropdowns (shell helpers).
  // Falls through to default text input if the helper isn't present.
  if (spec.widget === 'phone_line' && typeof P.fdPhoneLineSelectHtml === 'function') {
    return `<div ${wrapperAttrs}>${labelHtml}${P.fdPhoneLineSelectHtml(id, value || '')}${helpHtml}</div>`;
  }
  if (spec.widget === 'phone_line_mms' && typeof P.fdPhoneLineMmsSelectHtml === 'function') {
    return `<div ${wrapperAttrs}>${labelHtml}${P.fdPhoneLineMmsSelectHtml(id, value || '')}${helpHtml}</div>`;
  }
  if (spec.widget === 'email_from' && typeof P.fdEmailFromSelectHtml === 'function') {
    return `<div ${wrapperAttrs}>${labelHtml}${P.fdEmailFromSelectHtml(id, value || '')}${helpHtml}</div>`;
  }

  // Type-driven rendering.
  let inputHtml;
  switch (spec.type) {
    case 'boolean': {
      const checked = value === true ? 'checked' : '';
      inputHtml = `<input type="checkbox" id="${id}" ${checked} style="width:auto">`;
      break;
    }
    case 'enum': {
      const opts = spec.enum || [];
      const includeBlank = !spec.required;
      const blank = includeBlank ? '<option value=""></option>' : '';
      inputHtml = `<select id="${id}">${blank}${opts.map(o => `<option ${o === value ? 'selected' : ''}>${esc(o)}</option>`).join('')}</select>`;
      break;
    }
    case 'integer':
    case 'number': {
      const v = (value === null || value === undefined) ? '' : value;
      const step = spec.type === 'integer' ? 'step="1"' : '';
      const min  = spec.min !== undefined ? `min="${spec.min}"` : '';
      const max  = spec.max !== undefined ? `max="${spec.max}"` : '';
      inputHtml = `<input id="${id}" type="number" ${step} ${min} ${max} value="${esc(v)}">`;
      break;
    }
    case 'object':
    case 'array': {
      let display = '';
      if (value !== undefined && value !== null) {
        display = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
      }
      const placeholder = spec.type === 'array' ? '[]' : '{}';
      inputHtml = `<textarea id="${id}" rows="4" placeholder="${placeholder}">${esc(display)}</textarea>`;
      break;
    }
    default: {
      // string / iso_datetime / duration / placeholder_string
      const v = (value === null || value === undefined) ? '' : String(value);
      if (spec.multiline) {
        inputHtml = `<textarea id="${id}" rows="4">${esc(v)}</textarea>`;
      } else {
        inputHtml = `<input id="${id}" value="${esc(v)}">`;
      }
    }
  }

  return `<div ${wrapperAttrs}>${labelHtml}${inputHtml}${helpHtml}</div>`;
}

function seqOnFnChange() {
  const fn = document.getElementById('se-fn')?.value;
  const target = document.getElementById('se-fn-body');
  if (target) target.innerHTML = seqRenderInternalFnBody(fn, {});
}

function seqOnModeChange(mode) {
  const inner = document.getElementById('se-fn-body-inner');
  if (!inner) return;
  inner.dataset.mode = mode;
  // Show/hide param wrappers by mode group
  inner.querySelectorAll('[data-mode-group]').forEach(el => {
    const g = el.dataset.modeGroup;
    if (!g) return; // no mode group → always visible
    el.style.display = (g === mode) ? '' : 'none';
  });
  // Update mode button styling
  inner.querySelectorAll('.mode-btn').forEach(btn => {
    const isActive = btn.dataset.mode === mode;
    btn.style.borderColor = isActive ? 'var(--blue)' : 'var(--border)';
    btn.style.background  = isActive ? 'rgba(79,142,247,0.15)' : 'transparent';
  });
}

// JSON toggle. Reads the currently-displayed view via seqGatherActionConfig
// BEFORE flipping the mode flag; if gather fails (invalid JSON in either
// view, etc.), stays put so the user can fix it without losing the toggle.
function seqToggleJson() {
  const t = document.getElementById('se-action-type')?.value;
  if (!t) return;
  const cfg = seqGatherActionConfig(t);
  if (cfg === null) return;
  SEQ.jsonMode = !SEQ.jsonMode;
  document.getElementById('se-config-area').innerHTML = seqRenderActionConfig(t, cfg);
  // Cred dropdown may have just re-mounted (form mode) — re-evaluate the
  // internal-cred + non-internal-URL warning. No-op when not webhook.
  seqUpdateCredWarning();
}

function seqOnActionTypeChange() {
  const t = document.getElementById('se-action-type')?.value;
  if (t) document.getElementById('se-config-area').innerHTML = seqRenderActionConfig(t, {});
  // If user just switched to webhook the cred dropdown is freshly mounted
  // with no value, so no warning will fire — but we run anyway to keep
  // render and warning evaluation paired.
  seqUpdateCredWarning();
}

function seqRenderTimingTab(step) {
  const t = step.timing || { type: 'immediate' };
  const TIMING_TYPES = ['immediate', 'delay', 'next_business_day', 'business_days', 'before_appt', 'before_appt_fixed'];
  document.getElementById('seq-editor-body').innerHTML = `
    <div class="field"><label>Timing Type</label>
      <select id="st-type" onchange="seqOnTimingTypeChange()">
        ${TIMING_TYPES.map(tt => `<option value="${tt}" ${t.type === tt ? 'selected' : ''}>${tt}</option>`).join('')}
      </select>
    </div>
    <div id="st-fields">${seqTimingFields(t)}</div>`;
}

function seqTimingFields(t) {
  if (t.type === 'immediate') return `<p style="font-size:12px;color:var(--muted);padding:8px 0">Fires immediately (~5 seconds after enrollment or previous step).</p>`;
  if (t.type === 'delay') {
    const isAbsolute = typeof t.at === 'string';
    const mode = isAbsolute ? 'absolute' : 'relative';
    return `
      <div class="field">
        <label>Mode</label>
        <select id="st-delay-mode" onchange="seqOnDelayModeChange()">
          <option value="relative" ${mode === 'relative' ? 'selected' : ''}>Relative (value + unit)</option>
          <option value="absolute" ${mode === 'absolute' ? 'selected' : ''}>Absolute (specific datetime)</option>
        </select>
      </div>
      <div id="st-delay-fields">${seqDelayModeFields(mode, t)}</div>
      <div class="field">
        <label>Randomize ± Minutes</label>
        <input id="st-rand" type="number" min="0" max="1440" value="${t.randomizeMinutes || 0}">
        <div style="font-size:11px;color:var(--muted);margin-top:4px">Symmetric jitter — fires within ±N minutes of the computed time.</div>
      </div>`;
  }
  if (t.type === 'next_business_day' || t.type === 'business_days') return `
    ${t.type === 'business_days' ? `<div class="field"><label>Business Days Ahead</label><input id="st-value" type="number" min="1" value="${t.value || 1}"></div>` : ''}
    <div class="field"><label>Time of Day (HH:MM)</label><input id="st-time" value="${t.timeOfDay || '09:00'}"></div>
    <div class="field"><label>Randomize ± Minutes</label><input id="st-rand" type="number" min="0" value="${t.randomizeMinutes || 0}"></div>`;
  if (t.type === 'before_appt' || t.type === 'before_appt_fixed') return `
    <div class="field"><label>Hours Before Appointment</label><input id="st-hours" type="number" min="0" step="0.5" value="${t.hoursBack || 24}"></div>
    ${t.type === 'before_appt' ? `
    <div class="field"><label>Time of Day (HH:MM)</label><input id="st-time" value="${t.timeOfDay || '10:00'}"></div>
    <div class="field"><label>Randomize ± Minutes</label><input id="st-rand" type="number" min="0" value="${t.randomizeMinutes || 0}"></div>
    <div class="field"><label>Min Hours Before Appt</label><input id="st-minhours" type="number" min="0" value="${t.minHoursBefore || 1}"></div>` : ''}`;
  return '';
}

function seqDelayModeFields(mode, t) {
  if (mode === 'absolute') {
    return `
      <div class="field">
        <label>At (datetime)</label>
        <input id="st-at" value="${esc(t.at || '')}" placeholder="2026-05-01T14:30:00 or {{trigger_data.target_iso}}">
        <div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5">
          <strong>Accepted formats:</strong><br>
          • <code>2026-05-01T14:30:00Z</code> &mdash; explicit UTC<br>
          • <code>2026-05-01T14:30:00-04:00</code> &mdash; explicit offset<br>
          • <code>2026-05-01T14:30:00</code> or <code>2026-05-01 14:30:00</code> &mdash; firm timezone<br>
          • <code>2026-05-01</code> &mdash; firm timezone, midnight<br>
          • <code>{{trigger_data.field_name}}</code> &mdash; placeholder resolved at fire time<br>
          Past times fire on next process-jobs tick.
        </div>
      </div>`;
  }
  return `
    <div class="field-row">
      <div class="field"><label>Value</label><input id="st-value" type="number" min="1" value="${t.value || 5}"></div>
      <div class="field"><label>Unit</label><select id="st-unit">${['seconds', 'minutes', 'hours', 'days'].map(u => `<option ${t.unit === u ? 'selected' : ''}>${u}</option>`).join('')}</select></div>
    </div>`;
}

function seqOnTimingTypeChange() {
  const t = document.getElementById('st-type')?.value;
