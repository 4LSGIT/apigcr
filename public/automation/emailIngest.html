<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Ingest</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/automation/fnPicker.js"></script>
  <script src="/automation/paramsMapping.js"></script>
  <style>
    /* ══════════════════════════════════════════════
       EMAIL INGEST SUB-PAGE — self-contained styles.
       Tokens + base layout duplicated from hooks.html.

       SLICE 3.2 = skeleton: three internal tabs (Suppressions /
       Rules / Executions), list rendering, selection, /meta cache,
       READ-ONLY detail. No editors — those are 3.3 / 3.4.

       LAYOUT: Suppressions & Rules use the three-panel idiom (left
       list + right read-only detail). Executions is a special case —
       a center full-width table (the list can be 400+ rows), with a
       toolbar (status filter + limit + log-style pager) and a
       right-hand slide-over DRAWER for per-row detail. The sidebar is
       hidden while the Executions tab is active.
       ══════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1a1a2e;
      --navy2:   #16213e;
      --blue:    #4f8ef7;
      --blue2:   #3a7de8;
      --green:   #22c55e;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --purple:  #8b5cf6;
      --bg:      #f1f5f9;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --muted:   #94a3b8;
      --text:    #1e293b;
      --text2:   #475569;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Internal-tab bar — fixed, full-width, ABOVE the content row.
       Single source of truth for the Suppressions/Rules/Executions
       switch; doesn't move when the layout below it changes. ── */
    .ei-topbar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .ei-topbar .ei-topbar-collapse {
      margin-left: auto;
      background: none; border: 1px solid var(--border); border-radius: 5px;
      color: var(--muted); cursor: pointer; padding: 5px 9px; font-size: 12px;
      transition: all 0.12s;
    }
    .ei-topbar .ei-topbar-collapse:hover { color: var(--text); background: var(--bg); }
    .ei-topbar .ei-topbar-collapse.hidden { display: none; }

    /* content row sits below the topbar */
    .ei-content { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── Button family (duplicated from shell) ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px; border: none;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue2); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-outline { background: var(--bg); border: 1px solid var(--border); color: var(--text2); }
    .btn-outline:hover { background: var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Single internal-tab switcher (lives in the fixed topbar) ── */
    .ei-tab {
      flex: 0 0 auto; padding: 7px 14px; border: none; cursor: pointer;
      background: var(--bg); color: var(--text2);
      box-shadow: inset 0 0 0 1px var(--border);
      font-size: 12px; font-weight: 600; border-radius: 6px;
      transition: all 0.12s; white-space: nowrap;
      display: inline-flex; flex-direction: row; align-items: center; gap: 6px;
    }
    .ei-tab i { font-size: 13px; }
    .ei-tab:hover { color: var(--text); background: var(--border); }
    .ei-tab.active {
      color: var(--blue); background: rgba(79,142,247,0.08);
      box-shadow: inset 0 0 0 1px var(--blue);
    }

    /* ── Supp/Rules content host (left list + right detail) ── */
    .three-panel { flex: 1; overflow: hidden; display: flex; }

    .panel-left {
      width: 280px; min-width: 280px;
      background: var(--navy2);
      display: flex; flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
      transition: width 0.15s, min-width 0.15s;
    }
    /* Hide the sidebar entirely on the Executions tab */
    .panel-left.exec-mode { display: none; }
    /* Collapsed = fully hidden (detail pane reclaims the space). The
       re-expand control is the topbar collapse button. */
    .panel-left.collapsed { display: none; }

    .panel-left-head {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 6px;
    }
    .panel-left-head .ph-title {
      flex: 1; color: rgba(255,255,255,0.85); font-size: 12px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .panel-left-tools {
      padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ei-tool-input {
      width: 100%; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px; padding: 5px 9px;
      color: #fff; font-size: 12px; outline: none;
    }
    .ei-tool-input::placeholder { color: rgba(255,255,255,0.3); }
    .ei-tool-input:focus { border-color: var(--blue); }

    .panel-left-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .panel-left-loading { padding: 16px; color: rgba(255,255,255,0.3); font-size: 12px; }
    .panel-left-empty { padding: 20px 12px; color: rgba(255,255,255,0.3); font-size: 12px; text-align: center; }
    .panel-left-error { padding: 16px; color: #f87171; font-size: 12px; }

    .left-item {
      padding: 9px 12px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.12s;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .left-item:hover { background: rgba(255,255,255,0.05); }
    .left-item.active { border-left-color: var(--blue); background: rgba(79,142,247,0.1); }
    .left-item-name {
      color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 6px;
    }
    .left-item.active .left-item-name { color: #fff; }
    .left-item-meta {
      color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 3px;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .left-item-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
    .badge-active   { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-inactive { background: rgba(239,68,68,0.15); color: #f87171; }

    /* ── Right detail area (suppressions / rules) ── */
    .ei-detail-area {
      flex: 1; display: flex; flex-direction: column;
      background: var(--bg); overflow: hidden; min-width: 0;
    }
    .ei-detail-head {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 16px; height: 46px; display: flex; align-items: center;
      flex-shrink: 0; gap: 10px;
    }
    .ei-detail-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ei-detail-subtitle { font-size: 12px; color: var(--muted); font-weight: 500; }
    .ei-detail-body { flex: 1; overflow-y: auto; padding: 20px; min-height: 0; }

    /* ══ EXECUTIONS CENTER SURFACE ══ */
    .exec-surface {
      display: none; flex: 1; flex-direction: column;
      background: var(--bg); min-width: 0; overflow: hidden;
    }
    .exec-surface.active { display: flex; }

    .exec-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .exec-toolbar {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      padding: 10px 14px;
    }
    .exec-toolbar .tb-group { display: flex; align-items: center; gap: 6px; }
    .exec-toolbar label {
      font-size: 11px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .exec-toolbar select {
      padding: 5px 8px; font-size: 12px; border: 1px solid var(--border);
      border-radius: 5px; background: #fff; color: var(--text); cursor: pointer;
    }
    .exec-toolbar select:focus { outline: none; border-color: var(--blue); }
    .exec-toolbar .tb-spacer { flex: 1; }

    .exec-body { flex: 1; overflow: auto; min-height: 0; }

    /* Executions table */
    .exec-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .exec-table thead th {
      position: sticky; top: 0; z-index: 1;
      text-align: left; padding: 9px 14px;
      background: var(--bg); font-weight: 600; color: var(--text2);
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .exec-table tbody td {
      padding: 9px 14px; border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .exec-table tbody tr { cursor: pointer; transition: background 0.1s; }
    .exec-table tbody tr:hover { background: #eef2f7; }
    .exec-table tbody tr.active { background: rgba(79,142,247,0.1); box-shadow: inset 3px 0 0 var(--blue); }
    .exec-empty, .exec-loading, .exec-error {
      padding: 40px 16px; text-align: center; color: var(--muted); font-size: 13px;
    }
    .exec-error { color: var(--red); }

    .col-created { white-space: nowrap; color: var(--text2); }
    .col-source  { color: var(--text2); }
    .col-msgid   { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Footer (pagination strip — ported from scripts.js log idiom) */
    .exec-footer {
      flex-shrink: 0; background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 14px; display: flex; align-items: center;
      gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--text2);
    }
    .exec-footer .sep { color: var(--border); margin: 0 2px; }
    .log-pagination { display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .log-pagination a {
      color: var(--blue); text-decoration: none; padding: 2px 7px;
      border-radius: 4px; font-size: 12px;
    }
    .log-pagination a:hover { background: rgba(79,142,247,0.1); }
    .log-pagination strong {
      padding: 2px 8px; border-radius: 4px; background: var(--blue);
      color: #fff; font-size: 12px;
    }
    .log-pagination-ellipsis { color: var(--muted); padding: 0 2px; }
    .log-pagination .logPageInput {
      width: 48px; padding: 2px 4px; font-size: 12px; text-align: center;
      border: 1px solid var(--blue); border-radius: 4px;
    }

    /* Status chips */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; vertical-align: middle; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 9px; border-radius: 10px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
    }

    /* ══════════════════════════════════════════════════════════════
       MATCH-BUILDER (reusable condition-tree component, lifted from
       hooks.html and namespaced .mb-* / .cond-* so 3.4 + a future
       phone-ingest UI can reuse it unchanged). The component is
       config-driven: fields + operators are passed in at render time.
       ══════════════════════════════════════════════════════════════ */
    .cond-group {
      border: 1px solid var(--border); border-radius: 6px;
      padding: 10px; margin-bottom: 8px; background: #fafbfc;
    }
    .cond-group-head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .cond-group-head select {
      padding: 4px 8px; font-size: 11px;
      border: 1px solid var(--border); border-radius: 4px; font-weight: 600;
      background: #fff; color: var(--text);
    }
    .cond-group-head .cond-group-hint { font-size: 12px; color: var(--muted); }
    .cond-row {
      display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: wrap;
    }
    .cond-row input,
    .cond-row select {
      padding: 5px 8px; font-size: 12px;
      border: 1px solid var(--border); border-radius: 4px;
      background: #fff; color: var(--text);
    }
    .cond-row input:focus,
    .cond-row select:focus { outline: none; border-color: var(--blue); }
    .cond-field        { flex: 2; min-width: 150px; }
    .cond-path-custom  { flex: 2; min-width: 130px; }
    .cond-op           { width: 130px; }
    .cond-value        { flex: 2; min-width: 110px; }
    .cond-value[disabled] { background: var(--bg); color: var(--muted); }

    .mb-add-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      flex: 1; margin: 0; padding: 5px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.12s;
    }
    .mb-add-btn:hover { background: var(--border); color: var(--text); }
    .cond-remove {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 6px; font-size: 13px; line-height: 1;
    }
    .cond-remove:hover { color: var(--red); }

    /* ══ SUPPRESSION EDITOR FORM ══ */
    .ei-form { max-width: 720px; }
    .ei-form-row { margin-bottom: 16px; }
    .ei-form-row label.ei-label {
      display: block; font-size: 11px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .ei-input, .ei-textarea, .ei-select {
      width: 100%; padding: 8px 10px; font-size: 13px;
      border: 1px solid var(--border); border-radius: 6px;
      background: #fff; color: var(--text); font-family: inherit;
    }
    .ei-input:focus, .ei-textarea:focus, .ei-select:focus { outline: none; border-color: var(--blue); }
    .ei-textarea { resize: vertical; min-height: 72px; }
    .ei-code-textarea {
      min-height: 200px; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px; line-height: 1.5;
    }
    .ei-field-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .ei-toggle-line { display: flex; align-items: center; gap: 8px; }
    .ei-toggle-line input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
    .ei-toggle-line span { font-size: 13px; color: var(--text); }
    .ei-meta-card {
      background: #fff; border: 1px solid var(--border); border-radius: 8px;
      padding: 0; margin-top: 20px; overflow: hidden;
    }

    /* ══ SAMPLE-EVENT REFERENCE PANEL (field-discovery aid) ══
       SHARED sample-panel styles — the `pi-` prefix is INTENTIONAL on BOTH
       phoneIngest.html AND emailIngest.html; keep these rules byte-identical
       across the two pages (do NOT "tidy" email's pi- to ei- — that would break
       the lifted-and-kept-identical parity the panel relies on).
       A collapsible block under the match conditions paging through recent
       events projected to the match-field catalog; every path is a click-to-
       insert chip (absent paths included). Server-sourced (/sample-events). */
    .pi-sample {
      margin-top: 10px; border: 1px solid var(--border); border-radius: 8px;
      background: #fbfdff; overflow: hidden;
    }
    .pi-sample-head {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      padding: 8px 12px; user-select: none;
      font-size: 11px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .pi-sample-head:hover { background: #f1f7ff; }
    .pi-sample-head .chev { transition: transform 0.15s; font-size: 11px; color: var(--muted); }
    .pi-sample.collapsed .chev { transform: rotate(-90deg); }
    .pi-sample.collapsed .pi-sample-body { display: none; }
    .pi-sample-head .pi-sample-hint { margin-left: auto; font-weight: 500; text-transform: none; letter-spacing: 0; color: var(--muted); font-size: 11px; }
    .pi-sample-body { padding: 4px 12px 12px; }
    /* stepper: ‹ prev  [n / total]  label  next › */
    .pi-sample-stepper { display: flex; align-items: center; gap: 8px; margin: 6px 0 10px; }
    .pi-sample-nav {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); background: #fff; color: var(--text2);
      font-size: 11px; transition: all 0.12s;
    }
    .pi-sample-nav:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
    .pi-sample-nav:disabled { opacity: 0.35; cursor: not-allowed; }
    .pi-sample-pos { font-size: 11px; font-weight: 600; color: var(--text2); white-space: nowrap; }
    .pi-sample-label {
      font-size: 11px; color: var(--muted); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    .pi-sample-grid { display: grid; grid-template-columns: 1fr; gap: 2px; }
    .pi-sample-field {
      display: flex; align-items: baseline; gap: 8px; padding: 4px 6px;
      border-radius: 5px; font-size: 12px;
    }
    .pi-sample-field:hover { background: #eef5ff; }
    .pi-sample-field.absent { opacity: 0.55; }
    .pi-sample-path {
      font-family: 'SF Mono','Cascadia Code','Consolas',monospace;
      font-size: 11px; color: var(--blue2); cursor: pointer;
      border: 1px solid transparent; border-radius: 4px; padding: 1px 5px;
      white-space: nowrap; flex-shrink: 0;
    }
    /* absent fields stay visually distinct but ARE click-to-insert (the catalog
       defines what's matchable, not whichever sample is shown). */
    .pi-sample-field.absent .pi-sample-path { color: var(--muted); }
    .pi-sample-path:hover { border-color: var(--blue); background: #fff; }
    .pi-sample-val {
      font-family: 'SF Mono','Cascadia Code','Consolas',monospace;
      font-size: 11px; color: var(--text); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .pi-sample-val.muted { color: var(--muted); font-style: italic; }
    .pi-sample-empty { font-size: 12px; color: var(--muted); padding: 6px; }

    /* ══ TEST-MATCH PANEL (Slice 10B) ══
       SHARED test-match styles — the `tm-` prefix block is kept BYTE-IDENTICAL
       across phoneIngest.html AND emailIngest.html (same convention as the
       .pi-sample* block above). If you change one page, change the other. */
    .tm-controls { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .tm-select, .tm-date {
      border: 1px solid var(--border); border-radius: 6px; background: #fff;
      color: var(--text); font-size: 12px; padding: 4px 8px;
    }
    .tm-check { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); cursor: pointer; user-select: none; }
    .tm-range-sep { font-size: 12px; color: var(--muted); user-select: none; }
    .tm-banner {
      background: #fffbeb; border: 1px solid #fde68a; color: #92400e;
      border-radius: 6px; padding: 6px 10px; font-size: 11.5px; margin: 0 0 8px; line-height: 1.4;
    }
    .tm-head { font-size: 12px; font-weight: 700; color: var(--text); margin: 2px 0 8px; }
    .tm-rows { display: flex; flex-direction: column; gap: 2px; }
    .tm-row {
      display: flex; align-items: baseline; gap: 10px; padding: 4px 6px;
      border-radius: 5px; font-size: 12px; min-width: 0;
    }
    .tm-row.clickable { cursor: pointer; }
    .tm-row.clickable:hover { background: #eef5ff; }
    .tm-row.miss { opacity: 0.5; }
    .tm-ts { font-size: 11px; color: var(--text2); white-space: nowrap; flex-shrink: 0; width: 108px; }
    .tm-from {
      font-family: 'SF Mono','Cascadia Code','Consolas',monospace; font-size: 11px;
      color: var(--blue2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex-shrink: 0; max-width: 200px;
    }
    .tm-label { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .tm-fid {
      flex-shrink: 0; font-size: 10px; font-weight: 600; color: #92400e;
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 4px;
      padding: 0 5px; cursor: help;
    }
    .tm-status {
      flex-shrink: 0; font-size: 10px; font-weight: 600; color: #92400e;
      background: #fef3c7; border: 1px solid #fcd34d; border-radius: 4px;
      padding: 0 5px; opacity: 0.85; cursor: help;
    }
    .tm-divider {
      display: flex; align-items: center; gap: 8px; margin: 8px 0 4px;
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--muted);
    }
    .tm-divider::before, .tm-divider::after { content: ''; height: 1px; background: var(--border); flex: 1; }
    .tm-empty { font-size: 12px; color: var(--muted); padding: 6px; font-style: italic; }
    .tm-err {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
      border-radius: 6px; padding: 8px 10px; font-size: 12px;
      word-break: break-word;
    }
    .tm-row .tm-tf {
      margin-left: 6px; flex: 0 0 auto;
      border: 1px solid var(--border); background: #fff; color: var(--muted);
      border-radius: 4px; padding: 1px 7px; font-size: 10px; cursor: pointer;
    }
    .tm-row .tm-tf:hover { color: var(--blue); border-color: var(--blue); }

    /* ══ ACTION-FORM schema-hint note (from meta.action_types config_schema_hint) ══
       Lifted identical from phoneIngest.html — keep in sync. */
    .swal-a-note {
      font-size: 11px; color: var(--text2); background: #f1f7ff;
      border: 1px solid #d6e6ff; border-radius: 6px; padding: 6px 9px;
      margin: 2px 0 8px; line-height: 1.45;
    }
    .swal-a-note i { color: var(--blue); margin-right: 5px; }

    /* ── Read-only detail cards (suppressions/rules detail + drawer) ── */
    .ei-placeholder-banner {
      display: flex; align-items: center; gap: 8px;
      background: #fffbeb; border: 1px solid #fde68a; color: #92400e;
      border-radius: 6px; padding: 8px 12px; font-size: 12px; margin-bottom: 16px;
    }
    .kv-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 8px; padding: 0; margin-bottom: 14px; overflow: hidden;
    }
    .kv-card-head {
      padding: 9px 14px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text2);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .kv-row {
      display: flex; gap: 12px; padding: 8px 14px;
      border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .kv-row:last-child { border-bottom: none; }
    .kv-key {
      width: 150px; min-width: 150px; color: var(--text2);
      font-weight: 600; font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.4px; padding-top: 1px;
    }
    .kv-val { flex: 1; min-width: 0; color: var(--text); word-break: break-word; }
    .kv-val.null { color: var(--muted); font-style: italic; }

    pre.json {
      background: var(--navy); color: #e2e8f0; padding: 12px;
      border-radius: 6px; font-size: 12px; overflow: auto;
      white-space: pre-wrap; word-break: break-word;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; margin: 0;
    }

    .action-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
    }
    .action-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .action-type-pill {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
      background: #e0e7ff; color: #3730a3; text-transform: uppercase; letter-spacing: 0.4px;
    }

    /* No-selection placeholder (suppressions/rules right pane) */
    #ei-no-selection {
      display: flex; flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); gap: 4px; text-align: center;
    }
    #ei-no-selection i { font-size: 42px; opacity: 0.2; }

    /* ══ DRAWER (execution detail) ══ */
    .drawer-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,0.45);
      opacity: 0; pointer-events: none; transition: opacity 0.18s; z-index: 40;
    }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; right: 0; height: 100vh;
      width: 520px; max-width: 92vw;
      background: var(--bg); box-shadow: -8px 0 24px rgba(0,0,0,0.18);
      transform: translateX(100%); transition: transform 0.2s ease;
      z-index: 41; display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      flex-shrink: 0; background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px; height: 52px; display: flex; align-items: center; gap: 10px;
    }
    .drawer-title { font-size: 15px; font-weight: 700; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drawer-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 4px 8px; border-radius: 5px; transition: all 0.12s;
    }
    .drawer-close:hover { background: var(--bg); color: var(--text); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 18px; min-height: 0; }

    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; }
    .text-muted { color: var(--muted); }
    .hidden { display: none !important; }

    /* ══════════════════════════════════════════════════════════════
       RULE EDITOR — transform builder (mapper rules) + action manager.
       Added in Slice 3.4. The mapper UI is lifted from hooks.html's
       renderMapperRules; the action manager mirrors hooks' target cards
       and uses the existing .action-card / .action-type-pill styles plus
       the interactive extensions below.
       ══════════════════════════════════════════════════════════════ */

    /* mapper rules (transform = mapper) */
    .mapper-rule {
      background: #fafbfc; border: 1px solid var(--border);
      border-radius: 6px; padding: 8px; margin-bottom: 8px;
    }
    .mapper-rule-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .mapper-rule-row select,
    .mapper-rule-row input {
      padding: 5px 8px; font-size: 12px;
      border: 1px solid var(--border); border-radius: 4px;
      background: #fff; color: var(--text);
    }
    .mapper-rule-row select:focus,
    .mapper-rule-row input:focus { outline: none; border-color: var(--blue); }
    .mr-type { width: 92px; }
    .mr-from { flex: 2; min-width: 130px; }
    .mr-to   { flex: 1; min-width: 110px; }
    .mr-arrow { color: var(--muted); font-size: 15px; padding: 0 2px; }
    .mr-remove {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 6px; font-size: 13px; line-height: 1;
    }
    .mr-remove:hover { color: var(--red); }
    /* Transforms editor — a <textarea>, ONE DESCRIPTOR PER LINE.
       The delimiter is the newline, not a comma: a comma made regex quantifiers
       ({4,8}) and `split:,:0` inexpressible. wrap=off + white-space:pre keeps
       one visual line == one descriptor, so a long court regex can't LOOK like
       it wrapped onto a second descriptor. */
    .mr-transforms {
      display: block; margin-top: 6px; width: 100%; padding: 5px 8px; font-size: 12px;
      border: 1px solid var(--border); border-radius: 4px; color: var(--text);
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      background: #fff; line-height: 1.5; min-height: 44px; resize: vertical;
      white-space: pre; overflow-x: auto;
    }
    .mr-transforms:focus { outline: none; border-color: var(--blue); }
    .mr-empty { text-align: center; padding: 12px; color: var(--muted); font-size: 12px; }

    /* action manager cards (interactive — extend the read-only .action-card) */
    .action-card.interactive { padding: 12px 14px; }
    .action-card .action-card-head { justify-content: flex-start; }
    .action-icon { font-size: 14px; }
    .action-title { font-weight: 600; font-size: 13px; color: var(--text); }
    .action-summary { font-size: 12px; color: var(--text2); margin: 2px 0 0; }
    .action-card-actions { margin-left: auto; display: flex; gap: 4px; }
    .action-card-actions button {
      background: none; border: 1px solid var(--border); border-radius: 5px;
      color: var(--text2); cursor: pointer; padding: 4px 8px; font-size: 12px;
      transition: all 0.12s;
    }
    .action-card-actions button:hover { background: var(--bg); color: var(--text); }
    .action-card-actions button.danger:hover { color: var(--red); border-color: var(--red); }
    .actions-note {
      font-size: 11px; color: var(--muted); margin: 4px 0 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .ei-section-head {
      font-size: 11px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin: 22px 0 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* SweetAlert action-form field groups (mirror hooks' .fg / .hint) */
    .fg { margin-bottom: 10px; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 3px; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>

<div class="ei-content">

  <!-- ── Left panel (suppressions / rules). Hidden in exec-mode. ── -->

        <p style="font-size:14px;font-weight:500;margin:6px 0 0">Select a record to inspect</p>
        <p style="font-size:12px">Suppressions and rules — read-only for now</p>
      </div>
      <div id="ei-detail-wrap" style="display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden">
        <div class="ei-detail-head">
          <span class="ei-detail-title" id="ei-detail-title">—</span>
          <span class="ei-detail-subtitle" id="ei-detail-subtitle"></span>
        </div>
        <div class="ei-detail-body" id="ei-detail-body"></div>
      </div>

  </div>

  <!-- ── Executions center surface (full-width; sidebar hidden) ── -->
  <div class="exec-surface" id="ei-exec-surface">

    <div class="exec-header">
      <div class="exec-toolbar">
        <div class="tb-group">
          <label>Status</label>

            <option value="">All</option>

      <div class="exec-loading">Loading…</div>

</div>

<!-- ── Drawer (execution detail) ── -->
<div class="drawer-backdrop" id="ei-drawer-backdrop" onclick="eiCloseDrawer()"></div>
<div class="drawer" id="ei-drawer" role="dialog" aria-modal="true" aria-label="Execution detail">

    <span class="drawer-title" id="ei-drawer-title">Execution</span>
    <button class="drawer-close" onclick="eiCloseDrawer()" title="Close (Esc)"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="drawer-body" id="ei-drawer-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// EMAIL INGEST SUB-PAGE  (Phase 3.2 — skeleton)
//
// Communicates with the shell (automationManager.html) via:
//   - P.apiSend(path, method?, data?)  — relayed to a.html
//   - P.setTopbarButtons({...})        — request topbar button visibility
//   - P.firmData / P.fd*()             — available, unused this slice
//
// Lifecycle hooks on window: onShow, onHide, onSave, onDelete,
// onRefresh, onNew. init() is page-internal (boot via waitForShell).
//
// Slice scope: layout + list + selection + /meta cache + read-only
// detail. NO editors (3.3 = suppression editor, 3.4 = rule editor).
//
// EXECUTIONS layout: center full-width table (400+ rows), toolbar
// (status filter + limit + log-style windowed pager + "Showing N–M
// of T"), row click → right-hand drawer. Pager algorithm is PORTED
// from scripts.js renderLogPagination — the shell's copy isn't reachable
// from inside the iframe (P exposes only apiSend/firmData/setTopbarButtons/fd*).
// ═══════════════════════════════════════════════════════════════

const P = window.parent;

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function parseJson(val) {
  if (val === null || val === undefined || val === '') return null;
  if (typeof val === 'object') return val;
  try { return JSON.parse(val); } catch { return null; }
}
// Collapse/expand the supp/rules list sidebar. Driven by the topbar
// collapse button (which is hidden while Executions is active).
function eiToggleSidebar(btn) {
  const panel = document.getElementById('ei-sidebar');
  if (!panel) return;
  const collapsed = panel.classList.toggle('collapsed');
  btn.innerHTML = collapsed ? '<i class="fa-solid fa-angles-right"></i>' : '<i class="fa-solid fa-angles-left"></i>';
  btn.title = collapsed ? 'Expand list' : 'Collapse list';
}
window.eiToggleSidebar = eiToggleSidebar;

(function emailIngestModule() {
  const api = (...args) => P.apiSend(...args);
  const E = id => document.getElementById(id);
  const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2500 });

  const STATUS_META = {
    logged:               { label: 'Logged',           bg: '#dcfce7', fg: '#166534', dot: '#22c55e' },
    duplicate:            { label: 'Duplicate',         bg: '#f1f5f9', fg: '#475569', dot: '#94a3b8' },
    skipped_firm_to_firm: { label: 'Skip: firm→firm',   bg: '#dbeafe', fg: '#1e40af', dot: '#3b82f6' },
    skipped_suppression:  { label: 'Skip: suppressed',  bg: '#dbeafe', fg: '#1e40af', dot: '#3b82f6' },
    auth_failed:          { label: 'Auth failed',       bg: '#fef2f2', fg: '#991b1b', dot: '#ef4444' },
    validation_failed:    { label: 'Validation failed', bg: '#fef2f2', fg: '#991b1b', dot: '#ef4444' },
    error:                { label: 'Error',             bg: '#fef2f2', fg: '#991b1b', dot: '#ef4444' },
  };
  function statusMeta(s) {
    return STATUS_META[s] || { label: s || '—', bg: '#f1f5f9', fg: '#475569', dot: '#94a3b8' };
  }

  // ── State ──
  let subPageActive = false;
  let metaLoaded = false;
  let meta = {};

  let activeTab = 'suppressions';
  let selectedId = null;        // suppressions/rules sidebar selection

  const cache = {
    suppressions: { loaded: false, rows: [], filter: '' },
    rules:        { loaded: false, rows: [], filter: '' },
    // executions: offset/limit model (mirrors the log tab), total from server
    executions:   { loaded: false, rows: [], offset: 0, limit: 50, total: 0, status: '', selId: null },
  };

  // ── Suppression-editor form state ──
  // isNew: editor is open for a not-yet-saved record (onNew). When false and
  //   selectedId is set, the editor is editing an existing row (PUT on save).
  // editorOpen: an editor form is currently mounted in #ei-detail-body.
  // isDirty: any form input changed since load/save (drives discard guard).
  let editorState = { isNew: false, editorOpen: false, isDirty: false };

  // The available-fields catalog passed to the reusable match-builder.
  //
  // SERVER-OWNED (converged onto phone's pattern). The catalog formerly lived
  // here as a hardcoded EMAIL_MATCH_FIELDS const; it now comes from /meta
  // (meta.match_fields), so the server is the single source of truth and new
  // fields appear in the builder automatically with no UI change.
  //
  // SHAPE NOTE: meta.match_fields rows are { path, label, type } (email has no
  // `channels` — no sms/call split). The match-builder (field-agnostic) expects
  // { value, label }; matchFields() maps path→value. A verbatim pass-through
  // would render EMPTY field dropdowns — this map is load-bearing.
  //
  // ── matchFields() / FALLBACK_MATCH_FIELDS are KEPT IDENTICAL to phoneIngest.html
  //    (only the fallback CONTENTS differ — email vs phone fields). Any change to
  //    the mapping logic must be applied to BOTH pages. ──
  const FALLBACK_MATCH_FIELDS = [
    { value: 'from.email', label: 'From — email address' },
    { value: 'subject',    label: 'Subject' },
    { value: 'source',     label: 'Source (gmail-firm / siteground-php)' },
    { value: 'kind',       label: 'Kind (email)' },
  ];
  function matchFields() {
    const mf = meta && Array.isArray(meta.match_fields) ? meta.match_fields : null;
    if (!mf || !mf.length) return FALLBACK_MATCH_FIELDS;
    // map { path, label, type, channels } → { value, label } for the field-
    // agnostic match-builder (it renders a flat dropdown of {value,label}, so
    // we fold the channel/type teaching INTO the label rather than touching the
    // shared component). channels=['sms','call'] (both) gets no tag; a single-
    // channel field is tagged. (Email never has channels, so no channel tag —
    // the logic is identical to phone's so the two stay in lockstep.)
    return mf
      .filter(f => f && (f.path != null && f.path !== ''))
      .map(f => {
        const ch = Array.isArray(f.channels) ? f.channels : [];
        const tags = [];
        if (ch.length === 1) tags.push(ch[0]);          // 'sms' | 'call' only
        if (f.type && f.type !== 'string') tags.push(f.type); // surface non-string types
        const suffix = tags.length ? `  ·  ${tags.join(' · ')}` : '';
        return { value: String(f.path), label: (f.label || String(f.path)) + suffix };
      });
  }

  // ── SAMPLE-EVENT REFERENCE PANEL ────────────────────────────────────────
  // Field-discovery aid: a collapsible block under the match conditions that
  // pages through the newest-N real events, each projected to the match-field
  // catalog. Each field path is click-to-insert into the match builder —
  // INCLUDING absent fields (the catalog defines what's matchable, not whichever
  // sample is shown; an operator may be building a rule precisely to catch
  // events where a currently-absent field gains a value).
  //
  // ╔════════════════════════════════════════════════════════════════════════╗
  // ║ SHARED PANEL — KEPT BYTE-IDENTICAL across phoneIngest.html AND           ║
  // ║ emailIngest.html. The ONLY intended difference between the two copies is ║
  // ║ SAMPLE_ENDPOINT (below). Functions in this block (sampleCache,           ║
  // ║ loadSampleEvents, renderSamplePanelBody, mountSamplePanel,               ║
  // ║ insertConditionPath) + the .pi-sample* CSS must stay in sync. If you     ║
  // ║ change one page, change the other.                                       ║
  // ╚════════════════════════════════════════════════════════════════════════╝
  //
  // Server shape: { samples: [{ exec_id, type, ts, label, fields:[{path,label,
  // type,present,value}] }] }, newest first. `present` is key-chain existence:
  //   present:false            → "not present on this event" (still clickable)
  //   present:true, value:null → field exists but is empty → rendered as "null"
  const SAMPLE_ENDPOINT = '/api/email-ingest/sample-events';
  const sampleCache = { loaded: false, loading: null, samples: [], idx: 0 };

  async function loadSampleEvents() {
    if (sampleCache.loaded) return sampleCache.samples;
    if (sampleCache.loading) return sampleCache.loading;
    sampleCache.loading = (async () => {
      try {
        const data = await api(SAMPLE_ENDPOINT);
        sampleCache.samples = (data && Array.isArray(data.samples)) ? data.samples : [];
      } catch (e) {
        sampleCache.samples = []; // non-fatal — panel just shows an empty state
      }
      sampleCache.loaded = true;
      sampleCache.loading = null;
      sampleCache.idx = 0;
      return sampleCache.samples;
    })();
    return sampleCache.loading;
  }

  // Render the panel body for the current sample index into `bodyEl`.
  // `targetRootId` is the cond-root the field chips insert into.
  function renderSamplePanelBody(bodyEl, targetRootId) {
    const samples = sampleCache.samples;
    if (!samples.length) {
      bodyEl.innerHTML = `<div class="pi-sample-empty">No events captured yet — the field list in the builder above shows everything you can match on.</div>`;
      return;
    }
    if (sampleCache.idx < 0) sampleCache.idx = 0;
    if (sampleCache.idx > samples.length - 1) sampleCache.idx = samples.length - 1;
    const active = samples[sampleCache.idx];

    // Stepper: ‹ Prev   [n / total]  label   Next ›
    const atStart = sampleCache.idx === 0;
    const atEnd   = sampleCache.idx === samples.length - 1;
    const stepper =
      `<div class="pi-sample-stepper">
         <button type="button" class="pi-sample-nav" data-nav="prev" ${atStart ? 'disabled' : ''} title="Newer event"><i class="fa-solid fa-chevron-left"></i></button>
         <span class="pi-sample-pos">${sampleCache.idx + 1} / ${samples.length}</span>
         <span class="pi-sample-label" title="${esc(active.label || active.type || '')}">${esc(active.label || active.type || '')}</span>
         <button type="button" class="pi-sample-nav" data-nav="next" ${atEnd ? 'disabled' : ''} title="Older event"><i class="fa-solid fa-chevron-right"></i></button>
       </div>`;

    const rows = active.fields.map(f => {
      // Value display: absent → em-dash; genuine null → explicit "null"
      // (reads as "exists and is empty", distinct from missing); else the value.
      const valClass = (!f.present || f.value === null) ? 'pi-sample-val muted' : 'pi-sample-val';
      const valText  = !f.present ? '—'
                     : (f.value === null) ? 'null'
                     : (typeof f.value === 'boolean') ? String(f.value)
                     : String(f.value);
      const fieldCls = 'pi-sample-field' + (f.present ? '' : ' absent');
      const title    = f.present
        ? `Click to add a condition on ${esc(f.path)}`
        : `not present on this event — click to add a condition on ${esc(f.path)} anyway`;
      // Both present AND absent paths are click-to-insert (no .no-insert).
      return `<div class="${fieldCls}">
        <span class="pi-sample-path" data-path="${esc(f.path)}" title="${title}">${esc(f.path)}</span>
        <span class="${valClass}">${esc(valText)}</span></div>`;
    }).join('');

    bodyEl.innerHTML = `${stepper}<div class="pi-sample-grid">${rows}</div>`;

    // stepper nav
    bodyEl.querySelectorAll('.pi-sample-nav[data-nav]').forEach(b => {
      b.addEventListener('click', () => {
        if (b.disabled) return;
        sampleCache.idx += (b.getAttribute('data-nav') === 'next') ? 1 : -1;
        renderSamplePanelBody(bodyEl, targetRootId);
      });
    });
    // click-to-insert (present AND absent)
    bodyEl.querySelectorAll('.pi-sample-path[data-path]').forEach(p => {
      p.addEventListener('click', () => insertConditionPath(targetRootId, p.getAttribute('data-path')));
    });
  }

  // Mount the collapsible panel into `hostEl` (an empty container placed under
  // the cond-root) and lazy-load the samples.
  function mountSamplePanel(hostEl, targetRootId) {
    if (!hostEl) return;
    hostEl.innerHTML =
      `<div class="pi-sample collapsed" id="${targetRootId}-sample">
         <div class="pi-sample-head">
           <i class="fa-solid fa-chevron-down chev"></i>
           <span><i class="fa-solid fa-flask" style="margin-right:6px;color:var(--muted)"></i>Sample events &amp; available fields</span>
           <span class="pi-sample-hint">click a field to add a condition</span>
         </div>
         <div class="pi-sample-body"><div class="pi-sample-empty">Loading…</div></div>
       </div>`;
    const panel = hostEl.firstElementChild;
    const head  = panel.querySelector('.pi-sample-head');
    const body  = panel.querySelector('.pi-sample-body');
    head.addEventListener('click', () => panel.classList.toggle('collapsed'));
    loadSampleEvents().then(() => renderSamplePanelBody(body, targetRootId));
  }

  // Add a new condition row to the given cond-root, pre-set to `path`. Mirrors
  // the match-builder's own "+ Condition" by appending to the root group's
  // model and re-rendering via the component's stored config (mbRender re-run).
  function insertConditionPath(rootId, path) {
    const root = E(rootId);
    if (!root || !root._state) return;
    const grp = root._state;
    if (!Array.isArray(grp.conditions)) grp.conditions = [];
    // If the last row is a blank leaf, fill it instead of appending a new one.
    const last = grp.conditions[grp.conditions.length - 1];
    if (last && !last.operator && (last.path == null || last.path === '')) {
      last.path = path; last.op = last.op || 'equals';
    } else {
      grp.conditions.push({ path, op: 'equals', value: '' });
    }
    // re-render through the component's stored cfg (set by mbRender)
    const cfg = root._mbcfg || {};
    mbRender(root, grp, { availableFields: cfg.fields || matchFields(), operators: cfg.operators || meta.match_operators, onChange: cfg.onChange || (()=>{}) });
    if (cfg.onChange) cfg.onChange(); // mark dirty
    // scroll the new row into view
    const rows = root.querySelectorAll('.cond-row');
    if (rows.length && typeof rows[rows.length - 1].scrollIntoView === 'function') {
      rows[rows.length - 1].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  // ══════════════════════════════════════════════════════════════════════════
  // TEST-MATCH PANEL (Slice 10B) — evaluates the rule editor's CURRENT
  // (unsaved) match config against recent historical events via the Slice 10A
  // endpoint, which runs the PRODUCTION matcher. Suppression rules are NOT
  // applied server-side — this tests the rule layer only.
  //
  // ╔════════════════════════════════════════════════════════════════════════╗
  // ║ SHARED PANEL — KEPT BYTE-IDENTICAL across phoneIngest.html AND           ║
  // ║ emailIngest.html (same convention as the sample panel above). The ONLY   ║
  // ║ intended difference between the two copies is TM_ENDPOINT (below);       ║
  // ║ TM_IS_EMAIL and TM_EXEC_ENDPOINT — and thus every page-specific behavior ║
  // ║ (the email-only code-mode banner and fidelity badge) — derive from it.   ║
  // ║ Functions in this block (mountTestMatchPanel, tmRunFromEditor, tmSend,   ║
  // ║ tmRender*, tmOpenExecution) + the .tm-* CSS must stay in sync. If you    ║
  // ║ change one page, change the other.                                       ║
  // ╚════════════════════════════════════════════════════════════════════════╝
  //
  // Harvest REUSES the save path (collectRuleForm) — one harvest
  // implementation, so what gets tested is exactly what Save would persist.
  // Server shape (10C): { success, total, matched_count, unparseable_skipped?,
  // window_total?, truncated?, rows:[{ exec_id, ts, from, label, matched,
  // fidelity, status }] } — matches first (newest-first; oldest-first when
  // since anchors the window). since/until (10D) bound the range — the start
  // is required by this UI, the end optional; when include_misses, misses appended after
  // them. Corpus is scope 'wide' server-side (suppressed/skipped events
  // included, duplicates excluded); exec_id targets ONE execution (404 when
  // missing/unreconstructable). Rows with status != 'logged' get a badge —
  // "your rule matches, but this event was suppressed" is the diagnostic
  // payoff of the widened corpus.
  const TM_ENDPOINT = '/api/email-ingest/rules/test-match'; // ← the ONLY line differing between the two pages
  const TM_IS_EMAIL = TM_ENDPOINT.indexOf('email-ingest') !== -1;
  const TM_EXEC_ENDPOINT = TM_ENDPOINT.replace('/rules/test-match', '/executions');

  let tmLastRun = null; // { body, mode } — replayed by the Retry strip after a network/5xx failure

  // Mount the controls row + (initially hidden) collapsible results box into
  // `hostEl` (an empty div placed in the rule editor's Match section).
  function mountTestMatchPanel(hostEl) {
    if (!hostEl) return;
    hostEl.innerHTML = `
      <div class="tm-controls">
        <button type="button" class="btn btn-outline btn-sm" id="tm-run"><i class="fa-solid fa-vial"></i> Test conditions</button>
        <select class="tm-select" id="tm-window" title="Which recent events to test against">
          <option value="100" selected>Last 100 events</option>
          <option value="300">Last 300</option>
          <option value="since">Date range…</option>
          <option value="exec">Specific execution…</option>
        </select>
        <input type="datetime-local" class="tm-date hidden" id="tm-since" title="Start of the range (required)">
        <span class="tm-range-sep hidden" id="tm-range-sep">→</span>
        <input type="datetime-local" class="tm-date hidden" id="tm-until" title="End of the range (optional — leave empty for “until now”)">
        <input type="number" min="1" step="1" class="tm-date hidden" id="tm-exec" placeholder="execution #" title="Test against one specific execution by id">
        <label class="tm-check"><input type="checkbox" id="tm-misses"> include non-matching</label>
      </div>
      <div class="pi-sample collapsed hidden" id="tm-resbox" style="margin-top:8px">
        <div class="pi-sample-head">
          <i class="fa-solid fa-chevron-down chev"></i>
          <span><i class="fa-solid fa-vial" style="margin-right:6px;color:var(--muted)"></i>Test results</span>
          <span class="pi-sample-hint" id="tm-res-hint"></span>
        </div>
        <div class="pi-sample-body" id="tm-res-body"></div>
      </div>`;
    E('tm-window').addEventListener('change', () => {
      const w = E('tm-window').value;
      E('tm-since').classList.toggle('hidden', w !== 'since');
      E('tm-range-sep').classList.toggle('hidden', w !== 'since');
      E('tm-until').classList.toggle('hidden', w !== 'since');
      E('tm-exec').classList.toggle('hidden', w !== 'exec');
    });
    hostEl.querySelector('#tm-resbox .pi-sample-head')
      .addEventListener('click', () => E('tm-resbox').classList.toggle('collapsed'));
    E('tm-run').addEventListener('click', tmRunFromEditor);
    tmLastRun = null; // a stale run dies with the editor it was harvested from
  }

  // Harvest the editor's current state via the SAVE path and fire a test run.
  async function tmRunFromEditor() {
    // ── harvest (save-path reuse — do NOT reimplement the harvest) ──
    const payload = collectRuleForm();
    const mode = payload.match_mode;
    const cfg  = payload.match_config;

    // Untestable editor state → the same feedback Save gives, no server call.
    // (Conditions mode can't produce an unparseable config through the
    // builder; an EMPTY condition set is a legitimate always-match test and
    // is allowed through — the "N of N match" result is the feedback.)
    if (mode === 'code' && !String((cfg && cfg.code) || '').trim()) {
      Swal.fire({
        icon: 'warning', title: 'Empty match code',
        text: 'The match code is empty (it will never match) — nothing to test.',
      });
      return;
    }

    // ── window controls → request params ──
    const body = { match_mode: mode, match_config: cfg };
    const win = E('tm-window').value;
    if (win === 'exec') {
      const n = Number(E('tm-exec').value);
      if (!Number.isInteger(n) || n < 1) {
        Swal.fire({ icon: 'warning', title: 'Enter an execution #', text: 'Give the id of the execution to test against (a positive whole number).' });
        return;
      }
      body.exec_id = n;
      // Always include the row so the verdict is visible either way — a
      // non-matching single target with misses hidden would render as an
      // empty "0 of 1" with no row to look at.
      body.include_misses = true;
      tmSend(body, mode);
      return;
    }
    if (win === 'since') {
      const since = E('tm-since').value;
      if (!since) {
        Swal.fire({ icon: 'warning', title: 'Pick a start date', text: 'Choose the date to test from. The end date is optional.' });
        return;
      }
      const until = E('tm-until').value;
      if (until && new Date(until).getTime() < new Date(since).getTime()) {
        Swal.fire({ icon: 'warning', title: 'Range is backwards', text: 'The end date is before the start date.' });
        return;
      }
      body.since = since;
      if (until) body.until = until; // omitted = "until now"
      body.limit = 300; // window stays capped even with a wide range
    } else {
      body.limit = Number(win); // 100 | 300
    }
    if (E('tm-misses').checked) body.include_misses = true;

    tmSend(body, mode);
  }

  async function tmSend(body, mode) {
    tmLastRun = { body, mode };
    const box = E('tm-resbox');
    box.classList.remove('hidden');
    box.classList.remove('collapsed');
    E('tm-res-hint').textContent = '';
    E('tm-res-body').innerHTML = `<div class="tm-empty"><i class="fa-solid fa-spinner spin"></i> Testing against recent events…</div>`;
    try {
      const data = await api(TM_ENDPOINT, 'POST', body);
      tmRenderResults(data, mode);
    } catch (e) {
      // 400 = config rejected; 404 = exec_id target missing/unreconstructable.
      // Both are verbatim, non-retryable renders (same input can't succeed).
      if (e && (e.status === 400 || e.status === 404)) tmRenderBadRequest(e);
      else tmRenderNetError(e);
    }
  }

  function tmBanners(mode) {
    let h = '';
    if (TM_IS_EMAIL && mode === 'code') {
      h += `<div class="tm-banner"><i class="fa-solid fa-circle-info" style="margin-right:5px"></i>Code runs against reconstructed events — fields outside the match catalog are missing on most rows.</div>`;
    }
    h += `<div class="tm-banner"><i class="fa-solid fa-circle-info" style="margin-right:5px"></i>Suppression rules are not applied — this tests rule matching only.</div>`;
    return h;
  }

  function tmTs(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    if (isNaN(d.getTime())) return String(ts);
    return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function tmRow(r) {
    const fid = (TM_IS_EMAIL && r.fidelity === 'reconstructed')
      ? `<span class="tm-fid" title="4 raw-only fields absent on this row: from.name, kind, list_id, in_reply_to">reconstructed</span>`
      : '';
    // Non-logged executions get a status chip — the rule can match an event
    // the pipeline suppressed/skipped; that context is the point.
    const st = (r.status && r.status !== 'logged')
      ? `<span class="tm-status" title="execution status: ${esc(r.status)}">${esc(r.status)}</span>`
      : '';
    const clickable = r.exec_id != null;
    return `<div class="tm-row${r.matched ? '' : ' miss'}${clickable ? ' clickable' : ''}"${clickable ? ` data-exec="${esc(String(r.exec_id))}" title="Open execution #${esc(String(r.exec_id))}"` : ''}>
      <span class="tm-ts">${esc(tmTs(r.ts))}</span>
      <span class="tm-from" title="${esc(r.from == null ? '' : String(r.from))}">${r.from == null ? '<span class="pi-sample-val muted">—</span>' : esc(String(r.from))}</span>
      <span class="tm-label" title="${esc(r.label || '')}">${esc(r.label || '')}</span>
      ${st}
      ${fid}
      ${clickable ? `<button type="button" class="tm-tf" data-tf="${esc(String(r.exec_id))}" title="Test transform against event #${esc(String(r.exec_id))}"><i class="fa-solid fa-shuffle"></i></button>` : ''}
    </div>`;
  }

  function tmRenderResults(data, mode) {
    const total   = Number((data && data.total) || 0);
    const matchN  = Number((data && data.matched_count) || 0);
    const rows    = (data && Array.isArray(data.rows)) ? data.rows : [];
    const skipped = Number((data && data.unparseable_skipped) || 0);

    const matches = rows.filter(r => r.matched);
    const misses  = rows.filter(r => !r.matched);

    // since-anchored windows report truncation: the range held window_total
    // rows but only the first `total` (oldest-first) were evaluated.
    let trunc = '';
    if (data && data.truncated && tmLastRun && tmLastRun.body && tmLastRun.body.since) {
      const s = esc(String(tmLastRun.body.since).replace('T', ' '));
      const u = tmLastRun.body.until ? esc(String(tmLastRun.body.until).replace('T', ' ')) : '';
      trunc = u
        ? ` · first ${total} of ${Number(data.window_total)} between ${s} and ${u} — narrow the range`
        : ` · first ${total} of ${Number(data.window_total)} since ${s} — narrow the range`;
    }
    const head = `<div class="tm-head">${matchN} of ${total} recent events match${skipped > 0 ? ` · ${skipped} unparseable skipped` : ''}${trunc}</div>`;

    let bodyRows = '';
    if (matches.length) {
      bodyRows += `<div class="tm-rows">${matches.map(tmRow).join('')}</div>`;
    } else {
      bodyRows += `<div class="tm-empty">${total ? 'No matching events in this window.' : 'No events captured in this window — nothing to test against.'}</div>`;
    }
    if (misses.length) {
      bodyRows += `<div class="tm-divider">non-matching (${misses.length})</div><div class="tm-rows">${misses.map(tmRow).join('')}</div>`;
    }

    const bodyEl = E('tm-res-body');
    bodyEl.innerHTML = tmBanners(mode) + head + bodyRows;
    E('tm-res-hint').textContent = `${matchN} / ${total}`;

    // Row → execution drawer (reuses the page's existing drawer plumbing).
    bodyEl.querySelectorAll('.tm-row[data-exec]').forEach(el => {
      el.addEventListener('click', () => tmOpenExecution(el.getAttribute('data-exec')));
    });
    // Shuffle button → run the editor's CURRENT (unsaved) transform against
    // that one event (test-transform). stopPropagation keeps the row's
    // open-drawer click from also firing.
    bodyEl.querySelectorAll('.tm-tf[data-tf]').forEach(el => {
      el.addEventListener('click', (ev) => { ev.stopPropagation(); ttRunForExec(el.getAttribute('data-tf')); });
    });
  }

  function tmRenderBadRequest(e) {
    // 400 = the config itself was rejected (e.g. "code does not compile: …").
    // Rendered verbatim, no Retry — rerunning the same config can't succeed.
    E('tm-res-body').innerHTML = tmBanners(tmLastRun ? tmLastRun.mode : '') +
      `<div class="tm-err"><i class="fa-solid fa-triangle-exclamation"></i> ${esc((e && e.message) || 'The server rejected the test request.')}</div>`;
    E('tm-res-hint').textContent = 'error';
  }

  function tmRenderNetError(e) {
    E('tm-res-body').innerHTML =
      `<div class="tm-err"><i class="fa-solid fa-triangle-exclamation"></i> ${esc((e && e.message) || 'Request failed')} <button type="button" class="btn btn-outline btn-sm" id="tm-retry">Retry</button></div>`;
    E('tm-res-hint').textContent = 'error';
    const btn = E('tm-retry');
    if (btn) btn.addEventListener('click', () => { if (tmLastRun) tmSend(tmLastRun.body, tmLastRun.mode); });
  }

  // Open the executions drawer for one tested row. Reuses openDrawer +
  // renderExecutionDrawer directly — unlike selectExecution, this does NOT
  // touch cache.executions or re-render the executions table (the user is on
  // the Rules tab; the drawer is a page-level overlay).
  async function tmOpenExecution(id) {
    openDrawer(`Execution #${id}`, `<div class="text-muted"><i class="fa-solid fa-spinner spin"></i> Loading…</div>`);
    try {
      const data = await api(`${TM_EXEC_ENDPOINT}/${id}`);
      const exec   = (data && data.execution) ? data.execution : (data || {});
      const linked = (data && data.linked) ? data.linked : {};
      renderExecutionDrawer(exec, linked);
    } catch (e) {
      openDrawer(`Execution #${id}`,
        `<div class="tm-err"><i class="fa-solid fa-triangle-exclamation"></i> ${esc((e && e.message) || 'Failed to load execution')}</div>`);
    }
  }

  // ── test-transform (per test-match row) — kept in sync across emailIngest.html/phoneIngest.html ──
  //
  // Harvest REUSES the save path (collectRuleForm) — what gets tested is
  // exactly the transform Save would persist, unsaved edits included. The
  // event is sourced server-side by exec_id through the SAME fetcher
  // test-match uses, and the transform runs through the PRODUCTION runner
  // (ruleService._runTransform), so a failure here is exactly the failure
  // the rule would log live ("actions skipped").
  //
  // Saved internal_function actions (incl. the Forward pseudo-type, which is
  // stored as internal_function) ride along as params_mappings — the server
  // resolves each against the transform output with the '$'-aware resolver
  // live dispatch uses. Unsaved action-editor edits are NOT included: actions
  // are save-first by design, so the loop is save action → test a row.
  const TT_ENDPOINT = TM_ENDPOINT.replace('/rules/test-match', '/rules/test-transform');

  function ttPre(v) {
    return `<pre style="background:var(--navy);color:#e2e8f0;padding:10px;border-radius:6px;font-size:11px;max-height:260px;overflow:auto;text-align:left;white-space:pre-wrap;word-break:break-word;margin:6px 0 0">${esc(JSON.stringify(v, null, 2))}</pre>`;
  }

  async function ttRunForExec(execId) {
    const payload = collectRuleForm();
    const body = {
      transform_mode:   payload.transform_mode,
      transform_config: payload.transform_config,
      exec_id:          Number(execId),
    };
    const pms = (ruleForm.actions || [])
      .filter(a => a.active !== 0 && a.action_type === 'internal_function')
      .map(a => {
        const cfg = parseJson(a.config) || {};
        if (!cfg.params_mapping || typeof cfg.params_mapping !== 'object') return null;
        return { label: `action #${a.id} — ${cfg.function_name || 'internal_function'}`, mapping: cfg.params_mapping };
      })
      .filter(Boolean)
      .slice(0, 20);
    if (pms.length) body.params_mappings = pms;

    Swal.fire({
      title: `Transform test — event #${esc(String(execId))}`,
      html: '<div style="padding:16px;text-align:left"><i class="fa-solid fa-spinner spin"></i> Running…</div>',
      showConfirmButton: false, allowOutsideClick: false, width: 720,
    });
    try {
      const data = await api(TT_ENDPOINT, 'POST', body);
      ttRenderModal(execId, data, payload.transform_mode);
    } catch (e) {
      Swal.fire({ icon: 'error', title: 'Transform test failed', text: (e && e.message) || 'Request failed' });
    }
  }

  function ttRenderModal(execId, data, mode) {
    const t = (data && data.transform) || {};
    let h = `<div style="text-align:left;font-size:12px">`;
    h += `<div style="margin-bottom:6px;color:var(--muted)">mode: <code>${esc(mode || 'passthrough')}</code>${mode === 'passthrough' ? ' — output = input' : ''}</div>`;
    // Reconstructed rows (email >16KB at capture — the raw envelope was
    // truncated) are rebuilt from clean DB columns: `to` is a flat string
    // (live it's an array of {email,name}) and text/html/headers.all are
    // unavailable. Say so, or missing transform output looks like a bug.
    if (data && data.source && data.source.fidelity === 'reconstructed') {
      h += `<div style="background:#fffbeb;border:1px solid #fde68a;color:#78350f;border-radius:6px;padding:8px 10px;margin-bottom:8px">
        <i class="fa-solid fa-triangle-exclamation"></i> <strong>Reconstructed event</strong> — the raw envelope was truncated at capture (large email).
        Only catalog fields were rebuilt: <code>to</code> is a flat string here (live it's an array — <code>to.0.email</code> won't resolve), and
        <code>text</code> / <code>html</code> / <code>headers.all</code> are unavailable. Transform output may be missing fields that WOULD resolve live.
      </div>`;
    }
    if (t.ok) {
      h += `<div style="font-weight:600">Transform output</div>${ttPre(t.output)}`;
    } else {
      h += `<div style="color:#b91c1c;font-weight:600"><i class="fa-solid fa-triangle-exclamation"></i> Transform failed — the rule would NOT fire its actions on this event</div>` +
           `<div style="margin-top:4px;color:#b91c1c">${esc(t.error || '')}</div>`;
    }
    if (Array.isArray(data && data.resolved_params) && data.resolved_params.length) {
      h += `<div style="font-weight:600;margin-top:12px">Resolved params (saved actions)</div>`;
      for (const rp of data.resolved_params) {
        h += `<div style="margin-top:6px;color:var(--muted)">${esc(rp.label || '')}</div>${ttPre(rp.params)}`;
      }
    }
    h += `<details style="margin-top:12px"><summary style="cursor:pointer;font-weight:600">Input event</summary>${ttPre(data && data.input)}</details>`;
    h += `</div>`;
    Swal.fire({ title: `Transform test — event #${esc(String(execId))}`, html: h, width: 720, confirmButtonText: 'Close' });
  }

  // Fallback operator list — mirrors hooks.html's hardcoded 15 operators,
  // used when meta.match_operators is unavailable (same failure posture as 3.2).
  const FALLBACK_OPERATORS = [
    'equals','not_equals','contains','not_contains','starts_with','ends_with',
    'gt','gte','lt','lte','exists','not_exists','in','not_in','matches',
  ];
  // Operators that take NO value input (value box hidden/disabled).
  const VALUELESS_OPS = new Set(['exists','not_exists']);

  // ════════════════════════════════════════════════════════════════
  // META
  // ════════════════════════════════════════════════════════════════
  async function loadMeta() {
    if (metaLoaded) return;
    try {
      meta = await api('/api/email-ingest/meta') || {};
      metaLoaded = true;
    } catch (e) {
      console.warn('[email-ingest] meta load failed:', e.message);
      meta = {};
    }
    populateStatusFilter();
  }
  function populateStatusFilter() {
    const sel = E('ei-status-filter');
    const statuses = (Array.isArray(meta.execution_statuses) && meta.execution_statuses.length)
      ? meta.execution_statuses
      : Object.keys(STATUS_META);
    const opts = statuses.map(s => {
      const val = (typeof s === 'object') ? (s.value ?? '') : s;
      const lbl = (typeof s === 'object') ? (s.label ?? s.value ?? '') : statusMeta(s).label;
      return `<option value="${esc(val)}">${esc(lbl)}</option>`;
    }).join('');
    sel.innerHTML = `<option value="">All</option>${opts}`;
    sel.value = cache.executions.status || '';
  }

  // ════════════════════════════════════════════════════════════════
  // INTERNAL TAB SWITCHING
  // ════════════════════════════════════════════════════════════════
  async function eiSwitchTab(tab) {
    if (tab === activeTab) return;
    // Guard unsaved edits (suppression OR rule) before navigating away.
    if ((activeTab === 'suppressions' || activeTab === 'rules') && !(await confirmDiscardIfDirty())) return;
    closeEditor();
    activeTab = tab;
    selectedId = null;
    const isExec = tab === 'executions';

    // Toggle the two layouts
    E('ei-suprules').classList.toggle('hidden', isExec);
    E('ei-exec-surface').classList.toggle('active', isExec);

    // Single switcher (in the fixed topbar)
    ['suppressions','rules','executions'].forEach(t => {
      E(`ei-tab-${t}`)?.classList.toggle('active', t === tab);
    });
