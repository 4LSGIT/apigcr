<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Ingest</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* ══════════════════════════════════════════════
       EMAIL INGEST SUB-PAGE — self-contained styles.
       Tokens + base layout duplicated from hooks.html.

       SLICE 3.2 = skeleton: three internal tabs (Suppressions /
       Rules / Executions), list rendering, selection, /meta cache,
       READ-ONLY detail. No editors — those are 3.3 / 3.4.

       LAYOUT: Suppressions & Rules use the three-panel idiom (left
       list + right read-only detail). Executions is a special case —
       a center full-width table (the list can be 400+ rows), with a
       toolbar (status filter + limit + log-style pager) and a
       right-hand slide-over DRAWER for per-row detail. The sidebar is
       hidden while the Executions tab is active.
       ══════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1a1a2e;
      --navy2:   #16213e;
      --blue:    #4f8ef7;
      --blue2:   #3a7de8;
      --green:   #22c55e;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --purple:  #8b5cf6;
      --bg:      #f1f5f9;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --muted:   #94a3b8;
      --text:    #1e293b;
      --text2:   #475569;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Internal-tab bar — fixed, full-width, ABOVE the content row.
       Single source of truth for the Suppressions/Rules/Executions
       switch; doesn't move when the layout below it changes. ── */
    .ei-topbar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .ei-topbar .ei-topbar-collapse {
      margin-left: auto;
      background: none; border: 1px solid var(--border); border-radius: 5px;
      color: var(--muted); cursor: pointer; padding: 5px 9px; font-size: 12px;
      transition: all 0.12s;
    }
    .ei-topbar .ei-topbar-collapse:hover { color: var(--text); background: var(--bg); }
    .ei-topbar .ei-topbar-collapse.hidden { display: none; }

    /* content row sits below the topbar */
    .ei-content { flex: 1; display: flex; overflow: hidden; min-height: 0; }

    /* ── Button family (duplicated from shell) ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px; border: none;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue2); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-outline { background: var(--bg); border: 1px solid var(--border); color: var(--text2); }
    .btn-outline:hover { background: var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spin { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Single internal-tab switcher (lives in the fixed topbar) ── */
    .ei-tab {
      flex: 0 0 auto; padding: 7px 14px; border: none; cursor: pointer;
      background: var(--bg); color: var(--text2);
      box-shadow: inset 0 0 0 1px var(--border);
      font-size: 12px; font-weight: 600; border-radius: 6px;
      transition: all 0.12s; white-space: nowrap;
      display: inline-flex; flex-direction: row; align-items: center; gap: 6px;
    }
    .ei-tab i { font-size: 13px; }
    .ei-tab:hover { color: var(--text); background: var(--border); }
    .ei-tab.active {
      color: var(--blue); background: rgba(79,142,247,0.08);
      box-shadow: inset 0 0 0 1px var(--blue);
    }

    /* ── Supp/Rules content host (left list + right detail) ── */
    .three-panel { flex: 1; overflow: hidden; display: flex; }

    .panel-left {
      width: 280px; min-width: 280px;
      background: var(--navy2);
      display: flex; flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
      transition: width 0.15s, min-width 0.15s;
    }
    /* Hide the sidebar entirely on the Executions tab */
    .panel-left.exec-mode { display: none; }
    /* Collapsed = fully hidden (detail pane reclaims the space). The
       re-expand control is the topbar collapse button. */
    .panel-left.collapsed { display: none; }

    .panel-left-head {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 6px;
    }
    .panel-left-head .ph-title {
      flex: 1; color: rgba(255,255,255,0.85); font-size: 12px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .panel-left-tools {
      padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .ei-tool-input {
      width: 100%; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px; padding: 5px 9px;
      color: #fff; font-size: 12px; outline: none;
    }
    .ei-tool-input::placeholder { color: rgba(255,255,255,0.3); }
    .ei-tool-input:focus { border-color: var(--blue); }

    .panel-left-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .panel-left-loading { padding: 16px; color: rgba(255,255,255,0.3); font-size: 12px; }
    .panel-left-empty { padding: 20px 12px; color: rgba(255,255,255,0.3); font-size: 12px; text-align: center; }
    .panel-left-error { padding: 16px; color: #f87171; font-size: 12px; }

    .left-item {
      padding: 9px 12px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.12s;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .left-item:hover { background: rgba(255,255,255,0.05); }
    .left-item.active { border-left-color: var(--blue); background: rgba(79,142,247,0.1); }
    .left-item-name {
      color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 6px;
    }
    .left-item.active .left-item-name { color: #fff; }
    .left-item-meta {
      color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 3px;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .left-item-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
    .badge-active   { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-inactive { background: rgba(239,68,68,0.15); color: #f87171; }

    /* ── Right detail area (suppressions / rules) ── */
    .ei-detail-area {
      flex: 1; display: flex; flex-direction: column;
      background: var(--bg); overflow: hidden; min-width: 0;
    }
    .ei-detail-head {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 16px; height: 46px; display: flex; align-items: center;
      flex-shrink: 0; gap: 10px;
    }
    .ei-detail-title {
      font-size: 15px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ei-detail-subtitle { font-size: 12px; color: var(--muted); font-weight: 500; }
    .ei-detail-body { flex: 1; overflow-y: auto; padding: 20px; min-height: 0; }

    /* ══ EXECUTIONS CENTER SURFACE ══ */
    .exec-surface {
      display: none; flex: 1; flex-direction: column;
      background: var(--bg); min-width: 0; overflow: hidden;
    }
    .exec-surface.active { display: flex; }

    .exec-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .exec-toolbar {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      padding: 10px 14px;
    }
    .exec-toolbar .tb-group { display: flex; align-items: center; gap: 6px; }
    .exec-toolbar label {
      font-size: 11px; font-weight: 600; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .exec-toolbar select {
      padding: 5px 8px; font-size: 12px; border: 1px solid var(--border);
      border-radius: 5px; background: #fff; color: var(--text); cursor: pointer;
    }
    .exec-toolbar select:focus { outline: none; border-color: var(--blue); }
    .exec-toolbar .tb-spacer { flex: 1; }

    .exec-body { flex: 1; overflow: auto; min-height: 0; }

    /* Executions table */
    .exec-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .exec-table thead th {
      position: sticky; top: 0; z-index: 1;
      text-align: left; padding: 9px 14px;
      background: var(--bg); font-weight: 600; color: var(--text2);
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .exec-table tbody td {
      padding: 9px 14px; border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .exec-table tbody tr { cursor: pointer; transition: background 0.1s; }
    .exec-table tbody tr:hover { background: #eef2f7; }
    .exec-table tbody tr.active { background: rgba(79,142,247,0.1); box-shadow: inset 3px 0 0 var(--blue); }
    .exec-empty, .exec-loading, .exec-error {
      padding: 40px 16px; text-align: center; color: var(--muted); font-size: 13px;
    }
    .exec-error { color: var(--red); }

    .col-created { white-space: nowrap; color: var(--text2); }
    .col-source  { color: var(--text2); }
    .col-msgid   { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Footer (pagination strip — ported from scripts.js log idiom) */
    .exec-footer {
      flex-shrink: 0; background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 14px; display: flex; align-items: center;
      gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--text2);
    }
    .exec-footer .sep { color: var(--border); margin: 0 2px; }
    .log-pagination { display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .log-pagination a {
      color: var(--blue); text-decoration: none; padding: 2px 7px;
      border-radius: 4px; font-size: 12px;
    }
    .log-pagination a:hover { background: rgba(79,142,247,0.1); }
    .log-pagination strong {
      padding: 2px 8px; border-radius: 4px; background: var(--blue);
      color: #fff; font-size: 12px;
    }
    .log-pagination-ellipsis { color: var(--muted); padding: 0 2px; }
    .log-pagination .logPageInput {
      width: 48px; padding: 2px 4px; font-size: 12px; text-align: center;
      border: 1px solid var(--blue); border-radius: 4px;
    }

    /* Status chips */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; vertical-align: middle; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 9px; border-radius: 10px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
    }

    /* ══════════════════════════════════════════════════════════════
       MATCH-BUILDER (reusable condition-tree component, lifted from
       hooks.html and namespaced .mb-* / .cond-* so 3.4 + a future
       phone-ingest UI can reuse it unchanged). The component is
       config-driven: fields + operators are passed in at render time.
       ══════════════════════════════════════════════════════════════ */
    .cond-group {
      border: 1px solid var(--border); border-radius: 6px;
      padding: 10px; margin-bottom: 8px; background: #fafbfc;
    }
    .cond-group-head {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .cond-group-head select {
      padding: 4px 8px; font-size: 11px;
      border: 1px solid var(--border); border-radius: 4px; font-weight: 600;
      background: #fff; color: var(--text);
    }
    .cond-group-head .cond-group-hint { font-size: 12px; color: var(--muted); }
    .cond-row {
      display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: wrap;
    }
    .cond-row input,
    .cond-row select {
      padding: 5px 8px; font-size: 12px;
      border: 1px solid var(--border); border-radius: 4px;
      background: #fff; color: var(--text);
    }
    .cond-row input:focus,
    .cond-row select:focus { outline: none; border-color: var(--blue); }
    .cond-field        { flex: 2; min-width: 150px; }
    .cond-path-custom  { flex: 2; min-width: 130px; }
    .cond-op           { width: 130px; }
    .cond-value        { flex: 2; min-width: 110px; }
    .cond-value[disabled] { background: var(--bg); color: var(--muted); }

    .mb-add-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      flex: 1; margin: 0; padding: 5px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text2); font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.12s;
    }
    .mb-add-btn:hover { background: var(--border); color: var(--text); }
    .cond-remove {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 6px; font-size: 13px; line-height: 1;
    }
    .cond-remove:hover { color: var(--red); }

    /* ══ SUPPRESSION EDITOR FORM ══ */
    .ei-form { max-width: 720px; }
    .ei-form-row { margin-bottom: 16px; }
    .ei-form-row label.ei-label {
      display: block; font-size: 11px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .ei-input, .ei-textarea, .ei-select {
      width: 100%; padding: 8px 10px; font-size: 13px;
      border: 1px solid var(--border); border-radius: 6px;
      background: #fff; color: var(--text); font-family: inherit;
    }
    .ei-input:focus, .ei-textarea:focus, .ei-select:focus { outline: none; border-color: var(--blue); }
    .ei-textarea { resize: vertical; min-height: 72px; }
    .ei-code-textarea {
      min-height: 200px; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px; line-height: 1.5;
    }
    .ei-field-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .ei-toggle-line { display: flex; align-items: center; gap: 8px; }
    .ei-toggle-line input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
    .ei-toggle-line span { font-size: 13px; color: var(--text); }
    .ei-meta-card {
      background: #fff; border: 1px solid var(--border); border-radius: 8px;
      padding: 0; margin-top: 20px; overflow: hidden;
    }

    /* ── Read-only detail cards (suppressions/rules detail + drawer) ── */
    .ei-placeholder-banner {
      display: flex; align-items: center; gap: 8px;
      background: #fffbeb; border: 1px solid #fde68a; color: #92400e;
      border-radius: 6px; padding: 8px 12px; font-size: 12px; margin-bottom: 16px;
    }
    .kv-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 8px; padding: 0; margin-bottom: 14px; overflow: hidden;
    }
    .kv-card-head {
      padding: 9px 14px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text2);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .kv-row {
      display: flex; gap: 12px; padding: 8px 14px;
      border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .kv-row:last-child { border-bottom: none; }
    .kv-key {
      width: 150px; min-width: 150px; color: var(--text2);
      font-weight: 600; font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.4px; padding-top: 1px;
    }
    .kv-val { flex: 1; min-width: 0; color: var(--text); word-break: break-word; }
    .kv-val.null { color: var(--muted); font-style: italic; }

    pre.json {
      background: var(--navy); color: #e2e8f0; padding: 12px;
      border-radius: 6px; font-size: 12px; overflow: auto;
      white-space: pre-wrap; word-break: break-word;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; margin: 0;
    }

    .action-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; margin-bottom: 10px;
    }
    .action-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .action-type-pill {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
      background: #e0e7ff; color: #3730a3; text-transform: uppercase; letter-spacing: 0.4px;
    }

    /* No-selection placeholder (suppressions/rules right pane) */
    #ei-no-selection {
      display: flex; flex: 1; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); gap: 4px; text-align: center;
    }
    #ei-no-selection i { font-size: 42px; opacity: 0.2; }

    /* ══ DRAWER (execution detail) ══ */
    .drawer-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,0.45);
      opacity: 0; pointer-events: none; transition: opacity 0.18s; z-index: 40;
    }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; right: 0; height: 100vh;
      width: 520px; max-width: 92vw;
      background: var(--bg); box-shadow: -8px 0 24px rgba(0,0,0,0.18);
      transform: translateX(100%); transition: transform 0.2s ease;
      z-index: 41; display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      flex-shrink: 0; background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px; height: 52px; display: flex; align-items: center; gap: 10px;
    }
    .drawer-title { font-size: 15px; font-weight: 700; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drawer-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 4px 8px; border-radius: 5px; transition: all 0.12s;
    }
    .drawer-close:hover { background: var(--bg); color: var(--text); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 18px; min-height: 0; }

    .mono { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; }
    .text-muted { color: var(--muted); }
    .hidden { display: none !important; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Fixed internal-tab bar (single switcher, always on top) ── -->
<div class="ei-topbar">
  <button class="ei-tab active" id="ei-tab-suppressions" onclick="eiSwitchTab('suppressions')">
    <i class="fa-solid fa-filter-circle-xmark"></i> <span>Suppressions</span>
  </button>
  <button class="ei-tab" id="ei-tab-rules" onclick="eiSwitchTab('rules')">
    <i class="fa-solid fa-diagram-project"></i> <span>Rules</span>
  </button>
  <button class="ei-tab" id="ei-tab-executions" onclick="eiSwitchTab('executions')">
    <i class="fa-solid fa-list-check"></i> <span>Executions</span>
  </button>
  <!-- collapse toggle for the supp/rules sidebar; hidden in exec-mode -->
  <button class="ei-topbar-collapse" id="ei-collapse-btn" onclick="eiToggleSidebar(this)" title="Collapse list">
    <i class="fa-solid fa-angles-left"></i>
  </button>
</div>

<div class="ei-content">

  <!-- ── Left panel (suppressions / rules). Hidden in exec-mode. ── -->
  <div class="three-panel" id="ei-suprules">
    <div class="panel-left" id="ei-sidebar">

      <div class="panel-left-head">
        <span class="ph-title" id="ei-panel-title">Suppressions</span>
      </div>

      <div class="panel-left-tools">
        <input class="ei-tool-input" id="ei-search" placeholder="Search suppressions…"
               oninput="eiFilterList(this.value)">
      </div>

      <div class="panel-left-list" id="ei-list">
        <div class="panel-left-loading">Loading…</div>
      </div>

    </div>

    <!-- ── Right detail area (suppressions / rules read-only) ── -->
    <div class="ei-detail-area" id="ei-detail-area">
      <div id="ei-no-selection">
        <i class="fa-solid fa-envelope-open-text"></i>
        <p style="font-size:14px;font-weight:500;margin:6px 0 0">Select a record to inspect</p>
        <p style="font-size:12px">Suppressions and rules — read-only for now</p>
      </div>
      <div id="ei-detail-wrap" style="display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden">
        <div class="ei-detail-head">
          <span class="ei-detail-title" id="ei-detail-title">—</span>
          <span class="ei-detail-subtitle" id="ei-detail-subtitle"></span>
        </div>
        <div class="ei-detail-body" id="ei-detail-body"></div>
      </div>
    </div>
  </div>

  <!-- ── Executions center surface (full-width; sidebar hidden) ── -->
  <div class="exec-surface" id="ei-exec-surface">

    <div class="exec-header">
      <div class="exec-toolbar">
        <div class="tb-group">
          <label>Status</label>
          <select id="ei-status-filter" onchange="eiStatusFilterChanged(this.value)">
            <option value="">All</option>
          </select>
        </div>
        <div class="tb-group">
          <label>Limit</label>
          <select id="ei-limit" onchange="eiLimitChanged(this.value)">
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="500">500</option>
          </select>
        </div>
        <div class="tb-spacer"></div>
      </div>
    </div>

    <div class="exec-body" id="ei-exec-body">
      <div class="exec-loading">Loading…</div>
    </div>

    <div class="exec-footer" id="ei-exec-footer" style="display:none"></div>
  </div>

</div>

<!-- ── Drawer (execution detail) ── -->
<div class="drawer-backdrop" id="ei-drawer-backdrop" onclick="eiCloseDrawer()"></div>
<div class="drawer" id="ei-drawer" role="dialog" aria-modal="true" aria-label="Execution detail">
  <div class="drawer-head">
    <span class="drawer-title" id="ei-drawer-title">Execution</span>
    <button class="drawer-close" onclick="eiCloseDrawer()" title="Close (Esc)"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="drawer-body" id="ei-drawer-body"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// EMAIL INGEST SUB-PAGE  (Phase 3.2 — skeleton)
//
// Communicates with the shell (automationManager.html) via:
//   - P.apiSend(path, method?, data?)  — relayed to a.html
//   - P.setTopbarButtons({...})        — request topbar button visibility
//   - P.firmData / P.fd*()             — available, unused this slice
//
// Lifecycle hooks on window: onShow, onHide, onSave, onDelete,
// onRefresh, onNew. init() is page-internal (boot via waitForShell).
//
// Slice scope: layout + list + selection + /meta cache + read-only
// detail. NO editors (3.3 = suppression editor, 3.4 = rule editor).
//
// EXECUTIONS layout: center full-width table (400+ rows), toolbar
// (status filter + limit + log-style windowed pager + "Showing N–M
// of T"), row click → right-hand drawer. Pager algorithm is PORTED
// from scripts.js renderLogPagination — the shell's copy isn't reachable
// from inside the iframe (P exposes only apiSend/firmData/setTopbarButtons/fd*).
// ═══════════════════════════════════════════════════════════════

const P = window.parent;

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function parseJson(val) {
  if (val === null || val === undefined || val === '') return null;
  if (typeof val === 'object') return val;
  try { return JSON.parse(val); } catch { return null; }
}
// Collapse/expand the supp/rules list sidebar. Driven by the topbar
// collapse button (which is hidden while Executions is active).
function eiToggleSidebar(btn) {
  const panel = document.getElementById('ei-sidebar');
  if (!panel) return;
  const collapsed = panel.classList.toggle('collapsed');
  btn.innerHTML = collapsed ? '<i class="fa-solid fa-angles-right"></i>' : '<i class="fa-solid fa-angles-left"></i>';
  btn.title = collapsed ? 'Expand list' : 'Collapse list';
}
window.eiToggleSidebar = eiToggleSidebar;

(function emailIngestModule() {
  const api = (...args) => P.apiSend(...args);
  const E = id => document.getElementById(id);
  const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2500 });

  const STATUS_META = {
    logged:               { label: 'Logged',           bg: '#dcfce7', fg: '#166534', dot: '#22c55e' },
    duplicate:            { label: 'Duplicate',         bg: '#f1f5f9', fg: '#475569', dot: '#94a3b8' },
    skipped_firm_to_firm: { label: 'Skip: firm→firm',   bg: '#dbeafe', fg: '#1e40af', dot: '#3b82f6' },
    skipped_suppression:  { label: 'Skip: suppressed',  bg: '#dbeafe', fg: '#1e40af', dot: '#3b82f6' },
    auth_failed:          { label: 'Auth failed',       bg: '#fef2f2', fg: '#991b1b', dot: '#ef4444' },
    validation_failed:    { label: 'Validation failed', bg: '#fef2f2', fg: '#991b1b', dot: '#ef4444' },
    error:                { label: 'Error',             bg: '#fef2f2', fg: '#991b1b', dot: '#ef4444' },
  };
  function statusMeta(s) {
    return STATUS_META[s] || { label: s || '—', bg: '#f1f5f9', fg: '#475569', dot: '#94a3b8' };
  }

  // ── State ──
  let subPageActive = false;
  let metaLoaded = false;
  let meta = {};

  let activeTab = 'suppressions';
  let selectedId = null;        // suppressions/rules sidebar selection

  const cache = {
    suppressions: { loaded: false, rows: [], filter: '' },
    rules:        { loaded: false, rows: [], filter: '' },
    // executions: offset/limit model (mirrors the log tab), total from server
    executions:   { loaded: false, rows: [], offset: 0, limit: 50, total: 0, status: '', selId: null },
  };

  // ── Suppression-editor form state ──
  // isNew: editor is open for a not-yet-saved record (onNew). When false and
  //   selectedId is set, the editor is editing an existing row (PUT on save).
  // editorOpen: an editor form is currently mounted in #ei-detail-body.
  // isDirty: any form input changed since load/save (drives discard guard).
  let editorState = { isNew: false, editorOpen: false, isDirty: false };

  // The available-fields catalog passed to the reusable match-builder.
  // This lives in the EMAIL page; phone-ingest will define its own
  // PHONE_MATCH_FIELDS and pass that instead. The component itself knows
  // nothing about email — fields are an argument, not baked in.
  const EMAIL_MATCH_FIELDS = [
    { value: 'from.email',          label: 'From — email address' },
    { value: 'from.name',           label: 'From — display name' },
    { value: 'to',                  label: 'To (raw)' },
    { value: 'subject',             label: 'Subject' },
    { value: 'kind',                label: 'Kind (email)' },
    { value: 'source',              label: 'Source (gmail-firm / siteground-php)' },
    { value: 'headers.message_id',  label: 'Header — Message-ID' },
    { value: 'headers.list_id',     label: 'Header — List-ID' },
    { value: 'headers.in_reply_to', label: 'Header — In-Reply-To' },
    { value: 'auth.spf',            label: 'Auth — SPF result' },
    { value: 'auth.dkim',           label: 'Auth — DKIM result' },
    { value: 'auth.dmarc',          label: 'Auth — DMARC result' },
  ];

  // Fallback operator list — mirrors hooks.html's hardcoded 15 operators,
  // used when meta.match_operators is unavailable (same failure posture as 3.2).
  const FALLBACK_OPERATORS = [
    'equals','not_equals','contains','not_contains','starts_with','ends_with',
    'gt','gte','lt','lte','exists','not_exists','in','not_in','matches',
  ];
  // Operators that take NO value input (value box hidden/disabled).
  const VALUELESS_OPS = new Set(['exists','not_exists']);

  // ════════════════════════════════════════════════════════════════
  // META
  // ════════════════════════════════════════════════════════════════
  async function loadMeta() {
    if (metaLoaded) return;
    try {
      meta = await api('/api/email-ingest/meta') || {};
      metaLoaded = true;
    } catch (e) {
      console.warn('[email-ingest] meta load failed:', e.message);
      meta = {};
    }
    populateStatusFilter();
  }
  function populateStatusFilter() {
    const sel = E('ei-status-filter');
    const statuses = (Array.isArray(meta.execution_statuses) && meta.execution_statuses.length)
      ? meta.execution_statuses
      : Object.keys(STATUS_META);
    const opts = statuses.map(s => {
      const val = (typeof s === 'object') ? (s.value ?? '') : s;
      const lbl = (typeof s === 'object') ? (s.label ?? s.value ?? '') : statusMeta(s).label;
      return `<option value="${esc(val)}">${esc(lbl)}</option>`;
    }).join('');
    sel.innerHTML = `<option value="">All</option>${opts}`;
    sel.value = cache.executions.status || '';
  }

  // ════════════════════════════════════════════════════════════════
  // INTERNAL TAB SWITCHING
  // ════════════════════════════════════════════════════════════════
  async function eiSwitchTab(tab) {
    if (tab === activeTab) return;
    // Guard unsaved suppression edits before navigating away.
    if (activeTab === 'suppressions' && !(await confirmDiscardIfDirty())) return;
    closeEditor();
    activeTab = tab;
    selectedId = null;
    const isExec = tab === 'executions';

    // Toggle the two layouts
    E('ei-suprules').classList.toggle('hidden', isExec);
    E('ei-exec-surface').classList.toggle('active', isExec);

    // Single switcher (in the fixed topbar)
    ['suppressions','rules','executions'].forEach(t => {
      E(`ei-tab-${t}`)?.classList.toggle('active', t === tab);
    });

    // Collapse toggle only applies to the supp/rules sidebar
    E('ei-collapse-btn').classList.toggle('hidden', isExec);

    if (!isExec) {
      E('ei-panel-title').textContent = tab === 'suppressions' ? 'Suppressions' : 'Rules';
      E('ei-search').placeholder = tab === 'suppressions' ? 'Search suppressions…' : 'Search rules…';
      E('ei-search').value = cache[tab].filter || '';
      clearDetail();
    } else {
      eiCloseDrawer();
    }

    updateTopbarButtons();
    loadActiveTab();
  }
  window.eiSwitchTab = eiSwitchTab;

  async function loadActiveTab(force = false) {
    if (activeTab === 'suppressions') return loadSuppressions(force);
    if (activeTab === 'rules')        return loadRules(force);
    if (activeTab === 'executions')   return loadExecutions(force);
  }

  // ════════════════════════════════════════════════════════════════
  // REUSABLE MATCH-BUILDER COMPONENT  (namespaced mb*)
  //
  // Lifted from hooks.html's conditions-builder and made config-driven:
  // fields + operators are passed in at render time, so the same code
  // serves the suppression editor (3.3), the rule editor (3.4), and a
  // future phone-ingest UI. Zero email-specific logic lives here.
  //
  // Public interface:
  //   mbRender(rootEl, state, opts)  — render a condition tree; mutates `state` live.
  //     opts.availableFields : [{ value, label }]  (curated dropdown; '__custom__' escape hatch auto-added)
  //     opts.operators       : [{ value, label }]  (from meta.match_operators; falls back internally)
  //   mbCollect(rootEl)              — harvest current DOM → { operator, conditions }
  //
  // Handlers are bound via addEventListener inside the build functions
  // (no inline onclick / no globals), keeping the IIFE clean.
  // ════════════════════════════════════════════════════════════════
  const MB_CUSTOM = '__custom__';

  // Normalize an operators arg ([{value,label}] or ['equals',...] or undefined)
  // into a stable [{value,label}] list, falling back to FALLBACK_OPERATORS.
  function mbNormalizeOperators(operators) {
    let list = Array.isArray(operators) && operators.length ? operators : FALLBACK_OPERATORS;
    return list.map(o => {
      if (typeof o === 'object' && o) {
        const value = o.value ?? o.op ?? '';
        return { value, label: o.label ?? String(value).replace(/_/g, ' ') };
      }
      return { value: o, label: String(o).replace(/_/g, ' ') };
    });
  }

  // Render a match-builder into rootEl. `state` is the {operator, conditions}
  // tree and is mutated live as the user edits. opts carries the field catalog
  // and operator list (both injected — the reusability contract).
  function mbRender(rootEl, state, opts) {
    if (!rootEl) return;
    const cfg = {
      fields:    (opts && opts.availableFields) || [],
      operators: mbNormalizeOperators(opts && opts.operators),
      onChange:  (opts && typeof opts.onChange === 'function') ? opts.onChange : function () {},
    };
    rootEl.classList.add('cond-root');
    rootEl._state = state;
    rootEl._mbcfg = cfg;        // stash config so re-renders after mutation reuse it
    rootEl.innerHTML = '';
    rootEl.appendChild(mbBuildGroup(state, true, cfg));
  }

  // Re-render the nearest containing match-builder root after a structural
  // mutation (add/remove condition or group). Reuses the stashed config.
  function mbRerenderRoot(el) {
    const root = el.closest('.cond-root');
    if (root && root._state) mbRender(root, root._state, { availableFields: root._mbcfg.fields, operators: root._mbcfg.operators, onChange: root._mbcfg.onChange });
  }

  function mbBuildGroup(group, isRoot, cfg) {
    const div = document.createElement('div');
    div.className = 'cond-group';
    div._group = group;

    // head: AND/OR selector + hint + (remove, if subgroup)
    const head = document.createElement('div');
    head.className = 'cond-group-head';
    const opSel = document.createElement('select');
    opSel.innerHTML = `
      <option value="and" ${group.operator === 'and' ? 'selected' : ''}>AND</option>
      <option value="or"  ${group.operator === 'or'  ? 'selected' : ''}>OR</option>`;
    opSel.addEventListener('change', e => { group.operator = e.target.value; cfg.onChange(); });
    head.appendChild(opSel);
    const hint = document.createElement('span');
    hint.className = 'cond-group-hint';
    hint.textContent = group.operator === 'or' ? 'Any condition may match' : 'All conditions must match';
    opSel.addEventListener('change', () => { hint.textContent = group.operator === 'or' ? 'Any condition may match' : 'All conditions must match'; });
    head.appendChild(hint);
    if (!isRoot) {
      const rm = document.createElement('button');
      rm.className = 'cond-remove'; rm.title = 'Remove group';
      rm.innerHTML = '<i class="fa-solid fa-times"></i>';
      rm.addEventListener('click', () => { div.remove(); cfg.onChange(); });
      head.appendChild(rm);
    }
    div.appendChild(head);

    // body: child leaves + subgroups
    const body = document.createElement('div');
    body.className = 'cond-group-body';
    (group.conditions || []).forEach(cond => {
      if (cond && cond.operator) body.appendChild(mbBuildGroup(cond, false, cfg));
      else body.appendChild(mbBuildLeaf(cond, cfg));
    });
    div.appendChild(body);

    // foot: add-condition / add-group
    const foot = document.createElement('div');
    foot.style.cssText = 'display:flex;gap:6px;margin-top:6px';
    foot._group = group;
    const addC = document.createElement('button');
    addC.className = 'mb-add-btn';
    addC.innerHTML = '<i class="fa-solid fa-plus"></i> Condition';
    addC.addEventListener('click', () => { group.conditions = group.conditions || []; group.conditions.push({ path: '', op: 'equals', value: '' }); cfg.onChange(); mbRerenderRoot(addC); });
    const addG = document.createElement('button');
    addG.className = 'mb-add-btn';
    addG.innerHTML = '<i class="fa-solid fa-layer-group"></i> Group';
    addG.addEventListener('click', () => { group.conditions = group.conditions || []; group.conditions.push({ operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] }); cfg.onChange(); mbRerenderRoot(addG); });
    foot.appendChild(addC); foot.appendChild(addG);
    div.appendChild(foot);

    return div;
  }

  // A single condition row: curated field dropdown (+ custom escape hatch),
  // operator dropdown (injected list), value input (hidden for valueless ops).
  function mbBuildLeaf(cond, cfg) {
    const row = document.createElement('div');
    row.className = 'cond-row';
    row._cond = cond;
    const curPath = cond.path || '';
    const known = cfg.fields.some(f => f.value === curPath);
    const startCustom = curPath !== '' && !known;

    // field <select>
    const fieldSel = document.createElement('select');
    fieldSel.className = 'cond-field';
    fieldSel.innerHTML =
      cfg.fields.map(f => `<option value="${esc(f.value)}" ${(!startCustom && f.value === curPath) ? 'selected' : ''}>${esc(f.label)}</option>`).join('') +
      `<option value="${MB_CUSTOM}" ${startCustom ? 'selected' : ''}>Custom path…</option>`;
    // if path is empty and there are fields, default the model to the first field
    if (!startCustom && curPath === '' && cfg.fields.length) { cond.path = cfg.fields[0].value; fieldSel.value = cfg.fields[0].value; }
    row.appendChild(fieldSel);

    // custom-path free-text input (shown only in custom mode)
    const customInput = document.createElement('input');
    customInput.className = 'cond-path-custom';
    customInput.placeholder = 'custom.path';
    customInput.value = startCustom ? curPath : '';
    customInput.style.display = startCustom ? '' : 'none';
    row.appendChild(customInput);

    // operator <select> (injected list)
    const opSel = document.createElement('select');
    opSel.className = 'cond-op';
    opSel.innerHTML = cfg.operators.map(o => `<option value="${esc(o.value)}" ${cond.op === o.value ? 'selected' : ''}>${esc(o.label)}</option>`).join('');
    if (!cond.op) cond.op = cfg.operators[0]?.value || 'equals';
    row.appendChild(opSel);

    // value input
    const valInput = document.createElement('input');
    valInput.className = 'cond-value';
    valInput.placeholder = 'value';
    valInput.value = cond.value ?? '';
    row.appendChild(valInput);

    // remove button
    const rm = document.createElement('button');
    rm.className = 'cond-remove'; rm.title = 'Remove';
    rm.innerHTML = '<i class="fa-solid fa-times"></i>';
    row.appendChild(rm);

    // ── wiring ──
    const syncValueDisabled = () => {
      const off = VALUELESS_OPS.has(opSel.value);
      valInput.disabled = off;
      valInput.style.display = off ? 'none' : '';
      if (off) { cond.value = ''; valInput.value = ''; }
    };
    const syncPath = () => {
      if (fieldSel.value === MB_CUSTOM) {
        customInput.style.display = '';
        cond.path = customInput.value.trim();
      } else {
        customInput.style.display = 'none';
        cond.path = fieldSel.value;
      }
    };
    fieldSel.addEventListener('change', () => { syncPath(); cfg.onChange(); });
    customInput.addEventListener('input', () => { cond.path = customInput.value.trim(); cfg.onChange(); });
    opSel.addEventListener('change', () => { cond.op = opSel.value; syncValueDisabled(); cfg.onChange(); });
    valInput.addEventListener('input', () => { cond.value = valInput.value; cfg.onChange(); });
    rm.addEventListener('click', () => { row.remove(); cfg.onChange(); });

    syncValueDisabled();
    return row;
  }

  // Harvest the live DOM back into a { operator, conditions } object. This is
  // the authoritative save-time read (the live-mutated state can drift if a row
  // was removed). Reads field from .cond-field (or .cond-path-custom when the
  // field select is on the custom escape hatch). Valueless ops emit no value.
  function mbCollect(rootEl) {
    if (!rootEl) return { operator: 'and', conditions: [] };
    const top = rootEl.querySelector(':scope > .cond-group') || rootEl.querySelector('.cond-group');
    return mbCollectGroup(top);
  }
  function mbCollectGroup(groupEl) {
    if (!groupEl) return { operator: 'and', conditions: [] };
    const operator = groupEl.querySelector(':scope > .cond-group-head select')?.value || 'and';
    const body = groupEl.querySelector(':scope > .cond-group-body');
    const conditions = [];
    if (body) {
      for (const child of body.children) {
        if (child.classList.contains('cond-group')) {
          conditions.push(mbCollectGroup(child));
        } else if (child.classList.contains('cond-row')) {
          const fieldSel = child.querySelector('.cond-field');
          const customInput = child.querySelector('.cond-path-custom');
          const path = (fieldSel && fieldSel.value === MB_CUSTOM)
            ? (customInput?.value?.trim() || '')
            : (fieldSel?.value || '');
          const op = child.querySelector('.cond-op')?.value;
          if (!path || !op) continue;        // drop incomplete rows
          const cond = { path, op };
          if (!VALUELESS_OPS.has(op)) cond.value = child.querySelector('.cond-value')?.value ?? '';
          conditions.push(cond);
        }
      }
    }
    return { operator, conditions };
  }

  // ════════════════════════════════════════════════════════════════
  // SUPPRESSIONS  (sidebar list + right detail)
  // ════════════════════════════════════════════════════════════════
  async function loadSuppressions(force = false) {
    const c = cache.suppressions;
    if (c.loaded && !force) { renderSuppressionList(); return; }
    setSidebarLoading();
    try {
      const data = await api('/api/email-ingest/suppressions');
      c.rows = (data && data.suppressions) || [];
      c.loaded = true;
      renderSuppressionList();
    } catch (e) { setSidebarError(e.message); }
  }
  function renderSuppressionList() {
    const c = cache.suppressions;
    const q = (c.filter || '').toLowerCase();
    const rows = q ? c.rows.filter(r => (r.name||'').toLowerCase().includes(q) || (r.description||'').toLowerCase().includes(q)) : c.rows;
    if (!rows.length) { setSidebarEmpty('No suppressions.'); return; }
    E('ei-list').innerHTML = rows.map(r => `
      <div class="left-item${r.id === selectedId ? ' active' : ''}" onclick="eiSelect(${r.id})">
        <div class="left-item-name">${esc(r.name)}
          <span class="left-item-badge ${r.active ? 'badge-active' : 'badge-inactive'}">${r.active ? 'ON' : 'OFF'}</span>
        </div>
        <div class="left-item-meta"><span>${esc(r.match_mode || '')}</span><span>matched ${Number(r.match_count||0)}×</span></div>
      </div>`).join('');
  }
  async function selectSuppression(id) {
    let row = cache.suppressions.rows.find(r => r.id === id);
    try {
      const data = await api(`/api/email-ingest/suppressions/${id}`);
      row = (data && data.suppression) ? data.suppression : (data || row);
    } catch (e) { /* keep cached */ }
    if (!row) { Toast.fire({ icon:'error', title:'Suppression not found' }); return; }
    selectedId = id;
    editorState = { isNew: false, editorOpen: true, isDirty: false };
    renderSuppressionList();
    renderSuppressionDetail(row);
    updateTopbarButtons();
  }

  // Renders the EDITABLE suppression form into #ei-detail-body (Slice 3.3).
  // Same name + call site as the old read-only placeholder. For a new record,
  // pass a seeded blank row and set editorState.isNew=true before calling.
  function renderSuppressionDetail(r) {
    const isNew = editorState.isNew;
    setDetailHead(isNew ? 'New suppression' : (r.name || `Suppression #${r.id}`),
                  isNew ? 'unsaved' : `#${r.id} · suppression`);

    const modes = (Array.isArray(meta.match_modes) && meta.match_modes.length)
      ? meta.match_modes.map(m => (typeof m === 'object' ? (m.value ?? '') : m))
      : ['conditions', 'code'];
    const mode = r.match_mode || 'conditions';

    // Seed the live condition-tree state for the match-builder. Harvest at save
    // time reads the DOM (mbCollect), so this object only needs to seed render.
    const mc = parseJson(r.match_config);
    let condState;
    if (mode === 'conditions') {
      condState = (mc && mc.operator) ? mc : { operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] };
    } else {
      condState = { operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] };
    }
    // code-mode prefill: {code:'...'} or a bare string
    const codeStr = (mode === 'code')
      ? (typeof mc === 'string' ? mc : (mc && typeof mc.code === 'string' ? mc.code : ''))
      : '';

    const modeOpts = modes.map(m => `<option value="${esc(m)}" ${m === mode ? 'selected' : ''}>${esc(m)}</option>`).join('');

    E('ei-detail-body').innerHTML = `
      <div class="ei-form">
        <div class="ei-form-row">
          <label class="ei-label" for="sup-name">Name <span style="color:var(--red)">*</span></label>
          <input class="ei-input" id="sup-name" maxlength="255" placeholder="e.g. Court emails (uscourts.gov)" value="${esc(r.name || '')}">
        </div>
        <div class="ei-form-row">
          <label class="ei-label" for="sup-desc">Description</label>
          <textarea class="ei-textarea" id="sup-desc" placeholder="Optional notes about what this suppresses">${esc(r.description || '')}</textarea>
        </div>
        <div class="ei-form-row">
          <label class="ei-label">Active</label>
          <label class="ei-toggle-line">
            <input type="checkbox" id="sup-active" ${(r.active ?? 1) ? 'checked' : ''}>
            <span>When on, matching emails are suppressed (not logged).</span>
          </label>
        </div>
        <div class="ei-form-row">
          <label class="ei-label" for="sup-mode">Match mode</label>
          <select class="ei-select" id="sup-mode">${modeOpts}</select>
        </div>

        <div class="ei-form-row" id="sup-cond-wrap">
          <label class="ei-label">Match conditions</label>
          <div id="sup-cond-root"></div>
        </div>

        <div class="ei-form-row" id="sup-code-wrap">
          <label class="ei-label" for="sup-code">Match code</label>
          <textarea class="ei-textarea ei-code-textarea" id="sup-code" placeholder="// return truthy to suppress">${esc(codeStr)}</textarea>
          <div class="ei-field-hint">Receives the email envelope as <code>input</code>. Return truthy to suppress.</div>
        </div>
      </div>
      ${isNew ? '' : suppressionMetaCard(r)}
    `;

    // mount the reusable match-builder
    const root = E('sup-cond-root');
    mbRender(root, condState, { availableFields: EMAIL_MATCH_FIELDS, operators: meta.match_operators, onChange: markDirty });

    // mode toggle (mirror hooks.html toggleFilterMode pattern)
    const applyMode = () => {
      const m = E('sup-mode').value;
      E('sup-cond-wrap').classList.toggle('hidden', m !== 'conditions');
      E('sup-code-wrap').classList.toggle('hidden', m !== 'code');
    };
    E('sup-mode').addEventListener('change', () => { applyMode(); markDirty(); });
    applyMode();

    // dirty tracking on the scalar fields (match-builder marks dirty itself)
    ['sup-name','sup-desc','sup-code'].forEach(id => E(id).addEventListener('input', markDirty));
    E('sup-active').addEventListener('change', markDirty);
  }

  function suppressionMetaCard(r) {
    const rows = [
      ['Match count', String(r.match_count ?? 0)],
      ['Last matched', fmtDateOrNull(r.last_matched_at)],
      ['Last modified by', r.last_modified_by != null ? esc(String(r.last_modified_by)) : nullSpan('—')],
      ['Created', fmtDateOrNull(r.created_at)],
      ['Updated', fmtDateOrNull(r.updated_at)],
    ];
    const body = rows.map(([k, v]) => `<div class="kv-row"><div class="kv-key">${esc(k)}</div><div class="kv-val">${v}</div></div>`).join('');
    return `<div class="ei-meta-card"><div class="kv-card-head">Metadata (read-only)</div>${body}</div>`;
  }

  function markDirty() { editorState.isDirty = true; }

  // Harvest the suppression form into a payload for POST/PUT.
  function collectSuppressionForm() {
    const name = E('sup-name').value.trim();
    const description = E('sup-desc').value;
    const active = E('sup-active').checked ? 1 : 0;
    const match_mode = E('sup-mode').value;
    let match_config;
    if (match_mode === 'code') {
      match_config = { code: E('sup-code').value };
    } else {
      match_config = mbCollect(E('sup-cond-root'));
    }
    return { name, description, active, match_mode, match_config };
  }

  // Guard against silently losing edits when navigating away from a dirty form.
  // Returns a promise<boolean>: true = proceed, false = stay.
  async function confirmDiscardIfDirty() {
    if (!(editorState.editorOpen && editorState.isDirty)) return true;
    const res = await Swal.fire({
      icon: 'warning', title: 'Discard unsaved changes?',
      text: 'You have unsaved edits to this suppression.',
      showCancelButton: true, confirmButtonText: 'Discard', cancelButtonText: 'Keep editing',
      confirmButtonColor: '#ef4444',
    });
    return !!res.isConfirmed;
  }

  function closeEditor() { editorState = { isNew: false, editorOpen: false, isDirty: false }; }

    const c = cache.rules;

    const rows = q ? c.rows.filter(r => (r.name||'').toLowerCase().includes(q) || (r.description||'').toLowerCase().includes(q)) : c.rows;
    if (!rows.length) { setSidebarEmpty('No rules.'); return; }
    E('ei-list').innerHTML = rows.map(r => {
      const n = Array.isArray(r.actions) ? r.actions.length : (r.action_count ?? 0);

    let row = cache.rules.rows.find(r => r.id === id);

      if (data && data.rule) { row = data.rule; if (!row.actions && Array.isArray(data.actions)) row.actions = data.actions; }

  // EXECUTIONS  (center table + drawer)
  // ════════════════════════════════════════════════════════════════
  async function loadExecutions(force = false) {
    const c = cache.executions;
    if (c.loaded && !force) { renderExecutionTable(); return; }
    E('ei-exec-body').innerHTML = `<div class="exec-loading"><i class="fa-solid fa-spinner spin"></i> Loading…</div>`;
    E('ei-exec-footer').style.display = 'none';
    try {
      const params = new URLSearchParams({ page: String(Math.floor(c.offset / c.limit) + 1), page_size: String(c.limit) });
      if (c.status) params.set('status', c.status);
      const data = await api(`/api/email-ingest/executions?${params.toString()}`);
      c.rows = (data && data.executions) || [];
      // Reconcile from the server's own paging echo so the UI reflects
      // what we actually got (handles a server-side page_size cap).
      const srvPageSize = Number(data?.page_size ?? c.limit);
      const srvPage     = Number(data?.page ?? (Math.floor(c.offset / c.limit) + 1));
      c.limit  = srvPageSize > 0 ? srvPageSize : c.limit;
      c.offset = (srvPage - 1) * c.limit;
      c.total  = Number(data?.total ?? c.rows.length);
      c.loaded = true;
      // keep the limit dropdown honest if the server clamped it
      if (E('ei-limit') && String(c.limit) !== E('ei-limit').value &&
          [...E('ei-limit').options].some(o => o.value === String(c.limit))) {
        E('ei-limit').value = String(c.limit);
      }
      renderExecutionTable();
    } catch (e) {
      E('ei-exec-body').innerHTML = `<div class="exec-error">${esc(e.message)}</div>`;
    }
  }

        const sm = statusMeta(r.status);

          <tr class="${r.id === c.selId ? 'active' : ''}" onclick="eiSelect(${r.id})">

            <td><span class="status-badge" style="background:${sm.bg};color:${sm.fg}"><span class="status-dot" style="background:${sm.dot}"></span>${esc(sm.label)}</span></td>
            <td class="col-source">${esc(src)}</td>
            <td class="col-msgid mono" title="${esc(r.message_id || '')}">${esc(r.message_id || '(none)')}</td>
            <td style="text-align:center">${matched ? '<i class="fa-solid fa-bullseye" title="Matched rule(s)" style="color:#16a34a"></i>' : '<span class="text-muted">—</span>'}</td>
          </tr>`;

      E('ei-exec-body').innerHTML = `
        <table class="exec-table">
          <thead><tr>
            <th style="width:160px">Created</th>
            <th style="width:150px">Status</th>
            <th style="width:160px">Source</th>
            <th>Message ID</th>
            <th style="width:70px;text-align:center">Match</th>

          <tbody>${rowsHtml}</tbody>

  // Footer: ported log-style windowed pager + "Showing N–M of T".
  function renderExecFooter() {
    const c = cache.executions;
    const foot = E('ei-exec-footer');
    foot.style.display = 'flex';
    foot.innerHTML = '';

    const pagWrap = document.createElement('span');
    pagWrap.className = 'log-pagination';
    foot.appendChild(pagWrap);
    renderLogPagination(pagWrap, c.total, c.limit, c.offset, (p) => eiJumpPage(p));

    const shownStart = c.total === 0 ? 0 : c.offset + 1;
    const shownEnd = Math.min(c.total, c.offset + c.rows.length);
    const metaSpan = document.createElement('span');
    metaSpan.innerHTML = `<span class="sep">|</span> Showing ${shownStart}–${shownEnd} of ${c.total}`;
    foot.appendChild(metaSpan);
  }

  // jumpFn: 1-based page → offset, re-fetch
  function eiJumpPage(p) {
    const c = cache.executions;
    const totalPages = Math.max(1, Math.ceil(c.total / c.limit));
    p = Math.max(1, Math.min(totalPages, p));
    c.offset = (p - 1) * c.limit;
    c.loaded = false;
    loadExecutions(true);
  }

  // ════════════════════════════════════════════════════════════════
  // PORTED PAGER — renderLogPagination (from scripts.js, May 2026).
  // Verbatim algorithm: ≤7 pages = list all; >7 = {1,2 … cur±2 … last-1,
  // last} with a number input on the current page. jumpFn = 1-based page.
  // ════════════════════════════════════════════════════════════════
  function renderLogPagination(containerEl, total, limit, offset, jumpFn) {
    containerEl.innerHTML = '';
    if (!total || total < 0) total = 0;
    if (!limit || limit < 1) limit = 1;
    const totalPages = Math.max(1, Math.ceil(total / limit));
    const current = Math.min(totalPages, Math.max(1, Math.floor(offset / limit) + 1));
    const parts = [];

    if (totalPages <= 7) {
      for (let i = 1; i <= totalPages; i++) {
        parts.push(i === current ? `<strong>${i}</strong>` : `<a href="#" data-page="${i}">${i}</a>`);
      }
    } else {
      const pages = new Set([1, 2, totalPages - 1, totalPages]);
      for (let p = current - 2; p <= current + 2; p++) if (p >= 1 && p <= totalPages) pages.add(p);
      const sorted = [...pages].sort((a, b) => a - b);
      let prev = 0;
      for (const p of sorted) {
        if (prev && p > prev + 1) parts.push(`<span class="log-pagination-ellipsis">…</span>`);
        if (p === current) {
          parts.push(`<input type="number" min="1" max="${totalPages}" value="${current}" class="logPageInput" aria-label="Jump to page">`);
        } else {
          parts.push(`<a href="#" data-page="${p}">${p}</a>`);
        }
        prev = p;
      }
    }
    containerEl.innerHTML = parts.join(' ');

    containerEl.querySelectorAll('a[data-page]').forEach(a => {
      a.addEventListener('click', (ev) => {
        ev.preventDefault();
        const p = parseInt(a.getAttribute('data-page'), 10);
        if (!isNaN(p)) jumpFn(p);
      });
    });
    const input = containerEl.querySelector('.logPageInput');
    if (input) {
      const submit = () => {
        let p = parseInt(input.value, 10);
        if (isNaN(p)) { input.value = current; return; }
        p = Math.max(1, Math.min(totalPages, p));
        if (p !== current) jumpFn(p); else input.value = current;
      };
      input.addEventListener('keypress', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); submit(); } });
      input.addEventListener('blur', submit);
      input.addEventListener('focus', () => input.select());
    }
  }

  // ════════════════════════════════════════════════════════════════

  // ════════════════════════════════════════════════════════════════
  async function eiSelect(id) {
    if (activeTab === 'executions') return selectExecution(id);
    // Don't re-select the row already open in the editor (avoids clobbering edits).
    if (activeTab === 'suppressions' && editorState.editorOpen && !editorState.isNew && id === selectedId) return;
    if (activeTab === 'suppressions' && !(await confirmDiscardIfDirty())) return;
    showDetail();
    if (activeTab === 'suppressions') return selectSuppression(id);
    if (activeTab === 'rules')        return selectRule(id);
  }

    if (activeTab === 'executions') return;

    else if (activeTab === 'rules')   renderRuleList();
  }

  function showDetail() { E('ei-no-selection').style.display = 'none'; E('ei-detail-wrap').style.display = 'flex'; }
  function clearDetail() { closeEditor(); E('ei-detail-wrap').style.display = 'none'; E('ei-no-selection').style.display = ''; E('ei-detail-body').innerHTML = ''; }
  function setDetailHead(t, s) { E('ei-detail-title').textContent = t; E('ei-detail-subtitle').textContent = s || ''; }
  function setSidebarLoading() { E('ei-list').innerHTML = `<div class="panel-left-loading">Loading…</div>`; }
  function setSidebarEmpty(m) { E('ei-list').innerHTML = `<div class="panel-left-empty">${esc(m)}</div>`; }
  function setSidebarError(m) { E('ei-list').innerHTML = `<div class="panel-left-error">${esc(m)}</div>`; }

  function placeholderBanner(t) { return `<div class="ei-placeholder-banner"><i class="fa-solid fa-circle-info"></i> ${esc(t)}</div>`; }
  function kvCard(title, rows) {
    const body = rows.map(([k, v]) => `<div class="kv-row"><div class="kv-key">${esc(k)}</div><div class="kv-val">${v}</div></div>`).join('');
    return `<div class="kv-card"><div class="kv-card-head">${esc(title)}</div>${body}</div>`;
  }
  function jsonCard(title, raw) {
    const obj = parseJson(raw);
    const body = (obj === null)
      ? `<div style="padding:12px 14px;color:var(--muted);font-style:italic;font-size:13px">null</div>`
      : `<div style="padding:12px 14px"><pre class="json">${esc(prettyJson(obj))}</pre></div>`;
    return `<div class="kv-card"><div class="kv-card-head">${esc(title)}</div>${body}</div>`;
  }
  function activeBadge(v) {
    return `<span class="left-item-badge" style="color:${v ? '#166534':'#991b1b'};background:${v ? '#dcfce7':'#fef2f2'}">${v ? 'ON':'OFF'}</span>`;
  }
  function nullSpan(t) { return `<span class="kv-val null">${esc(t)}</span>`; }
  function prettyJson(raw) {
    const obj = parseJson(raw);
    if (obj === null) return 'null';
    try { return JSON.stringify(obj, null, 2); } catch { return String(raw); }
  }
  function fmtDate(d) { if (!d) return '—'; const dt = new Date(d); return isNaN(dt.getTime()) ? String(d) : dt.toLocaleString(); }
  function fmtDateOrNull(d) { return d ? esc(fmtDate(d)) : nullSpan('—'); }

  // TOPBAR BUTTON STATE
  //   Executions: Refresh only.
  //   Rules: Refresh + New (editor ships in 3.4).
  //   Suppressions: Refresh + New always; Save when the editor is open;
  //     Delete only when editing an existing record (hidden for a new one).
  // ════════════════════════════════════════════════════════════════
  function updateTopbarButtons() {
    if (!subPageActive) return;
    if (activeTab === 'executions') {
      P.setTopbarButtons({ refresh: true, new: false, save: false, delete: false });
      return;
    }
    if (activeTab === 'suppressions') {
      const open = editorState.editorOpen;
      P.setTopbarButtons({
        refresh: true, new: true,
        save: open,
        delete: open && !editorState.isNew,
      });
      return;
    }
    // rules (3.4 placeholder behavior, unchanged from 3.2)
    P.setTopbarButtons({ refresh: true, new: true, save: false, delete: false });
  }

  // ════════════════════════════════════════════════════════════════
  function init() {
    subPageActive = true;
    updateTopbarButtons();
    loadMeta();
    loadActiveTab();
  }
  function onShow() { subPageActive = true; updateTopbarButtons(); }
  function onHide() { subPageActive = false; }

  async function onSave() {
    if (activeTab !== 'suppressions' || !editorState.editorOpen) return; // rules = 3.4 no-op
    const payload = collectSuppressionForm();

    // hard validation
    if (!payload.name) {
      Swal.fire({ icon: 'error', title: 'Name required', text: 'Give the suppression a name.' });
      return;
    }
    // soft warnings (allow, but confirm)
    if (payload.match_mode === 'conditions' && (!payload.match_config.conditions || payload.match_config.conditions.length === 0)) {
      const res = await Swal.fire({
        icon: 'warning', title: 'No conditions',
        text: 'An empty condition set matches every email. Save anyway?',
        showCancelButton: true, confirmButtonText: 'Save anyway', cancelButtonText: 'Back',
      });
      if (!res.isConfirmed) return;
    }
    if (payload.match_mode === 'code' && !String(payload.match_config.code || '').trim()) {
      const res = await Swal.fire({
        icon: 'warning', title: 'Empty code',
        text: 'The match code is empty (it will never suppress). Save anyway?',
        showCancelButton: true, confirmButtonText: 'Save anyway', cancelButtonText: 'Back',
      });
      if (!res.isConfirmed) return;
    }

    try {
      let saved;
      if (editorState.isNew) {
        saved = await api('/api/email-ingest/suppressions', 'POST', payload);
      } else {
        saved = await api(`/api/email-ingest/suppressions/${selectedId}`, 'PUT', payload);
      }
      const row = (saved && saved.suppression) ? saved.suppression : saved;
      const newId = (row && row.id != null) ? row.id : selectedId;

      Toast.fire({ icon: 'success', title: editorState.isNew ? 'Suppression created' : 'Saved' });

      // refresh list, then re-select the saved record and re-render its editor
      cache.suppressions.loaded = false;
      await loadSuppressions(true);
      if (newId != null) {
        await selectSuppression(newId);    // sets editorState fresh (isNew=false, clean)
      } else {
        closeEditor(); clearDetail(); updateTopbarButtons();
      }
    } catch (e) {
      Swal.fire({ icon: 'error', title: 'Save failed', text: e.message || 'The server rejected the suppression.' });
      // keep the form open so the user can fix it
    }
  }

  async function onDelete() {
    if (activeTab !== 'suppressions' || !editorState.editorOpen || editorState.isNew || selectedId == null) return;
    const row = cache.suppressions.rows.find(r => r.id === selectedId);
    const name = row ? row.name : `#${selectedId}`;
    const res = await Swal.fire({
      icon: 'warning', title: 'Delete suppression?',
      html: `Delete <strong>${esc(name)}</strong>? This cannot be undone.`,
      showCancelButton: true, confirmButtonText: 'Delete', cancelButtonText: 'Cancel',
      confirmButtonColor: '#ef4444',
    });
    if (!res.isConfirmed) return;
    try {
      await api(`/api/email-ingest/suppressions/${selectedId}`, 'DELETE');
      Toast.fire({ icon: 'success', title: 'Deleted' });
      closeEditor();
      selectedId = null;
      cache.suppressions.loaded = false;
      await loadSuppressions(true);
      clearDetail();
      updateTopbarButtons();
    } catch (e) {
      Swal.fire({ icon: 'error', title: 'Delete failed', text: e.message || 'The server rejected the delete.' });
    }
  }

  async function onRefresh() {
    if (activeTab === 'executions') { cache.executions.loaded = false; cache.executions.selId = null; eiCloseDrawer(); }
    else {
      if (activeTab === 'suppressions' && !(await confirmDiscardIfDirty())) return;
      if (activeTab === 'suppressions') closeEditor();
      cache[activeTab].loaded = false; selectedId = null; clearDetail();
    }
    await loadActiveTab(true);
    updateTopbarButtons();
    Toast.fire({ icon: 'success', title: 'Refreshed' });
  }

  async function onNew() {
    if (activeTab === 'executions') return; // shell hides New here anyway

    // Suppressions: open a blank editor (Slice 3.3).
    if (activeTab === 'suppressions') {
      if (!(await confirmDiscardIfDirty())) return;
      selectedId = null;
      editorState = { isNew: true, editorOpen: true, isDirty: false };
      renderSuppressionList();
      showDetail();
      renderSuppressionDetail({
        name: '', description: '', active: 1,
        match_mode: 'conditions',
        match_config: { operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] },
      });
      updateTopbarButtons();
      return;
    }

    // Rules: keep the 3.4 placeholder behavior unchanged.
    selectedId = null;
    renderRuleList();
    showDetail();
    setDetailHead('New rule', 'placeholder');
    E('ei-detail-body').innerHTML =
      placeholderBanner('The "new rule" editor is not built yet — it ships in Slice 3.4. This panel is a placeholder.') +
      `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px;color:var(--muted);gap:4px;text-align:center">
         <i class="fa-solid fa-pen-ruler" style="font-size:42px;opacity:0.2"></i>
         <p style="font-size:14px;font-weight:500;margin:6px 0 0">New rule editor coming in Slice 3.4</p>
         <p style="font-size:12px">For now, select an existing record to inspect it read-only.</p>
       </div>`;
  }

  window.onShow = onShow; window.onHide = onHide;
  window.onSave = onSave; window.onDelete = onDelete;
  window.onRefresh = onRefresh; window.onNew = onNew;

  (function waitForShell() {
    if (P && typeof P.apiSend === 'function' && typeof P.setTopbarButtons === 'function') return init();
    setTimeout(waitForShell, 50);
  })();
})();
</script>
