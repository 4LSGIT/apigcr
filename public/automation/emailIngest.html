    E('ei-collapse-btn').classList.toggle('hidden', isExec);

    if (!isExec) {
      E('ei-panel-title').textContent = tab === 'suppressions' ? 'Suppressions' : 'Rules';
      E('ei-search').placeholder = tab === 'suppressions' ? 'Search suppressions…' : 'Search rules…';
      E('ei-search').value = cache[tab].filter || '';
      clearDetail();
    } else {
      eiCloseDrawer();
    }

    updateTopbarButtons();
    loadActiveTab();
  }
  window.eiSwitchTab = eiSwitchTab;

  async function loadActiveTab(force = false) {
    if (activeTab === 'suppressions') return loadSuppressions(force);
    if (activeTab === 'rules')        return loadRules(force);
    if (activeTab === 'executions')   return loadExecutions(force);
  }

  // ════════════════════════════════════════════════════════════════
  // REUSABLE MATCH-BUILDER COMPONENT  (namespaced mb*)
  //
  // Lifted from hooks.html's conditions-builder and made config-driven:
  // fields + operators are passed in at render time, so the same code
  // serves the suppression editor (3.3), the rule editor (3.4), and a
  // future phone-ingest UI. Zero email-specific logic lives here.
  //
  // Public interface:
  //   mbRender(rootEl, state, opts)  — render a condition tree; mutates `state` live.
  //     opts.availableFields : [{ value, label }]  (curated dropdown; '__custom__' escape hatch auto-added)
  //     opts.operators       : [{ value, label }]  (from meta.match_operators; falls back internally)
  //   mbCollect(rootEl)              — harvest current DOM → { operator, conditions }
  //
  // Handlers are bound via addEventListener inside the build functions
  // (no inline onclick / no globals), keeping the IIFE clean.
  // ════════════════════════════════════════════════════════════════
  const MB_CUSTOM = '__custom__';

  // Normalize an operators arg ([{value,label}] or ['equals',...] or undefined)
  // into a stable [{value,label}] list, falling back to FALLBACK_OPERATORS.
  function mbNormalizeOperators(operators) {
    let list = Array.isArray(operators) && operators.length ? operators : FALLBACK_OPERATORS;
    return list.map(o => {
      if (typeof o === 'object' && o) {
        const value = o.value ?? o.op ?? '';
        return { value, label: o.label ?? String(value).replace(/_/g, ' ') };
      }
      return { value: o, label: String(o).replace(/_/g, ' ') };
    });
  }

  // Render a match-builder into rootEl. `state` is the {operator, conditions}
  // tree and is mutated live as the user edits. opts carries the field catalog
  // and operator list (both injected — the reusability contract).
  function mbRender(rootEl, state, opts) {
    if (!rootEl) return;
    const cfg = {
      fields:    (opts && opts.availableFields) || [],
      operators: mbNormalizeOperators(opts && opts.operators),
      onChange:  (opts && typeof opts.onChange === 'function') ? opts.onChange : function () {},
    };
    rootEl.classList.add('cond-root');
    rootEl._state = state;
    rootEl._mbcfg = cfg;        // stash config so re-renders after mutation reuse it
    rootEl.innerHTML = '';
    rootEl.appendChild(mbBuildGroup(state, true, cfg));
  }

  // Re-render the nearest containing match-builder root after a structural
  // mutation (add/remove condition or group). Reuses the stashed config.
  function mbRerenderRoot(el) {
    const root = el.closest('.cond-root');
    if (root && root._state) mbRender(root, root._state, { availableFields: root._mbcfg.fields, operators: root._mbcfg.operators, onChange: root._mbcfg.onChange });
  }

  function mbBuildGroup(group, isRoot, cfg) {
    const div = document.createElement('div');
    div.className = 'cond-group';
    div._group = group;

    // head: AND/OR selector + hint + (remove, if subgroup)
    const head = document.createElement('div');
    head.className = 'cond-group-head';
    const opSel = document.createElement('select');
    opSel.innerHTML = `
      <option value="and" ${group.operator === 'and' ? 'selected' : ''}>AND</option>
      <option value="or"  ${group.operator === 'or'  ? 'selected' : ''}>OR</option>`;
    opSel.addEventListener('change', e => { group.operator = e.target.value; cfg.onChange(); });
    head.appendChild(opSel);
    const hint = document.createElement('span');
    hint.className = 'cond-group-hint';
    hint.textContent = group.operator === 'or' ? 'Any condition may match' : 'All conditions must match';
    opSel.addEventListener('change', () => { hint.textContent = group.operator === 'or' ? 'Any condition may match' : 'All conditions must match'; });
    head.appendChild(hint);
    if (!isRoot) {
      const rm = document.createElement('button');
      rm.className = 'cond-remove'; rm.title = 'Remove group';
      rm.innerHTML = '<i class="fa-solid fa-times"></i>';
      rm.addEventListener('click', () => { div.remove(); cfg.onChange(); });
      head.appendChild(rm);
    }
    div.appendChild(head);

    // body: child leaves + subgroups
    const body = document.createElement('div');
    body.className = 'cond-group-body';
    (group.conditions || []).forEach(cond => {
      if (cond && cond.operator) body.appendChild(mbBuildGroup(cond, false, cfg));
      else body.appendChild(mbBuildLeaf(cond, cfg));
    });
    div.appendChild(body);

    // foot: add-condition / add-group
    const foot = document.createElement('div');
    foot.style.cssText = 'display:flex;gap:6px;margin-top:6px';
    foot._group = group;
    const addC = document.createElement('button');
    addC.className = 'mb-add-btn';
    addC.innerHTML = '<i class="fa-solid fa-plus"></i> Condition';
    addC.addEventListener('click', () => { group.conditions = group.conditions || []; group.conditions.push({ path: '', op: 'equals', value: '' }); cfg.onChange(); mbRerenderRoot(addC); });
    const addG = document.createElement('button');
    addG.className = 'mb-add-btn';
    addG.innerHTML = '<i class="fa-solid fa-layer-group"></i> Group';
    addG.addEventListener('click', () => { group.conditions = group.conditions || []; group.conditions.push({ operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] }); cfg.onChange(); mbRerenderRoot(addG); });
    foot.appendChild(addC); foot.appendChild(addG);
    div.appendChild(foot);

    return div;
  }

  // A single condition row: curated field dropdown (+ custom escape hatch),
  // operator dropdown (injected list), value input (hidden for valueless ops).
  function mbBuildLeaf(cond, cfg) {
    const row = document.createElement('div');
    row.className = 'cond-row';
    row._cond = cond;
    const curPath = cond.path || '';
    const known = cfg.fields.some(f => f.value === curPath);
    const startCustom = curPath !== '' && !known;

    // field <select>
    const fieldSel = document.createElement('select');
    fieldSel.className = 'cond-field';
    fieldSel.innerHTML =
      cfg.fields.map(f => `<option value="${esc(f.value)}" ${(!startCustom && f.value === curPath) ? 'selected' : ''}>${esc(f.label)}</option>`).join('') +
      `<option value="${MB_CUSTOM}" ${startCustom ? 'selected' : ''}>Custom path…</option>`;
    // if path is empty and there are fields, default the model to the first field
    if (!startCustom && curPath === '' && cfg.fields.length) { cond.path = cfg.fields[0].value; fieldSel.value = cfg.fields[0].value; }
    row.appendChild(fieldSel);

    // custom-path free-text input (shown only in custom mode)
    const customInput = document.createElement('input');
    customInput.className = 'cond-path-custom';
    customInput.placeholder = 'custom.path';
    customInput.value = startCustom ? curPath : '';
    customInput.style.display = startCustom ? '' : 'none';
    row.appendChild(customInput);

    // operator <select> (injected list)
    const opSel = document.createElement('select');
    opSel.className = 'cond-op';
    opSel.innerHTML = cfg.operators.map(o => `<option value="${esc(o.value)}" ${cond.op === o.value ? 'selected' : ''}>${esc(o.label)}</option>`).join('');
    if (!cond.op) cond.op = cfg.operators[0]?.value || 'equals';
    row.appendChild(opSel);

    // value input
    const valInput = document.createElement('input');
    valInput.className = 'cond-value';
    valInput.placeholder = 'value';
    valInput.value = cond.value ?? '';
    row.appendChild(valInput);

    // remove button
    const rm = document.createElement('button');
    rm.className = 'cond-remove'; rm.title = 'Remove';
    rm.innerHTML = '<i class="fa-solid fa-times"></i>';
    row.appendChild(rm);

    // ── wiring ──
    const syncValueDisabled = () => {
      const off = VALUELESS_OPS.has(opSel.value);
      valInput.disabled = off;
      valInput.style.display = off ? 'none' : '';
      if (off) { cond.value = ''; valInput.value = ''; }
    };
    const syncPath = () => {
      if (fieldSel.value === MB_CUSTOM) {
        customInput.style.display = '';
        cond.path = customInput.value.trim();
      } else {
        customInput.style.display = 'none';
        cond.path = fieldSel.value;
      }
    };
    fieldSel.addEventListener('change', () => { syncPath(); cfg.onChange(); });
    customInput.addEventListener('input', () => { cond.path = customInput.value.trim(); cfg.onChange(); });
    opSel.addEventListener('change', () => { cond.op = opSel.value; syncValueDisabled(); cfg.onChange(); });
    valInput.addEventListener('input', () => { cond.value = valInput.value; cfg.onChange(); });
    rm.addEventListener('click', () => { row.remove(); cfg.onChange(); });

    syncValueDisabled();
    return row;
  }

  // Harvest the live DOM back into a { operator, conditions } object. This is
  // the authoritative save-time read (the live-mutated state can drift if a row
  // was removed). Reads field from .cond-field (or .cond-path-custom when the
  // field select is on the custom escape hatch). Valueless ops emit no value.
  function mbCollect(rootEl) {
    if (!rootEl) return { operator: 'and', conditions: [] };
    const top = rootEl.querySelector(':scope > .cond-group') || rootEl.querySelector('.cond-group');
    return mbCollectGroup(top);
  }
  function mbCollectGroup(groupEl) {
    if (!groupEl) return { operator: 'and', conditions: [] };
    const operator = groupEl.querySelector(':scope > .cond-group-head select')?.value || 'and';
    const body = groupEl.querySelector(':scope > .cond-group-body');
    const conditions = [];
    if (body) {
      for (const child of body.children) {
        if (child.classList.contains('cond-group')) {
          conditions.push(mbCollectGroup(child));
        } else if (child.classList.contains('cond-row')) {
          const fieldSel = child.querySelector('.cond-field');
          const customInput = child.querySelector('.cond-path-custom');
          const path = (fieldSel && fieldSel.value === MB_CUSTOM)
            ? (customInput?.value?.trim() || '')
            : (fieldSel?.value || '');
          const op = child.querySelector('.cond-op')?.value;
          if (!path || !op) continue;        // drop incomplete rows
          const cond = { path, op };
          if (!VALUELESS_OPS.has(op)) cond.value = child.querySelector('.cond-value')?.value ?? '';
          conditions.push(cond);
        }
      }
    }
    return { operator, conditions };
  }

  // ════════════════════════════════════════════════════════════════
  // SUPPRESSIONS  (sidebar list + right detail)
  // ════════════════════════════════════════════════════════════════
  async function loadSuppressions(force = false) {
    const c = cache.suppressions;
    if (c.loaded && !force) { renderSuppressionList(); return; }
    setSidebarLoading();
    try {
      const data = await api('/api/email-ingest/suppressions');
      c.rows = (data && data.suppressions) || [];
      c.loaded = true;
      renderSuppressionList();
    } catch (e) { setSidebarError(e.message); }
  }
  function renderSuppressionList() {
    const c = cache.suppressions;
    const q = (c.filter || '').toLowerCase();
    const rows = q ? c.rows.filter(r => (r.name||'').toLowerCase().includes(q) || (r.description||'').toLowerCase().includes(q)) : c.rows;
    if (!rows.length) { setSidebarEmpty('No suppressions.'); return; }
    E('ei-list').innerHTML = rows.map(r => `
      <div class="left-item${r.id === selectedId ? ' active' : ''}" onclick="eiSelect(${r.id})">
        <div class="left-item-name">${esc(r.name)}

  async function selectSuppression(id) {
    let row = cache.suppressions.rows.find(r => r.id === id);

  // Renders the EDITABLE suppression form into #ei-detail-body (Slice 3.3).
  // Same name + call site as the old read-only placeholder. For a new record,
  // pass a seeded blank row and set editorState.isNew=true before calling.
  function renderSuppressionDetail(r) {
    const isNew = editorState.isNew;
    setDetailHead(isNew ? 'New suppression' : (r.name || `Suppression #${r.id}`),
                  isNew ? 'unsaved' : `#${r.id} · suppression`);

    const modes = (Array.isArray(meta.match_modes) && meta.match_modes.length)
      ? meta.match_modes.map(m => (typeof m === 'object' ? (m.value ?? '') : m))
      : ['conditions', 'code'];
    const mode = r.match_mode || 'conditions';

    // Seed the live condition-tree state for the match-builder. Harvest at save
    // time reads the DOM (mbCollect), so this object only needs to seed render.
    const mc = parseJson(r.match_config);
    let condState;
    if (mode === 'conditions') {
      condState = (mc && mc.operator) ? mc : { operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] };
    } else {
      condState = { operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] };
    }
    // code-mode prefill: {code:'...'} or a bare string
    const codeStr = (mode === 'code')
      ? (typeof mc === 'string' ? mc : (mc && typeof mc.code === 'string' ? mc.code : ''))
      : '';

    const modeOpts = modes.map(m => `<option value="${esc(m)}" ${m === mode ? 'selected' : ''}>${esc(m)}</option>`).join('');

    E('ei-detail-body').innerHTML = `
      <div class="ei-form">
        <div class="ei-form-row">
          <label class="ei-label" for="sup-name">Name <span style="color:var(--red)">*</span></label>
          <input class="ei-input" id="sup-name" maxlength="255" placeholder="e.g. Court emails (uscourts.gov)" value="${esc(r.name || '')}">
        </div>
        <div class="ei-form-row">
          <label class="ei-label" for="sup-desc">Description</label>
          <textarea class="ei-textarea" id="sup-desc" placeholder="Optional notes about what this suppresses">${esc(r.description || '')}</textarea>
        </div>
        <div class="ei-form-row">
          <label class="ei-label">Active</label>
          <label class="ei-toggle-line">
            <input type="checkbox" id="sup-active" ${(r.active ?? 1) ? 'checked' : ''}>
            <span>When on, matching emails are suppressed (not logged).</span>
          </label>
        </div>
        <div class="ei-form-row">
          <label class="ei-label" for="sup-mode">Match mode</label>
          <select class="ei-select" id="sup-mode">${modeOpts}</select>
        </div>

        <div class="ei-form-row" id="sup-cond-wrap">
          <label class="ei-label">Match conditions</label>
          <div id="sup-cond-root"></div>
          <div id="sup-sample-host"></div>
        </div>

        <div class="ei-form-row" id="sup-code-wrap">
          <label class="ei-label" for="sup-code">Match code</label>
          <textarea class="ei-textarea ei-code-textarea" id="sup-code" placeholder="// return truthy to suppress">${esc(codeStr)}</textarea>
          <div class="ei-field-hint">Receives the email envelope as <code>input</code>. Return truthy to suppress.</div>
        </div>
      </div>
      ${isNew ? '' : suppressionMetaCard(r)}
    `;

    // mount the reusable match-builder
    const root = E('sup-cond-root');
    mbRender(root, condState, { availableFields: matchFields(), operators: meta.match_operators, onChange: markDirty });
    mountSamplePanel(E('sup-sample-host'), 'sup-cond-root');

    // mode toggle (mirror hooks.html toggleFilterMode pattern)
    const applyMode = () => {
      const m = E('sup-mode').value;
      E('sup-cond-wrap').classList.toggle('hidden', m !== 'conditions');
      E('sup-code-wrap').classList.toggle('hidden', m !== 'code');
    };
    E('sup-mode').addEventListener('change', () => { applyMode(); markDirty(); });
    applyMode();

    // dirty tracking on the scalar fields (match-builder marks dirty itself)
    ['sup-name','sup-desc','sup-code'].forEach(id => E(id).addEventListener('input', markDirty));
    E('sup-active').addEventListener('change', markDirty);
  }

  function suppressionMetaCard(r) {
    const rows = [
      ['Match count', String(r.match_count ?? 0)],
      ['Last matched', fmtDateOrNull(r.last_matched_at)],
      ['Last modified by', r.last_modified_by != null ? esc(String(r.last_modified_by)) : nullSpan('—')],
      ['Created', fmtDateOrNull(r.created_at)],
      ['Updated', fmtDateOrNull(r.updated_at)],
    ];
    const body = rows.map(([k, v]) => `<div class="kv-row"><div class="kv-key">${esc(k)}</div><div class="kv-val">${v}</div></div>`).join('');
    return `<div class="ei-meta-card"><div class="kv-card-head">Metadata (read-only)</div>${body}</div>`;
  }

  function markDirty() { editorState.isDirty = true; }

  // Harvest the suppression form into a payload for POST/PUT.
  function collectSuppressionForm() {
    const name = E('sup-name').value.trim();
    const description = E('sup-desc').value;
    const active = E('sup-active').checked ? 1 : 0;
    const match_mode = E('sup-mode').value;
    let match_config;
    if (match_mode === 'code') {
      match_config = { code: E('sup-code').value };
    } else {
      match_config = mbCollect(E('sup-cond-root'));
    }
    return { name, description, active, match_mode, match_config };
  }

  // Guard against silently losing edits when navigating away from a dirty form.
  // Returns a promise<boolean>: true = proceed, false = stay.
  async function confirmDiscardIfDirty() {
    if (!(editorState.editorOpen && editorState.isDirty)) return true;
    const res = await Swal.fire({
      icon: 'warning', title: 'Discard unsaved changes?',
      text: 'You have unsaved edits.',
      showCancelButton: true, confirmButtonText: 'Discard', cancelButtonText: 'Keep editing',
      confirmButtonColor: '#ef4444',
    });
    return !!res.isConfirmed;
  }

  function closeEditor() { editorState = { isNew: false, editorOpen: false, isDirty: false }; }

  // ════════════════════════════════════════════════════════════════
  // RULE EDITOR  (Slice 3.4) — replaces the 3.4 read-only placeholder.
  //
  // Structure mirrors the suppression editor (3.3) plus two new pieces:
  //   - transform builder (passthrough / mapper / code), lifted from
  //     hooks.html's renderMapperRules + toggleTransformMode.
  //   - action manager (Deliverable 2), mirroring hooks.html's target
  //     CRUD against the rule-action endpoints. Action-save model (b):
  //     actions are saved independently of the rule's own Save.
  //
  // Live form state lives in ruleForm (below). Match-tree state is kept
  // live for mbRender; the code textarea + mapper buffer are preserved
  // across mode toggles (don't wipe on switch — mirrors 3.3's conditions
  // vs. code independence).
  // ════════════════════════════════════════════════════════════════

  // ruleForm: the live editor buffer for the rule currently mounted.
  //   id            — null while the rule is unsaved (new); set after first save.
  //   actions       — local mirror of the rule's actions array (mutated by the
  //                   action manager; re-rendered card list reads from here).
  //   condState     — live {operator, conditions} tree for the match-builder.
  //   mapperRules   — live mapper-rule buffer for transform=mapper (preserved
  //                   across transform-mode toggles).
  let ruleForm = { id: null, actions: [], condState: null, mapperRules: [] };

  // Renders the EDITABLE rule form into #ei-detail-body. Same call site as
  // the old read-only placeholder. For a new record, pass a seeded blank row
  // and set editorState.isNew=true before calling.
  function renderRuleDetail(r) {
    const isNew = editorState.isNew;
    setDetailHead(isNew ? 'New rule' : (r.name || `Rule #${r.id}`),
                  isNew ? 'unsaved' : `#${r.id} · rule`);

    // ── Match seed (identical handling to the suppression editor) ──
    const matchModes = (Array.isArray(meta.match_modes) && meta.match_modes.length)
      ? meta.match_modes.map(m => (typeof m === 'object' ? (m.value ?? '') : m))
      : ['conditions', 'code'];
    const matchMode = r.match_mode || 'conditions';
    const mc = parseJson(r.match_config);
    let condState;
    if (matchMode === 'conditions') {
      condState = (mc && mc.operator) ? mc : { operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] };
    } else {
      condState = { operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] };
    }
    const matchCodeStr = (matchMode === 'code')
      ? (typeof mc === 'string' ? mc : (mc && typeof mc.code === 'string' ? mc.code : ''))
      : '';

    // ── Transform seed ──
    const transformModes = (Array.isArray(meta.transform_modes) && meta.transform_modes.length)
      ? meta.transform_modes.map(m => (typeof m === 'object' ? (m.value ?? '') : m))
      : ['passthrough', 'mapper', 'code'];
    const transformMode = r.transform_mode || 'passthrough';
    const tc = parseJson(r.transform_config);
    // mapper buffer: transform_config is an array for mapper mode
    const mapperRules = (transformMode === 'mapper' && Array.isArray(tc))
      ? tc.map(normalizeMapperRule)
      : [];
    // code buffer: {code:'...'} or a bare string
    const transformCodeStr = (transformMode === 'code')
      ? (typeof tc === 'string' ? tc : (tc && typeof tc.code === 'string' ? tc.code : ''))
      : '';

    // initialize live form state
    ruleForm = {
      id: isNew ? null : (r.id ?? null),
      actions: Array.isArray(r.actions) ? r.actions.slice() : [],
      condState,
      mapperRules,
    };

    const matchModeOpts = matchModes.map(m => `<option value="${esc(m)}" ${m === matchMode ? 'selected' : ''}>${esc(m)}</option>`).join('');
    const transformModeOpts = transformModes.map(m => `<option value="${esc(m)}" ${m === transformMode ? 'selected' : ''}>${esc(m)}</option>`).join('');

    E('ei-detail-body').innerHTML = `
      <div class="ei-form">
        <div class="ei-form-row">
          <label class="ei-label" for="rule-name">Name <span style="color:var(--red)">*</span></label>
          <input class="ei-input" id="rule-name" maxlength="255" placeholder="e.g. Court docket notices → log + workflow" value="${esc(r.name || '')}">
        </div>
        <div class="ei-form-row">
          <label class="ei-label" for="rule-desc">Description</label>
          <textarea class="ei-textarea" id="rule-desc" placeholder="Optional notes about what this rule does">${esc(r.description || '')}</textarea>
        </div>
        <div class="ei-form-row">
          <label class="ei-label">Active</label>
          <label class="ei-toggle-line">
            <input type="checkbox" id="rule-active" ${(r.active ?? 1) ? 'checked' : ''}>
            <span>When on, matching emails run this rule's transform + actions.</span>
          </label>
        </div>
        <div class="ei-form-row">
          <label class="ei-label" for="rule-position">Position</label>
          <input class="ei-input" id="rule-position" type="number" min="0" step="1" style="max-width:140px" value="${Number(r.position ?? 0)}">
          <div class="ei-field-hint">Lower positions evaluate first.</div>
        </div>

        <!-- ═══ MATCH ═══ -->
        <div class="ei-section-head">Match</div>
        <div class="ei-form-row">
          <label class="ei-label" for="rule-match-mode">Match mode</label>
          <select class="ei-select" id="rule-match-mode" style="max-width:220px">${matchModeOpts}</select>
        </div>
        <div class="ei-form-row" id="rule-match-cond-wrap">
          <label class="ei-label">Match conditions</label>
          <div id="rule-match-cond-root"></div>
          <div id="rule-sample-host"></div>
        </div>
        <div class="ei-form-row" id="rule-match-code-wrap">
          <label class="ei-label" for="rule-match-code">Match code</label>
          <textarea class="ei-textarea ei-code-textarea" id="rule-match-code" placeholder="// return truthy to match">${esc(matchCodeStr)}</textarea>
          <div class="ei-field-hint">Receives the email envelope as <code>input</code>. Return truthy to match.</div>
        </div>
        <div id="rule-testmatch-host"></div>

        <!-- ═══ TRANSFORM ═══ -->
        <div class="ei-section-head">Transform</div>
        <div class="ei-form-row">
          <label class="ei-label" for="rule-transform-mode">Transform mode</label>
          <select class="ei-select" id="rule-transform-mode" style="max-width:220px">${transformModeOpts}</select>
        </div>
        <div class="ei-form-row" id="rule-transform-passthrough-wrap">
          <div class="ei-field-hint">The email envelope is passed to actions unchanged — so actions reference the envelope's own fields (<code>from.email</code>, <code>subject</code>, <code>source</code>, <code>auth.spf</code>, …). See the sample panel above for the full list.</div>
        </div>
        <div class="ei-form-row" id="rule-transform-mapper-wrap">
          <label class="ei-label">Mapping rules</label>
          <div id="rule-mapper-rules"></div>
          <button type="button" class="btn btn-outline btn-sm" id="rule-mapper-add" style="margin-top:6px"><i class="fa-solid fa-plus"></i> Add mapping</button>
          <div class="ei-field-hint">Build the object passed to actions from envelope fields.</div>
        </div>
        <div class="ei-form-row" id="rule-transform-code-wrap">
          <label class="ei-label" for="rule-transform-code">Transform code</label>
          <textarea class="ei-textarea ei-code-textarea" id="rule-transform-code" placeholder="// return the transformed object">${esc(transformCodeStr)}</textarea>
          <div class="ei-field-hint">Receives the envelope as <code>input</code>. Return the transformed object passed to actions.</div>
        </div>

        <!-- ═══ ACTIONS ═══ -->
        <div class="ei-section-head">Actions</div>
        <div class="actions-note"><i class="fa-solid fa-circle-info"></i> Actions are saved immediately when added or edited (separately from the rule's Save).</div>
        <div id="rule-actions-list"></div>
        <button type="button" class="btn btn-outline btn-sm" id="rule-action-add" style="margin-top:6px"><i class="fa-solid fa-plus"></i> Add action</button>
        <div id="rule-action-disabled-note" class="ei-field-hint" style="display:none"><i class="fa-solid fa-lock"></i> Save the rule first, then add actions.</div>

        ${isNew ? '' : `
        <!-- ═══ DUPLICATE ═══ -->
        <div class="ei-section-head">Duplicate</div>
        <button type="button" class="btn btn-outline btn-sm" id="rule-duplicate"><i class="fa-solid fa-copy"></i> Duplicate rule</button>
        <div class="ei-field-hint">Creates an <strong>inactive</strong> copy of the last <strong>saved</strong> version of this rule — match, transform, and actions included. Unsaved edits here are not copied.</div>
        `}
      </div>
      ${isNew ? '' : ruleMetaCard(r)}
    `;

    // ── mount the reusable match-builder (REUSED UNCHANGED from 3.3) ──
    mbRender(E('rule-match-cond-root'), ruleForm.condState,
      { availableFields: matchFields(), operators: meta.match_operators, onChange: markDirty });
    mountSamplePanel(E('rule-sample-host'), 'rule-match-cond-root');

    // ── match mode toggle ──
    const applyMatchMode = () => {
      const m = E('rule-match-mode').value;
      E('rule-match-cond-wrap').classList.toggle('hidden', m !== 'conditions');
      E('rule-match-code-wrap').classList.toggle('hidden', m !== 'code');
    };
    E('rule-match-mode').addEventListener('change', () => { applyMatchMode(); markDirty(); });
    applyMatchMode();
    // ── test-match panel (Slice 10B) — kept in sync across emailIngest.html/phoneIngest.html ──
    mountTestMatchPanel(E('rule-testmatch-host'));

    // ── transform mode toggle (preserves each sub-editor's state) ──
    const applyTransformMode = () => {
      const m = E('rule-transform-mode').value;
      E('rule-transform-passthrough-wrap').classList.toggle('hidden', m !== 'passthrough');
      E('rule-transform-mapper-wrap').classList.toggle('hidden', m !== 'mapper');
      E('rule-transform-code-wrap').classList.toggle('hidden', m !== 'code');
      if (m === 'mapper') renderMapperRules();
    };
    E('rule-transform-mode').addEventListener('change', () => { applyTransformMode(); markDirty(); });
    E('rule-mapper-add').addEventListener('click', () => { syncMapperRulesFromDom(); ruleForm.mapperRules.push({ from: '', to: '' }); renderMapperRules(); markDirty(); });
    applyTransformMode();

    // ── dirty tracking on scalar + code fields (match-builder marks itself) ──
    ['rule-name','rule-desc','rule-position','rule-match-code','rule-transform-code'].forEach(id => E(id).addEventListener('input', markDirty));
    E('rule-active').addEventListener('change', markDirty);

    // ── actions section ──
    renderActionCards();
    wireActionAddButton();

  function ruleMetaCard(r) {
    const rows = [
      ['Match count', String(r.match_count ?? 0)],
      ['Last matched', fmtDateOrNull(r.last_matched_at)],
      ['Last modified by', r.last_modified_by != null ? esc(String(r.last_modified_by)) : nullSpan('—')],
      ['Created', fmtDateOrNull(r.created_at)],
      ['Updated', fmtDateOrNull(r.updated_at)],
    ];
    const body = rows.map(([k, v]) => `<div class="kv-row"><div class="kv-key">${esc(k)}</div><div class="kv-val">${v}</div></div>`).join('');
    return `<div class="ei-meta-card"><div class="kv-card-head">Metadata (read-only)</div>${body}</div>`;
  }

  // ── Transform: mapper-rules UI (lifted from hooks.html renderMapperRules) ──
  // A mapper rule is one of: {from, to, transforms?} | {template, to} | {value, to}.
  function normalizeMapperRule(r) {
    if (!r || typeof r !== 'object') return { from: '', to: '' };
    if (r.template !== undefined) return { template: r.template, to: r.to || '' };
    if (r.value !== undefined)    return { value: r.value, to: r.to || '' };
    return { from: r.from || '', to: r.to || '', transforms: Array.isArray(r.transforms) ? r.transforms : [] };
  }
  function renderMapperRules() {
    const el = E('rule-mapper-rules');
    if (!el) return;
    const rules = ruleForm.mapperRules;
    if (!rules.length) { el.innerHTML = `<div class="mr-empty">No mapping rules. Add one below.</div>`; return; }
    el.innerHTML = rules.map((r, i) => {
      const kind = r.from !== undefined ? 'from' : (r.template !== undefined ? 'template' : 'value');
      const srcVal = r.from ?? r.template ?? (r.value !== undefined ? String(r.value) : '');
      const ph = kind === 'template' ? '{{path|transform}} text' : (kind === 'value' ? 'static value' : 'subject  or  from.email');
      return `
        <div class="mapper-rule" data-idx="${i}">
          <div class="mapper-rule-row">
            <select class="mr-type">
              <option value="from"     ${kind==='from'?'selected':''}>Path</option>
              <option value="template" ${kind==='template'?'selected':''}>Template</option>
              <option value="value"    ${kind==='value'?'selected':''}>Static</option>
            </select>
            <input class="mr-from" placeholder="${esc(ph)}" value="${esc(srcVal)}">
            <span class="mr-arrow">→</span>
            <input class="mr-to" placeholder="dest_field" value="${esc(r.to || '')}">
            <button type="button" class="mr-remove" title="Remove"><i class="fa-solid fa-times"></i></button>
          </div>
          ${kind==='from' ? `<textarea class="mr-transforms" rows="2" wrap="off" spellcheck="false" placeholder="one transform per line&#10;trim&#10;regex: always use a capture group, e.g.  regex:(\\d{4,8})">${esc((r.transforms||[]).join('\n'))}</textarea>` : ''}
        </div>`;
    }).join('');
    // wire each rule's controls
    el.querySelectorAll('.mapper-rule').forEach(card => {
      const i = Number(card.getAttribute('data-idx'));
      card.querySelector('.mr-type').addEventListener('change', e => {
        syncMapperRulesFromDom();
        const to = ruleForm.mapperRules[i].to || '';
        const t = e.target.value;
        if (t === 'from') ruleForm.mapperRules[i] = { from: '', to, transforms: [] };
        else if (t === 'template') ruleForm.mapperRules[i] = { template: '', to };
        else ruleForm.mapperRules[i] = { value: '', to };
        renderMapperRules(); markDirty();
      });
      card.querySelector('.mr-remove').addEventListener('click', () => { syncMapperRulesFromDom(); ruleForm.mapperRules.splice(i, 1); renderMapperRules(); markDirty(); });
      card.querySelector('.mr-from')?.addEventListener('input', markDirty);
      card.querySelector('.mr-to')?.addEventListener('input', markDirty);
      card.querySelector('.mr-transforms')?.addEventListener('input', markDirty);
    });
  }
  // Harvest mapper rules from the live DOM → transform_config array.
  function collectMapperRules() {
    const el = E('rule-mapper-rules');
    if (!el) return [];
    return Array.from(el.querySelectorAll('.mapper-rule')).map(card => {
      const kind = card.querySelector('.mr-type').value;
      const source = card.querySelector('.mr-from').value;
      const to = card.querySelector('.mr-to').value;
      const rule = { to };
      if (kind === 'from') {
        rule.from = source;
        const tf = card.querySelector('.mr-transforms');
        // NEWLINE-delimited, one descriptor per line. Do NOT also accept commas as a
        // fallback — that reintroduces the bug this replaced: the comma split
        // `regex:(\d{4,8})` into two broken halves and threw "Unknown transform".
        if (tf && tf.value.trim()) rule.transforms = tf.value.split('\n').map(s => s.trim()).filter(Boolean);
      } else if (kind === 'template') {
        rule.template = source;
      } else {
        rule.value = source;
      }
      return rule;
    });
  }

  // Sync the live DOM input values back into ruleForm.mapperRules WITHOUT
  // re-rendering. Must run before any handler that mutates the buffer and
  // re-renders (type change, add, remove), or unsaved edits in sibling rows
  // are lost (they live only in the DOM until Save calls collectMapperRules).
  function syncMapperRulesFromDom() {
    if (E('rule-mapper-rules')) ruleForm.mapperRules = collectMapperRules();
  }

  // Harvest the rule's scalar + match + transform fields into a POST/PUT payload.
  // Actions are NOT included — they're managed independently (model (b)).
  function collectRuleForm() {
    const name = E('rule-name').value.trim();
    const description = E('rule-desc').value;
    const active = E('rule-active').checked ? 1 : 0;
    const position = Math.max(0, parseInt(E('rule-position').value, 10) || 0);

    const match_mode = E('rule-match-mode').value;
    let match_config;
    if (match_mode === 'code') match_config = { code: E('rule-match-code').value };
    else match_config = mbCollect(E('rule-match-cond-root'));

    const transform_mode = E('rule-transform-mode').value;
    let transform_config;
    if (transform_mode === 'mapper')      transform_config = collectMapperRules();
    else if (transform_mode === 'code')   transform_config = { code: E('rule-transform-code').value };
    else                                  transform_config = null; // passthrough

    return { name, description, active, position, match_mode, match_config, transform_mode, transform_config };
  }

  // ════════════════════════════════════════════════════════════════
  // ACTION MANAGER  (Deliverable 2) — mirrors hooks.html target CRUD.
  //
  // The five action types map ~1:1 to hook target types, plus a new
  // 'hook' type (config {slug}) that hooks.html lacks. Config forms are
  // hand-built per type (the recommended approach in the prompt) mirroring
  // buildTargetForm's sections. Unlike hook targets, rule actions have NO
  // per-action conditions (out of scope — the rule's match is the gate).
  //
  // New-rule action ordering: SAVE-FIRST (recommended). When the rule is
  // unsaved (ruleForm.id == null), the "Add action" button is disabled with
  // a "save the rule first" note. After the first POST returns an id,
  // selectRule re-renders with the actions section enabled. Chosen over
  // hooks' local-buffer approach because actions FK to rule_id — buffering
  // unsaved actions would need a client-side replay after rule creation and
  // can't pre-validate referentially; save-first matches the backend reality
  // and is simpler + less error-prone.
  // ════════════════════════════════════════════════════════════════
  const ACTION_TYPE_LABELS = {
    workflow:          { label: 'Workflow', icon: 'fa-diagram-project', color: '#8b5cf6' },
    sequence:          { label: 'Sequence', icon: 'fa-list-ol',         color: '#f97316' },
    hook:              { label: 'Hook',     icon: 'fa-bolt-lightning',  color: '#0ea5e9' },
    internal_function: { label: 'Function', icon: 'fa-code',            color: '#10b981' },
    http:              { label: 'HTTP',     icon: 'fa-globe',           color: 'var(--blue)' },
  };

  // ── Forward pseudo-type detection (Slice 9B) ──────────────────────
  // "Forward" is a UI-level pseudo-type over the two Slice 9A internal
  // functions (forward_as_email / forward_as_sms). It exists ONLY in this
  // page's action-type select — the stored action_type is always
  // internal_function, and the server's action_types list is untouched
  // (forward is not a dispatch type).
  //
  // Detection is deliberately strict: a stored internal_function action is
  // treated as Forward iff
  //   - function_name is one of the two forwarding fns,
  //   - params_mapping.event === '$' (bare whole-object token), and
  //   - every OTHER mapping key is in the fn's known param set AND its value
  //     is a quoted literal.
  // Anything else (path-mapped `to`, extra params, missing event) renders in
  // the generic Internal Function form — the friendly form must never lossily
  // rewrite a hand-built mapping. A mapping missing `to`/`from` still detects
  // (empty friendly fields; save validation forces filling them — not lossy).
  //
  // Quoted-literal check mirrors resolveParamsMapping (lib/actionDispatchers):
  // a string of length >= 2 that starts AND ends with a single quote. Only the
  // OUTER pair is stripped at resolve time, so interior single quotes are safe
  // in both directions (wrap on save, strip on detect).
  const FWD_FN_CHANNEL = { forward_as_email: 'email', forward_as_sms: 'sms' };
  const FWD_ALLOWED_KEYS = {
    email: ['event', 'to', 'from', 'subject_prefix', 'body_prefix'],
    sms:   ['event', 'to', 'from', 'body_prefix'],
  };
  function fwdIsQuotedLiteral(v) {
    return typeof v === 'string' && v.length >= 2 && v.startsWith("'") && v.endsWith("'");
  }
  // cfg = parsed internal_function config. Returns
  // { channel, to, from, subject_prefix, body_prefix } (unquoted values,
  // '' when absent) or null when the shape isn't Forward-safe.
  function fwdDetect(cfg) {
    const channel = FWD_FN_CHANNEL[cfg && cfg.function_name];
    if (!channel) return null;
    const pm = cfg.params_mapping;
    if (!pm || typeof pm !== 'object' || Array.isArray(pm)) return null;
    if (pm.event !== '$') return null;
    const allowed = FWD_ALLOWED_KEYS[channel];
    const out = { channel, to: '', from: '', subject_prefix: '', body_prefix: '' };
    for (const [k, v] of Object.entries(pm)) {
      if (k === 'event') continue;
      if (!allowed.includes(k)) return null;    // extra param → generic form
      if (!fwdIsQuotedLiteral(v)) return null;  // path-mapped value → generic form
      out[k] = v.slice(1, -1);                  // strip the outer quote pair
    }
    return out;
  }
  // 'Fwd:' default for NEW Forward actions — read from /meta's
  // internal_function_meta params (Slice 9B meta-service passthrough);
  // hard fallback matches forwarding.js's __meta default.
  function fwdSubjectDefault() {
    const m = meta.targets?.internal_function_meta?.forward_as_email;
    const p = m && Array.isArray(m.params) ? m.params.find(x => x.name === 'subject_prefix') : null;
    return (p && p.default != null) ? String(p.default) : 'Fwd:';
  }

  function summarizeAction(a) {
    const type = a.action_type || 'http';
    const cfg = parseJson(a.config) || {};
    if (type === 'workflow') return `Start workflow #${cfg.workflow_id ?? '?'}`;
    if (type === 'sequence') {
      if (cfg.template_id != null && cfg.template_id !== '') {
        const tpl = (meta.targets?.sequences || []).find(s => s.id == cfg.template_id);
        return tpl ? `Enroll in template #${cfg.template_id} "${tpl.name}"` : `Enroll in template #${cfg.template_id}`;
      }
      return `Enroll in sequence "${cfg.template_type || '?'}"`;
    }
    if (type === 'hook') {
      const h = (meta.targets?.hooks || []).find(x => x.slug === cfg.slug);
      return h ? `Invoke hook '${cfg.slug}' (${h.name})` : `Invoke hook '${cfg.slug || '?'}'`;
    }
    if (type === 'internal_function') {
      const fwd = fwdDetect(cfg);
      if (fwd) {
        return fwd.channel === 'email'
          ? `Forward as email → ${fwd.to || '?'}`
          : `Forward as SMS → ${fwd.to || '?'}`;
      }
      return `Call ${cfg.function_name || '?'}()`;
    }
    if (type === 'http') return `${cfg.method || 'POST'} ${cfg.url || '—'}`;
    return `(${type})`;
  }

  function renderActionCards() {
    const el = E('rule-actions-list');
    if (!el) return;
    const actions = ruleForm.actions;
    if (!actions.length) {
      el.innerHTML = `<div class="text-muted" style="font-size:13px;padding:4px 0">No actions configured.</div>`;
      return;
    }
    el.innerHTML = actions.map((a, i) => {
      const info = ACTION_TYPE_LABELS[a.action_type] || ACTION_TYPE_LABELS.http;
      return `
        <div class="action-card interactive">
          <div class="action-card-head">
            <i class="fa-solid ${info.icon} action-icon" style="color:${info.color}"></i>
            <span class="action-title">${esc(info.label)}</span>
            <span class="text-muted" style="font-size:12px">pos ${Number(a.position ?? i)}</span>
            <span class="left-item-badge ${a.active ? 'badge-active':'badge-inactive'}">${a.active?'ON':'OFF'}</span>
            <div class="action-card-actions">
              <button data-act="edit" data-idx="${i}" title="Edit"><i class="fa-solid fa-pen"></i></button>
              <button data-act="del" data-idx="${i}" class="danger" title="Delete"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
          <div class="action-summary mono">${esc(summarizeAction(a))}</div>
        </div>`;
    }).join('');
    el.querySelectorAll('button[data-act]').forEach(btn => {
      const i = Number(btn.getAttribute('data-idx'));
      if (btn.getAttribute('data-act') === 'edit') btn.addEventListener('click', () => editAction(i));
      else btn.addEventListener('click', () => removeAction(i));
    });
  }

  // Enable/disable the Add-action affordance based on whether the rule is saved.
  function wireActionAddButton() {
    const btn = E('rule-action-add');
    const note = E('rule-action-disabled-note');
    if (!btn) return;
    const saved = ruleForm.id != null;
    btn.disabled = !saved;
    if (note) note.style.display = saved ? 'none' : '';
    btn.onclick = saved ? () => addAction() : null;
    // Duplicate button — only rendered for saved rules (isNew skips the block).
    const dup = E('rule-duplicate');
    if (dup) dup.onclick = () => onDuplicateRule();
  }

  // Server-side deep copy (rule + actions), created INACTIVE. Copies the last
  // SAVED state — if the editor is dirty we warn, since the user may expect
  // their in-progress edits in the copy. On success we navigate to the copy;
  // selectRule() rebuilds the editor, so no explicit discard is needed.
  async function onDuplicateRule() {
    if (ruleForm.id == null) return;
    if (editorState.isDirty) {
      const res = await Swal.fire({
        icon: 'question', title: 'Duplicate saved rule?',
        text: 'You have unsaved edits. The duplicate copies the last SAVED version of this rule — your unsaved edits are not included and will be discarded when the copy opens. Continue?',
        showCancelButton: true, confirmButtonText: 'Duplicate', cancelButtonText: 'Back',
      });
      if (!res.isConfirmed) return;
    }
    const btn = E('rule-duplicate');
    if (btn) btn.disabled = true;
    try {
      const data = await api(`/api/email-ingest/rules/${ruleForm.id}/duplicate`, 'POST', {});
      const row = (data && data.rule) ? data.rule : data;
      if (!row || row.id == null) throw new Error('Server returned no rule');
      Toast.fire({ icon: 'success', title: 'Duplicated — copy is inactive' });
      cache.rules.loaded = false;
      await loadRules(true);
      await selectRule(row.id);   // opens the copy; sets editorState fresh
    } catch (e) {
      if (btn) btn.disabled = false;
      Swal.fire({ icon: 'error', title: 'Duplicate failed', text: e.message || 'The server rejected the duplicate.' });
    }
  }

  async function addAction() {
    if (ruleForm.id == null) return;
    const { value } = await Swal.fire({
      title: 'Add action',
      html: buildActionForm({}),
      width: 600,
      showCancelButton: true,
      confirmButtonText: 'Add',
      didOpen: () => initActionFormHandlers({}),
      preConfirm: () => collectActionForm(),
    });
    if (!value) return;
    try {
      const result = await api(`/api/email-ingest/rules/${ruleForm.id}/actions`, 'POST', value);
      const row = (result && result.action) ? result.action : result;
      ruleForm.actions.push(row);
      renderActionCards();
      Toast.fire({ icon: 'success', title: 'Action added' });
    } catch (e) {
      Swal.fire({ icon: 'error', title: 'Add failed', text: e.message || 'The server rejected the action.' });
    }
  }

  async function editAction(i) {
    const a = ruleForm.actions[i];
    if (!a) return;
    const { value } = await Swal.fire({
      title: 'Edit action',
      html: buildActionForm(a),
      width: 600,
      showCancelButton: true,
      confirmButtonText: 'Update',
      didOpen: () => initActionFormHandlers(a),
      preConfirm: () => collectActionForm(),
    });
    if (!value) return;
    try {
      const result = await api(`/api/email-ingest/rule-actions/${a.id}`, 'PUT', value);
      const row = (result && result.action) ? result.action : result;
      // merge: keep id + rule_id, take updated fields
      ruleForm.actions[i] = Object.assign({}, a, row, value);
      renderActionCards();
      Toast.fire({ icon: 'success', title: 'Action updated' });
    } catch (e) {
      Swal.fire({ icon: 'error', title: 'Update failed', text: e.message || 'The server rejected the action.' });
    }
  }

  async function removeAction(i) {
    const a = ruleForm.actions[i];
    if (!a) return;
    const res = await Swal.fire({
      icon: 'warning', title: 'Delete action?',
      html: `Delete this <strong>${esc((ACTION_TYPE_LABELS[a.action_type]||{}).label || a.action_type)}</strong> action?`,
      showCancelButton: true, confirmButtonText: 'Delete', cancelButtonText: 'Cancel', confirmButtonColor: '#ef4444',
    });
    if (!res.isConfirmed) return;
    try {
      await api(`/api/email-ingest/rule-actions/${a.id}`, 'DELETE');
      ruleForm.actions.splice(i, 1);
      renderActionCards();
      Toast.fire({ icon: 'success', title: 'Action deleted' });
    } catch (e) {
      Swal.fire({ icon: 'error', title: 'Delete failed', text: e.message || 'The server rejected the delete.' });
    }
  }

  // default_contact_id_from; not set here") — surfaced in the action form so
  // operators understand how data reaches the automation. Returns '' if none.
  // ── Lifted identical from phoneIngest.html — keep in sync. ──
  function actionNote(type) {
    const at = (meta.action_types || []).find(a => a.value === type);
    const note = at && at.config_schema_hint && at.config_schema_hint.note;
    return note ? String(note) : '';

    const n = actionNote(type);

            <input id="swal-a-position" class="swal2-input" type="number" min="0" step="1" style="margin:0;width:100%" value="${Number(a.position ?? 0)}">
          </div>

            <input type="checkbox" id="swal-a-active" ${a.active !== false && a.active !== 0 ? 'checked' : ''}>
            <label for="swal-a-active" style="font-size:13px">Active</label>

  function initActionFormHandlers(a) {
    const typeEl = document.getElementById('swal-a-type');
    if (!typeEl) return;
    const updateSections = () => {
      const type = typeEl.value;
      document.querySelectorAll('.swal-a-section').forEach(sec => {
        sec.style.display = sec.id === `swal-a-sec-${type}` ? '' : 'none';
      });
    };
    typeEl.addEventListener('change', updateSections);
    updateSections();

    // forward channel toggle (Slice 9B) — swaps the From widget and hides the
    // email-only subject-prefix field when forwarding as SMS.
    const fwdChEl = document.getElementById('swal-a-fwd-channel');
    if (fwdChEl) {
      const updateFwdChannel = () => {
        const isEmail = fwdChEl.value !== 'sms';
        const we = document.getElementById('swal-a-fwd-from-email-wrap');
        const ws = document.getElementById('swal-a-fwd-from-sms-wrap');
        const sj = document.getElementById('swal-a-fwd-subj-wrap');
        if (we) we.style.display = isEmail ? '' : 'none';
        if (ws) ws.style.display = isEmail ? 'none' : '';
        if (sj) sj.style.display = isEmail ? '' : 'none';
      };
      fwdChEl.addEventListener('change', updateFwdChannel);
      updateFwdChannel();
    }

    // sequence enrollment-mode toggle
    const seqModeEl = document.getElementById('swal-a-seq-mode');
    if (seqModeEl) {
      const updateSeqMode = () => {
        const mode = seqModeEl.value;
        const byType = document.getElementById('swal-a-seq-by-type');
        const byId   = document.getElementById('swal-a-seq-by-id');
        if (byType) byType.style.display = mode === 'type' ? '' : 'none';
        if (byId)   byId.style.display   = mode === 'id'   ? '' : 'none';
      };
      seqModeEl.addEventListener('change', updateSeqMode);
      updateSeqMode();
    }

    // http body-mode toggle
    const bodyModeEl = document.getElementById('swal-a-bodymode');
    const bodyWrap   = document.getElementById('swal-a-template-wrap');
    if (bodyModeEl && bodyWrap) {
      const updateBody = () => { bodyWrap.style.display = bodyModeEl.value === 'template' ? '' : 'none'; };
      bodyModeEl.addEventListener('change', updateBody);
      updateBody();
    }

    // internal_function params mapping — shared widget (paramsMapping.js).
    // Open-for-edit paints EXACTLY the stored rows, undecorated. Seeding is
    // driven only by the function <select>'s change event below, so reopening
    // an existing action never grows rows under the operator.
    const cfg = parseJson(a.config) || {};
    pmRender(aPmEl(), cfg.params_mapping || {}, A_PM_OPTS);

    const addBtn = document.getElementById('swal-a-fn-add');
    if (addBtn) addBtn.addEventListener('click', () => pmAddRow(aPmEl(), A_PM_OPTS));

    // Meta-driven seeding. Picking a function appends one row per declared param
    // not already present (declaration order), prefilled with the param's
    // default as a quoted literal, and marks required params / tooltips the
    // description / hints enum values. Rows the operator already filled are
    // preserved across a function switch — including out-of-schema keys, which
    // the param validator tolerates by design.
    //
    // Passing null as existingMapping is deliberate: the merge base is then read
    // off the CURRENT DOM rather than the saved config, which is what makes the
    // switch-function-preserves-typing behavior work.
    const fnSel = document.getElementById('swal-a-fn');
    if (fnSel) fnSel.addEventListener('change', () => {
      if (!fnSel.value) return;   // "— select a function —" → leave the rows alone
      const fnMeta = (meta.targets?.internal_function_meta || {})[fnSel.value] || null;
      pmSeedFromMeta(aPmEl(), fnMeta, null, A_PM_OPTS);
    });
  }

  // ── Params-mapping widget (public/automation/paramsMapping.js) ─────────
  //
  // The renderActionParamsMapping / buildActionParamRow /
  // collectActionParamsMapping trio that used to live here — near-verbatim in
  // phoneIngest.html and, with different class names, in hooks.html — is now
  // the shared module. Only the page-specific ids stay local.
  //
  // Two behavior changes ride along with the consolidation:
  //   - Row classes are the module's pm-key / pm-val / pm-del. The old
  //     swal-apm-* names were pure JS selectors, used by nothing outside that
  //     trio and styled by no rule (grep-verified across public/).
  //   - pmCollect now DROPS rows whose value is blank, not just rows whose key
  //     is blank. Seeded-but-unfilled rows are scaffolding; persisting them as
  //     `{ subject: "" }` would resolve to undefined at dispatch. Verified
  //     against live data — no production mapping row has an empty value.
  const A_PM_OPTS = { datalistId: 'a-pm-source-datalist' };
  const aPmEl = () => document.getElementById('swal-a-fn-params');

  // Harvest the action form → {action_type, config, position, active}.
  function collectActionForm() {
    const type = document.getElementById('swal-a-type').value;
    const position = Math.max(0, parseInt(document.getElementById('swal-a-position').value, 10) || 0);
    const active = document.getElementById('swal-a-active').checked ? 1 : 0;

    if (type === 'workflow') {
      const wfId = parseInt(document.getElementById('swal-a-wf').value, 10);
      if (!Number.isInteger(wfId) || wfId <= 0) { Swal.showValidationMessage('Select a workflow'); return false; }
      return { action_type: 'workflow', config: { workflow_id: wfId }, position, active };
    }

    // Slice 9B: Forward pseudo-type → saved as an internal_function action.
    if (type === 'forward') {
      const channel = document.getElementById('swal-a-fwd-channel').value === 'sms' ? 'sms' : 'email';
      const to = document.getElementById('swal-a-fwd-to').value.trim();
      const fromEl = document.getElementById(channel === 'email' ? 'swal-a-fwd-from-email' : 'swal-a-fwd-from-sms');
      const from = ((fromEl && fromEl.value) || '').trim();
      if (!to)   { Swal.showValidationMessage(channel === 'email' ? 'Enter a recipient email address' : 'Enter a recipient phone number'); return false; }
      if (!from) { Swal.showValidationMessage(channel === 'email' ? 'Select a sending address' : 'Select a sending line'); return false; }
      // Literal wrapping per resolveParamsMapping (lib/actionDispatchers):
      // only the OUTER single-quote pair is stripped at resolve time
      // (source.slice(1, -1)), so values containing interior single quotes
      // are safe without escaping. event: '$' (bare, unquoted) passes the
      // whole post-transform envelope through.
      const q = v => `'${v}'`;
      const pm = { event: '$', to: q(to), from: q(from) };
      if (channel === 'email') {
        const sp = document.getElementById('swal-a-fwd-subj').value;
        if (sp.trim() !== '') pm.subject_prefix = q(sp); // omit when empty
      }
      const bp = document.getElementById('swal-a-fwd-body').value;
      if (bp.trim() !== '') pm.body_prefix = q(bp); // omit when empty
      return {
        action_type: 'internal_function',
        config: {
          function_name: channel === 'email' ? 'forward_as_email' : 'forward_as_sms',
          params_mapping: pm,
        },
        position, active,
      };
    }

    if (type === 'sequence') {
      const mode = document.getElementById('swal-a-seq-mode').value;
      const cidField = document.getElementById('swal-a-seq-cid').value.trim() || 'contact_id';
      const tdRaw = document.getElementById('swal-a-seq-td').value.trim();
      const triggerDataFields = tdRaw ? tdRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
      if (mode === 'id') {
        const tplId = parseInt(document.getElementById('swal-a-seq-id').value, 10);
        if (!Number.isInteger(tplId) || tplId <= 0) { Swal.showValidationMessage('Select a template'); return false; }
        return { action_type: 'sequence', config: { template_id: tplId, contact_id_field: cidField, trigger_data_fields: triggerDataFields }, position, active };
      }
      const tt = document.getElementById('swal-a-seq-type').value.trim();
      if (!tt) { Swal.showValidationMessage('Select a template type'); return false; }
      return { action_type: 'sequence', config: { template_type: tt, contact_id_field: cidField, trigger_data_fields: triggerDataFields }, position, active };
    }

    if (type === 'hook') {
      const slug = document.getElementById('swal-a-hook').value.trim();
      if (!slug) { Swal.showValidationMessage('Select a hook'); return false; }
      return { action_type: 'hook', config: { slug }, position, active };
    }

    if (type === 'internal_function') {
      const fn = document.getElementById('swal-a-fn').value.trim();
      if (!fn) { Swal.showValidationMessage('Select a function'); return false; }
      return { action_type: 'internal_function', config: { function_name: fn, params_mapping: pmCollect(aPmEl()) }, position, active };
    }

    if (type === 'http') {
      const url = document.getElementById('swal-a-url').value.trim();
      if (!url) { Swal.showValidationMessage('HTTP actions require a URL'); return false; }
      const cfg = {
        url,
        method: document.getElementById('swal-a-method').value,
        body_mode: document.getElementById('swal-a-bodymode').value,
      };
      const tpl = document.getElementById('swal-a-template').value;
      if (cfg.body_mode === 'template' && tpl) cfg.body_template = tpl;
      const credVal = document.getElementById('swal-a-cred').value;
      if (credVal) cfg.credential_id = parseInt(credVal, 10);
      return { action_type: 'http', config: cfg, position, active };
    }

    Swal.showValidationMessage(`Unknown action type: ${type}`);
    return false;
  }

  async function loadExecutions(force = false) {
    const c = cache.executions;
    if (c.loaded && !force) { renderExecutionTable(); return; }
    E('ei-exec-body').innerHTML = `<div class="exec-loading"><i class="fa-solid fa-spinner spin"></i> Loading…</div>`;
    E('ei-exec-footer').style.display = 'none';
    try {
      const params = new URLSearchParams({ page: String(Math.floor(c.offset / c.limit) + 1), page_size: String(c.limit) });
      if (c.status) params.set('status', c.status);
      const data = await api(`/api/email-ingest/executions?${params.toString()}`);
      c.rows = (data && data.executions) || [];
      // Reconcile from the server's own paging echo so the UI reflects
      // what we actually got (handles a server-side page_size cap).
      const srvPageSize = Number(data?.page_size ?? c.limit);
      const srvPage     = Number(data?.page ?? (Math.floor(c.offset / c.limit) + 1));
      c.limit  = srvPageSize > 0 ? srvPageSize : c.limit;
      c.offset = (srvPage - 1) * c.limit;
      c.total  = Number(data?.total ?? c.rows.length);
      c.loaded = true;
      // keep the limit dropdown honest if the server clamped it
      if (E('ei-limit') && String(c.limit) !== E('ei-limit').value &&
          [...E('ei-limit').options].some(o => o.value === String(c.limit))) {
        E('ei-limit').value = String(c.limit);
      }
      renderExecutionTable();
    } catch (e) {
      E('ei-exec-body').innerHTML = `<div class="exec-error">${esc(e.message)}</div>`;
    }
  }

    const c = cache.executions;
    if (!c.rows.length) {
      E('ei-exec-body').innerHTML = `<div class="exec-empty">No executions match.</div>`;
    } else {
      const rowsHtml = c.rows.map(r => {
        const sm = statusMeta(r.status);
        const md = parseJson(r.metadata);
        const matched = md && Array.isArray(md.matched_rules) && md.matched_rules.length;
        const src = r.source_name || (r.source_id != null ? 'src#' + r.source_id : '—');
        return `
          <tr class="${r.id === c.selId ? 'active' : ''}" onclick="eiSelect(${r.id})">
            <td class="col-created">${esc(fmtDate(r.created_at))}</td>
            <td><span class="status-badge" style="background:${sm.bg};color:${sm.fg}"><span class="status-dot" style="background:${sm.dot}"></span>${esc(sm.label)}</span></td>
            <td class="col-source">${esc(src)}</td>
            <td class="col-msgid mono" title="${esc(r.message_id || '')}">${esc(r.message_id || '(none)')}</td>
            <td style="text-align:center">${matched ? '<i class="fa-solid fa-bullseye" title="Matched rule(s)" style="color:#16a34a"></i>' : '<span class="text-muted">—</span>'}</td>

      E('ei-exec-body').innerHTML = `
        <table class="exec-table">

            <th style="width:160px">Created</th>
            <th style="width:150px">Status</th>
            <th style="width:160px">Source</th>
            <th>Message ID</th>

  // Footer: ported log-style windowed pager + "Showing N–M of T".
  function renderExecFooter() {
    const c = cache.executions;
    const foot = E('ei-exec-footer');
    foot.style.display = 'flex';
    foot.innerHTML = '';

    const pagWrap = document.createElement('span');
    pagWrap.className = 'log-pagination';
    foot.appendChild(pagWrap);
    renderLogPagination(pagWrap, c.total, c.limit, c.offset, (p) => eiJumpPage(p));

    const shownStart = c.total === 0 ? 0 : c.offset + 1;
    const shownEnd = Math.min(c.total, c.offset + c.rows.length);
    const metaSpan = document.createElement('span');
    metaSpan.innerHTML = `<span class="sep">|</span> Showing ${shownStart}–${shownEnd} of ${c.total}`;
    foot.appendChild(metaSpan);
  }

  // jumpFn: 1-based page → offset, re-fetch
  function eiJumpPage(p) {
    const c = cache.executions;
    const totalPages = Math.max(1, Math.ceil(c.total / c.limit));
    p = Math.max(1, Math.min(totalPages, p));
    c.offset = (p - 1) * c.limit;
    c.loaded = false;
    loadExecutions(true);
  }

  // ════════════════════════════════════════════════════════════════
  // PORTED PAGER — renderLogPagination (from scripts.js, May 2026).
  // Verbatim algorithm: ≤7 pages = list all; >7 = {1,2 … cur±2 … last-1,
  // last} with a number input on the current page. jumpFn = 1-based page.
  // ════════════════════════════════════════════════════════════════
  function renderLogPagination(containerEl, total, limit, offset, jumpFn) {
    containerEl.innerHTML = '';
    if (!total || total < 0) total = 0;
    if (!limit || limit < 1) limit = 1;
    const totalPages = Math.max(1, Math.ceil(total / limit));
    const current = Math.min(totalPages, Math.max(1, Math.floor(offset / limit) + 1));
    const parts = [];

    if (totalPages <= 7) {
      for (let i = 1; i <= totalPages; i++) {
        parts.push(i === current ? `<strong>${i}</strong>` : `<a href="#" data-page="${i}">${i}</a>`);
      }
    } else {
      const pages = new Set([1, 2, totalPages - 1, totalPages]);
      for (let p = current - 2; p <= current + 2; p++) if (p >= 1 && p <= totalPages) pages.add(p);
      const sorted = [...pages].sort((a, b) => a - b);
      let prev = 0;
      for (const p of sorted) {
        if (prev && p > prev + 1) parts.push(`<span class="log-pagination-ellipsis">…</span>`);
        if (p === current) {
          parts.push(`<input type="number" min="1" max="${totalPages}" value="${current}" class="logPageInput" aria-label="Jump to page">`);
        } else {
          parts.push(`<a href="#" data-page="${p}">${p}</a>`);
        }
        prev = p;
      }
    }
    containerEl.innerHTML = parts.join(' ');

    containerEl.querySelectorAll('a[data-page]').forEach(a => {
      a.addEventListener('click', (ev) => {
        ev.preventDefault();
        const p = parseInt(a.getAttribute('data-page'), 10);
        if (!isNaN(p)) jumpFn(p);
      });
    });
    const input = containerEl.querySelector('.logPageInput');
    if (input) {
      const submit = () => {
        let p = parseInt(input.value, 10);
        if (isNaN(p)) { input.value = current; return; }
        p = Math.max(1, Math.min(totalPages, p));
        if (p !== current) jumpFn(p); else input.value = current;
      };
      input.addEventListener('keypress', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); submit(); } });
      input.addEventListener('blur', submit);
      input.addEventListener('focus', () => input.select());
    }
  }

  function placeholderBanner(t) { return `<div class="ei-placeholder-banner"><i class="fa-solid fa-circle-info"></i> ${esc(t)}</div>`; }
  function kvCard(title, rows) {
    const body = rows.map(([k, v]) => `<div class="kv-row"><div class="kv-key">${esc(k)}</div><div class="kv-val">${v}</div></div>`).join('');
    return `<div class="kv-card"><div class="kv-card-head">${esc(title)}</div>${body}</div>`;
  }
  function jsonCard(title, raw) {
    const obj = parseJson(raw);
    const body = (obj === null)
      ? `<div style="padding:12px 14px;color:var(--muted);font-style:italic;font-size:13px">null</div>`
      : `<div style="padding:12px 14px"><pre class="json">${esc(prettyJson(obj))}</pre></div>`;
    return `<div class="kv-card"><div class="kv-card-head">${esc(title)}</div>${body}</div>`;
  }
  function activeBadge(v) {
    return `<span class="left-item-badge" style="color:${v ? '#166534':'#991b1b'};background:${v ? '#dcfce7':'#fef2f2'}">${v ? 'ON':'OFF'}</span>`;
  }
  function nullSpan(t) { return `<span class="kv-val null">${esc(t)}</span>`; }
  function prettyJson(raw) {
    const obj = parseJson(raw);
    if (obj === null) return 'null';
    try { return JSON.stringify(obj, null, 2); } catch { return String(raw); }
  }
  function fmtDate(d) { if (!d) return '—'; const dt = new Date(d); return isNaN(dt.getTime()) ? String(d) : dt.toLocaleString(); }
  function fmtDateOrNull(d) { return d ? esc(fmtDate(d)) : nullSpan('—'); }

    if (!editorState.editorOpen) return;
    if (activeTab === 'suppressions') return onSaveSuppression();

  async function onSaveSuppression() {
    const payload = collectSuppressionForm();

    // hard validation
    if (!payload.name) {
      Swal.fire({ icon: 'error', title: 'Name required', text: 'Give the suppression a name.' });
      return;
    }
    // soft warnings (allow, but confirm)
    if (payload.match_mode === 'conditions' && (!payload.match_config.conditions || payload.match_config.conditions.length === 0)) {
      const res = await Swal.fire({
        icon: 'warning', title: 'No conditions',
        text: 'An empty condition set matches every email. Save anyway?',
        showCancelButton: true, confirmButtonText: 'Save anyway', cancelButtonText: 'Back',
      });
      if (!res.isConfirmed) return;
    }
    if (payload.match_mode === 'code' && !String(payload.match_config.code || '').trim()) {
      const res = await Swal.fire({
        icon: 'warning', title: 'Empty code',
        text: 'The match code is empty (it will never suppress). Save anyway?',
        showCancelButton: true, confirmButtonText: 'Save anyway', cancelButtonText: 'Back',
      });
      if (!res.isConfirmed) return;
    }

    try {
      let saved;
      if (editorState.isNew) {
        saved = await api('/api/email-ingest/suppressions', 'POST', payload);
      } else {
        saved = await api(`/api/email-ingest/suppressions/${selectedId}`, 'PUT', payload);
      }
      const row = (saved && saved.suppression) ? saved.suppression : saved;
      const newId = (row && row.id != null) ? row.id : selectedId;

      Toast.fire({ icon: 'success', title: editorState.isNew ? 'Suppression created' : 'Saved' });

      // refresh list, then re-select the saved record and re-render its editor
      cache.suppressions.loaded = false;
      await loadSuppressions(true);
      if (newId != null) {
        await selectSuppression(newId);    // sets editorState fresh (isNew=false, clean)
      } else {
        closeEditor(); clearDetail(); updateTopbarButtons();
      }
    } catch (e) {
      Swal.fire({ icon: 'error', title: 'Save failed', text: e.message || 'The server rejected the suppression.' });
      // keep the form open so the user can fix it
    }
  }

    if (activeTab === 'executions') { cache.executions.loaded = false; cache.executions.selId = null; eiCloseDrawer(); }
    else {
      if ((activeTab === 'suppressions' || activeTab === 'rules') && !(await confirmDiscardIfDirty())) return;
      closeEditor();
      cache[activeTab].loaded = false; selectedId = null; clearDetail();
    }
    await loadActiveTab(true);
    updateTopbarButtons();
    Toast.fire({ icon: 'success', title: 'Refreshed' });
  }

  async function onNew() {
    if (activeTab === 'executions') return; // shell hides New here anyway

    // Suppressions: open a blank editor (Slice 3.3).
    if (activeTab === 'suppressions') {
      if (!(await confirmDiscardIfDirty())) return;
      selectedId = null;
      editorState = { isNew: true, editorOpen: true, isDirty: false };
      renderSuppressionList();
      showDetail();
      renderSuppressionDetail({
        name: '', description: '', active: 1,
        match_mode: 'conditions',
        match_config: { operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] },
      });
      updateTopbarButtons();
      return;
    }

    // Rules: open a blank rule editor (Slice 3.4). Actions section is
    // disabled until the rule's first save (actions FK to rule_id).
    if (activeTab === 'rules') {
      if (!(await confirmDiscardIfDirty())) return;
      selectedId = null;
      editorState = { isNew: true, editorOpen: true, isDirty: false };
      renderRuleList();
      showDetail();
      renderRuleDetail({
        name: '', description: '', active: 1, position: 0,
        match_mode: 'conditions',
        match_config: { operator: 'and', conditions: [{ path: '', op: 'equals', value: '' }] },
        transform_mode: 'passthrough', transform_config: null,
        actions: [],
      });
      updateTopbarButtons();
      return;
    }
  }

  window.onShow = onShow; window.onHide = onHide;
  window.onSave = onSave; window.onDelete = onDelete;
  window.onRefresh = onRefresh; window.onNew = onNew;

  (function waitForShell() {
    if (P && typeof P.apiSend === 'function' && typeof P.setTopbarButtons === 'function') return init();
    setTimeout(waitForShell, 50);
  })();
})();
</script>
