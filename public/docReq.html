<script>
  // ── Init ─────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const caseId = params.get('case');

  if (!caseId) {
    showError('Invalid link. Please contact our office.');
  } else {
    fetch(`/api/public/docs/${caseId}`)
      .then(r => {
        if (!r.ok) throw new Error('Not found');
        return r.json();
      })
      .then(data => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main').style.display = 'block';

        const name  = data.name  || 'there';
        const items = data.items || [];

        document.getElementById('greeting').textContent = `Hi ${name}!`;

        document.getElementById('intro-text').textContent =
          items.length > 0
            ? `Please provide the following ${items.length} document${items.length > 1 ? 's' : ''}. Upload them below.`
            : '';

        const list = document.getElementById('doc-list');

        if (items.length === 0) {
          list.style.display = 'none';
          document.getElementById('all-clear').style.display = 'block';
          document.getElementById('upload-card').style.display = 'none';
        } else {
          items.forEach((item, i) => {
            const li = document.createElement('li');
            li.innerHTML = `
              <span class="doc-num">${i + 1}</span>
              <span>${item}</span>`;
            list.appendChild(li);
          });
        }
      })
      .catch(() => showError('We couldn\'t load your document list.'));
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error-msg');
    err.style.display = 'block';
    err.textContent = msg;
  }

  // ── Upload logic ─────────────────────────────────────
  const uploadForm = document.getElementById('upload-form');
  const statusDiv  = document.getElementById('upload-status');
  const button     = uploadForm.querySelector('button');

  uploadForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const files = document.getElementById('files').files;
    if (!files.length) return;

    button.disabled = true;
    statusDiv.innerHTML = '';

    for (const file of files) {
      const row = document.createElement('div');
      row.className = 'upload-row';
      row.textContent = `Uploading ${file.name}...`;
      statusDiv.appendChild(row);

      try {
        // 1. Get temp upload link
        const res = await fetch('/api/public/get-upload-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            case_id: caseId,
            filename: file.name
          })
        });

        if (!res.ok) throw new Error('Link failed');

        const { link } = await res.json();

        // 2. Upload with progress
        await uploadWithProgress(link, file, (percent) => {
          row.textContent = `${file.name} – ${percent}%`;
        });

        row.textContent = `${file.name} ✓ uploaded`;

      } catch (err) {
        console.error(err);
        row.textContent = `${file.name} ✗ failed`;
      }
    }

    button.disabled = false;
  });

function uploadWithProgress(url, file, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();

    xhr.open('POST', url);   // Note: Dropbox temp links usually expect POST, but confirm with your backend

    // CRITICAL: Add this
    xhr.setRequestHeader('Content-Type', 'application/octet-stream');

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const percent = Math.round((e.loaded / e.total) * 100);
        onProgress(percent);
      }
    };

    xhr.onload = () => {
      if (xhr.status === 200) {
        resolve();
      } else {
        console.error('Upload failed with status:', xhr.status, xhr.responseText);
        reject(new Error(`Upload failed: ${xhr.status} - ${xhr.responseText}`));
      }
    };

    xhr.onerror = () => {
      console.error('Network error during upload');
      reject(new Error('Network error'));
    };

    xhr.send(file);   // Send the raw File object (this is correct)
  });
}
</script>
