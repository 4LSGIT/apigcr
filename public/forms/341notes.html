<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>341 Meeting Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="/css/yc-forms.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="yc-form-header">
  <div class="yc-toggle" style="display:none;">
    <input class="form-check-input" type="checkbox" id="toggleBtn">
    <label class="form-check-label" for="toggleBtn" id="toggleLabel">View Mode</label>
  </div>
  <span class="yc-save-status" id="saveStatus"></span>
  <span class="yc-warning" id="warning" style="display:none;"></span>
</div>

<div class="yc-draft-banner" id="draftBanner" style="display:none;">
  <span>You have unsaved changes from <strong id="draftTimestamp"></strong></span>
  <button class="yc-btn yc-btn-sm yc-btn-primary" id="draftRestore">Restore</button>
  <button class="yc-btn yc-btn-sm yc-btn-secondary" id="draftDiscard">Discard</button>
</div>

<form id="form341" class="yc-form">

  <!-- Hidden fields: workflow data passed through collect() → workflow variables -->
  <input type="hidden" name="primary_contact_id">
  <input type="hidden" name="attorney_user_id">
  <input type="hidden" name="attorney_email">
  <input type="hidden" name="attorney_name">

  <!-- ═══ HEADER INFO (locked, pre-filled) ═══ -->
  <div class="yc-row">
    <div class="yc-field yc-field-locked">
      <label class="yc-label">Case ID</label>
      <input type="text" name="case_id" data-yc-locked-msg="The Case ID cannot be changed">
    </div>
    <div class="yc-field yc-field-locked yc-2x">
      <label class="yc-label">Case Number</label>
      <input type="text" name="case_number" data-yc-locked-msg="The Case Number can be changed in the Case Information Form">
    </div>
  </div>

  <div class="yc-section-title">Debtor</div>
  <div class="yc-row">
    <div class="yc-field yc-field-locked">
      <label class="yc-label">First Name</label>
      <input type="text" name="debtor_fname" data-yc-locked-msg="The Primary client can be changed under the 'People' tab">
    </div>
    <div class="yc-field yc-field-locked">
      <label class="yc-label">Middle Name</label>
      <input type="text" name="debtor_mname" data-yc-locked-msg="The Primary client can be changed under the 'People' tab">
    </div>
    <div class="yc-field yc-field-locked">
      <label class="yc-label">Last Name</label>
      <input type="text" name="debtor_lname" data-yc-locked-msg="The Primary client can be changed under the 'People' tab">
    </div>
  </div>

  <div id="codebtorSection" style="display:none;">
    <div class="yc-section-title">Co-Debtor</div>
    <div class="yc-row">
      <div class="yc-field yc-field-locked">
        <label class="yc-label">First Name</label>
        <input type="text" name="codebtor_fname" data-yc-locked-msg="The Secondary client can be changed under the 'People' tab">
      </div>
      <div class="yc-field yc-field-locked">
        <label class="yc-label">Middle Name</label>
        <input type="text" name="codebtor_mname" data-yc-locked-msg="The Secondary client can be changed under the 'People' tab">
      </div>
      <div class="yc-field yc-field-locked">
        <label class="yc-label">Last Name</label>
        <input type="text" name="codebtor_lname" data-yc-locked-msg="The Secondary client can be changed under the 'People' tab">
      </div>
    </div>
  </div>

  <div class="yc-row">
    <div class="yc-field yc-field-locked">
      <label class="yc-label">Trustee Name</label>
      <input type="text" name="trustee" data-yc-locked-msg="The Trustee can be changed in the Case Information Form">
    </div>
    <div class="yc-field yc-field-locked">
      <label class="yc-label">341 Meeting Date & Time</label>
      <input type="datetime-local" name="meeting_datetime" data-yc-locked-msg="The 341 can be changed by selecting a new control date below">
    </div>
  </div>

  <!-- ═══ OUTCOME ═══ -->
  <div class="yc-section">
    <div class="yc-section-title">341 Outcome</div>
    <div class="yc-field">
      <div class="yc-radio-group">
        <label><input type="radio" name="outcome" value="Continued"> Continued</label>
        <label><input type="radio" name="outcome" value="Completed"> Completed</label>
      </div>
    </div>
  </div>

  <!-- ═══ CONTINUED SECTION (hidden when outcome = Completed) ═══ -->
  <div id="continuedSection">

    <!-- ── Missing Documents ── -->
    <div class="yc-section">
      <div class="yc-section-title">Missing Documents</div>
      <div class="yc-check-grid" data-yc-checkgroup="missing_docs">
        <label><input type="checkbox" value="2022 Tax Return"> 2022 Tax Return</label>
        <label><input type="checkbox" value="2023 Tax Return"> 2023 Tax Return</label>
        <label><input type="checkbox" value="2024 Tax Return"> 2024 Tax Return</label>
        <label><input type="checkbox" value="Bank Statements"> Bank Statements</label>
        <label><input type="checkbox" value="Pay Stubs"> Pay Stubs</label>
        <label><input type="checkbox" value="Vehicle Title(s)"> Vehicle Title(s)</label>
        <label><input type="checkbox" value="Retirement Statement"> Retirement Statement</label>
        <label><input type="checkbox" value="Life Insurance Info"> Life Insurance Info</label>
        <label><input type="checkbox" value="Recorded Deed"> Recorded Deed</label>
        <label><input type="checkbox" value="Recorded Mortgage"> Recorded Mortgage</label>
        <label><input type="checkbox" value="Mortgage Statement"> Mortgage Statement</label>
        <label><input type="checkbox" value="SEV Statement"> SEV Statement</label>
        <label><input type="checkbox" value="Homeowner's Policy"> Homeowner's Policy</label>
        <label><input type="checkbox" value="Divorce Judgment"> Divorce Judgment</label>
        <label><input type="checkbox" value="Business Documents"> Business Documents</label>
        <label><input type="checkbox" data-yc-other value="Other"> Other</label>
        <div class="yc-other-text" id="missingDocsOther" style="display:none;">
          <input type="text" data-yc-other-text placeholder="Specify other missing documents">
        </div>
      </div>
      <div class="yc-field">
        <label class="yc-label">Notes RE: Missing Documents</label>
        <textarea name="missing_docs_notes" rows="3" maxlength="2000"></textarea>
      </div>
    </div>

    <!-- ── Amendments Needed ── -->
    <div class="yc-section">
      <div class="yc-section-title">Amendments Needed</div>
      <div class="yc-check-grid" data-yc-checkgroup="amendments">
        <label><input type="checkbox" value="Cover Sheet"> Cover Sheet</label>
        <label><input type="checkbox" value="Schedule A"> Schedule A</label>
        <label><input type="checkbox" value="Schedule B"> Schedule B</label>
        <label><input type="checkbox" value="Schedule C"> Schedule C</label>
        <label><input type="checkbox" value="Schedule D"> Schedule D</label>
        <label><input type="checkbox" value="Schedule E"> Schedule E</label>
        <label><input type="checkbox" value="Schedule F"> Schedule F</label>
        <label><input type="checkbox" value="Schedule G"> Schedule G</label>
        <label><input type="checkbox" value="Schedule H"> Schedule H</label>
        <label><input type="checkbox" value="Schedule I"> Schedule I</label>
        <label><input type="checkbox" value="Schedule J"> Schedule J</label>
        <label><input type="checkbox" value="SOFA"> SOFA</label>
        <label><input type="checkbox" value="Add creditor(s)"> Add creditor(s)?</label>
        <label><input type="checkbox" data-yc-other value="Other"> Other</label>
        <div class="yc-other-text" id="amendmentsOther" style="display:none;">
          <input type="text" data-yc-other-text placeholder="Specify other amendments needed">
        </div>
      </div>
      <div class="yc-field">
        <label class="yc-label">Notes RE: Amendments Needed</label>
        <textarea name="amendments_notes" rows="3" maxlength="2000"></textarea>
      </div>
    </div>

    <!-- ── Other Issues ── -->
    <div class="yc-section">
      <div class="yc-section-title">Other Issues</div>
      <div class="yc-field">
        <textarea name="other_issues" rows="4" maxlength="3000"></textarea>
      </div>
    </div>

    <!-- ── Control Date & Appearance ── -->
    <div class="yc-section">
      <div class="yc-section-title">Next Steps</div>
      <div class="yc-row">
        <div class="yc-field">
          <label class="yc-label">New Control Date & Time</label>
          <input type="datetime-local" name="new_control_datetime">
        </div>
        <div class="yc-field">
          <label class="yc-label">Documents Due By</label>
          <input type="date" name="docs_due_by">
        </div>
      </div>
      <div class="yc-row">
        <div class="yc-field">
          <label class="yc-label">Appearance Required?</label>
          <div class="yc-radio-group">
            <label><input type="radio" name="appearance_required" value="YES"> YES</label>
            <label><input type="radio" name="appearance_required" value="NO"> NO</label>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /continuedSection -->

  <button type="button" class="yc-btn yc-btn-primary yc-btn-block" id="saveBtn">
    Save
  </button>
</form>

<script src="/js/yc-forms.js"></script>
<script>
  const P = window.parent;
  const params = new URLSearchParams(location.search);
  const caseId = params.get('case_id');

  if (!caseId) {
    document.body.innerHTML = '<p style="color:red;padding:20px;">Missing case_id parameter.</p>';
  } else {

    const form = new YCForm({
      formKey:       '341_notes',
      schemaVersion: 1,
      linkType:      'case',
      linkId:        caseId,
      container:     '#form341',
      dataMode:      'snapshot',
      autosave:      true,
      autosaveMs:    3000,
      readonly:      false,          // always in edit mode — no toggle needed

      fields: {
        // Hidden fields for workflow
        primary_contact_id: { el: '[name="primary_contact_id"]', type: 'text', readonly: true },
        attorney_user_id:   { el: '[name="attorney_user_id"]',   type: 'text', readonly: true },
        attorney_email:     { el: '[name="attorney_email"]',     type: 'text', readonly: true },
        attorney_name:      { el: '[name="attorney_name"]',      type: 'text', readonly: true },
        // Visible locked fields
        case_id:           { el: '[name="case_id"]',           type: 'text',     readonly: true },
        case_number:       { el: '[name="case_number"]',       type: 'text',     readonly: true },
        debtor_fname:      { el: '[name="debtor_fname"]',      type: 'text',     readonly: true },
        debtor_mname:      { el: '[name="debtor_mname"]',      type: 'text',     readonly: true },
        debtor_lname:      { el: '[name="debtor_lname"]',      type: 'text',     readonly: true },
        codebtor_fname:    { el: '[name="codebtor_fname"]',    type: 'text',     readonly: true },
        codebtor_mname:    { el: '[name="codebtor_mname"]',    type: 'text',     readonly: true },
        codebtor_lname:    { el: '[name="codebtor_lname"]',    type: 'text',     readonly: true },
        trustee:           { el: '[name="trustee"]',           type: 'text',     readonly: true },
        meeting_datetime:  { el: '[name="meeting_datetime"]',  type: 'text',     readonly: true },
        outcome:           { el: '[name="outcome"]',           type: 'radio' },
        missing_docs:      { el: '[data-yc-checkgroup="missing_docs"]', type: 'checkgroup' },
        missing_docs_notes:{ el: '[name="missing_docs_notes"]',type: 'textarea' },
        amendments:        { el: '[data-yc-checkgroup="amendments"]',   type: 'checkgroup' },
        amendments_notes:  { el: '[name="amendments_notes"]',  type: 'textarea' },
        other_issues:      { el: '[name="other_issues"]',      type: 'textarea' },
        new_control_datetime: { el: '[name="new_control_datetime"]', type: 'text' },
        docs_due_by:       { el: '[name="docs_due_by"]',       type: 'date' },
        appearance_required: { el: '[name="appearance_required"]', type: 'radio' },
      },

      validation: {
        outcome: { required: true },
      },

      endpoints: {
        load: { method: 'GET', url: '/api/cases/{linkId}?include=clients', path: 'case' },
      },

      apiMap: {
        'case_id':          'case_id',
        'case_number_full': 'case_number',
        'case_trustee':     'trustee',
      },

      onSubmit: {
        // Synchronous: update docs_missing, 341_status, docs_due on cases table
        patch: { method: 'PATCH', url: '/api/cases/{linkId}' },
        // Async: create follow-up 341 appt (if needed) + send summary email
        workflow: { id: 7, initData: { source: '341_form' } },
      },

      onLoad: async (data) => {
        const loadResult = form._loadResult || {};
        const caseData = loadResult.case || {};
        const clients = loadResult.clients || [];
        const appts = loadResult.appts || [];

        // ── Prefill visible header fields (only if empty — snapshot guard) ──
        const caseIdEl = document.querySelector('[name="case_id"]');
        if (!caseIdEl.value) caseIdEl.value = caseData.case_id || '';

        const caseNumEl = document.querySelector('[name="case_number"]');
        if (!caseNumEl.value) caseNumEl.value = caseData.case_number_full || caseData.case_number || '';

        const trusteeEl = document.querySelector('[name="trustee"]');
        if (!trusteeEl.value) trusteeEl.value = caseData.case_trustee || '';

        // Primary contact
        const PC = clients.find(c => c.relate_type === 'Primary');
        const debtorFname = document.querySelector('[name="debtor_fname"]');
        if (PC && !debtorFname.value) {
          debtorFname.value = PC.contact_fname || '';
          document.querySelector('[name="debtor_mname"]').value = PC.contact_mname || '';
          document.querySelector('[name="debtor_lname"]').value = PC.contact_lname || '';
        }

        // Secondary contact (co-debtor)
        const SC = clients.find(c => c.relate_type === 'Secondary');
        if (SC) {
          const coFname = document.querySelector('[name="codebtor_fname"]');
          if (!coFname.value) {
            coFname.value = SC.contact_fname || '';
            document.querySelector('[name="codebtor_mname"]').value = SC.contact_mname || '';
            document.querySelector('[name="codebtor_lname"]').value = SC.contact_lname || '';
          }
          document.getElementById('codebtorSection').style.display = '';
        } else if (document.querySelector('[name="codebtor_fname"]').value) {
          document.getElementById('codebtorSection').style.display = '';
        }

        // 341 meeting datetime
        const meetEl = document.querySelector('[name="meeting_datetime"]');
        if (!meetEl.value && caseData.case_341_current) {
          const dtStr = (caseData.case_341_current instanceof Date)
            ? caseData.case_341_current.toISOString()
            : String(caseData.case_341_current);
          const local = dtStr.replace('Z', '').split('.')[0].slice(0, 16);
          if (local.length === 16) meetEl.value = local;
        }

        // ── Hidden fields for workflow (always set from live data) ──

        // Primary contact ID
        const pcIdEl = document.querySelector('[name="primary_contact_id"]');
        if (PC && !pcIdEl.value) pcIdEl.value = PC.contact_id || '';

        // Attorney: find from 341 appt → appt_with, then resolve email
        const apptId341 = caseData['341_appt_id'];
        const appt341 = apptId341 ? appts.find(a => a.appt_id == apptId341) : null;
        const attorneyIdEl = document.querySelector('[name="attorney_user_id"]');
        const attorneyEmailEl = document.querySelector('[name="attorney_email"]');
        const attorneyNameEl = document.querySelector('[name="attorney_name"]');

        if (appt341 && appt341.appt_with && !attorneyIdEl.value) {
          attorneyIdEl.value = appt341.appt_with;

          // Look up attorney email + name via resolver
          try {
            const resolved = await P.apiSend('/resolve', 'POST', {
              text: '{{users.email}}|||{{users.user_name}}',
              refs: { users: { user: appt341.appt_with } }
            });
            if (resolved.status === 'success' && resolved.text) {
              const [email, name] = resolved.text.split('|||');
              attorneyEmailEl.value = email || '';
              attorneyNameEl.value = name || '';
            }
          } catch (err) {
            console.warn('[341] Could not resolve attorney info:', err);
          }
        }
      },

      onSave: (result) => {
        P.postMessage({ type: 'form-saved', form: '341_notes' }, '*');
      },
    });

    // ── "Other" checkbox toggle for text inputs ──
    function setupOtherToggle(checkgroupSelector, otherTextId) {
      const container = document.querySelector(checkgroupSelector);
      if (!container) return;
      const otherCb = container.querySelector('input[data-yc-other]');
      const otherDiv = document.getElementById(otherTextId);
      if (!otherCb || !otherDiv) return;

      otherCb.addEventListener('change', () => {
        otherDiv.style.display = otherCb.checked ? '' : 'none';
      });
    }

    // ── Outcome toggle: hide sections when Completed ──
    function setupOutcomeToggle() {
      const radios = document.querySelectorAll('input[name="outcome"]');
      const section = document.getElementById('continuedSection');
      if (!section) return;

      radios.forEach(r => {
        r.addEventListener('change', () => {
          section.style.display = r.value === 'Completed' && r.checked ? 'none' : '';
        });
      });
    }

    // ── Build PATCH payload override ──
    // The standard PATCH would try to send form field names to /api/cases/:id
    // But this form mostly stores in form_submissions. We only PATCH docs_missing.
    const originalBuildPatch = form._buildPatchPayload.bind(form);
    form._buildPatchPayload = function() {
      const collected = this.collect();
      const payload = {};

      // Only send docs_missing to the cases table
      if (collected.missing_docs) {
        payload.docs_missing = collected.missing_docs;
      }

      // Update 341_status if outcome changed
      if (collected.outcome) {
        payload['341_status'] = collected.outcome;
      }

      // Update docs_due if set
      if (collected.docs_due_by) {
        payload.docs_due = collected.docs_due_by;
      }

      return payload;
    };

    form.init().then(() => {
      setupOtherToggle('[data-yc-checkgroup="missing_docs"]', 'missingDocsOther');
      setupOtherToggle('[data-yc-checkgroup="amendments"]', 'amendmentsOther');
      setupOutcomeToggle();

      // Apply outcome toggle state from loaded data
      const checkedOutcome = document.querySelector('input[name="outcome"]:checked');
      if (checkedOutcome && checkedOutcome.value === 'Completed') {
        document.getElementById('continuedSection').style.display = 'none';
      }
    });
  }
</script>
</body>
</html>
