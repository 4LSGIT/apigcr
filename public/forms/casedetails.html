<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="/css/yc-forms.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .yc-section-title { font-size: 1rem; margin-top: 14px; margin-bottom: 6px; }
    .yc-field { margin-bottom: 8px; }
    .yc-label { font-size: 0.84rem; margin-bottom: 3px; }
    .yc-hint  { font-size: 0.75rem; color: #6c757d; margin-top: 2px; }
  </style>
</head>
<body>

<div class="yc-form-header">
  <div class="yc-toggle" style="display:none;">
    <input class="form-check-input" type="checkbox" id="toggleBtn">
    <label class="form-check-label" for="toggleBtn" id="toggleLabel">Edit Mode</label>
  </div>
  <span class="yc-save-status" id="saveStatus"></span>
  <span class="yc-warning" id="warning" style="display:none;"></span>
</div>

<div class="yc-draft-banner" id="draftBanner" style="display:none;">
  <span>You have unsaved changes from <strong id="draftTimestamp"></strong></span>
  <button class="yc-btn yc-btn-sm yc-btn-primary" id="draftRestore">Restore</button>
  <button class="yc-btn yc-btn-sm yc-btn-secondary" id="draftDiscard">Discard</button>
</div>

<form id="caseDetailsForm" class="yc-form">

  <!-- ═══ HEADER ═══ -->
  <div class="yc-section-title" style="font-size:1.15rem; margin-top:0;">Case Details</div>

  <div class="yc-row">
    <div class="yc-field yc-2x yc-field-locked">
      <label class="yc-label">Client</label>
      <input type="text" name="debtor_name" data-yc-locked-msg="Edit the client name from the Contact page">
    </div>
    <div class="yc-field yc-2x yc-field-locked" id="codebtorField" style="display:none;">
      <label class="yc-label">Secondary Party</label>
      <input type="text" name="codebtor_name" data-yc-locked-msg="Edit the secondary party from the Contact page">
    </div>
  </div>

  <div class="yc-row">
    <div class="yc-field yc-2x">
      <label class="yc-label">Case / Docket Number</label>
      <input type="text" name="case_number" maxlength="20" placeholder="e.g. 1:26-cv-00123-RML">
      <div class="yc-hint">Stored exactly as entered — no formatting applied.</div>
    </div>
    <div class="yc-field yc-2x">
      <label class="yc-label">Case Number (Full)</label>
      <input type="text" name="case_number_full" maxlength="20" placeholder="e.g. 1:26-cv-00123 (RML)">
      <div class="yc-hint">Optional alternate / full form of the docket.</div>
    </div>
    <div class="yc-field yc-field-locked">
      <label class="yc-label">Case ID</label>
      <input type="text" name="case_id" data-yc-locked-msg="The Case ID cannot be changed">
    </div>
  </div>

  <div class="yc-row">
    <div class="yc-field yc-2x">
      <label class="yc-label">Judge</label>
      <input type="text" name="case_judge" maxlength="100" placeholder="e.g. Robert M. Lindeman">
    </div>
    <div class="yc-field">
      <label class="yc-label">Opened</label>
      <input type="date" name="case_open_date">
    </div>
    <div class="yc-field">
      <label class="yc-label">Filed</label>
      <input type="date" name="case_file_date">
    </div>
    <div class="yc-field">
      <label class="yc-label">Closed</label>
      <input type="date" name="case_close_date">
    </div>
  </div>

  <div class="yc-hint" style="margin: 4px 2px 0;">
    Hearings, depositions, and deadlines are tracked on the <strong>Events</strong> tab.
  </div>

  <!-- ═══ NOTES + ALERTS ═══ -->
  <div class="yc-section">
    <div class="yc-section-title">Notes &amp; Alerts</div>

    <div class="yc-row">
      <div class="yc-field yc-2x">
        <label class="yc-label">Case Notes</label>
        <textarea name="case_notes" rows="6" maxlength="65535"></textarea>
        <div class="yc-hint">Court, opposing counsel, and other matter details — record here.</div>
      </div>
      <div class="yc-field yc-2x">
        <label class="yc-label">Alerts</label>
        <textarea name="case_alerts" rows="6" maxlength="5000"></textarea>
      </div>
    </div>
  </div>

  <button type="button" class="yc-btn yc-btn-primary yc-btn-block" id="saveBtn">
    Save
  </button>
</form>

<script src="/js/yc-forms.js"></script>
<script>
  const P = window.parent;
  const params = new URLSearchParams(location.search);
  const caseId = params.get('case_id');

  if (!caseId) {
    document.body.innerHTML = '<p style="color:red;padding:20px;">Missing case_id parameter.</p>';
  } else {

    const form = new YCForm({
      formKey:       'case_details_general',
      schemaVersion: 1,
      linkType:      'case',
      linkId:        caseId,
      container:     '#caseDetailsForm',
      dataMode:      'live',
      autosave:      true,
      autosaveMs:    3000,
      readonly:      false,

      fields: {
        // Locked display fields
        debtor_name:      { el: '[name="debtor_name"]',   type: 'text', readonly: true },
        codebtor_name:    { el: '[name="codebtor_name"]', type: 'text', readonly: true },
        case_id:          { el: '[name="case_id"]',       type: 'text', readonly: true },

        // Editable case details (form field names == DB column names; no apiMap)
        case_number:      { el: '[name="case_number"]',      type: 'text' },
        case_number_full: { el: '[name="case_number_full"]', type: 'text' },
        case_judge:       { el: '[name="case_judge"]',       type: 'text' },
        case_open_date:   { el: '[name="case_open_date"]',   type: 'date' },
        case_file_date:   { el: '[name="case_file_date"]',   type: 'date' },
        case_close_date:  { el: '[name="case_close_date"]',  type: 'date' },

        // Notes
        case_notes:  { el: '[name="case_notes"]',  type: 'textarea' },
        case_alerts: { el: '[name="case_alerts"]', type: 'textarea' },
      },

      endpoints: {
        load: { method: 'GET', url: '/api/cases/{linkId}?include=clients', path: 'case' },
      },

      onSubmit: {
        patch: { method: 'PATCH', url: '/api/cases/{linkId}' },
      },

      onLoad: async () => {
        const loadResult = form._loadResult || {};
        const clients    = loadResult.clients || [];

        // Client name (locked display)
        const PC = clients.find(c => c.relate_type === 'Primary');
        if (PC) {
          document.querySelector('[name="debtor_name"]').value = PC.contact_name || '';
        }

        // Secondary party (show field if one exists)
        const SC = clients.find(c => c.relate_type === 'Secondary');
        if (SC) {
          document.querySelector('[name="codebtor_name"]').value = SC.contact_name || '';
          document.getElementById('codebtorField').style.display = '';
        }
      },

      onSave: () => {
        //try { P.postMessage({ type: 'form-saved', form: 'case_details_general' }, '*'); } catch (_) {}
      },
    });

    // No custom _buildPatchPayload here (unlike the BK form): field names already
    // equal DB column names and there is no apiMap, so YCForm's default builder —
    // which sends only changed, non-readonly fields — does exactly what we need.
    // Dockets are stored verbatim (no split); that transform lives only in the BK form.

    form.init();
  }
</script>
</body>
</html>
